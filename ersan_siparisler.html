<style>
/* Sipariş sayfasına özel stiller */
.sp-layout {
  display: flex;
  height: calc(100vh - 52px);
  overflow: hidden;
}
.sp-sol {
  width: 280px;
  flex-shrink: 0;
  background: var(--beyaz);

  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sp-sol-baslik {
  padding: 10px 14px;

  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sp-sol-baslik h2 {
  font-size: 12px;
  font-weight: 600;
  color: var(--laci);
  margin: 0;
}
.sp-sayi {
  font-size: 11px;
  color: var(--metin4);
}
.sp-arama {
  padding: 8px 12px;

  flex-shrink: 0;
}
.sp-arama input {
  width: 100%;

}

.sp-tab-btn { flex:1; padding:7px 4px; font-size:11px; text-align:center; cursor:pointer; border:none; background:transparent; color:#6b7280; border-bottom:2px solid transparent; font-weight:400; font-family:inherit; white-space:nowrap; transition:all .12s; }
.sp-tab-btn.on { color:#1a2b47; border-bottom-color:#1a2b47; font-weight:500; }
.sp-tab-btn:hover:not(.on) { background:#f9fafb; }
.sp-liste {

/* Liste item */

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var BASE = 'app5LDgJMgocw79Ix';
var TABLES = { se: 'tbl56Oj1nPaqefI60', ie: 'tbl58qL39I2tv8hK4' };

var records = [], currentFilter = 'Tumu', selectedSP = null, selectedKalemIdx = null;
var musteriPoMap = JSON.parse(localStorage.getItem('musteriPoMap') || '{}');
var pdfDoc = null, pdfZoom = 1.2, pdfRotation = 0, pdfCurrentUrl = null;
var pdfRotationCache = JSON.parse(sessionStorage.getItem('pdfRotationCache') || '{}');
var YOGUNLUK = {'Celik':7.85,'Paslanmaz':7.93,'Aluminyum':2.70,'Titanyum':4.51,'Bronz':8.89,'Pirinc':8.50,'Bakir':8.96};

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function pillClass(s) {
  if (s==='Uretimde'||s==='Üretimde') return 'sp-bdg-ure';
  if (s==='Tamamlandi'||s==='Tamamlandı') return 'sp-bdg-tam';
  if (s==='Iptal'||s==='İptal') return 'sp-bdg-iptal';
  if (s==='Kismi Sevk'||s==='Kısmi Sevk') return 'sp-bdg-ksv';
  return 'sp-bdg-bek';
}

function fmtDate(d) { if(!d) return '—'; try { return new Date(d).toLocaleDateString('tr-TR'); } catch(e){ return d; } }

function spParent(seNo) {
  if (!seNo) return seNo;
  var p = seNo.split('-');
  if (p.length === 4 && p[0] === 'SP') return p.slice(0,3).join('-');
  return seNo;
}

function buildGroups(recs) {
  var map = {}, order = [];
  recs.forEach(function(r) {
    var f = r.fields;
    var parent = spParent(f['SE No'] || r.id);
    if (!map[parent]) { map[parent] = []; order.push(parent); }
    map[parent].push(r);
  });
  return order.map(function(p) {
    var kalemler = map[p];
    kalemler.sort(function(a,b){ return (a.fields['Kalem Sıra']||0) - (b.fields['Kalem Sıra']||0); });
    var durumOncelik = {'İptal':0,'Iptal':0,'Beklemede':1,'Üretimde':2,'Uretimde':2,'Kısmi Sevk':3,'Kismi Sevk':3,'Tamamlandı':4,'Tamamlandi':4};
    var durumlar = kalemler.map(function(r){ return r.fields['Durum']||'Beklemede'; });
    var durum = durumlar.reduce(function(a,b){ return (durumOncelik[a]||1) <= (durumOncelik[b]||1) ? a : b; });
    var parcalar = kalemler.map(function(r){ return r.fields['Parça Adı']||''; }).filter(Boolean);
    return { spNo: p, kalemler: kalemler, durum: durum, parcalar: parcalar };
  });
}

async function apiGet(table, params) {
  var path = '/v0/' + BASE + '/' + encodeURIComponent(table) + (params ? '?' + params : '');
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({method: 'GET', path: path})
  });
  var d = await r.json();
  if (d.error) {
    var msg = typeof d.error === 'string' ? d.error : (d.error.message || d.error.type || JSON.stringify(d.error));
    throw new Error(msg);
  }
  return d;
}

async function apiPatch(table, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table, id, fields})
  });
  return r.json();
}

async function apiDelete(table, id) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'DELETE', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table, id})
  });
  return r.json();
}

async function loadList() {
  try {
    var all = [], pageOffset = '';
    do {
      var params = 'sort%5B0%5D%5Bfield%5D=SE%20No&sort%5B0%5D%5Bdirection%5D=desc' + (pageOffset ? '&offset=' + pageOffset : '');
      var d = await apiGet('Satış Emirleri', params);
      all = all.concat(d.records || []);
      pageOffset = d.offset || '';
    } while (pageOffset);
    records = all;
    syncMusteriPoFromRecords();
    filterList();
    var params = new URLSearchParams(window.location.search);

function base64ToBlobUrl(base64str) {
  var raw = base64str;
  if (raw.indexOf(',') !== -1) raw = raw.split(',')[1];
  var mime = 'application/pdf';
  if (base64str.indexOf('data:') === 0) {
    var m = base64str.match(/data:([^;]+)/);
    if (m) mime = m[1];
  }
  var byteChars = atob(raw);
  var byteArr = new Uint8Array(byteChars.length);
  for (var j = 0; j < byteChars.length; j++) byteArr[j] = byteChars.charCodeAt(j);
  var blob = new Blob([byteArr], {type: mime});
  return URL.createObjectURL(blob);
}

async function selectKalem(idx) {
  if (!window._currentGroup) return;
  selectedKalemIdx = idx;
  renderKalemler(window._currentGroup.kalemler, idx);

  var r = window._currentGroup.kalemler[idx];
  var f = r.fields;
  var localPDF = f['_localPDF'];
  var pdfArr = f['Teknik Resim'];
  var url = null, name = null;

  if (localPDF) {
    url = localPDF.url; name = localPDF.filename;
  } else if (pdfArr && pdfArr.length) {
    url = pdfArr[0].url; name = pdfArr[0].filename || 'teknik.pdf';
  } else {
    try {
      var recData = await apiGet('Satış Emirleri', 'filterByFormula=RECORD_ID()%3D%22' + r.id + '%22&fields%5B%5D=PDF%20Data');
      var rec = (recData.records || [])[0];
      var pdfData = rec && rec.fields && rec.fields['PDF Data'];
      if (pdfData) {
        url = pdfData;
        name = 'teknik-resim.pdf';
        r.fields['PDF Data'] = pdfData;
      }
    } catch(e) { /* PDF Data yok */ }
  }

  if (url && url !== pdfCurrentUrl) loadPDF(url, name);

async function loadPDF(url, filename) {
  pdfCurrentUrl = url;
  var fn = document.getElementById('pdf-filename'); if(fn) fn.textContent = filename||'teknik.pdf';
  var area = document.getElementById('pdf-canvas-area');
  if (!area) return;
  area.className = 'pdf-canvas-wrap'; area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;padding:1rem;">Yukleniyor...</p>';
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfRotation = pdfRotationCache[url] || 0;
    var page = await pdfDoc.getPage(1);
    var vp0 = page.getViewport({scale:1, rotation:pdfRotation});
    pdfZoom = Math.max(0.3, (area.clientWidth-32)/vp0.width);
    renderPDFPage();
  } catch(e) {
    area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;padding:1rem;">PDF yuklenemedi: '+e.message+'</p>';
  }
}

async function renderPDFPage() {
  if (!pdfDoc) return;
  var area = document.getElementById('pdf-canvas-area');
  if (!area) return;
  area.className = 'pdf-canvas-wrap';
  try {
    var page = await pdfDoc.getPage(1);
    var vp = page.getViewport({scale:pdfZoom, rotation:pdfRotation});
    var canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    area.innerHTML = ''; area.appendChild(canvas);
    await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
    var zv = document.getElementById('zoom-val'); if(zv) zv.textContent = Math.round(pdfZoom*100)+'%';
    initPan(area);
  } catch(e) { /* render hatasi */ }
}

function initPan(area) {
  if (area._panReady) return;
  area._panReady = true;
  var dragging = false, startX, startY, scrollL, scrollT;
  area.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    dragging = true; area.classList.add('panning');
    startX = e.clientX; startY = e.clientY;
    scrollL = area.scrollLeft; scrollT = area.scrollTop;
    e.preventDefault();
  });
  area.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    area.scrollLeft = scrollL - (e.clientX - startX);
    area.scrollTop = scrollT - (e.clientY - startY);
  });
  area.addEventListener('mouseup', function() { dragging = false; area.classList.remove('panning'); });
  area.addEventListener('mouseleave', function() { dragging = false; area.classList.remove('panning'); });
  area.addEventListener('wheel', function(e) {
    if (!pdfDoc) return;
    e.preventDefault();
    if (e.deltaY < 0) { pdfZoom = Math.min(pdfZoom + 0.15, 4); }
    else { pdfZoom = Math.max(pdfZoom - 0.15, 0.3); }
    renderPDFPage();
  }, {passive: false});
}

function zoomIn() { if(!pdfDoc) return; pdfZoom = Math.min(pdfZoom+0.25,4); renderPDFPage(); }
function zoomOut() { if(!pdfDoc) return; pdfZoom = Math.max(pdfZoom-0.25,0.5); renderPDFPage(); }
function rotatePDF() { if(!pdfDoc) return; pdfRotation=(pdfRotation+90)%360; if(pdfCurrentUrl){ pdfRotationCache[pdfCurrentUrl]=pdfRotation; sessionStorage.setItem('pdfRotationCache',JSON.stringify(pdfRotationCache)); } renderPDFPage(); }
function zoomFit() {
  if(!pdfDoc) return;
  pdfDoc.getPage(1).then(function(page) {
    var vp = page.getViewport({scale:1,rotation:pdfRotation});
    var area = document.getElementById('pdf-canvas-area');
    if(!area) return;
    pdfZoom = Math.max(0.3,(area.clientWidth-32)/vp.width);
    renderPDFPage();
  });
}

function uploadPDF(input) {
  var recordId = input.dataset.recid;
  var idx = parseInt(input.dataset.idx);
  var file = input.files[0];
  if (!file) return;
  if (file.size > 10*1024*1024) { toast('Max 10MB'); return; }
  var objectUrl = URL.createObjectURL(file);
  var r = window._currentGroup.kalemler[idx];
  r.fields['_localPDF'] = {url: objectUrl, filename: file.name};
  renderKalemler(window._currentGroup.kalemler, selectedKalemIdx);
  loadPDF(objectUrl, file.name);
  toast('PDF goruntuleniyor, kaydediliyor...');
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var upRes = await fetch('/.netlify/functions/upload-pdf', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({filename:file.name, data:e.target.result, recordId:recordId, table:'İş Emirleri'})
      });
      var upData = await upRes.json();
      if (upData.success) toast('PDF kaydedildi');
      else toast('Goruntuleme OK, kayit hatasi: '+(upData.error||'?'));
    } catch(e2) { toast('Goruntuleme OK, kayit hatasi: '+e2.message); }
  };
  reader.readAsDataURL(file);
}

function calcKg(tip, s, adet) {
  var rho = YOGUNLUK[s.yogunluk]||7.85, gram=0;
  if(tip==='Mil'){var r2=(parseFloat(s.cap)||0)/2/10,h2=(parseFloat(s.boy)||0)/10;gram=Math.PI*r2*r2*h2*rho;}
  else if(tip==='Boru'){var rd2=(parseFloat(s.cap)||0)/2/10,ri2=(parseFloat(s.ic_cap)||0)/2/10,h3=(parseFloat(s.boy)||0)/10;gram=Math.PI*(rd2*rd2-ri2*ri2)*h3*rho;}
  else if(tip==='Lama'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*((parseFloat(s.boy)||0)/10)*rho;}
  else if(tip==='Sac'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.boy)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*rho;}
  return gram/1000*(adet||1);
}

    html += '<div><div style="'+_stlLbl+'">MALZEME TIPI</div><select id="stl-mtyp-'+uid+'" style="'+_stlInp+'">'+

      html += '<div><div style="'+_stlLbl+'">BOY (mm)</div><input id="stl-boy-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.boy||'')+'" placeholder="200"></div>';
    } else if(s.malzemeTipi==='Boru'){
      html += '<div><div style="'+_stlLbl+'">DIS CAP (mm)</div><input id="stl-cap-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.cap||'')+'" placeholder="150"></div>';
      html += '<div><div style="'+_stlLbl+'">IC CAP (mm)</div><input id="stl-ic-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.ic_cap||'')+'"></div>';
      html += '<div><div style="'+_stlLbl+'">BOY (mm)</div><input id="stl-boy-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.boy||'')+'" placeholder="200"></div>';
    } else if(s.malzemeTipi==='Lama'){

      html += '<div><div style="'+_stlLbl+'">KALINLIK (mm)</div><input id="stl-kal-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.kalinlik||'')+'" placeholder="20"></div>';
      html += '<div><div style="'+_stlLbl+'">BOY (mm)</div><input id="stl-boy-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.boy||'')+'" placeholder="300"></div>';
    } else if(s.malzemeTipi==='Sac'){
      html += '<div><div style="'+_stlLbl+'">EN (mm)</div><input id="stl-en-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.en||'')+'" placeholder="500"></div>';
      html += '<div><div style="'+_stlLbl+'">BOY (mm)</div><input id="stl-boy-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.boy||'')+'" placeholder="500"></div>';
      html += '<div><div style="'+_stlLbl+'">KALINLIK (mm)</div><input id="stl-kal-'+uid+'" type="number" style="'+_stlInp+'" value="'+(s.kalinlik||'')+'" placeholder="5"></div>';
    }
    html += '<div id="stl-kg-'+uid+'" style="grid-column:1/-1;background:var(--yesil-bg);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--yesil-t);font-weight:600;display:'+(kg>0?'block':'none')+';">'+(kg>0?'Tahmini: '+kg.toFixed(2)+' kg/adet':'')+'</div>';

function renderSTL() {
  var body = document.getElementById('stl-body');
  body.innerHTML = '';
  window._stlKalemler.forEach(function(kalem, ki) {
    var kalemDiv = document.createElement('div');
    kalemDiv.style.cssText = 'border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;';
    var seNo = kalem.seNo.split('-').pop() || (ki+1);
    var header = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bg);">'+
      '<span style="font-size:12px;font-weight:600;color:var(--mavi-koyu);">Kalem '+seNo+'</span>'+
      '<span style="font-size:12px;font-weight:500;">'+kalem.parcaAdi+'</span>'+
      '<span style="font-size:11px;color:var(--metin4);">'+kalem.miktar+' '+kalem.birim+'</span>'+
      '</div>';
    var rowsHtml = '';
    kalem.rows.forEach(function(row, ri) {
      var uid = ki+'_'+ri;
      var aciliyetRenk = row.aciliyet==='Kritik'?'color:var(--kirmizi)':row.aciliyet==='Y\u00FCksek'?'color:var(--sari)':'';
      rowsHtml += '<div style="position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
        '<span style="font-size:10px;font-weight:600;color:var(--metin3);">'+(ri+1)+'. '+(row.tip==='Fason'?'Fason':'Hammadde')+'</span>'+
        '<div style="display:flex;align-items:center;gap:6px;">'+
        '<select id="stl-acl-'+uid+'" style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;font-weight:600;font-family:inherit;'+aciliyetRenk+'" onchange="window._stlKalemler['+ki+'].rows['+ri+'].aciliyet=this.value;renderSTL()">'+
        '<option'+(row.aciliyet==='Normal'?' selected':'')+'>Normal</option>'+
        '<option'+(row.aciliyet==='Y\u00FCksek'?' selected':'')+' style="color:var(--sari)">Y\u00FCksek</option>'+
        '<option'+(row.aciliyet==='Kritik'?' selected':'')+' style="color:var(--kirmizi)">Kritik</option></select>'+
        '<button onclick="removeSTLRow('+ki+','+ri+')" style="background:transparent;border:none;color:var(--kirmizi);font-size:12px;cursor:pointer;">Sil</button>'+
        '</div></div>'+
        renderSTLRow(row, uid)+
        '</div>';
    });
    rowsHtml += '<button onclick="addSTLRow('+ki+')" style="width:100%;padding:5px;border:1px dashed var(--metin4);border-radius:6px;background:transparent;color:var(--metin3);font-size:11px;cursor:pointer;margin-top:2px;font-family:inherit;">+ Talep Satiri Ekle</button>';
    kalemDiv.innerHTML = header + rowsHtml;
    body.appendChild(kalemDiv);
    kalem.rows.forEach(function(row, ri) {
      var uid = ki+'_'+ri;
      setTimeout(function() {
        var tipSel = document.getElementById('stl-tip-'+uid);
        if(tipSel) tipSel.onchange = function(){ kalem.rows[ri].tip=this.value; if(this.value==='Fason') kalem.rows[ri].malzemeTipi='Fason'; renderSTL(); };
        var mtypSel = document.getElementById('stl-mtyp-'+uid);
        if(mtypSel) mtypSel.onchange = function(){ kalem.rows[ri].malzemeTipi=this.value; renderSTL(); };
        var yogSel = document.getElementById('stl-yog-'+uid);
        if(yogSel) yogSel.onchange = function(){ kalem.rows[ri].yogunluk=this.value; stlDebounceKg(uid,ki,ri); };
        ['mc','cap','ic','boy','en','kal','spec'].forEach(function(fld){
          var el = document.getElementById('stl-'+fld+'-'+uid);
          if(!el) return;
          var map = {mc:'malzemeCinsi',cap:'cap',ic:'ic_cap',boy:'boy',en:'en',kal:'kalinlik',spec:'spec'};
          if(fld==='mc' && kalem.rows[ri].tip==='Fason') {
            el.onchange = function(){ kalem.rows[ri].malzemeCinsi=this.value; };
          } else {
            el.oninput = function(){ kalem.rows[ri][map[fld]]=this.value; if(['cap','ic','boy','en','kal'].indexOf(fld)>=0) stlDebounceKg(uid,ki,ri); };
          }
        });
      }, 0);
    });
  });
}

var _stlKgTimer = null;
function stlDebounceKg(uid, ki, ri) {
  clearTimeout(_stlKgTimer);
  _stlKgTimer = setTimeout(function() {
    var s = window._stlKalemler[ki].rows[ri]; if(!s) return;
    var kg = calcKg(s.malzemeTipi, s, 1);
    var el = document.getElementById('stl-kg-'+uid);
    if(el){ el.textContent = kg>0?'Tahmini: '+kg.toFixed(2)+' kg/adet':''; el.style.display = kg>0?'block':'none'; }
  }, 600);
}

function stlOlcuStr(s) {
  if(s.malzemeTipi==='Mil') return 'O'+(s.cap||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Boru') return 'O'+(s.cap||'?')+'/'+(s.ic_cap||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Lama') return (s.en||'?')+'x'+(s.kalinlik||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Sac') return (s.en||'?')+'x'+(s.boy||'?')+'x'+(s.kalinlik||'?')+'mm';
  return '';
}

async function saveSTL() {
  try {
    var count = 0;
    var hatalar = [];
    for (var ki=0; ki<window._stlKalemler.length; ki++) {
      var kalem = window._stlKalemler[ki];
      for (var ri=0; ri<kalem.rows.length; ri++) {
        var s = kalem.rows[ri];
        var kg = s.tip==='Hammadde' ? calcKg(s.malzemeTipi, s, kalem.miktar) : 0;
        var bugun = new Date().toISOString().split('T')[0];
        var acl = s.aciliyet || 'Normal';
        var ihtiyacT = acl === 'Normal' ? new Date(Date.now()+7*86400000).toISOString().split('T')[0] : bugun;
        var res = await fetch('/.netlify/functions/airtable',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({method:'POST',path:'/v0/'+BASE+'/tblHmfCvNZq0qNtb1',body:{fields:{
            'Talep No': window._stlPrNo || '',
            'SE No': [kalem.seId],
            'Kalem Adı': kalem.parcaAdi,
            'Talep Tipi': s.tip,
            'Malzeme İşlem': s.tip==='Fason'?(s.malzemeCinsi||''):(s.malzemeTipi+' - '+(s.malzemeCinsi||'')),
            'Miktar': kalem.miktar||0,
            'Birim': kalem.birim||'Adet',
            'Ölçü': s.tip==='Hammadde'?stlOlcuStr(s):(s.spec||''),
            'Tahmini kg': kg>0?parseFloat(kg.toFixed(3)):null,
            'Durum':'Taslak',
            'PR Tipi': 'Siparise Bagli',
            'Aciliyet': acl,
            'Ihtiyac Tarihi': ihtiyacT,
            'Talep Tarihi': bugun
          }}})
        });
        var data = await res.json();
        if (data.error) {
          console.error('STL kayit hatasi:', JSON.stringify(data.error));
          hatalar.push(kalem.parcaAdi + ': ' + (data.error.message || JSON.stringify(data.error)));
        } else {
          count++;
        }
      }
    }
    document.getElementById('stl-modal').remove();
    if (hatalar.length > 0) {
      toast('Hata: ' + hatalar[0], 'err');
      console.error('Tum hatalar:', hatalar);
    } else {
      toast(count+' satinalma talebi olusturuldu');
    }
    // Detay panelini yenile
    if (window._currentGroup) selectGroup(window._currentGroup.spNo);
    logIslem('Oluşturuldu', 'Satınalma', null, window._currentGroup?.spNo, null, {adet:count});
  } catch(e) { toast('Hata: '+e.message, 'err'); console.error('saveSTL exception:', e); }
}

    '</div></div>';
  document.body.appendChild(modal);
  document.getElementById('ie-save-btn').onclick = function() { saveIE(g); };

  // Auto-fill empty termin inputs with today + 21 days

    for (var j = 0; j < g.kalemler.length; j++) {

async function saveIE(g) {
  var btn = document.getElementById('ie-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Olusturuluyor...'; }
  try {
    var count = 0;
    for (var i = 0; i < g.kalemler.length; i++) {
      var chk = document.getElementById('ie-chk-'+i);
      if (!chk || !chk.checked) continue;
      var r = g.kalemler[i];
      var f = r.fields;
      var miktar = parseInt(document.getElementById('ie-mik-'+i).value) || f['Miktar'] || 0;
      var oncelik = document.getElementById('ie-onc-'+i).value || 'Normal';
      var fai = document.getElementById('ie-fai-'+i).checked;
      var terminDate = document.getElementById('ie-termin-'+i).value || f['Termin Tarihi'] || null;

      var ieFields = {
        'SE No': [r.id],
        'Parça No': f['Parça No'] || '',
        'Parça Adı': f['Parça Adı'] || '',
        'Revizyon': f['Revizyon'] || '',
        'Miktar': miktar,
        'Birim': f['Birim'] || 'Adet',
        'Açılış Tarihi': new Date().toISOString().split('T')[0],
        'Termin Tarihi': terminDate,
        'Öncelik': oncelik,
        'Durum': 'Taslak',
        'FAI Gerekli mi?': fai
      };

      await fetch('/.netlify/functions/airtable', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({method:'POST', path:'/v0/'+BASE+'/'+encodeURIComponent('İş Emirleri'), body:{fields:ieFields}})
      });
      count++;
    }
    document.getElementById('ie-modal').remove();
    toast(count + ' is emri olusturuldu');
    logIslem('Oluşturuldu', 'İş Emri', null, g.spNo, null, {adet:count});
  } catch(e) {
    toast('Hata: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Is Emirlerini Olustur'; }
  }
}

function akisGuncelle(durum) {
  var adimlar = ['as-siparis','as-pr','as-uretim','as-sevk','as-teslim'];
  var aktifIdx = durum === 'Beklemede' ? 0 : (durum === 'Üretimde' || durum === 'Uretimde') ? 2 : (durum === 'Sevk Edildi' || durum === 'Kısmi Sevk' || durum === 'Kismi Sevk') ? 3 : (durum === 'Tamamlandı' || durum === 'Tamamlandi') ? 4 : 1;
  adimlar.forEach(function(id, i) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = 'as-step' + (i < aktifIdx ? ' done' : i === aktifIdx ? ' active' : '');
  });
}
