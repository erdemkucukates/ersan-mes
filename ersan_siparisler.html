<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Sipariş Yönetimi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; overflow: hidden; }
.layout { display: flex; height: 100vh; padding-top: 48px; }
.sidebar { width: 230px; background: #fff; border-right: 1px solid #e2e5ea; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sb-head { padding: 12px 14px 8px; border-bottom: 1px solid #e2e5ea; }
.sb-title { font-size: 13px; font-weight: 600; color: #1a1d23; }
.sb-count { font-size: 11px; color: #9aa0ad; margin-top: 2px; }
.sb-search { margin: 8px 10px; padding: 6px 10px; border: 1px solid #e2e5ea; border-radius: 7px; font-size: 12px; width: calc(100% - 20px); outline: none; }
.sb-search:focus { border-color: #7c3aed; }
.ftabs { display: flex; gap: 4px; padding: 0 10px 8px; flex-wrap: wrap; }
.ft { padding: 2px 9px; border-radius: 20px; font-size: 10px; border: 1px solid #e2e5ea; color: #5a6170; cursor: pointer; background: #fff; }
.ft.on { background: #1a1d23; color: #fff; border-color: #1a1d23; }
.sb-list { flex: 1; overflow-y: auto; }
.si { padding: 10px 14px; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: background .1s; }
.si:hover { background: #f7f8fa; }
.si.active { background: #eff6ff; border-left: 2px solid #2563eb; }
.si-top { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.si-no { font-size: 11px; font-weight: 600; color: #2563eb; font-family: monospace; }
.si-kalem { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: #f0f2f5; color: #5a6170; font-weight: 500; }
.si.active .si-kalem { background: #dbeafe; color: #1d4ed8; }
.si-pill { margin-left: auto; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.si-name { font-size: 12px; color: #1a1d23; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pill-bek { background: #f3f4f6; color: #6b7280; }
.pill-ure { background: #dbeafe; color: #2563eb; }
.pill-tam { background: #d1fae5; color: #059669; }
.pill-ips { background: #fee2e2; color: #dc2626; }
.pill-ksv { background: #fef3c7; color: #92400e; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: #fff; border-bottom: 1px solid #e2e5ea; padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.tb-no { font-size: 16px; font-weight: 700; font-family: monospace; color: #1a1d23; }
.tb-kalem { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f3f4f6; color: #5a6170; font-weight: 500; }
.termin-badge { font-size: 11px; padding: 3px 10px; border-radius: 7px; background: #fef3c7; color: #92400e; font-weight: 500; }
.termin-badge.late { background: #fee2e2; color: #991b1b; }
.tb-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.btn { padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; border: 1px solid #e2e5ea; cursor: pointer; background: #fff; color: #5a6170; }
.btn:hover { background: #f7f8fa; }
.btn-amber { background: #f59e0b; color: #fff; border-color: #f59e0b; }
.btn-blue { background: #2563eb; color: #fff; border-color: #2563eb; }
.btn-red { border-color: #fca5a5; color: #dc2626; }
.btn-red:hover { background: #fee2e2; }
.body-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.kalem-head { display: grid; grid-template-columns: 40px 2fr 110px 60px 80px 90px 100px; gap: 8px; padding: 6px 16px; background: #f7f8fa; font-size: 10px; font-weight: 600; color: #9aa0ad; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #e2e5ea; flex-shrink: 0; }
.kalem-list { flex-shrink: 0; }
.kalem-item { border-bottom: 1px solid #e2e5ea; cursor: pointer; transition: all .15s; }
.kalem-item.dimmed { opacity: 0.4; }
.kalem-item.selected { border-left: 3px solid #2563eb; background: #eff6ff; }
.kalem-summary { display: grid; grid-template-columns: 40px 2fr 110px 60px 80px 90px 100px; gap: 8px; padding: 8px 16px; font-size: 12px; align-items: center; }

.kalem-detail { padding: 10px 16px 12px 16px; border-top: 1px dashed #e2e5ea; background: rgba(37,99,235,0.03); display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.det-f label { font-size: 10px; color: #9aa0ad; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
.det-f .v { font-size: 12px; font-weight: 600; color: #1a1d23; }
.pdf-pane { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; overflow: hidden; min-height: 200px; }
.pdf-bar { display: flex; align-items: center; gap: 6px; padding: 7px 12px; background: #fff; border-top: 1px solid #e2e5ea; flex-shrink: 0; }
.pdf-filename { font-size: 12px; font-weight: 500; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1a1d23; }
.zoom-btn { width: 28px; height: 28px; border: 1px solid #e2e5ea; border-radius: 6px; background: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #5a6170; }
.zoom-btn:hover { background: #f0f2f5; }
.zoom-val { font-size: 11px; color: #5a6170; min-width: 38px; text-align: center; }
.zoom-fit { font-size: 11px; padding: 0 10px; height: 28px; border: 1px solid #e2e5ea; border-radius: 6px; background: #fff; cursor: pointer; color: #5a6170; }
.zoom-fit:hover { background: #f0f2f5; }
.pdf-canvas-wrap { flex: 1; overflow: auto; padding: 16px; background: #6b7280; text-align: center; cursor: grab; }
.pdf-canvas-wrap.panning { cursor: grabbing; }
.pdf-canvas-wrap canvas { display: inline-block; box-shadow: 0 4px 16px rgba(0,0,0,.3); flex-shrink: 0; pointer-events: none; }
.pdf-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #9aa0ad; background: #6b7280; }
.pdf-empty-icon { width: 56px; height: 68px; border: 2px solid rgba(255,255,255,.3); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: rgba(255,255,255,.6); }
.pdf-empty p { font-size: 12px; color: rgba(255,255,255,.6); }
.upbtn { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 1px dashed #9aa0ad; color: #5a6170; cursor: pointer; background: transparent; white-space: nowrap; }
.upbtn.has { border: 1px solid #059669; color: #059669; background: #d1fae5; border-style: solid; }
.upbtn input { display: none; }
.empty-main { flex: 1; display: flex; align-items: center; justify-content: center; color: #9aa0ad; font-size: 14px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #1a1d23; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal-box { background: #fff; border-radius: 12px; width: 580px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.modal-head { background: #1a1d23; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
.modal-title { color: #fff; font-weight: 600; font-size: 14px; }
.modal-sub { color: #9aa0ad; font-size: 11px; margin-top: 2px; }
.modal-body { padding: 16px; overflow-y: auto; flex: 1; }
.modal-foot { padding: 12px 20px; border-top: 1px solid #e2e5ea; display: flex; justify-content: flex-end; gap: 8px; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<script src="ersan_nav.js"></script>
<div class="toast" id="toast"></div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Siparişler</div>
      <div class="sb-count" id="sb-count">yükleniyor...</div>
    </div>
    <input class="sb-search" id="search" placeholder="SE no veya parça ara..." oninput="filterList()">
    <div class="ftabs">
      <button class="ft on" onclick="setFilter(this,'Tümü')">Tümü</button>
      <button class="ft" onclick="setFilter(this,'Beklemede')">Beklemede</button>
      <button class="ft" onclick="setFilter(this,'Üretimde')">Üretimde</button>
      <button class="ft" onclick="setFilter(this,'Tamamlandı')">Tamamlandı</button>
    </div>
    <div class="sb-list" id="sb-list"><div style="padding:1rem;font-size:12px;color:#9aa0ad;">Yükleniyor...</div></div>
  </div>

  <div class="main" id="main">
    <div class="empty-main">Soldaki listeden bir sipariş seçin.</div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var BASE = 'app5LDgJMgocw79Ix';
var TABLES = { se: 'tbl56Oj1nPaqefI60', ie: 'tbl58qL39I2tv8hK4' };

var records = [], currentFilter = 'Tümü', selectedSP = null, selectedKalemIdx = null;
var pdfDoc = null, pdfZoom = 1.2, pdfRotation = 0, pdfCurrentUrl = null;
var pdfRotationCache = JSON.parse(sessionStorage.getItem('pdfRotationCache') || '{}');

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function pillClass(s) {
  if (s==='Üretimde') return 'pill-ure'; if (s==='Tamamlandı') return 'pill-tam'; if (s==='İptal') return 'pill-ips'; if (s==='Kısmi Sevk') return 'pill-ksv'; return 'pill-bek';
}

function fmtDate(d) { if(!d) return '—'; try { return new Date(d).toLocaleDateString('tr-TR'); } catch(e){ return d; } }

// SP-2026-001-01 → SP-2026-001
function spParent(seNo) {
  if (!seNo) return seNo;
  var p = seNo.split('-');
  if (p.length === 4 && p[0] === 'SP') return p.slice(0,3).join('-');
  return seNo;
}

// Group records by SP parent
function buildGroups(recs) {
  var map = {}, order = [];
  recs.forEach(function(r) {
    var f = r.fields;
    var parent = spParent(f['SE No'] || r.id);
    if (!map[parent]) { map[parent] = []; order.push(parent); }
    map[parent].push(r);
  });
  return order.map(function(p) {
    var kalemler = map[p];
    // Kalem sırasına göre sırala
    kalemler.sort(function(a,b){ return (a.fields['Kalem Sıra']||0) - (b.fields['Kalem Sıra']||0); });
    // Grup durumu: en yüksek öncelikli durumu al
    var durumOncelik = {'İptal':0,'Beklemede':1,'Üretimde':2,'Kısmi Sevk':3,'Tamamlandı':4};
    var durumlar = kalemler.map(function(r){ return r.fields['Durum']||'Beklemede'; });
    var durum = durumlar.reduce(function(a,b){ return (durumOncelik[a]||1) <= (durumOncelik[b]||1) ? a : b; });
    var parcalar = kalemler.map(function(r){ return r.fields['Parça Adı']||''; }).filter(Boolean);
    return { spNo: p, kalemler: kalemler, durum: durum, parcalar: parcalar };
  });
}

async function apiGet(table, params) {
  var path = '/v0/' + BASE + '/' + encodeURIComponent(table) + (params ? '?' + params : '');
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({method: 'GET', path: path})
  });
  var d = await r.json();
  if (d.error) {
    var msg = typeof d.error === 'string' ? d.error : (d.error.message || d.error.type || JSON.stringify(d.error));
    throw new Error(msg);
  }
  return d;
}

async function apiPatch(table, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table, id, fields})
  });
  return r.json();
}

async function apiDelete(table, id) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'DELETE', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table, id})
  });
  return r.json();
}

async function loadList() {
  try {
    var all = [], pageOffset = '';
    do {
      var params = 'sort%5B0%5D%5Bfield%5D=SE%20No&sort%5B0%5D%5Bdirection%5D=desc' + (pageOffset ? '&offset=' + pageOffset : '');
      var d = await apiGet('Satış Emirleri', params);
      all = all.concat(d.records || []);
      pageOffset = d.offset || '';
    } while (pageOffset);
    records = all;
    filterList();
  } catch(e) {
    var errMsg = e.message || JSON.stringify(e);
    console.error('loadList hatası:', e);
    document.getElementById('sb-list').innerHTML = '<div style="padding:1rem;color:#dc2626;font-size:12px;">Hata: '+errMsg+'</div>';
  }
}

function setFilter(el, f) {
  currentFilter = f;
  document.querySelectorAll('.ft').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on'); filterList();
}

function filterList() {
  var q = (document.getElementById('search').value||'').toLowerCase();
  var filtered = records.filter(function(r) {
    var f = r.fields;
    var mf = currentFilter==='Tümü' || (f['Durum']||'Beklemede')===currentFilter;
    var mq = !q || (f['SE No']||'').toLowerCase().includes(q) || (f['Parça Adı']||'').toLowerCase().includes(q) || (f['Parça No']||'').toLowerCase().includes(q);
    return mf && mq;
  });

  var groups = buildGroups(filtered);
  document.getElementById('sb-count').textContent = groups.length + ' sipariş';

  if (!groups.length) {
    document.getElementById('sb-list').innerHTML = '<div style="padding:1rem;text-align:center;color:#9aa0ad;font-size:12px;">Kayıt bulunamadı</div>';
    return;
  }

  document.getElementById('sb-list').innerHTML = groups.map(function(g) {
    var isActive = g.spNo === selectedSP;
    return '<div class="si'+(isActive?' active':'')+'" onclick="selectGroup(this.dataset.sp)" data-sp="'+g.spNo+'">'+
      '<div class="si-top">'+
      '<span class="si-no">'+g.spNo+'</span>'+
      '<span class="si-kalem">'+g.kalemler.length+' kalem</span>'+
      '<span class="si-pill '+pillClass(g.durum)+'">'+g.durum+'</span>'+
      '</div>'+
      '<div class="si-name">'+g.parcalar.slice(0,2).join(', ').substring(0,45)+'</div>'+
      '</div>';
  }).join('');
}

function selectGroup(spNo) {
  selectedSP = spNo;
  selectedKalemIdx = null;
  filterList();

  // Tüm kayıtlardan bu SP grubunu bul (filtre ne olursa olsun)
  var allGroups = buildGroups(records);
  var g = allGroups.find(function(x){ return x.spNo === spNo; });
  if (!g) return;

  renderMain(g);
}

function renderMain(g) {
  var main = document.getElementById('main');
  var firstDurum = g.durum;

  main.innerHTML =
    '<div class="top-bar">'+
    '<div class="tb-no">'+g.spNo+'</div>'+
    '<span class="tb-kalem">'+g.kalemler.length+' kalem</span>'+
    '<span class="si-pill '+pillClass(firstDurum)+'" style="font-size:11px;padding:3px 10px;">'+firstDurum+'</span>'+
    '<div class="tb-right">'+
    '<button class="btn btn-amber" id="stl-btn">📋 Satınalma Talebi</button>'+
    '<button class="btn btn-blue" id="ie-btn">⚙ İş Emri Aç</button>'+
    '<select id="durum-sel" style="padding:5px 8px;border:1px solid #e2e5ea;border-radius:7px;font-size:12px;" onchange="updateAllDurum(this.value)">'+
    ['Beklemede','Üretimde','Tamamlandı','Kısmi Sevk','İptal'].map(function(d){ return '<option'+(d===firstDurum?' selected':'')+'>'+d+'</option>'; }).join('')+
    '</select>'+
    '<button class="btn btn-red" id="del-btn">🗑 Sil</button>'+
    '</div></div>'+
    '<div class="body-area">'+
    '<div class="kalem-head"><span>Kalem</span><span>Parça adı</span><span>Parça no</span><span>Rev</span><span>Miktar</span><span>Termin</span><span>Teknik resim</span></div>'+
    '<div class="kalem-list" id="kalem-list"></div>'+
    '<div class="pdf-pane" id="pdf-pane">'+
    '<div class="pdf-bar">'+
    '<div class="pdf-filename" id="pdf-filename">Kalem seçin</div>'+
    '<button class="zoom-btn" onclick="zoomOut()">−</button>'+
    '<div class="zoom-val" id="zoom-val">120%</div>'+
    '<button class="zoom-btn" onclick="zoomIn()">+</button>'+
    '<button class="zoom-fit" onclick="zoomFit()">Sığdır</button>'+
    '<button class="zoom-fit" onclick="rotatePDF()" title="Döndür">↻</button>'+
    '</div>'+
    '<div id="pdf-canvas-area" class="pdf-empty-area">'+
    '<div class="pdf-icon">PDF</div>'+
    '<div class="pdf-msg">Kalem seçince teknik resim burada görünür</div>'+
    '</div>'+
    '</div></div>';

  window._currentGroup = g;
  renderKalemler(g.kalemler, null);

  setTimeout(function() {
    var stlBtn = document.getElementById('stl-btn');
    if (stlBtn) stlBtn.onclick = function() { openSTLModal(g); };
    var ieBtn = document.getElementById('ie-btn');
    if (ieBtn) ieBtn.onclick = function() { openIEModal(g); };
    var delBtn = document.getElementById('del-btn');
    if (delBtn) delBtn.onclick = function() { deleteGroup(g.spNo); };
  }, 0);
}

function renderKalemler(kalemler, selIdx) {
  var html = kalemler.map(function(r, i) {
    var f = r.fields;
    var isSel = i === selIdx;
    var isDim = selIdx !== null && !isSel;
    var hasPDF = f['_localPDF'] || f['PDF Data'] || (f['Teknik Resim'] && f['Teknik Resim'].length > 0);
    var seNo = f['SE No'] || '';
    var kalemNo = seNo.split('-').pop() || (i+1);
    var durum = f['Durum'] || 'Beklemede';

    var row = '<div class="kalem-summary">'+
      '<span style="font-family:monospace;font-size:11px;color:#7c3aed;font-weight:600;">'+kalemNo+'</span>'+
      '<span style="font-weight:500'+(isSel?';color:#1d4ed8':'')+'">'+( f['Parça Adı']||'—')+'</span>'+
      '<span style="font-family:monospace;font-size:11px">'+(f['Parça No']||'—')+'</span>'+
      '<span>'+(f['Revizyon']||'—')+'</span>'+
      '<span>'+(f['Miktar']||0)+' '+(f['Birim']||'Adet')+'</span>'+
      '<span style="font-size:11px">'+(f['Termin Tarihi']?fmtDate(f['Termin Tarihi']):'—')+'</span>'+
      '<label class="upbtn'+(hasPDF?' has':'')+'" onclick="event.stopPropagation()">'+
      (hasPDF?'PDF mevcut':'+ PDF yükle')+
      '<input type="file" accept=".pdf,image/*" data-recid="'+r.id+'" data-idx="'+i+'" onchange="uploadPDF(this)">'+
      '</label>'+
      '</div>';

    var detail = isSel ? '<div class="kalem-detail">'+
      '<div class="det-f"><label>SE No</label><div class="v" style="font-family:monospace">'+(f['SE No']||'—')+'</div></div>'+
      '<div class="det-f"><label>Parça adı</label><div class="v">'+(f['Parça Adı']||'—')+'</div></div>'+
      '<div class="det-f"><label>Parça no</label><div class="v" style="font-family:monospace">'+(f['Parça No']||'—')+'</div></div>'+
      '<div class="det-f"><label>Revizyon</label><div class="v">'+(f['Revizyon']||'—')+'</div></div>'+
      '<div class="det-f"><label>Miktar</label><div class="v">'+(f['Miktar']||0)+' '+(f['Birim']||'Adet')+'</div></div>'+
      '<div class="det-f"><label>Termin</label><div class="v" style="color:#b45309">'+(f['Termin Tarihi']?fmtDate(f['Termin Tarihi']):'—')+'</div></div>'+
      '<div class="det-f"><label>Durum</label><div class="v"><span class="si-pill '+pillClass(durum)+'" style="font-size:10px;padding:2px 8px;">'+durum+'</span></div></div>'+
      '<div class="det-f"><label>Müşteri PO</label><div class="v">'+(f['Müşteri PO No']||'—')+'</div></div>'+
      '<div class="det-f"><label>Notlar</label><div class="v" style="font-weight:400">'+(f['Notlar']||'—')+'</div></div>'+
      '</div>' : '';

    return '<div class="kalem-item'+(isSel?' selected':'')+(isDim?' dimmed':'')+'" id="kalem-'+i+'" onclick="selectKalem('+i+')">'+row+detail+'</div>';
  }).join('');
  document.getElementById('kalem-list').innerHTML = html;
}

function base64ToBlobUrl(base64str) {
  var raw = base64str;
  if (raw.indexOf(',') !== -1) raw = raw.split(',')[1];
  var mime = 'application/pdf';
  if (base64str.indexOf('data:') === 0) {
    var m = base64str.match(/data:([^;]+)/);
    if (m) mime = m[1];
  }
  var byteChars = atob(raw);
  var byteArr = new Uint8Array(byteChars.length);
  for (var j = 0; j < byteChars.length; j++) byteArr[j] = byteChars.charCodeAt(j);
  var blob = new Blob([byteArr], {type: mime});
  return URL.createObjectURL(blob);
}

async function selectKalem(idx) {
  if (!window._currentGroup) return;
  selectedKalemIdx = idx;
  renderKalemler(window._currentGroup.kalemler, idx);

  var r = window._currentGroup.kalemler[idx];
  var f = r.fields;
  var localPDF = f['_localPDF'];
  var pdfArr = f['Teknik Resim'];

  var url = null, name = null;

  // 1) Lokal yüklenen PDF (henüz kaydedilmemiş)
  if (localPDF) {
    url = localPDF.url; name = localPDF.filename;
  }
  // 2) Airtable attachment (Cloudinary URL)
  else if (pdfArr && pdfArr.length) {
    url = pdfArr[0].url; name = pdfArr[0].filename || 'teknik.pdf';
  }
  // 3) PDF Data (Cloudinary URL) — tek kayıt olarak lazy-fetch
  else {
    try {
      console.log('[PDF-VIEW] PDF Data lazy-fetch, recordId:', r.id);
      var recData = await apiGet('Satış Emirleri', 'filterByFormula=RECORD_ID()%3D%22' + r.id + '%22&fields%5B%5D=PDF%20Data');
      var rec = (recData.records || [])[0];
      var pdfData = rec && rec.fields && rec.fields['PDF Data'];
      if (pdfData) {
        console.log('[PDF-VIEW] PDF Data bulundu:', pdfData);
        url = pdfData;
        name = 'teknik-resim.pdf';
        r.fields['PDF Data'] = pdfData;
      } else {
        console.log('[PDF-VIEW] PDF Data boş — bu kalemde PDF yok');
      }
    } catch(e) {
      console.error('[PDF-VIEW] PDF Data fetch hatası:', e);
    }
  }

  if (url && url !== pdfCurrentUrl) loadPDF(url, name);
  else if (url) { var fn = document.getElementById('pdf-filename'); if(fn) fn.textContent = name; }
  // PDF yoksa mevcut PDF'i ekranda birak (clearPDF yapma)
}

function clearPDF() {
  var el = document.getElementById('pdf-filename'); if(el) el.textContent = 'PDF yüklü değil';
  var area = document.getElementById('pdf-canvas-area');
  if (area) { area.className = 'pdf-empty-area'; area.innerHTML = '<div class="pdf-icon">PDF</div><div class="pdf-msg">PDF yüklü değil — yüklemek için butona tıklayın</div>'; }
}

async function loadPDF(url, filename) {
  pdfCurrentUrl = url;
  var fn = document.getElementById('pdf-filename'); if(fn) fn.textContent = filename||'teknik.pdf';
  var area = document.getElementById('pdf-canvas-area');
  if (!area) return;
  area.className = 'pdf-canvas-wrap'; area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;padding:1rem;">Yükleniyor...</p>';
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfRotation = pdfRotationCache[url] || 0;
    var page = await pdfDoc.getPage(1);
    var vp0 = page.getViewport({scale:1, rotation:pdfRotation});
    pdfZoom = Math.max(0.3, (area.clientWidth-32)/vp0.width);
    renderPDFPage();
  } catch(e) {
    console.error('[PDF-VIEW] loadPDF HATA:', e.message, 'URL:', url);
    area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;padding:1rem;">PDF yüklenemedi: '+e.message+'</p>';
  }
}

async function renderPDFPage() {
  if (!pdfDoc) return;
  var area = document.getElementById('pdf-canvas-area');
  if (!area) return;
  area.className = 'pdf-canvas-wrap';
  try {
    var page = await pdfDoc.getPage(1);
    var vp = page.getViewport({scale:pdfZoom, rotation:pdfRotation});
    var canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    area.innerHTML = ''; area.appendChild(canvas);
    await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
    var zv = document.getElementById('zoom-val'); if(zv) zv.textContent = Math.round(pdfZoom*100)+'%';
    initPan(area);
  } catch(e) { console.error('[PDF] render hatası:', e); }
}

function initPan(area) {
  if (area._panReady) return;
  area._panReady = true;
  var dragging = false, startX, startY, scrollL, scrollT;
  area.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    dragging = true; area.classList.add('panning');
    startX = e.clientX; startY = e.clientY;
    scrollL = area.scrollLeft; scrollT = area.scrollTop;
    e.preventDefault();
  });
  area.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    area.scrollLeft = scrollL - (e.clientX - startX);
    area.scrollTop = scrollT - (e.clientY - startY);
  });
  area.addEventListener('mouseup', function() { dragging = false; area.classList.remove('panning'); });
  area.addEventListener('mouseleave', function() { dragging = false; area.classList.remove('panning'); });
  // Mouse wheel zoom
  area.addEventListener('wheel', function(e) {
    if (!pdfDoc) return;
    e.preventDefault();
    if (e.deltaY < 0) { pdfZoom = Math.min(pdfZoom + 0.15, 4); }
    else { pdfZoom = Math.max(pdfZoom - 0.15, 0.3); }
    renderPDFPage();
  }, {passive: false});
}

function zoomIn() { if(!pdfDoc) return; pdfZoom = Math.min(pdfZoom+0.25,4); renderPDFPage(); }
function zoomOut() { if(!pdfDoc) return; pdfZoom = Math.max(pdfZoom-0.25,0.5); renderPDFPage(); }
function rotatePDF() { if(!pdfDoc) return; pdfRotation=(pdfRotation+90)%360; if(pdfCurrentUrl){ pdfRotationCache[pdfCurrentUrl]=pdfRotation; sessionStorage.setItem('pdfRotationCache',JSON.stringify(pdfRotationCache)); } renderPDFPage(); }
function zoomFit() {
  if(!pdfDoc) return;
  pdfDoc.getPage(1).then(function(page) {
    var vp = page.getViewport({scale:1,rotation:pdfRotation});
    var area = document.getElementById('pdf-canvas-area');
    if(!area) return;
    pdfZoom = Math.max(0.3,(area.clientWidth-32)/vp.width);
    renderPDFPage();
  });
}

// Ortak kg hesaplama (g/cm³ × cm³ = gram, /1000 = kg)
function calcKg(tip, s, adet) {
  var rho = YOGUNLUK[s.yogunluk]||7.85, gram=0;
  if(tip==='Mil'){var r2=(parseFloat(s.cap)||0)/2/10,h2=(parseFloat(s.boy)||0)/10;gram=Math.PI*r2*r2*h2*rho;}
  else if(tip==='Boru'){var rd2=(parseFloat(s.cap)||0)/2/10,ri2=(parseFloat(s.ic_cap)||0)/2/10,h3=(parseFloat(s.boy)||0)/10;gram=Math.PI*(rd2*rd2-ri2*ri2)*h3*rho;}
  else if(tip==='Lama'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*((parseFloat(s.boy)||0)/10)*rho;}
  else if(tip==='Sac'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.boy)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*rho;}
  return gram/1000*(adet||1);
}

function stlOlcuStr(s) {
  if(s.malzemeTipi==='Mil') return 'Ø'+(s.cap||'?')+'×'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Boru') return 'Ø'+(s.cap||'?')+'/'+(s.ic_cap||'?')+'×'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Lama') return (s.en||'?')+'×'+(s.kalinlik||'?')+'×'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Sac') return (s.en||'?')+'×'+(s.boy||'?')+'×'+(s.kalinlik||'?')+'mm';
  return '';
}

      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+
      '<input type="checkbox" id="ie-chk-'+i+'" checked style="width:16px;height:16px;">'+
      '<span style="font-size:11px;font-weight:600;color:#7c3aed;">Kalem '+kalemNo+'</span>'+
      '<span style="font-size:12px;font-weight:500;">'+( f['Parça Adı']||'—')+'</span>'+
      '<span style="font-size:11px;color:#9aa0ad;font-family:monospace;">'+(f['Parça No']||'')+'</span>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">'+
      '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px">MİKTAR</div>'+
      '<input id="ie-mik-'+i+'" type="number" value="'+(f['Miktar']||0)+'" style="width:100%;padding:4px;border:1px solid #e2e5ea;border-radius:6px;font-size:11px;"></div>'+
      '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px">ÖNCELİK</div>'+
      '<select id="ie-onc-'+i+'" style="width:100%;padding:4px;border:1px solid #e2e5ea;border-radius:6px;font-size:11px;">'+
      '<option>Normal</option><option>Acil</option><option>Kritik</option></select></div>'+
      '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px">FAI GEREKLİ</div>'+
      '<label style="display:flex;align-items:center;gap:4px;font-size:11px;"><input type="checkbox" id="ie-fai-'+i+'"> Evet</label></div>'+
      '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px">TERMİN TARİHİ</div>'+
      '<input id="ie-termin-'+i+'" type="date" value="'+(f['Termin Tarihi']||'')+'" style="width:100%;padding:4px;border:1px solid #e2e5ea;border-radius:6px;font-size:11px;"></div>'+
      '</div></div>';
  }).join('');

  modal.innerHTML = '<div class="modal-box">'+
    '<div class="modal-head">'+
    '<div><div class="modal-title">⚙ İş Emri Aç — '+g.spNo+'</div>'+
    '<div class="modal-sub">'+g.kalemler.length+' kalem · Seçili kalemler için iş emri oluşturulacak</div></div>'+
    '<button onclick="document.getElementById(\'ie-modal\').remove()" style="background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;">×</button>'+
    '</div>'+
    '<div class="modal-body">'+kalemRows+'</div>'+
    '<div class="modal-foot">'+
    '<button onclick="document.getElementById(\'ie-modal\').remove()" class="btn">İptal</button>'+
    '<button id="ie-save-btn" class="btn btn-blue">⚙ İş Emirlerini Oluştur</button>'+
    '</div></div>';
  document.body.appendChild(modal);

  document.getElementById('ie-save-btn').onclick = function() { saveIE(g); };
}

async function saveIE(g) {
  var btn = document.getElementById('ie-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Oluşturuluyor...'; }
  try {
    var count = 0;
    for (var i = 0; i < g.kalemler.length; i++) {
      var chk = document.getElementById('ie-chk-'+i);
      if (!chk || !chk.checked) continue;
      var r = g.kalemler[i];
      var f = r.fields;
      var miktar = parseInt(document.getElementById('ie-mik-'+i).value) || f['Miktar'] || 0;
      var oncelik = document.getElementById('ie-onc-'+i).value || 'Normal';
      var fai = document.getElementById('ie-fai-'+i).checked;

      var terminDate = document.getElementById('ie-termin-'+i).value || f['Termin Tarihi'] || null;

      var ieFields = {
        'SE No': [r.id],
        'Parça No': f['Parça No'] || '',
        'Parça Adı': f['Parça Adı'] || '',
        'Revizyon': f['Revizyon'] || '',
        'Miktar': miktar,
        'Birim': f['Birim'] || 'Adet',
        'Açılış Tarihi': new Date().toISOString().split('T')[0],
        'Termin Tarihi': terminDate,
        'Öncelik': oncelik,
        'Durum': 'Taslak',
        'FAI Gerekli mi?': fai
      };

      await fetch('/.netlify/functions/airtable', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({method:'POST', path:'/v0/'+BASE+'/'+encodeURIComponent('İş Emirleri'), body:{fields:ieFields}})
      });
      count++;
    }
    document.getElementById('ie-modal').remove();
    toast(count + ' iş emri oluşturuldu ✓');
  } catch(e) {
    toast('Hata: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '⚙ İş Emirlerini Oluştur'; }
  }
}

loadList();
</script>
