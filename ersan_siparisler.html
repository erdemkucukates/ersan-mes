<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Sipariş Yönetimi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="ersan_nav.js" defer></script>
<script src="ersan_log.js" defer></script>
<link rel="stylesheet" href="ersan_styles.css">
<style>
/* Sipariş sayfasına özel stiller */
.sp-layout {
  display: flex;
  height: calc(100vh - 52px);
  overflow: hidden;
}
.sp-sol {
  width: 280px;
  flex-shrink: 0;
  background: var(--beyaz);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sp-sol-baslik {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sp-sol-baslik h2 {
  font-size: 12px;
  font-weight: 600;
  color: var(--laci);
  margin: 0;
}
.sp-sayi {
  font-size: 11px;
  color: var(--metin4);
}
.sp-arama {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sp-arama input {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
  color: var(--metin2);
  background: var(--bg2);
  font-family: inherit;
}
.sp-arama input:focus {
  outline: none;
  border-color: var(--mavi);
}
.sp-filtreler {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
.sp-ft {
  flex: 1;
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 500;
  color: var(--metin3);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  text-align: center;
  transition: all .12s;
  font-family: inherit;
}
.sp-ft.on {
  color: var(--mavi);
  border-bottom-color: var(--mavi);
  background: var(--mavi-acik);
}
.sp-liste {
  flex: 1;
  overflow-y: auto;
}
.sp-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--bg2);
  cursor: pointer;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.sp-item:hover { background: var(--bg2); }
.sp-item.secili {
  background: var(--mavi-acik);
  border-left-color: var(--mavi);
}
.sp-item-ust {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.sp-item-no {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--mavi-koyu);
}
.sp-item-kalem {
  font-size: 10px;
  color: var(--metin4);
}
.sp-item-ad {
  font-size: 12px;
  color: var(--metin2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* Durum badge'leri */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.pill-bek { background: #f1f5f9; color: #475569; }
.pill-ure { background: var(--mavi-acik); color: var(--mavi-koyu); }
.pill-tam { background: var(--yesil-bg); color: var(--yesil-t); }
.pill-ips { background: var(--kirmizi-bg); color: var(--kirmizi-t); }
.pill-ksv { background: var(--sari-bg); color: var(--sari-t); }

/* Sağ panel */
.sp-sag {
  flex: 1;
  background: var(--beyaz);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.sp-bos {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--metin4);
  font-size: 13px;
}
.sp-ust-bar {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
  background: var(--beyaz);
}
.sp-ust-no {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--laci);
}
.sp-ust-sag {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sp-govde {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* Kalem listesi */
.kalem-baslik {
  display: grid;
  grid-template-columns: 40px 1fr 100px 40px 80px 80px 100px;
  gap: 6px;
  padding: 6px 14px;
  font-size: 10px;
  font-weight: 600;
  color: var(--metin3);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.kalem-liste {
  overflow-y: auto;
  max-height: 40%;
  border-bottom: 1px solid var(--border);
}
.kalem-item {
  cursor: pointer;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.kalem-item:hover { background: var(--bg2); }
.kalem-item.secili {
  background: var(--mavi-acik);
  border-left-color: var(--mavi);
}
.kalem-item.soluk { opacity: 0.5; }
.kalem-ozet {
  display: grid;
  grid-template-columns: 40px 1fr 100px 40px 80px 80px 100px;
  gap: 6px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--metin2);
  align-items: center;
}
.kalem-detay {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
}
.kalem-detay label {
  font-size: 10px;
  font-weight: 600;
  color: var(--metin3);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  display: block;
  margin-bottom: 2px;
}
.kalem-detay .v {
  font-size: 12px;
  color: var(--metin2);
}
/* PDF upload buton */
.yukle-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg2);
  color: var(--metin3);
  border: 1px solid var(--border);
}
.yukle-btn.var { background: var(--yesil-bg); color: var(--yesil-t); border-color: var(--yesil-bg); }
.yukle-btn input[type=file] { display: none; }
/* PDF görüntüleyici */
.pdf-panel {
  flex: 1;
  background: var(--laci);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.pdf-ust {
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--laci2);
  flex-shrink: 0;
}
.pdf-dosya-adi {
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.zoom-btn {
  width: 26px;
  height: 26px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: transparent;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.zoom-btn:hover { background: rgba(255,255,255,0.1); }
.zoom-deger {
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  min-width: 35px;
  text-align: center;
}
.zoom-sigdir {
  padding: 3px 8px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
}
.zoom-sigdir:hover { background: rgba(255,255,255,0.1); }
.pdf-bos-alan {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.3);
}
.pdf-bos-alan .pdf-ikon {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  opacity: 0.5;
}
.pdf-bos-alan .pdf-mesaj {
  font-size: 12px;
}
.pdf-canvas-wrap {
  flex: 1;
  overflow: auto;
  cursor: grab;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 12px;
}
.pdf-canvas-wrap.panning { cursor: grabbing; }
.pdf-canvas-wrap canvas {
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
/* Toast */
.toast-msg {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  background: var(--mavi);
  z-index: 9999;
  opacity: 0;
  transform: translateY(10px);
  transition: all .3s;
  pointer-events: none;
}
.toast-msg.show {
  opacity: 1;
  transform: translateY(0);
}
/* Butonlar */
.sp-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--beyaz);
  color: var(--metin2);
  font-family: inherit;
  transition: all .12s;
}
.sp-btn:hover { background: var(--bg2); }
.sp-btn-mavi { background: var(--mavi); color: #fff; border-color: var(--mavi); }
.sp-btn-mavi:hover { background: var(--mavi-koyu); }
.sp-btn-sari { background: var(--sari); color: #fff; border-color: var(--sari); }
.sp-btn-kirmizi { background: var(--kirmizi); color: #fff; border-color: var(--kirmizi); }
.sp-btn-kirmizi:hover { background: #c53030; }
/* Modal */
.sp-modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(15,39,68,0.5);
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sp-modal {
  background: var(--beyaz);
  border-radius: 10px;
  width: 90%;
  max-width: 640px;
  max-height: 80vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.sp-modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.sp-modal-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--laci);
}
.sp-modal-sub {
  font-size: 11px;
  color: var(--metin3);
  margin-top: 2px;
}
.sp-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
}
.sp-modal-foot {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
}
.sp-modal-kapat {
  background: transparent;
  border: none;
  color: var(--metin3);
  font-size: 18px;
  cursor: pointer;
}
/* Responsive */
@media (max-width: 768px) {
  .sp-layout { flex-direction: column; height: auto; }
  .sp-sol { width: 100%; height: 300px; }
  .kalem-baslik, .kalem-ozet { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="nav-alani"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Siparis Yonetimi</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik" style="padding:0;">

<div class="toast-msg" id="toast"></div>

<div class="sp-layout">
  <div class="sp-sol">
    <div class="sp-sol-baslik">
      <h2>Siparisler</h2>
      <span class="sp-sayi" id="sb-count">yukleniyor...</span>
    </div>
    <div class="sp-arama">
      <input id="search" placeholder="SE no veya parca ara..." oninput="filterList()">
    </div>
    <div class="sp-filtreler">
      <button class="sp-ft on" onclick="setFilter(this,'Tumu')">Tumu</button>
      <button class="sp-ft" onclick="setFilter(this,'Beklemede')">Beklemede</button>
      <button class="sp-ft" onclick="setFilter(this,'Uretimde')">Uretimde</button>
      <button class="sp-ft" onclick="setFilter(this,'Tamamlandi')">Tamamlandi</button>
    </div>
    <div class="sp-liste" id="sb-list"><div style="padding:1rem;font-size:12px;color:var(--metin4);">Yukleniyor...</div></div>
  </div>

  <div class="sp-sag" id="main">
    <div class="sp-bos">Soldaki listeden bir siparis secin.</div>
  </div>
</div>

  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var BASE = 'app5LDgJMgocw79Ix';
var TABLES = { se: 'tbl56Oj1nPaqefI60', ie: 'tbl58qL39I2tv8hK4' };

var records = [], currentFilter = 'Tumu', selectedSP = null, selectedKalemIdx = null;
var pdfDoc = null, pdfZoom = 1.2, pdfRotation = 0, pdfCurrentUrl = null;
var pdfRotationCache = JSON.parse(sessionStorage.getItem('pdfRotationCache') || '{}');
var YOGUNLUK = {'Celik':7.85,'Paslanmaz':7.93,'Aluminyum':2.70,'Titanyum':4.51,'Bronz':8.89,'Pirinc':8.50,'Bakir':8.96};

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function pillClass(s) {
  if (s==='Uretimde'||s==='Üretimde') return 'pill-ure';
  if (s==='Tamamlandi'||s==='Tamamlandı') return 'pill-tam';
  if (s==='Iptal'||s==='İptal') return 'pill-ips';
  if (s==='Kismi Sevk'||s==='Kısmi Sevk') return 'pill-ksv';
  return 'pill-bek';
}

function fmtDate(d) { if(!d) return '—'; try { return new Date(d).toLocaleDateString('tr-TR'); } catch(e){ return d; } }

function spParent(seNo) {
  if (!seNo) return seNo;
  var p = seNo.split('-');
  if (p.length === 4 && p[0] === 'SP') return p.slice(0,3).join('-');
  return seNo;
}

function buildGroups(recs) {
  var map = {}, order = [];
  recs.forEach(function(r) {
    var f = r.fields;
    var parent = spParent(f['SE No'] || r.id);
    if (!map[parent]) { map[parent] = []; order.push(parent); }
    map[parent].push(r);
  });
  return order.map(function(p) {
    var kalemler = map[p];
    kalemler.sort(function(a,b){ return (a.fields['Kalem Sıra']||0) - (b.fields['Kalem Sıra']||0); });
    var durumOncelik = {'İptal':0,'Iptal':0,'Beklemede':1,'Üretimde':2,'Uretimde':2,'Kısmi Sevk':3,'Kismi Sevk':3,'Tamamlandı':4,'Tamamlandi':4};
    var durumlar = kalemler.map(function(r){ return r.fields['Durum']||'Beklemede'; });
    var durum = durumlar.reduce(function(a,b){ return (durumOncelik[a]||1) <= (durumOncelik[b]||1) ? a : b; });
    var parcalar = kalemler.map(function(r){ return r.fields['Parça Adı']||''; }).filter(Boolean);
    return { spNo: p, kalemler: kalemler, durum: durum, parcalar: parcalar };
  });
}

async function apiGet(table, params) {
  var path = '/v0/' + BASE + '/' + encodeURIComponent(table) + (params ? '?' + params : '');
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({method: 'GET', path: path})
  });
  var d = await r.json();
  if (d.error) {
    var msg = typeof d.error === 'string' ? d.error : (d.error.message || d.error.type || JSON.stringify(d.error));
    throw new Error(msg);
  }
  return d;
}

async function apiPatch(table, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table, id, fields})
  });
  return r.json();
}

async function apiDelete(table, id) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'DELETE', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table, id})
  });
  return r.json();
}

async function loadList() {
  try {
    var all = [], pageOffset = '';
    do {
      var params = 'sort%5B0%5D%5Bfield%5D=SE%20No&sort%5B0%5D%5Bdirection%5D=desc' + (pageOffset ? '&offset=' + pageOffset : '');
      var d = await apiGet('Satış Emirleri', params);
      all = all.concat(d.records || []);
      pageOffset = d.offset || '';
    } while (pageOffset);
    records = all;
    filterList();
    var params = new URLSearchParams(window.location.search);
    var hedefSP = params.get('sp');
    if (hedefSP) {
      setTimeout(function() {
        selectGroup(hedefSP);
        window.history.replaceState({}, '', 'ersan_siparisler.html');
      }, 300);
    }
  } catch(e) {
    document.getElementById('sb-list').innerHTML = '<div style="padding:1rem;color:var(--kirmizi);font-size:12px;">Hata: '+e.message+'</div>';
  }
}

function setFilter(el, f) {
  currentFilter = f;
  document.querySelectorAll('.sp-ft').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on'); filterList();
}

function filterList() {
  var q = (document.getElementById('search').value||'').toLowerCase();
  var filtered = records.filter(function(r) {
    var f = r.fields;
    var durum = f['Durum']||'Beklemede';
    var mf = currentFilter==='Tumu' || durum===currentFilter || durum===({'Uretimde':'Üretimde','Tamamlandi':'Tamamlandı'}[currentFilter]||currentFilter);
    var mq = !q || (f['SE No']||'').toLowerCase().includes(q) || (f['Parça Adı']||'').toLowerCase().includes(q) || (f['Parça No']||'').toLowerCase().includes(q);
    return mf && mq;
  });

  var groups = buildGroups(filtered);
  document.getElementById('sb-count').textContent = groups.length + ' siparis';

  if (!groups.length) {
    document.getElementById('sb-list').innerHTML = '<div style="padding:1rem;text-align:center;color:var(--metin4);font-size:12px;">Kayit bulunamadi</div>';
    return;
  }

  document.getElementById('sb-list').innerHTML = groups.map(function(g) {
    var isActive = g.spNo === selectedSP;
    return '<div class="sp-item'+(isActive?' secili':'')+'" onclick="selectGroup(this.dataset.sp)" data-sp="'+g.spNo+'">'+
      '<div class="sp-item-ust">'+
      '<span class="sp-item-no">'+g.spNo+'</span>'+
      '<span class="sp-item-kalem">'+g.kalemler.length+' kalem</span>'+
      '<span class="pill '+pillClass(g.durum)+'">'+g.durum+'</span>'+
      '</div>'+
      '<div class="sp-item-ad">'+g.parcalar.slice(0,2).join(', ').substring(0,45)+'</div>'+
      '</div>';
  }).join('');
}

function selectGroup(spNo) {
  selectedSP = spNo;
  selectedKalemIdx = null;
  filterList();
  var allGroups = buildGroups(records);
  var g = allGroups.find(function(x){ return x.spNo === spNo; });
  if (!g) return;
  renderMain(g);
}

function renderMain(g) {
  var main = document.getElementById('main');
  var firstDurum = g.durum;

  main.innerHTML =
    '<div class="sp-ust-bar">'+
    '<div class="sp-ust-no">'+g.spNo+'</div>'+
    '<span style="font-size:11px;color:var(--metin4);">'+g.kalemler.length+' kalem</span>'+
    '<span class="pill '+pillClass(firstDurum)+'" style="font-size:11px;">'+firstDurum+'</span>'+
    '<div class="sp-ust-sag">'+
    '<button class="sp-btn sp-btn-sari" id="stl-btn">Satinalma Talebi</button>'+
    '<button class="sp-btn sp-btn-mavi" id="ie-btn">Is Emri Ac</button>'+
    '<select id="durum-sel" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;" onchange="updateAllDurum(this.value)">'+
    ['Beklemede','Üretimde','Tamamlandı','Kısmi Sevk','İptal'].map(function(d){ return '<option'+(d===firstDurum?' selected':'')+'>'+d+'</option>'; }).join('')+
    '</select>'+
    '<button class="sp-btn sp-btn-kirmizi" id="del-btn">Sil</button>'+
    '</div></div>'+
    '<div class="sp-govde">'+
    '<div class="kalem-baslik"><span>Kalem</span><span>Parca adi</span><span>Parca no</span><span>Rev</span><span>Miktar</span><span>Termin</span><span>Teknik resim</span></div>'+
    '<div class="kalem-liste" id="kalem-list"></div>'+
    '<div class="pdf-panel" id="pdf-pane">'+
    '<div class="pdf-ust">'+
    '<div class="pdf-dosya-adi" id="pdf-filename">Kalem secin</div>'+
    '<button class="zoom-btn" onclick="zoomOut()">&#8722;</button>'+
    '<div class="zoom-deger" id="zoom-val">120%</div>'+
    '<button class="zoom-btn" onclick="zoomIn()">+</button>'+

function base64ToBlobUrl(base64str) {
  var raw = base64str;
  if (raw.indexOf(',') !== -1) raw = raw.split(',')[1];
  var mime = 'application/pdf';
  if (base64str.indexOf('data:') === 0) {
    var m = base64str.match(/data:([^;]+)/);
    if (m) mime = m[1];
  }
  var byteChars = atob(raw);
  var byteArr = new Uint8Array(byteChars.length);
  for (var j = 0; j < byteChars.length; j++) byteArr[j] = byteChars.charCodeAt(j);
  var blob = new Blob([byteArr], {type: mime});
  return URL.createObjectURL(blob);
}

async function selectKalem(idx) {

  var r = window._currentGroup.kalemler[idx];

  if (localPDF) {

  } else if (pdfArr && pdfArr.length) {

  } else {
    try {
      var recData = await apiGet('Satış Emirleri', 'filterByFormula=RECORD_ID()%3D%22' + r.id + '%22&fields%5B%5D=PDF%20Data');

async function loadPDF(url, filename) {
  pdfCurrentUrl = url;
  var fn = document.getElementById('pdf-filename'); if(fn) fn.textContent = filename||'teknik.pdf';
  var area = document.getElementById('pdf-canvas-area');
  if (!area) return;
  area.className = 'pdf-canvas-wrap'; area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;padding:1rem;">Yukleniyor...</p>';
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfRotation = pdfRotationCache[url] || 0;
    var page = await pdfDoc.getPage(1);
    var vp0 = page.getViewport({scale:1, rotation:pdfRotation});
    pdfZoom = Math.max(0.3, (area.clientWidth-32)/vp0.width);
    renderPDFPage();
  } catch(e) {
    area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;padding:1rem;">PDF yuklenemedi: '+e.message+'</p>';
  }
}

async function renderPDFPage() {
  if (!pdfDoc) return;
  var area = document.getElementById('pdf-canvas-area');
  if (!area) return;
  area.className = 'pdf-canvas-wrap';
  try {
    var page = await pdfDoc.getPage(1);
    var vp = page.getViewport({scale:pdfZoom, rotation:pdfRotation});
    var canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    area.innerHTML = ''; area.appendChild(canvas);
    await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
    var zv = document.getElementById('zoom-val'); if(zv) zv.textContent = Math.round(pdfZoom*100)+'%';
    initPan(area);
  } catch(e) { /* render hatasi */ }
}

function initPan(area) {
  if (area._panReady) return;
  area._panReady = true;
  var dragging = false, startX, startY, scrollL, scrollT;
  area.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    dragging = true; area.classList.add('panning');
    startX = e.clientX; startY = e.clientY;
    scrollL = area.scrollLeft; scrollT = area.scrollTop;
    e.preventDefault();
  });
  area.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    area.scrollLeft = scrollL - (e.clientX - startX);
    area.scrollTop = scrollT - (e.clientY - startY);
  });
  area.addEventListener('mouseup', function() { dragging = false; area.classList.remove('panning'); });
  area.addEventListener('mouseleave', function() { dragging = false; area.classList.remove('panning'); });
  area.addEventListener('wheel', function(e) {
    if (!pdfDoc) return;
    e.preventDefault();
    if (e.deltaY < 0) { pdfZoom = Math.min(pdfZoom + 0.15, 4); }
    else { pdfZoom = Math.max(pdfZoom - 0.15, 0.3); }
    renderPDFPage();
  }, {passive: false});
}

function zoomIn() { if(!pdfDoc) return; pdfZoom = Math.min(pdfZoom+0.25,4); renderPDFPage(); }
function zoomOut() { if(!pdfDoc) return; pdfZoom = Math.max(pdfZoom-0.25,0.5); renderPDFPage(); }
function rotatePDF() { if(!pdfDoc) return; pdfRotation=(pdfRotation+90)%360; if(pdfCurrentUrl){ pdfRotationCache[pdfCurrentUrl]=pdfRotation; sessionStorage.setItem('pdfRotationCache',JSON.stringify(pdfRotationCache)); } renderPDFPage(); }
function zoomFit() {
  if(!pdfDoc) return;
  pdfDoc.getPage(1).then(function(page) {
    var vp = page.getViewport({scale:1,rotation:pdfRotation});
    var area = document.getElementById('pdf-canvas-area');
    if(!area) return;
    pdfZoom = Math.max(0.3,(area.clientWidth-32)/vp.width);
    renderPDFPage();
  });
}

function uploadPDF(input) {
  var recordId = input.dataset.recid;
  var idx = parseInt(input.dataset.idx);
  var file = input.files[0];
  if (!file) return;
  if (file.size > 10*1024*1024) { toast('Max 10MB'); return; }
  var objectUrl = URL.createObjectURL(file);
  var r = window._currentGroup.kalemler[idx];
  r.fields['_localPDF'] = {url: objectUrl, filename: file.name};
  renderKalemler(window._currentGroup.kalemler, selectedKalemIdx);
  loadPDF(objectUrl, file.name);
  toast('PDF goruntuleniyor, kaydediliyor...');
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var upRes = await fetch('/.netlify/functions/upload-pdf', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({filename:file.name, data:e.target.result, recordId:recordId, table:'İş Emirleri'})
      });
      var upData = await upRes.json();
      if (upData.success) toast('PDF kaydedildi');
      else toast('Goruntuleme OK, kayit hatasi: '+(upData.error||'?'));
    } catch(e2) { toast('Goruntuleme OK, kayit hatasi: '+e2.message); }
  };
  reader.readAsDataURL(file);
}

function calcKg(tip, s, adet) {
  var rho = YOGUNLUK[s.yogunluk]||7.85, gram=0;
  if(tip==='Mil'){var r2=(parseFloat(s.cap)||0)/2/10,h2=(parseFloat(s.boy)||0)/10;gram=Math.PI*r2*r2*h2*rho;}
  else if(tip==='Boru'){var rd2=(parseFloat(s.cap)||0)/2/10,ri2=(parseFloat(s.ic_cap)||0)/2/10,h3=(parseFloat(s.boy)||0)/10;gram=Math.PI*(rd2*rd2-ri2*ri2)*h3*rho;}
  else if(tip==='Lama'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*((parseFloat(s.boy)||0)/10)*rho;}
  else if(tip==='Sac'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.boy)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*rho;}
  return gram/1000*(adet||1);
}

        var yogSel = document.getElementById('stl-yog-'+uid);
        if(yogSel) yogSel.onchange = function(){ kalem.rows[ri].yogunluk=this.value; stlDebounceKg(uid,ki,ri); };
        ['mc','cap','ic','boy','en','kal','spec'].forEach(function(fld){
          var el = document.getElementById('stl-'+fld+'-'+uid);
          if(!el) return;
          var map = {mc:'malzemeCinsi',cap:'cap',ic:'ic_cap',boy:'boy',en:'en',kal:'kalinlik',spec:'spec'};
          if(fld==='mc' && kalem.rows[ri].tip==='Fason') {
            el.onchange = function(){ kalem.rows[ri].malzemeCinsi=this.value; };
          } else {
            el.oninput = function(){ kalem.rows[ri][map[fld]]=this.value; if(['cap','ic','boy','en','kal'].indexOf(fld)>=0) stlDebounceKg(uid,ki,ri); };
          }
        });
      }, 0);
    });
  });
}

var _stlKgTimer = null;
function stlDebounceKg(uid, ki, ri) {
  clearTimeout(_stlKgTimer);
  _stlKgTimer = setTimeout(function() {
    var s = window._stlKalemler[ki].rows[ri]; if(!s) return;
    var kg = calcKg(s.malzemeTipi, s, 1);
    var el = document.getElementById('stl-kg-'+uid);
    if(el){ el.textContent = kg>0?'Tahmini: '+kg.toFixed(2)+' kg/adet':''; el.style.display = kg>0?'block':'none'; }
  }, 600);
}

function stlOlcuStr(s) {
  if(s.malzemeTipi==='Mil') return 'O'+(s.cap||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Boru') return 'O'+(s.cap||'?')+'/'+(s.ic_cap||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Lama') return (s.en||'?')+'x'+(s.kalinlik||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Sac') return (s.en||'?')+'x'+(s.boy||'?')+'x'+(s.kalinlik||'?')+'mm';
  return '';
}

async function saveSTL() {
  try {
    var count = 0;
    for (var ki=0; ki<window._stlKalemler.length; ki++) {
      var kalem = window._stlKalemler[ki];
      for (var ri=0; ri<kalem.rows.length; ri++) {
        var s = kalem.rows[ri];
        var kg = s.tip==='Hammadde' ? calcKg(s.malzemeTipi, s, kalem.miktar) : 0;
        await fetch('/.netlify/functions/airtable',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({method:'POST',path:'/v0/'+BASE+'/'+encodeURIComponent('Satınalma Talepleri'),body:{fields:{
            'SE No': [kalem.seId],
            'Kalem Adı': kalem.parcaAdi,
            'Talep Tipi': s.tip,
            'Malzeme İşlem': s.tip==='Fason'?(s.malzemeCinsi||''):(s.malzemeTipi+' - '+(s.malzemeCinsi||'')),
            'Miktar': kalem.miktar||0,
            'Birim': kalem.birim||'Adet',
            'Ölçü': s.tip==='Hammadde'?stlOlcuStr(s):(s.spec||''),
            'Tahmini kg': kg>0?parseFloat(kg.toFixed(3)):null,
            'Durum':'Taslak'
          }}})
        });
        count++;
      }
    }
    document.getElementById('stl-modal').remove();
    toast(count+' satinalma talebi olusturuldu');
    logIslem('Oluşturuldu', 'Satınalma', null, window._currentGroup?.spNo, null, {adet:count});
  } catch(e) { toast('Hata: '+e.message); }
}

// ── IS EMRI MODAL ──
function openIEModal(g) {
  var existing = document.getElementById('ie-modal'); if(existing) existing.remove();
  var modal = document.createElement('div');
  modal.id = 'ie-modal';
  modal.className = 'sp-modal-bg';

  var kalemRows = g.kalemler.map(function(r, i) {
    var f = r.fields;
    var seNo = f['SE No'] || '';
    var kalemNo = seNo.split('-').pop() || (i+1);
    return '<div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+
      '<input type="checkbox" id="ie-chk-'+i+'" checked style="width:16px;height:16px;">'+
      '<span style="font-size:11px;font-weight:600;color:var(--mavi-koyu);">Kalem '+kalemNo+'</span>'+
      '<span style="font-size:12px;font-weight:500;">'+( f['Parça Adı']||'—')+'</span>'+
      '<span style="font-size:11px;color:var(--metin4);font-family:monospace;">'+(f['Parça No']||'')+'</span>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">'+
      '<div><div style="font-size:10px;color:var(--metin3);margin-bottom:2px">MIKTAR</div>'+
      '<input id="ie-mik-'+i+'" type="number" value="'+(f['Miktar']||0)+'" style="'+_stlInp+'"></div>'+
      '<div><div style="font-size:10px;color:var(--metin3);margin-bottom:2px">ONCELIK</div>'+
      '<select id="ie-onc-'+i+'" style="'+_stlInp+'">'+
      '<option>Normal</option><option>Acil</option><option>Kritik</option></select></div>'+
      '<div><div style="font-size:10px;color:var(--metin3);margin-bottom:2px">FAI GEREKLI</div>'+
      '<label style="display:flex;align-items:center;gap:4px;font-size:11px;"><input type="checkbox" id="ie-fai-'+i+'"> Evet</label></div>'+
      '<div><div style="font-size:10px;color:var(--metin3);margin-bottom:2px">TERMIN TARIHI</div>'+
      '<input id="ie-termin-'+i+'" type="date" value="'+(f['Termin Tarihi']||'')+'" style="'+_stlInp+'"></div>'+
      '</div></div>';
  }).join('');

  modal.innerHTML = '<div class="sp-modal">'+
    '<div class="sp-modal-head">'+
    '<div><div class="sp-modal-title">Is Emri Ac — '+g.spNo+'</div>'+
    '<div class="sp-modal-sub">'+g.kalemler.length+' kalem</div></div>'+
    '<button class="sp-modal-kapat" onclick="document.getElementById(\'ie-modal\').remove()">&times;</button>'+
    '</div>'+
    '<div class="sp-modal-body">'+kalemRows+'</div>'+
    '<div class="sp-modal-foot">'+
    '<button class="sp-btn" onclick="document.getElementById(\'ie-modal\').remove()">Iptal</button>'+
    '<button id="ie-save-btn" class="sp-btn sp-btn-mavi">Is Emirlerini Olustur</button>'+
    '</div></div>';
  document.body.appendChild(modal);
  document.getElementById('ie-save-btn').onclick = function() { saveIE(g); };

  // Auto-fill empty termin inputs with today + 21 days
  setTimeout(function() {
    for (var j = 0; j < g.kalemler.length; j++) {
      var terminInput = document.getElementById('ie-termin-' + j);
      if (terminInput && !terminInput.value) {
        // Default: today + 15 business days ≈ 21 calendar days
        var d = new Date();
        d.setDate(d.getDate() + 21);
        terminInput.value = d.toISOString().split('T')[0];
        terminInput.style.background = '#f0f9ff';
        terminInput.style.borderColor = '#93c5fd';
      }
      // Add change listener for manual edit indication
      (function(idx) {
        var inp = document.getElementById('ie-termin-' + idx);
        if (inp) {
          inp.addEventListener('change', function() {
            this.style.background = '#fefce8';
            this.style.borderColor = '#fbbf24';
          });
        }
      })(j);
    }
  }, 100);
}

async function saveIE(g) {
  var btn = document.getElementById('ie-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Olusturuluyor...'; }
  try {
    var count = 0;
    for (var i = 0; i < g.kalemler.length; i++) {
      var chk = document.getElementById('ie-chk-'+i);
      if (!chk || !chk.checked) continue;
      var r = g.kalemler[i];
      var f = r.fields;
      var miktar = parseInt(document.getElementById('ie-mik-'+i).value) || f['Miktar'] || 0;
      var oncelik = document.getElementById('ie-onc-'+i).value || 'Normal';
      var fai = document.getElementById('ie-fai-'+i).checked;
      var terminDate = document.getElementById('ie-termin-'+i).value || f['Termin Tarihi'] || null;

      var ieFields = {
        'SE No': [r.id],
        'Parça No': f['Parça No'] || '',
        'Parça Adı': f['Parça Adı'] || '',
        'Revizyon': f['Revizyon'] || '',
        'Miktar': miktar,
        'Birim': f['Birim'] || 'Adet',
        'Açılış Tarihi': new Date().toISOString().split('T')[0],
        'Termin Tarihi': terminDate,
        'Öncelik': oncelik,
        'Durum': 'Taslak',
        'FAI Gerekli mi?': fai
      };

      await fetch('/.netlify/functions/airtable', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({method:'POST', path:'/v0/'+BASE+'/'+encodeURIComponent('İş Emirleri'), body:{fields:ieFields}})
      });
      count++;
    }
    document.getElementById('ie-modal').remove();
    toast(count + ' is emri olusturuldu');
    logIslem('Oluşturuldu', 'İş Emri', null, g.spNo, null, {adet:count});
  } catch(e) {
    toast('Hata: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Is Emirlerini Olustur'; }
  }
}
