<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Sipariş Yönetimi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; overflow: hidden; }
.layout { display: flex; height: 100vh; padding-top: 48px; }
.sidebar { width: 230px; background: #fff; border-right: 1px solid #e2e5ea; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sb-head { padding: 12px 14px 8px; border-bottom: 1px solid #e2e5ea; }
.sb-title { font-size: 13px; font-weight: 600; color: #1a1d23; }
.sb-count { font-size: 11px; color: #9aa0ad; margin-top: 2px; }
.sb-search { margin: 8px 10px; padding: 6px 10px; border: 1px solid #e2e5ea; border-radius: 7px; font-size: 12px; width: calc(100% - 20px); outline: none; }
.sb-search:focus { border-color: #7c3aed; }
.ftabs { display: flex; gap: 4px; padding: 0 10px 8px; flex-wrap: wrap; }
.ft { padding: 2px 9px; border-radius: 20px; font-size: 10px; border: 1px solid #e2e5ea; color: #5a6170; cursor: pointer; background: #fff; }
.ft.on { background: #1a1d23; color: #fff; border-color: #1a1d23; }
.sb-list { flex: 1; overflow-y: auto; }
.si { padding: 10px 14px; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: background .1s; }
.si:hover { background: #f7f8fa; }
.si.active { background: #eff6ff; border-left: 2px solid #2563eb; }
.si-top { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.si-no { font-size: 11px; font-weight: 600; color: #2563eb; font-family: monospace; }
.si-kalem { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: #f0f2f5; color: #5a6170; font-weight: 500; }
.si.active .si-kalem { background: #dbeafe; color: #1d4ed8; }
.si-pill { margin-left: auto; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.si-name { font-size: 12px; color: #1a1d23; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pill-bek { background: #f3f4f6; color: #6b7280; }
.pill-ure { background: #dbeafe; color: #2563eb; }
.pill-tam { background: #d1fae5; color: #059669; }
.pill-ips { background: #fee2e2; color: #dc2626; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: #fff; border-bottom: 1px solid #e2e5ea; padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.tb-no { font-size: 16px; font-weight: 700; font-family: monospace; color: #1a1d23; }
.tb-kalem { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f3f4f6; color: #5a6170; font-weight: 500; }
.termin-badge { font-size: 11px; padding: 3px 10px; border-radius: 7px; background: #fef3c7; color: #92400e; font-weight: 500; }
.termin-badge.late { background: #fee2e2; color: #991b1b; }
.tb-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.btn { padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; border: 1px solid #e2e5ea; cursor: pointer; background: #fff; color: #5a6170; }
.btn:hover { background: #f7f8fa; }
.btn-amber { background: #f59e0b; color: #fff; border-color: #f59e0b; }
.btn-blue { background: #2563eb; color: #fff; border-color: #2563eb; }
.btn-red { border-color: #fca5a5; color: #dc2626; }
.btn-red:hover { background: #fee2e2; }
.body-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.kalem-head { display: grid; grid-template-columns: 2fr 110px 80px 90px 110px 120px; gap: 8px; padding: 6px 16px; background: #f7f8fa; font-size: 10px; font-weight: 600; color: #9aa0ad; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #e2e5ea; flex-shrink: 0; }
.kalem-list { flex-shrink: 0; }
.kalem-item { border-bottom: 1px solid #e2e5ea; cursor: pointer; transition: all .15s; }
.kalem-item.dimmed { opacity: 0.4; }
.kalem-item.selected { border-left: 3px solid #2563eb; background: #eff6ff; }
.kalem-summary { display: grid; grid-template-columns: 2fr 110px 80px 90px 110px 120px; gap: 8px; padding: 8px 16px; font-size: 12px; align-items: center; }

.kalem-detail { padding: 10px 16px 12px 16px; border-top: 1px dashed #e2e5ea; background: rgba(37,99,235,0.03); display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.det-f label { font-size: 10px; color: #9aa0ad; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
.det-f .v { font-size: 12px; font-weight: 600; color: #1a1d23; }
.pdf-pane { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; overflow: hidden; min-height: 200px; }
.pdf-bar { display: flex; align-items: center; gap: 6px; padding: 7px 12px; background: #fff; border-top: 1px solid #e2e5ea; flex-shrink: 0; }
.pdf-filename { font-size: 12px; font-weight: 500; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1a1d23; }
.zoom-btn { width: 28px; height: 28px; border: 1px solid #e2e5ea; border-radius: 6px; background: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #5a6170; }
.zoom-btn:hover { background: #f0f2f5; }
.zoom-val { font-size: 11px; color: #5a6170; min-width: 38px; text-align: center; }
.zoom-fit { font-size: 11px; padding: 0 10px; height: 28px; border: 1px solid #e2e5ea; border-radius: 6px; background: #fff; cursor: pointer; color: #5a6170; }
.zoom-fit:hover { background: #f0f2f5; }
.pdf-canvas-wrap { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 16px; background: #6b7280; }
.pdf-canvas-wrap canvas { display: block; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
.pdf-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #9aa0ad; background: #6b7280; }
.pdf-empty-icon { width: 56px; height: 68px; border: 2px solid rgba(255,255,255,.3); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: rgba(255,255,255,.6); }
.pdf-empty p { font-size: 12px; color: rgba(255,255,255,.6); }
.upbtn { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 1px dashed #9aa0ad; color: #5a6170; cursor: pointer; background: transparent; white-space: nowrap; }
.upbtn.has { border: 1px solid #059669; color: #059669; background: #d1fae5; border-style: solid; }
.upbtn input { display: none; }
.empty-main { flex: 1; display: flex; align-items: center; justify-content: center; color: #9aa0ad; font-size: 14px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #1a1d23; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<script src="ersan_nav.js"></script>
<div class="toast" id="toast"></div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Siparişler</div>
      <div class="sb-count" id="sb-count">yükleniyor...</div>
    </div>
    <input class="sb-search" id="search" placeholder="SE no veya parça ara..." oninput="filterList()">
    <div class="ftabs">
      <button class="ft on" onclick="setFilter(this,'Tümü')">Tümü</button>
      <button class="ft" onclick="setFilter(this,'Beklemede')">Beklemede</button>
      <button class="ft" onclick="setFilter(this,'Üretimde')">Üretimde</button>
      <button class="ft" onclick="setFilter(this,'Tamamlandı')">Tamamlandı</button>
    </div>
    <div class="sb-list" id="sb-list"><div style="padding:1rem;font-size:12px;color:#9aa0ad;">Yükleniyor...</div></div>
  </div>

  <div class="main" id="main">
    <div class="empty-main">Soldaki listeden bir sipariş seçin.</div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var BASE = 'app5LDgJMgocw79Ix';
var TABLES = {
  satisEmirleri: 'tbl56Oj1nPaqefI60',
  teklifKalemleri: 'tblqRGCv8yu6zQXZ4',
  teklifler: 'tblBvcPQjPDdg6N52',
};

var records = [], filtered = [], currentFilter = 'Tümü', selectedSE = null, selectedKalem = null;
var pdfDoc = null, pdfPage = 1, pdfZoom = 1.2, pdfRotation = 0;
var pdfCurrentUrl = null, pdfCurrentFilename = null;

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function pillClass(s) {
  if (s==='Üretimde') return 'pill-ure';
  if (s==='Tamamlandı') return 'pill-tam';
  if (s==='İptal') return 'pill-ips';
  return 'pill-bek';
}

function isBizGunu(date) {
  var d = date.getDay();
  return d !== 0 && d !== 6;
}

function addIsBiz(startDate, gunSayisi) {
  var d = new Date(startDate);
  var added = 0;
  while (added < gunSayisi) {
    d.setDate(d.getDate() + 1);
    if (isBizGunu(d)) added++;
  }
  return d;
}

function formatDate(d) {
  if (!d) return '—';
  try {
    var dt = new Date(d);
    return dt.toLocaleDateString('tr-TR');
  } catch(e) { return d; }
}

function terminHesapla(siparisTarihi, isBizGunu) {
  if (!siparisTarihi || !isBizGunu) return null;
  return addIsBiz(new Date(siparisTarihi), isBizGunu);
}

async function apiGet(table, params) {
  var r = await fetch('/.netlify/functions/airtable?table=' + encodeURIComponent(table) + (params ? '&' + params : ''));
  return r.json();
}

async function apiPatch(table, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({table, id, fields})
  });
  return r.json();
}

async function apiDelete(table, id) {
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'DELETE', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({table, id})
  });
  return r.json();
}

async function loadList() {
  try {
    var d = await apiGet('Satış Emirleri', 'pageSize=100&sort[0][field]=SE+No&sort[0][direction]=desc');
    records = d.records || [];
    document.getElementById('sb-count').textContent = records.length + ' sipariş';
    filterList();
  } catch(e) {
    document.getElementById('sb-list').innerHTML = '<div style="padding:1rem;color:#dc2626;font-size:12px;">Hata: '+e.message+'</div>';
  }
}

function setFilter(el, f) {
  currentFilter = f;
  document.querySelectorAll('.ft').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');
  filterList();
}

function filterList() {
  var q = (document.getElementById('search').value||'').toLowerCase();
  filtered = records.filter(function(r) {
    var f = r.fields;
    var mf = currentFilter==='Tümü' || (f['Durum']||'Beklemede')===currentFilter;
    var mq = !q || (f['SE No']||'').toLowerCase().includes(q) || (f['Parça Adı']||'').toLowerCase().includes(q) || (f['Parça No']||'').toLowerCase().includes(q);
    return mf && mq;
  });

  var html = filtered.length === 0
    ? '<div style="padding:1rem;text-align:center;color:#9aa0ad;font-size:12px;">Kayıt bulunamadı</div>'
    : filtered.map(function(r) {
        var f = r.fields, no = f['SE No']||r.id.slice(-6);
        var durum = f['Durum']||'Beklemede';
        var kalemSayisi = (f['Teklif Kalemleri']||[]).length || 1;
        return '<div class="si'+(r.id===selectedSE?' active':'')+'" onclick="selectSE(\''+r.id+'\')">'+
          '<div class="si-top">'+
          '<span class="si-no">'+no+'</span>'+
          '<span class="si-kalem">'+kalemSayisi+' kalem</span>'+
          '<span class="si-pill '+pillClass(durum)+'">'+durum+'</span>'+
          '</div>'+
          '<div class="si-name">'+(f['Parça Adı']||'—')+'</div>'+
          '</div>';
      }).join('');
  document.getElementById('sb-list').innerHTML = html;
}

async function selectSE(id) {
  selectedSE = id;
  selectedKalem = null;
  filterList();

  var r = records.find(function(x){ return x.id===id; });
  if (!r) return;
  var f = r.fields;
  var no = f['SE No']||id.slice(-6);
  var durum = f['Durum']||'Beklemede';

  // Termin hesapla
  var isBizGunuVal = f['Teslim Süresi İş Günü'];
  var sipTarihi = f['Sipariş Tarihi'] || f['Oluşturma Tarihi'] || null;
  var terminTarihi = null;
  if (isBizGunuVal && sipTarihi) {
    terminTarihi = terminHesapla(sipTarihi, isBizGunuVal);
  } else if (f['Termin Tarihi']) {
    terminTarihi = new Date(f['Termin Tarihi']);
  }
  var terminStr = terminTarihi ? formatDate(terminTarihi) + (isBizGunuVal ? ' · '+isBizGunuVal+' iş günü' : '') : '—';
  var isLate = terminTarihi && terminTarihi < new Date();

  // Kalemler
  var kalemler = [];
  var teklifKalemIds = f['Teklif Kalemleri'] || [];
  if (teklifKalemIds.length > 0) {
    try {
      var filter = 'OR(' + teklifKalemIds.map(function(kid){ return 'RECORD_ID()=\''+kid+'\''; }).join(',') + ')';
      var kd = await apiGet('Teklif Kalemleri', 'filterByFormula='+encodeURIComponent(filter));
      kalemler = kd.records || [];
    } catch(e) {}
  }
  if (kalemler.length === 0) {
    kalemler = [{id: id+'_main', fields: {
      'Parça Adı': f['Parça Adı']||'—',
      'Parça No': f['Parça No']||'—',
      'Revizyon': f['Revizyon']||'—',
      'Miktar': f['Miktar']||0,
      'Birim': f['Birim']||'Adet',
      'Birim Fiyat': f['Birim Fiyat']||null,
      '_isSE': true
    }}];
  }

  var main = document.getElementById('main');
  main.innerHTML =
    '<div class="top-bar">'+
    '<div class="tb-no">'+no+'</div>'+
    '<span class="tb-kalem">'+kalemler.length+' kalem</span>'+
    '<span class="si-pill '+pillClass(durum)+'" style="font-size:11px;padding:3px 10px;">'+durum+'</span>'+
    (terminStr!=='—' ? '<span class="termin-badge'+(isLate?' late':'')+'">Termin: '+terminStr+'</span>' : '')+
    '<div class="tb-right">'+
    '<button class="btn btn-amber" id="stl-btn-'+id+'">&#128203; Satınalma Talebi</button>'+
    '<button class="btn btn-blue" onclick="window.location=\'ersan_isemirleri.html\'">İş Emri Aç</button>'+
    '<select id="durum-sel" onchange="updateDurum(\''+id+'\',this.value)" style="padding:5px 8px;border:1px solid #e2e5ea;border-radius:7px;font-size:12px;">'+
    ['Beklemede','Üretimde','Tamamlandı','Kısmi Sevk','İptal'].map(function(d){ return '<option'+(d===durum?' selected':'')+'>'+d+'</option>'; }).join('')+
    '</select>'+
    '<button class="btn" style="background:#059669;color:#fff;border-color:#059669;" id="save-btn-'+id+'">&#128190; Kaydet</button>'+
    '<button class="btn btn-red" onclick="deleteSE(\''+id+'\',\''+no+'\')">Sil</button>'+
    '</div></div>'+
    '<div class="body-area" id="body-area">'+
    '<div class="kalem-head">'+
    '<span>Parça adı</span><span>Parça no</span><span>Revizyon</span><span>Miktar</span><span>Termin</span><span>Teknik resim</span>'+
    '</div>'+
    '<div class="kalem-list" id="kalem-list"></div>'+
    '<div class="pdf-pane" id="pdf-pane">'+
    '<div class="pdf-bar">'+
    '<div class="pdf-filename" id="pdf-filename">Kalem seçin</div>'+
    '<button class="zoom-btn" id="btn-zoom-out" onclick="zoomOut()">−</button>'+
    '<div class="zoom-val" id="zoom-val">120%</div>'+
    '<button class="zoom-btn" id="btn-zoom-in" onclick="zoomIn()">+</button>'+
    '<button class="zoom-fit" onclick="zoomFit()">Sığdır</button>'+
    '<button class="zoom-fit" onclick="rotatePDF()" title="90° döndür">↻</button>'+
    '</div>'+
    '<div id="pdf-canvas-area" class="pdf-empty">'+
    '<div class="pdf-empty-icon">PDF</div>'+
    '<p>Kalem seçilince teknik resim burada görünür</p>'+
    '</div>'+
    '</div>'+
    '</div>';

  // Attach satinalma button click after render
  setTimeout(function() {
    var stlBtn = document.getElementById('stl-btn-' + id);
    if (stlBtn) {
      stlBtn.onclick = function() {
        openSTLModal(id, no, f['Parça Adı']||'', f['Miktar']||0, f['Birim']||'Adet');
      };
    }
    var saveBtn = document.getElementById('save-btn-' + id);
    if (saveBtn) {
      saveBtn.onclick = function() { saveSE(id); };
    }
  }, 50);
  window._seKalemler = kalemler;
  window._seId = id;
  window._seFields = f;
  renderKalemler(kalemler, null, terminTarihi, isBizGunuVal);
}

function renderKalemler(kalemler, selectedIdx, terminTarihi, isBizGunuVal) {
  var html = kalemler.map(function(k, i) {
    var f = k.fields;
    var isSelected = i === selectedIdx;
    var isDimmed = selectedIdx !== null && !isSelected;
    var terminStr = terminTarihi ? formatDate(terminTarihi) : (window._seFields['Termin Tarihi'] ? formatDate(window._seFields['Termin Tarihi']) : '—');
    var hasPDF = f['Teknik Resim'] && f['Teknik Resim'].length > 0;
    var seHasPDF = !f['_isSE'] ? false : (window._seFields['Teknik Resim'] && window._seFields['Teknik Resim'].length > 0);

    var summary = '<div class="kalem-summary" style="grid-template-columns:2fr 110px 80px 90px 110px 120px">'+
      '<span style="font-weight:500'+(isSelected?';color:#1d4ed8':'')+'">'+((f['Parça Adı']||'—'))+'</span>'+
      '<span style="font-family:monospace;font-size:11px">'+(f['Parça No']||'—')+'</span>'+
      '<span>'+(f['Revizyon']||'—')+'</span>'+
      '<span>'+(f['Miktar']||0)+' '+(f['Birim']||'Adet')+'</span>'+
      '<span style="font-size:11px;'+(terminTarihi&&terminTarihi<new Date()?'color:#dc2626;font-weight:600':'')+'">'+terminStr+'</span>'+
      '<label class="upbtn'+(hasPDF||seHasPDF?' has':'')+'">'+
      (hasPDF||seHasPDF ? 'PDF mevcut' : '+ PDF yükle')+
      '<input type="file" accept=".pdf,image/*" onchange="uploadPDF(this,\''+k.id+'\','+i+')">'+
      '</label>'+
      '</div>';

    var detail = '';
    if (isSelected) {
      detail = '<div class="kalem-detail">'+
        '<div class="det-f"><label>Parça adı</label><div class="v">'+(f['Parça Adı']||'—')+'</div></div>'+
        '<div class="det-f"><label>Parça no</label><div class="v" style="font-family:monospace">'+(f['Parça No']||'—')+'</div></div>'+
        '<div class="det-f"><label>Revizyon</label><div class="v">'+(f['Revizyon']||'—')+'</div></div>'+
        '<div class="det-f"><label>Miktar</label><div class="v">'+(f['Miktar']||0)+' '+(f['Birim']||'Adet')+'</div></div>'+
        '<div class="det-f"><label>Birim fiyat</label><div class="v">'+(f['Birim Fiyat']?Number(f['Birim Fiyat']).toLocaleString('tr-TR')+ ' TL':'—')+'</div></div>'+
        '<div class="det-f"><label>İskonto</label><div class="v">'+(f['İskonto']?'%'+f['İskonto']:'—')+'</div></div>'+
        '<div class="det-f"><label>Toplam</label><div class="v" style="color:#059669">'+(f['Birim Fiyat']&&f['Miktar']?Number(f['Birim Fiyat']*f['Miktar']*(1-(f['İskonto']||0)/100)).toLocaleString('tr-TR')+' TL':'—')+'</div></div>'+
        '<div class="det-f"><label>Stok kodu</label><div class="v">'+(f['Stok Kodu']||'—')+'</div></div>'+
        '<div class="det-f"><label>Teslim süresi</label><div class="v">'+(f['Teklif Süresi (Gün)']||isBizGunuVal||'—')+(isBizGunuVal?' iş günü':'')+'</div></div>'+
        '<div class="det-f"><label>Açıklama</label><div class="v">'+(f['Notlar']||'—')+'</div></div>'+
        '</div>';
    }

    return '<div class="kalem-item'+(isSelected?' selected':'')+(isDimmed?' dimmed':'')+'" onclick="selectKalem('+i+')" id="kalem-'+i+'">'+summary+detail+'</div>';
  }).join('');
  document.getElementById('kalem-list').innerHTML = html;
}

function selectKalem(idx) {
  if (!window._seKalemler) return;
  selectedKalem = idx;
  var terminTarihi = null;
  var isBizGunuVal = window._seFields['Teslim Süresi İş Günü'];
  var sipTarihi = window._seFields['Sipariş Tarihi'] || null;
  if (isBizGunuVal && sipTarihi) terminTarihi = terminHesapla(sipTarihi, isBizGunuVal);
  else if (window._seFields['Termin Tarihi']) terminTarihi = new Date(window._seFields['Termin Tarihi']);

  renderKalemler(window._seKalemler, idx, terminTarihi, isBizGunuVal);

  // PDF yükle - sadece farklı PDF ise yeniden yükle
  var kalem = window._seKalemler[idx];
  var localPDF = kalem.fields['_localPDF'] || (kalem.fields['_isSE'] ? window._seFields['_localPDF'] : null);
  var pdfArr = kalem.fields['Teknik Resim'] || (kalem.fields['_isSE'] ? window._seFields['Teknik Resim'] : null);
  var newUrl = localPDF ? localPDF.url : (pdfArr && pdfArr.length > 0 ? pdfArr[0].url : null);
  var newName = localPDF ? (localPDF.filename||'teknik-resim.pdf') : (pdfArr && pdfArr.length > 0 ? (pdfArr[0].filename||'teknik-resim.pdf') : null);
  if (newUrl && newUrl !== pdfCurrentUrl) {
    loadPDF(newUrl, newName);
  } else if (!newUrl) {
    clearPDF('PDF yüklü değil — yüklemek için "PDF yükle" butonuna tıklayın');
  } else {
    // Same PDF - just update filename display, keep zoom
    var fn = document.getElementById('pdf-filename');
    if (fn) fn.textContent = newName;
  }
}

function clearPDF(msg) {
  document.getElementById('pdf-filename').textContent = msg || 'Kalem seçin';
  document.getElementById('pdf-canvas-area').className = 'pdf-empty';
  document.getElementById('pdf-canvas-area').innerHTML = '<div class="pdf-empty-icon">PDF</div><p>'+(msg||'Teknik resim yüklü değil')+'</p>';
}

async function loadPDF(url, filename) {
  var fnEl = document.getElementById('pdf-filename');
  if (fnEl) fnEl.textContent = filename || 'teknik-resim.pdf';
  var area = document.getElementById('pdf-canvas-area');
  if (!area) return;
  area.className = 'pdf-canvas-wrap';
  area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;">Yükleniyor...</p>';
  try {
    pdfCurrentUrl = url; pdfCurrentFilename = filename;
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfPage = 1;
    pdfRotation = 0;
    // Auto-fit on first load
    var page = await pdfDoc.getPage(1);
    var vp0 = page.getViewport({scale:1, rotation:0});
    pdfZoom = Math.max(0.5, Math.min(2, (area.clientWidth - 32) / vp0.width));
    renderPDFPage();
  } catch(e) {
    if (area) area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;">PDF yüklenemedi: '+e.message+'</p>';
  }
}

async function renderPDFPage() {
  if (!pdfDoc) return;
  var area = document.getElementById('pdf-canvas-area');
  area.className = 'pdf-canvas-wrap';
  try {
    var page = await pdfDoc.getPage(pdfPage);
    var vp = page.getViewport({scale: pdfZoom, rotation: pdfRotation});
    var canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    area.innerHTML = '';
    area.appendChild(canvas);
    await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
    var zv = document.getElementById('zoom-val');
    if (zv) zv.textContent = Math.round(pdfZoom*100)+'%';
  } catch(e) {
    area.innerHTML = '<p style="color:rgba(255,255,255,.6);font-size:12px;">Render hatası: '+e.message+'</p>';
  }
}

function zoomIn() { if (!pdfDoc) return; pdfZoom = Math.min(pdfZoom + 0.25, 4); renderPDFPage(); }
function zoomOut() { if (!pdfDoc) return; pdfZoom = Math.max(pdfZoom - 0.25, 0.5); renderPDFPage(); }
function rotatePDF() { if (!pdfDoc) return; pdfRotation = (pdfRotation + 90) % 360; renderPDFPage(); }
function zoomFit() {
  if (!pdfDoc) return;
  pdfDoc.getPage(pdfPage).then(function(page) {
    var vp = page.getViewport({scale:1, rotation: pdfRotation});
    var area = document.getElementById('pdf-canvas-area');
    if (!area) return;
    var w = pdfRotation===90||pdfRotation===270 ? vp.height : vp.width;
    pdfZoom = Math.max(0.3, (area.clientWidth - 32) / w);
    renderPDFPage();
  });
}

function uploadPDF(input, kalemId, idx) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { toast('Max 10MB'); return; }
  var objectUrl = URL.createObjectURL(file);
  var pdfObj = {url: objectUrl, filename: file.name};
  if (kalemId.endsWith('_main')) {
    window._seFields['_localPDF'] = pdfObj;
  } else {
    if (!window._seKalemler[idx]) return;
    window._seKalemler[idx].fields['_localPDF'] = pdfObj;
  }
  loadPDF(objectUrl, file.name);
  var btn = document.querySelector('#kalem-'+idx+' .upbtn');
  if (btn) { btn.className = 'upbtn has'; btn.childNodes[0].textContent = 'PDF mevcut'; }
  // Netlify Blobs kalici kayit
  var targetId = kalemId.endsWith('_main') ? window._seId : kalemId;
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var upRes = await fetch('/.netlify/functions/upload-pdf', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({filename: file.name, data: e.target.result, recordId: targetId})
      });
      var upData = await upRes.json();
      if (upData.success) toast('PDF kalici kaydedildi ✓');
      else toast('Goruntuleme OK, kayit hatasi: ' + (upData.error||'?'));
    } catch(e2) { toast('Goruntuleme OK, kayit hatasi: ' + e2.message); }
  };
  reader.readAsDataURL(file);
}

async function updateDurum(id, durum) {
  try {
    await apiPatch('Satış Emirleri', id, {'Durum': durum});
    var r = records.find(function(x){ return x.id===id; });
    if (r) r.fields['Durum'] = durum;
    filterList();
    toast('Durum: '+durum);
  } catch(e) { toast('Hata: '+e.message); }
}

async function deleteSE(id, no) {
  if (!confirm('Sipariş '+no+' silinsin mi?')) return;
  try {
    var d = await apiDelete('Satış Emirleri', id);
    if (d.deleted) {
      records = records.filter(function(x){ return x.id!==id; });
      selectedSE = null;
      filterList();
      document.getElementById('main').innerHTML = '<div class="empty-main">Sipariş silindi.</div>';
      document.getElementById('sb-count').textContent = records.length+' sipariş';
      toast('Silindi');
    }
  } catch(e) { toast('Hata: '+e.message); }
}


function openSTLModal(seId, seNo, parcaAdi, miktar, birim) {
  window.location.href = 'ersan_satinalma.html';
}



async function saveSE(id) {
  var terminInput = document.getElementById('termin-input-' + id);
  var notlarInput = document.getElementById('notlar-input-' + id);
  var fields = {};
  if (terminInput) fields['Termin Tarihi'] = terminInput.value || null;
  if (notlarInput) fields['Notlar'] = notlarInput.value || null;
  if (!Object.keys(fields).length) { toast('Kaydedilecek değişiklik yok'); return; }
  try {
    await apiPatch('Satış Emirleri', id, fields);
    var r = records.find(function(x){ return x.id===id; });
    if (r) Object.assign(r.fields, fields);
    toast('Kaydedildi ✓');
  } catch(e) { toast('Hata: ' + e.message); }
}
