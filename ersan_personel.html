<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Personel & Yetkinlik Yönetimi</title>
<link rel="stylesheet" href="ersan_styles.css">
<script src="ersan_nav.js" defer></script>
<script src="ersan_log.js" defer></script>
</head>
<body>
<div id="nav-alani"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Personel</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

<div class="layout-wrapper">

  <!-- LEFT: Personel Listesi -->
  <div class="list-panel">
    <div class="list-header">
      <h2>Personel</h2>
      <div class="list-count" id="listCount">Yükleniyor…</div>
    </div>
    <div class="list-search">
      <input type="text" id="searchInput" placeholder="Ara…" oninput="filterList()">
    </div>
    <div class="list-scroll" id="listScroll">
      <div class="loading-row"><div class="spinner"></div> Yükleniyor…</div>
    </div>
  </div>

  <!-- RIGHT: Detay Paneli -->
  <div class="detail-panel">
    <div class="detail-toolbar" id="detailToolbar">
      <span class="detail-name" id="detailName" style="color:var(--text3);">Bir personel seçin</span>
    </div>
    <div class="detail-scroll" id="detailScroll">
      <div class="empty">
        <div class="empty-icon">👥</div>
        <div style="font-size:13px;font-weight:500;">Personel Seçin</div>
        <div style="font-size:12px;">Sol listeden bir personel seçerek detaylarını görüntüleyin.</div>
      </div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const BASE = 'app5LDgJMgocw79Ix';
const T = {
  personel: 'tblwG9GqnLC9oFZzb',
  tezgah:   'tblsBXDsWACBAFEJ5'
};
const PROXY = '/.netlify/functions/airtable';

// ── STATE ────────────────────────────────────────────────────────────────
let allPersonel = [];
let allTezgahlar = [];
let selectedId = null;
let tezgahlarLoaded = false;

// ── API HELPERS ──────────────────────────────────────────────────────────
async function atGet(table, filter, sort, dir) {
  const p = new URLSearchParams({ table });
  if (filter) p.append('filter', filter);
  if (sort)   p.append('sort', sort);
  if (dir)    p.append('dir', dir);
  const r = await fetch(`${PROXY}?${p}`);
  if (!r.ok) throw new Error('API hatası: ' + r.status);
  return r.json();
}

async function atGetAll(table, sort, dir) {
  let records = [], offset = null;
  do {
    const p = new URLSearchParams({ table });
    if (sort)   p.append('sort', sort);
    if (dir)    p.append('dir', dir);
    if (offset) p.append('offset', offset);
    const r = await fetch(`${PROXY}?${p}`);
    const d = await r.json();
    if (d.records) records = records.concat(d.records);
    offset = d.offset || null;
  } while (offset);
  return records;
}

async function atPatch(table, id, fields) {
  const r = await fetch(PROXY, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ table, id, fields })
  });
  if (!r.ok) throw new Error('Kayıt hatası: ' + r.status);
  return r.json();
}

// ── TOAST ────────────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const w = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── LOAD PERSONEL ────────────────────────────────────────────────────────
async function loadPersonel() {
  try {
    const records = await atGetAll(T.personel, 'Ad Soyad', 'asc');
    allPersonel = records;
    renderList(allPersonel);
  } catch(e) {
    document.getElementById('listScroll').innerHTML =
      '<div class="list-empty">Yüklenemedi: ' + e.message + '</div>';
  }
}

function renderList(list) {
  const el = document.getElementById('listScroll');
  const cnt = document.getElementById('listCount');
  cnt.textContent = list.length + ' personel';
  if (!list.length) {
    el.innerHTML = '<div class="list-empty">Kayıt bulunamadı.</div>';
    return;
  }
  el.innerHTML = list.map(r => {
    const f = r.fields;
    const aktif = f['Aktif mi?'] === true;
    const gorev = f['Görevi'] || '';
    return `<div class="liste-satir${r.id===selectedId?' secili':''}" onclick="selectPersonel('${r.id}')">
      <div class="p-name">${esc(f['Ad Soyad'] || '—')}</div>
      ${gorev ? `<div class="p-gorev">${esc(gorev)}</div>` : ''}
      <div class="p-badges">
        <span class="${aktif?'badge-aktif':'badge-pasif'}">${aktif?'Aktif':'Pasif'}</span>
      </div>
    </div>`;
  }).join('');
}

function filterList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderList(allPersonel); return; }
  renderList(allPersonel.filter(r => {
    const f = r.fields;
    return (f['Ad Soyad']||'').toLowerCase().includes(q)
        || (f['Görevi']||'').toLowerCase().includes(q)
        || (f['Personel Kodu']||'').toLowerCase().includes(q);
  }));
}

// ── SELECT PERSONEL ──────────────────────────────────────────────────────
async function selectPersonel(id) {
  selectedId = id;
  const rec = allPersonel.find(r => r.id === id);
  if (!rec) return;
  renderList(document.getElementById('searchInput').value.toLowerCase()
    ? allPersonel.filter(r => {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const f = r.fields;
        return (f['Ad Soyad']||'').toLowerCase().includes(q)
            || (f['Görevi']||'').toLowerCase().includes(q)
            || (f['Personel Kodu']||'').toLowerCase().includes(q);
      })
    : allPersonel);

  const f = rec.fields;
  document.getElementById('detailName').textContent = f['Ad Soyad'] || '—';
  document.getElementById('detailName').style.color = '';

  const ds = document.getElementById('detailScroll');
  ds.innerHTML = renderDetailCards(rec);

  if (!tezgahlarLoaded) {
    await loadTezgahlar();
  }
  renderYetkinlikMatrisi(rec);
}

function renderDetailCards(rec) {
  const f = rec.fields;
  const aktif = f['Aktif mi?'] === true;
  const girisTarihi = f['İşe Giriş Tarihi'] || '';

  return `
  <!-- Card 1: Kişisel Bilgiler -->
  <div class="card" id="card-kisel">
    <div class="card-header">
      <div class="card-dot" style="background:var(--accent)"></div>
      Kişisel Bilgiler
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="fg">
          <div class="fl">Ad Soyad</div>
          <input class="fi" id="f-adSoyad" type="text" value="${esc(f['Ad Soyad']||'')}">
        </div>
        <div class="fg">
          <div class="fl">Personel Kodu</div>
          <input class="fi" id="f-personelKodu" type="text" value="${esc(f['Personel Kodu']||'')}">
        </div>
        <div class="fg">
          <div class="fl">Görevi</div>
          <select class="fi" id="f-gorevi">
            <option value="">— Seçiniz —</option>
            ${['Operatör','Teknisyen','Mühendis','Kalite','Yönetici','Diğer'].map(g =>
              `<option value="${g}"${f['Görevi']===g?' selected':''}>${g}</option>`
            ).join('')}
          </select>
        </div>
        <div class="fg">
          <div class="fl">Telefon</div>
          <input class="fi" id="f-telefon" type="tel" value="${esc(f['Telefon']||'')}">
        </div>
        <div class="fg">
          <div class="fl">E-posta</div>
          <input class="fi" id="f-eposta" type="email" value="${esc(f['E-posta']||'')}">
        </div>
        <div class="fg">
          <div class="fl">İşe Giriş Tarihi</div>
          <input class="fi" id="f-girisTarihi" type="date" value="${girisTarihi}">
        </div>
        <div class="fg full">
          <div class="fl">Durum</div>
          <div class="aktif-row">
            <input type="checkbox" id="f-aktif" ${aktif?'checked':''}>
            <label for="f-aktif">Aktif personel</label>
          </div>
        </div>
      </div>
      <div class="save-row">
        <span class="save-status" id="saveStatus1"></span>
        <button class="btn primary" onclick="saveKisel('${rec.id}')">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- Card 2: Yetkinlik Matrisi -->
  <div class="card" id="card-yetkinlik">
    <div class="card-header">
      <div class="card-dot" style="background:var(--orange)"></div>
      Yetkinlik Matrisi
      <span style="margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--mono);">Tezgah Bazlı</span>
    </div>
    <div class="card-body" id="yetkinlikBody">
      <div class="loading-row"><div class="spinner"></div> Tezgahlar yükleniyor…</div>
    </div>
  </div>

  <!-- Card 3: Aktivite -->
  <div class="card">
    <div class="card-header">
      <div class="card-dot" style="background:var(--blue)"></div>
      Aktivite
    </div>
    <div class="card-body">
      <div class="akt-box">
        <p>Bu personelin sistem aktiviteleri ve değişiklik logları<br>
        <a href="ersan_sistem_logu.html">Sistem Logu</a> sayfasından görüntülenebilir.</p>
      </div>
    </div>
  </div>
  `;
}

// ── KAYDET: KİŞİSEL ─────────────────────────────────────────────────────
async function saveKisel(id) {
  const btn = document.querySelector('[onclick="saveKisel(\'' + id + '\')"]');
  const status = document.getElementById('saveStatus1');
  const rec = allPersonel.find(r => r.id === id);
  if (!rec) return;

  const oldFields = {
    'Ad Soyad': rec.fields['Ad Soyad'] || '',
    'Personel Kodu': rec.fields['Personel Kodu'] || '',
    'Görevi': rec.fields['Görevi'] || '',
    'Telefon': rec.fields['Telefon'] || '',
    'E-posta': rec.fields['E-posta'] || '',
    'İşe Giriş Tarihi': rec.fields['İşe Giriş Tarihi'] || '',
    'Aktif mi?': rec.fields['Aktif mi?'] || false,
  };

  const fields = {};
  const adSoyad = document.getElementById('f-adSoyad').value.trim();
  const personelKodu = document.getElementById('f-personelKodu').value.trim();
  const gorevi = document.getElementById('f-gorevi').value;
  const telefon = document.getElementById('f-telefon').value.trim();
  const eposta = document.getElementById('f-eposta').value.trim();
  const girisTarihi = document.getElementById('f-girisTarihi').value;
  const aktif = document.getElementById('f-aktif').checked;

  if (adSoyad)       fields['Ad Soyad'] = adSoyad;
  if (personelKodu)  fields['Personel Kodu'] = personelKodu;
  if (gorevi)        fields['Görevi'] = gorevi;
  if (telefon)       fields['Telefon'] = telefon;
  if (eposta)        fields['E-posta'] = eposta;
  if (girisTarihi)   fields['İşe Giriş Tarihi'] = girisTarihi;
  fields['Aktif mi?'] = aktif;

  btn.disabled = true;
  status.textContent = 'Kaydediliyor…';
  try {
    const updated = await atPatch(T.personel, id, fields);
    // Update local cache
    rec.fields = Object.assign(rec.fields, updated.fields || fields);
    document.getElementById('detailName').textContent = rec.fields['Ad Soyad'] || '—';
    renderList(document.getElementById('searchInput').value.toLowerCase()
      ? allPersonel.filter(r => {
          const q = document.getElementById('searchInput').value.toLowerCase();
          const ff = r.fields;
          return (ff['Ad Soyad']||'').toLowerCase().includes(q)
              || (ff['Görevi']||'').toLowerCase().includes(q)
              || (ff['Personel Kodu']||'').toLowerCase().includes(q);
        })
      : allPersonel);
    status.textContent = 'Kaydedildi ✓';
    setTimeout(() => { status.textContent = ''; }, 2500);
    toast('Kişisel bilgiler güncellendi.');
    await logIslem('Güncellendi', 'Personel', id, rec.fields['Ad Soyad'] || id, oldFields, fields);
  } catch(e) {
    status.textContent = 'Hata!';
    toast('Kayıt başarısız: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ── LOAD TEZGAHLAR ───────────────────────────────────────────────────────
async function loadTezgahlar() {
  try {
    allTezgahlar = await atGetAll(T.tezgah, 'Tezgah Adı', 'asc');
    tezgahlarLoaded = true;
  } catch(e) {
    allTezgahlar = [];
    tezgahlarLoaded = true;
  }
}

// ── YETKINLIK MATRİSİ ────────────────────────────────────────────────────
// Saved as JSON in "Notlar" field: { "tezgahId": "Usta", ... }
function renderYetkinlikMatrisi(rec) {
  const body = document.getElementById('yetkinlikBody');
  if (!body) return;

  let matris = {};
  try {
    const raw = rec.fields['Notlar'] || '';
    // Try to find JSON in the Notlar field
    const m = raw.match(/\[\[YK\]\]([\s\S]*?)\[\[\/YK\]\]/);
    if (m) matris = JSON.parse(m[1]);
  } catch(e) { matris = {}; }

  if (!allTezgahlar.length) {
    body.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px 0;">Tezgah verisi bulunamadı.</div>';
    return;
  }

  const seviyeler = ['Usta', 'Yeterli', 'Aday', 'Yetkisiz'];
  const seviyeClass = { 'Usta': 'yk-usta', 'Yeterli': 'yk-yeterli', 'Aday': 'yk-aday', 'Yetkisiz': 'yk-yetkisiz' };

  body.innerHTML = `
    <table class="yk-table">
      <thead>
        <tr>
          <th style="width:55%">Tezgah / Ekipman</th>
          <th>Yetkinlik Seviyesi</th>
        </tr>
      </thead>
      <tbody>
        ${allTezgahlar.map(t => {
          const tid = t.id;
          const adField = t.fields['Tezgah Adı'] || t.fields['Ad'] || t.fields['İsim'] || t.fields['Name'] || Object.values(t.fields)[0] || tid;
          const mevcut = matris[tid] || 'Yetkisiz';
          return `<tr>
            <td style="font-weight:500;">${esc(String(adField))}</td>
            <td>
              <select class="yk-select" id="yk-${tid}" onchange="updateYkBadge('${tid}',this.value)">
                ${seviyeler.map(s =>
                  `<option value="${s}"${mevcut===s?' selected':''}>${s}</option>`
                ).join('')}
              </select>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="save-row">
      <span class="save-status" id="saveStatusYK"></span>
      <button class="btn primary" onclick="saveYetkinlik('${rec.id}')">Yetkinlikleri Kaydet</button>
    </div>
  `;
}

function updateYkBadge(tid, val) {
  // Visual feedback only — save happens on button click
}

async function saveYetkinlik(id) {
  const rec = allPersonel.find(r => r.id === id);
  if (!rec) return;

  const matris = {};
  allTezgahlar.forEach(t => {
    const sel = document.getElementById('yk-' + t.id);
    if (sel) matris[t.id] = sel.value;
  });

  const matrisJson = JSON.stringify(matris);
  const oldNotlar = rec.fields['Notlar'] || '';
  let newNotlar;

  // Embed the matris JSON as a tagged block in Notlar
  const tag = /\[\[YK\]\][\s\S]*?\[\[\/YK\]\]/;
  const block = `[[YK]]${matrisJson}[[/YK]]`;
  if (tag.test(oldNotlar)) {
    newNotlar = oldNotlar.replace(tag, block);
  } else {
    newNotlar = oldNotlar ? (oldNotlar + '\n' + block) : block;
  }

  const btn = document.querySelector('[onclick="saveYetkinlik(\'' + id + '\')"]');
  const status = document.getElementById('saveStatusYK');
  if (btn) btn.disabled = true;
  if (status) status.textContent = 'Kaydediliyor…';

  try {
    await atPatch(T.personel, id, { 'Notlar': newNotlar });
    rec.fields['Notlar'] = newNotlar;
    if (status) { status.textContent = 'Kaydedildi ✓'; setTimeout(()=>{ status.textContent=''; }, 2500); }
    toast('Yetkinlik matrisi güncellendi.');
    await logIslem('Güncellendi', 'Personel Yetkinlik', id, rec.fields['Ad Soyad'] || id, null, matris);
  } catch(e) {
    if (status) status.textContent = 'Hata!';
    toast('Kayıt başarısız: ' + e.message, 'err');
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── UTILS ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── INIT ─────────────────────────────────────────────────────────────────
loadPersonel();
</script>
</body>
</html>
