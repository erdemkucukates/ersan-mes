<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Sistem Log Görüntüleyici</title>
<link rel="stylesheet" href="ersan_styles.css">
<link rel="stylesheet" href="utils/sidebar.css">
<script src="utils/sidebar.js" defer></script>
<script src="ersan_log.js" defer></script>
</head>
<body>
<div id="sb-mount"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Sistem Logu</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

<div class="layout-wrapper">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">Modül</span>
    <select id="f-modul">
      <option value="">Tümü</option>
      <option value="Teklif">Teklif</option>
      <option value="Sipariş">Sipariş</option>
      <option value="Satınalma">Satınalma</option>
      <option value="Ön Kabul">Ön Kabul</option>
      <option value="Girdi Kalite">Girdi Kalite</option>
      <option value="İş Emri">İş Emri</option>
      <option value="Üretim">Üretim</option>
      <option value="NCR">NCR</option>
      <option value="Sevkiyat">Sevkiyat</option>
      <option value="CAPA">CAPA</option>
      <option value="Personel">Personel</option>
      <option value="Bakım">Bakım</option>
      <option value="Diğer">Diğer</option>
    </select>
    <div class="filter-sep"></div>
    <span class="filter-label">İşlem Tipi</span>
    <select id="f-islem">
      <option value="">Tümü</option>
      <option value="Oluşturuldu">Oluşturuldu</option>
      <option value="Güncellendi">Güncellendi</option>
      <option value="Silindi">Silindi</option>
      <option value="Onaylandı">Onaylandı</option>
      <option value="Reddedildi">Reddedildi</option>
      <option value="PDF Yüklendi">PDF Yüklendi</option>
      <option value="AI Çağrıldı">AI Çağrıldı</option>
      <option value="Mail Gönderildi">Mail Gönderildi</option>
    </select>
    <div class="filter-sep"></div>
    <span class="filter-label">Başlangıç</span>
    <input type="date" id="f-baslangic">
    <span class="filter-label">Bitiş</span>
    <input type="date" id="f-bitis">
    <div class="filter-sep"></div>
    <button class="btn primary" onclick="applyFilters()">Filtrele</button>
    <button class="btn ghost" onclick="clearFilters()">Temizle</button>
    <div class="filter-sep"></div>
    <span class="count-badge" id="result-count">— kayıt</span>
    <button class="btn ghost" onclick="loadLogs()" style="margin-left:auto;" title="Yenile">↻ Yenile</button>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="card" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div id="table-container" style="flex:1;overflow:auto;">
        <div class="empty" id="loading-state">
          <div class="spinner"></div>
          <div>Loglar yükleniyor…</div>
        </div>
        <table class="log-table" id="log-table" style="display:none;">
          <thead>
            <tr>
              <th>Tarih / Saat</th>
              <th>Kullanıcı</th>
              <th>Modül</th>
              <th>İşlem Tipi</th>
              <th>Kayıt Özeti</th>
              <th style="text-align:center;">Detay</th>
            </tr>
          </thead>
          <tbody id="log-tbody"></tbody>
        </table>
        <div class="empty" id="empty-state" style="display:none;">
          <div class="empty-icon">📋</div>
          <div style="font-size:14px;font-weight:500;">Kayıt bulunamadı</div>
          <div style="font-size:12px;">Filtre kriterlerini değiştirerek tekrar deneyin.</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detail-modal" style="display:none;" onclick="closeDetailModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-head-title" id="modal-title">Log Detayı</span>
      <button class="btn-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal()">Kapat</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const BASE = 'app5LDgJMgocw79Ix';
const LOG_TABLE = 'Sistem Logu';

// ─── STATE ───────────────────────────────────────────────────────────────────
let allLogs = [];   // raw fetched records
let filtered = [];  // after client-side filter

// ─── API ─────────────────────────────────────────────────────────────────────
async function apiGet(table, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const url = `/.netlify/functions/airtable?base=${BASE}&table=${encodeURIComponent(table)}&${qs}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

async function apiGetAll(table, opts = {}) {
  const records = [];
  let offset = null;
  const params = { ...opts };
  do {
    if (offset) params.offset = offset;
    const data = await apiGet(table, params);
    (data.records || []).forEach(r => records.push(r));
    offset = data.offset || null;
  } while (offset && records.length < (opts.maxRecords || 200));
  return records;
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadLogs() {
  showLoading();
  try {
    const params = {
      maxRecords: 200,
      'sort[0][field]': 'Tarih Saat',
      'sort[0][direction]': 'desc'
    };
    allLogs = await apiGetAll(LOG_TABLE, params);
    applyFilters();
  } catch(e) {
    showEmpty();
    toast('Loglar yüklenemedi: ' + e.message, 'err');
  }
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function applyFilters() {
  const modul   = document.getElementById('f-modul').value;
  const islem   = document.getElementById('f-islem').value;
  const bas     = document.getElementById('f-baslangic').value;  // YYYY-MM-DD
  const bitis   = document.getElementById('f-bitis').value;

  filtered = allLogs.filter(r => {
    const f = r.fields || {};
    if (modul && f['Modül'] !== modul) return false;
    if (islem && f['İşlem Tipi'] !== islem) return false;
    if (bas || bitis) {
      const ts = f['Tarih Saat'] || '';
      const day = ts.substring(0, 10); // ISO date part
      if (bas && day < bas) return false;
      if (bitis && day > bitis) return false;
    }
    return true;
  });

  renderTable();
}

function clearFilters() {
  document.getElementById('f-modul').value = '';
  document.getElementById('f-islem').value = '';
  document.getElementById('f-baslangic').value = '';
  document.getElementById('f-bitis').value = '';
  applyFilters();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function rowClass(islemTipi) {
  const map = {
    'Silindi':       'row-silindi',
    'Reddedildi':    'row-reddedildi',
    'Onaylandı':     'row-onaylandi',
    'Oluşturuldu':   'row-olusturuldu',
    'Güncellendi':   'row-guncellendi',
    'AI Çağrıldı':   'row-ai',
  };
  return map[islemTipi] || 'row-default';
}

function badgeClass(islemTipi) {
  const safe = (islemTipi || '').replace(/\s/g, '\\ ');
  // Try exact CSS class; fallback to default
  return `badge badge-${safe}`;
}

function formatTS(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}<br>
            <span style="color:var(--text3)">${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}</span>`;
  } catch { return ts; }
}

function renderTable() {
  const tbody = document.getElementById('log-tbody');
  const table = document.getElementById('log-table');
  const emptyDiv = document.getElementById('empty-state');
  const loading = document.getElementById('loading-state');

  loading.style.display = 'none';

  document.getElementById('result-count').textContent = filtered.length + ' kayıt';

  if (filtered.length === 0) {
    table.style.display = 'none';
    emptyDiv.style.display = 'flex';
    return;
  }

  emptyDiv.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = filtered.map((r, idx) => {
    const f = r.fields || {};
    const it = f['İşlem Tipi'] || '';
    const rc = rowClass(it);
    // Build badge class safely
    let bc = 'badge';
    const knownBadges = ['Oluşturuldu','Güncellendi','Silindi','Onaylandı','Reddedildi','PDF Yüklendi','AI Çağrıldı','Mail Gönderildi'];
    if (knownBadges.includes(it)) {
      bc = 'badge badge-' + it;
    } else {
      bc = 'badge badge-default';
    }

    const ozet = escHtml(f['Kayıt Özeti'] || '');
    const user = escHtml(f['Kullanıcı'] || '—');
    const modul = escHtml(f['Modül'] || '—');

    return `<tr class="${rc}" data-idx="${idx}">
      <td class="ts-cell">${formatTS(f['Tarih Saat'])}</td>
      <td class="user-cell">${user}</td>
      <td><span class="mod-badge">${modul}</span></td>
      <td><span class="${bc}">${escHtml(it) || '—'}</span></td>
      <td class="summary-cell" title="${ozet}">${ozet || '—'}</td>
      <td style="text-align:center;"><button class="detail-btn" onclick="openDetail(${idx})">Detay</button></td>
    </tr>`;
  }).join('');
}

function showLoading() {
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('log-table').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('result-count').textContent = '— kayıt';
}

function showEmpty() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('log-table').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('result-count').textContent = '0 kayıt';
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(idx) {
  const r = filtered[idx];
  if (!r) return;
  const f = r.fields || {};

  document.getElementById('modal-title').textContent =
    'Log Detayı — ' + (f['Kayıt Özeti'] || r.id || '');

  const eski  = f['Eski Değer']  || '';
  const yeni  = f['Yeni Değer']  || '';

  const eskiPretty  = prettyJSON(eski);
  const yeniPretty  = prettyJSON(yeni);

  const fields = [
    ['Kayıt ID (Airtable)', r.id],
    ['Tarih / Saat', f['Tarih Saat'] || ''],
    ['Kullanıcı', f['Kullanıcı'] || ''],
    ['Modül', f['Modül'] || ''],
    ['İşlem Tipi', f['İşlem Tipi'] || ''],
    ['Kayıt ID', f['Kayıt ID'] || ''],
    ['Kayıt Özeti', f['Kayıt Özeti'] || ''],
    ['Notlar', f['Notlar'] || ''],
    ['Cihaz', f['Cihaz'] || ''],
  ];

  const infoRows = fields.filter(([,v]) => v).map(([l,v]) =>
    `<div class="fg">
      <div class="fl">${escHtml(l)}</div>
      <div class="fv">${escHtml(String(v))}</div>
    </div>`
  ).join('');

  const hasDiff = eski || yeni;

  document.getElementById('modal-body').innerHTML = `
    <div class="detail-grid">${infoRows}</div>

    ${hasDiff ? `
    <div>
      <div class="fl" style="margin-bottom:8px;">Değer Karşılaştırması</div>
      <div class="diff-cols">
        <div class="diff-block">
          <div class="diff-block-head old">Eski Değer</div>
          <div class="diff-block-body old ${eski ? '' : 'empty-diff'}">${eski ? escHtml(eskiPretty) : '(boş)'}</div>
        </div>
        <div class="diff-block">
          <div class="diff-block-head new">Yeni Değer</div>
          <div class="diff-block-body new ${yeni ? '' : 'empty-diff'}">${yeni ? escHtml(yeniPretty) : '(boş)'}</div>
        </div>
      </div>
    </div>` : ''}
  `;

  document.getElementById('detail-modal').style.display = 'flex';
}

function prettyJSON(str) {
  if (!str) return '';
  try {
    return JSON.stringify(JSON.parse(str), null, 2);
  } catch {
    return str;
  }
}

function closeModal() {
  document.getElementById('detail-modal').style.display = 'none';
}

function closeDetailModal(e) {
  if (e.target === document.getElementById('detail-modal')) closeModal();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toast(msg, type='inf', ms=3500) {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadLogs();
</script>

  </div><!-- /sayfa-icerik -->
</div><!-- /icerik-alani -->
</body>
</html>
