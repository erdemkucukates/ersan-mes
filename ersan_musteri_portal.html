<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan Endustriyel — Musteri Portali</title>
<link rel="stylesheet" href="ersan_styles.css">
<script src="ersan_log.js" defer></script>
<style>
body { background: var(--bg); }
.portal-topbar {
  background: var(--laci); color: #fff; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; position: sticky; top: 0; z-index: 50;
}
.portal-logo { font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
.portal-logo-sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-left: 8px; }
.portal-musteri { font-size: 12px; color: rgba(255,255,255,0.7); }
.portal-icerik { max-width: 900px; margin: 0 auto; padding: 20px; }
.portal-icerik .icerik-alani { margin-left: 0; }
.bolum { margin-bottom: 20px; }
.bolum-baslik {
  font-size: 13px; font-weight: 700; color: var(--laci);
  padding-bottom: 8px; margin-bottom: 12px;
  border-bottom: 2px solid var(--mavi);
}
.siparis-kart {
  background: var(--beyaz); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; margin-bottom: 10px;
}
.siparis-kart-ust {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.siparis-no { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700; color: var(--mavi-koyu); }
.siparis-parca { font-size: 12px; color: var(--metin2); }
.ilerleme-bar { display: flex; gap: 0; width: 100%; margin-top: 8px; }
.ilerleme-adim {
  flex: 1; text-align: center; padding: 6px 4px;
  font-size: 9px; font-weight: 600; color: var(--metin4);
  background: var(--bg2); border-right: 2px solid var(--beyaz);
  position: relative;
}
.ilerleme-adim:first-child { border-radius: 4px 0 0 4px; }
.ilerleme-adim:last-child { border-radius: 0 4px 4px 0; border-right: none; }
.ilerleme-adim.tamamlandi { background: var(--yesil); color: #fff; }
.ilerleme-adim.aktif { background: var(--mavi); color: #fff; }
.teklif-kart {
  background: var(--beyaz); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; margin-bottom: 10px;
}
.teklif-ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.teklif-no { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700; color: var(--mavi-koyu); }
.teklif-aksiyonlar { display: flex; gap: 6px; margin-top: 8px; }
.belge-satir {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--beyaz); border: 1px solid var(--border);
  border-radius: 6px; margin-bottom: 6px;
}
.belge-ad { font-size: 12px; font-weight: 600; color: var(--metin2); }
.belge-tip { font-size: 10px; color: var(--metin3); }
.talep-form {
  background: var(--beyaz); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
}
.portal-hata {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; color: var(--metin3);
  font-size: 14px; gap: 12px;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="portal-topbar">
  <div style="display:flex;align-items:center;">
    <span class="portal-logo">Ersan Endustriyel</span>
    <span class="portal-logo-sub">Musteri Portali</span>
  </div>
  <div class="portal-musteri" id="portal-musteri"></div>
</div>

<!-- ICERIK -->
<div class="portal-icerik" id="portal-icerik">
  <div class="yukleniyor" id="yukleniyor"><div class="spinner"></div> Yukleniyor...</div>
</div>

<div class="toast" id="toast-el"></div>

<script>
var musteriId = null;
var musteriAd = '';
var siparisler = [];
var tekliflerData = [];
var belgeler = [];

async function apiGet(tablo, query) {
  var url = '/.netlify/functions/airtable?table=' + encodeURIComponent(tablo);
  if (query) url += '&' + query;
  var r = await fetch(url);
  return r.json();
}
async function apiPost(tablo, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({method: 'POST', path: '/v0/app5LDgJMgocw79Ix/' + encodeURIComponent(tablo), body: {fields: fields}})
  });
  return r.json();
}
async function apiPatch(tablo, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'PATCH', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({table: tablo, id: id, fields: fields})
  });
  return r.json();
}

function toast(mesaj, tip) {
  var el = document.getElementById('toast-el');
  el.textContent = mesaj;
  el.className = 'toast toast-' + (tip || 'bilgi') + ' goster';
  setTimeout(function() { el.classList.remove('goster'); }, 3000);
}

function formatTL(val) {
  var n = parseFloat(val) || 0;
  return n.toLocaleString('tr-TR', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + ' TL';
}

function tokenCoz() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (!token) return null;
  try { return atob(token); } catch(e) { return null; }
}

async function yukle() {
  musteriId = tokenCoz();
  if (!musteriId) {
    document.getElementById('portal-icerik').innerHTML =
      '<div class="portal-hata">'
      + '<svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="opacity:.3;"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/><path d="M16 16l16 16M32 16L16 32" stroke="currentColor" stroke-width="2"/></svg>'
      + '<p>Gecersiz veya eksik erisim baglantisi.</p>'
      + '<p style="font-size:12px;">Lutfen size iletilen baglanti uzerinden giris yapin.</p>'
      + '</div>';
    return;
  }

  try {
    // Musteri bilgisi
    var mData = await apiGet('Müşteriler', 'pageSize=1&filterByFormula=RECORD_ID()%3D%22' + encodeURIComponent(musteriId) + '%22');
    var mRec = mData && mData.records && mData.records[0];
    if (!mRec) {
      document.getElementById('portal-icerik').innerHTML = '<div class="portal-hata"><p>Musteri bulunamadi.</p></div>';
      return;
    }
    musteriAd = mRec.fields['Müşteri Adı'] || mRec.fields['Ad'] || mRec.fields['Name'] || 'Musteri';
    document.getElementById('portal-musteri').textContent = musteriAd;

    // Paralel veri cekme
    var sonuclar = await Promise.all([
      apiGet('Satış Emirleri', 'pageSize=100'),
      apiGet('Teklifler', 'pageSize=100')
    ]);
    var tumSiparisler = (sonuclar[0] && sonuclar[0].records) || [];
    var tumTeklifler = (sonuclar[1] && sonuclar[1].records) || [];

    // Musteriyi filtrele
    siparisler = tumSiparisler.filter(function(s) {
      var mId = s.fields['Musteri'] || s.fields['Müşteri'];
      if (Array.isArray(mId)) return mId.indexOf(musteriId) >= 0;
      return mId === musteriId;
    });
    tekliflerData = tumTeklifler.filter(function(t) {
      var mId = t.fields['Musteri'] || t.fields['Müşteri'];
      if (Array.isArray(mId)) return mId.indexOf(musteriId) >= 0;
      return mId === musteriId;
    });
  } catch(e) {
    console.error('Veri hatasi:', e);
    siparisler = [];
    tekliflerData = [];
  }

  render();
}

function durumAdimi(durum) {
  var adimlar = ['Siparis Alindi', 'Uretimde', 'Kalite Kontrol', 'Sevke Hazir'];
  var durumMap = {
    'Beklemede': 0, 'Siparis Alindi': 0,
    'Uretimde': 1, 'Üretimde': 1, 'Islemde': 1,
    'Kalite': 2, 'Kalite Kontrol': 2, 'Muayene': 2,
    'Sevke Hazir': 3, 'Sevkiyat': 3, 'Tamamlandi': 4, 'Tamamlandı': 4
  };
  var aktifAdim = durumMap[durum] !== undefined ? durumMap[durum] : -1;
  return {adimlar: adimlar, aktifAdim: aktifAdim};
}

function render() {
  var html = '';

  // BOLUM 1: AKTIF SIPARISLER
  html += '<div class="bolum"><div class="bolum-baslik">Aktif Siparisler</div>';
  var aktifSiparisler = siparisler.filter(function(s) {
    var d = s.fields['Durum'] || '';
    return d !== 'Tamamlandi' && d !== 'Tamamlandı' && d !== 'Iptal';
  });
  if (aktifSiparisler.length === 0) {
    html += '<div class="bos-durum" style="background:var(--beyaz);border:1px solid var(--border);border-radius:8px;padding:30px;">Aktif siparis bulunmuyor</div>';
  } else {
    aktifSiparisler.forEach(function(s) {
      var f = s.fields;
      var durum = f['Durum'] || 'Beklemede';
      var info = durumAdimi(durum);
      html += '<div class="siparis-kart">'
        + '<div class="siparis-kart-ust">'
        + '<div><span class="siparis-no">' + (f['SE No'] || f['SP No'] || '-') + '</span>'
        + '<span class="siparis-parca" style="margin-left:8px;">' + (f['Parca Adi'] || f['Parça Adı'] || '') + '</span></div>'
        + '<span class="badge badge-mavi">' + durum + '</span></div>'
        + '<div style="font-size:11px;color:var(--metin3);margin-bottom:6px;">Miktar: ' + (f['Miktar'] || '-') + ' | Termin: ' + (f['Termin'] || f['Termin Tarihi'] || '-') + '</div>'
        + '<div class="ilerleme-bar">';
      info.adimlar.forEach(function(adim, idx) {
        var cls = idx < info.aktifAdim ? 'tamamlandi' : idx === info.aktifAdim ? 'aktif' : '';
        html += '<div class="ilerleme-adim ' + cls + '">' + adim + '</div>';
      });
      html += '</div></div>';
    });
  }
  html += '</div>';

  // BOLUM 2: ACIK TEKLIFLER
  html += '<div class="bolum"><div class="bolum-baslik">Acik Teklifler</div>';
  var acikTeklifler = tekliflerData.filter(function(t) {
    var d = t.fields['Durum'] || '';
    return d !== 'Onaylandi' && d !== 'Onaylandı' && d !== 'Reddedildi' && d !== 'Iptal';
  });
  if (acikTeklifler.length === 0) {
    html += '<div class="bos-durum" style="background:var(--beyaz);border:1px solid var(--border);border-radius:8px;padding:30px;">Acik teklif bulunmuyor</div>';
  } else {
    acikTeklifler.forEach(function(t) {
      var f = t.fields;
      html += '<div class="teklif-kart">'
        + '<div class="teklif-ust">'
        + '<span class="teklif-no">' + (f['Teklif No'] || '-') + '</span>'
        + '<span class="badge badge-sari">' + (f['Durum'] || 'Taslak') + '</span></div>'
        + '<div style="font-size:11px;color:var(--metin3);">Tutar: ' + formatTL(f['Toplam Tutar'] || f['Tutar'] || 0) + ' | Gecerlilik: ' + (f['Gecerlilik Tarihi'] || f['Geçerlilik Tarihi'] || '-') + '</div>'
        + '<div class="teklif-aksiyonlar">'
        + '<button class="btn btn-yesil btn-sm" onclick="teklifOnayla(\'' + t.id + '\')">Teklifi Onayla</button>'
        + '<button class="btn btn-beyaz btn-sm" onclick="revizyonIste(\'' + t.id + '\')">Revizyon Iste</button>'
        + '</div></div>';
    });
  }
  html += '</div>';

  // BOLUM 3: BELGELER
  html += '<div class="bolum"><div class="bolum-baslik">Belgeler</div>';
  var belgeVar = false;
  siparisler.forEach(function(s) {
    var f = s.fields;
    var coc = f['CoC'] || f['Sertifika'];
    var irsaliye = f['Irsaliye'] || f['İrsaliye'];
    if (coc && Array.isArray(coc)) {
      coc.forEach(function(b) {
        belgeVar = true;
        html += '<div class="belge-satir">'
          + '<div><div class="belge-ad">' + (b.filename || 'CoC') + '</div><div class="belge-tip">Uygunluk Sertifikasi - ' + (f['SE No'] || f['SP No'] || '') + '</div></div>'
          + '<a href="' + b.url + '" target="_blank" class="btn btn-beyaz btn-sm">Indir</a></div>';
      });
    }
    if (irsaliye && Array.isArray(irsaliye)) {
      irsaliye.forEach(function(b) {
        belgeVar = true;
        html += '<div class="belge-satir">'
          + '<div><div class="belge-ad">' + (b.filename || 'Irsaliye') + '</div><div class="belge-tip">Irsaliye - ' + (f['SE No'] || f['SP No'] || '') + '</div></div>'
          + '<a href="' + b.url + '" target="_blank" class="btn btn-beyaz btn-sm">Indir</a></div>';
      });
    }
  });
  if (!belgeVar) {
    html += '<div class="bos-durum" style="background:var(--beyaz);border:1px solid var(--border);border-radius:8px;padding:30px;">Belge bulunmuyor</div>';
  }
  html += '</div>';

  // BOLUM 4: YENI TALEP
  html += '<div class="bolum"><div class="bolum-baslik">Yeni Talep Olustur</div>'
    + '<div class="talep-form">'
    + '<div class="form-grid-2">'
    + '<div class="form-grup"><label class="form-label">Parca Adi</label><input class="form-input" id="talep-parca" placeholder="Parca adi"></div>'
    + '<div class="form-grup"><label class="form-label">Miktar</label><input class="form-input" id="talep-miktar" type="number" placeholder="0"></div>'
    + '</div>'
    + '<div class="form-grid-2">'
    + '<div class="form-grup"><label class="form-label">Malzeme</label><input class="form-input" id="talep-malzeme" placeholder="Orn: AISI 4140"></div>'
    + '<div class="form-grup"><label class="form-label">Termin Tarihi</label><input class="form-input" id="talep-termin" type="date"></div>'
    + '</div>'
    + '<div class="form-grup"><label class="form-label">Aciklama / Notlar</label><textarea class="form-textarea" id="talep-not" rows="3" placeholder="Detaylar, ozel gereksinimler..."></textarea></div>'
    + '<div class="form-grup"><label class="form-label">Teknik Resim (Dosya)</label><input type="file" id="talep-dosya" class="form-input" accept=".pdf,.dwg,.dxf,.step,.stp,.jpg,.png"></div>'
    + '<div style="margin-top:12px;"><button class="btn btn-mavi" onclick="talepGonder()">Talep Gonder</button></div>'
    + '</div></div>';

  document.getElementById('portal-icerik').innerHTML = html;
}

async function teklifOnayla(id) {
  if (!confirm('Bu teklifi onaylamak istediginizden emin misiniz?')) return;
  try {
    await apiPatch('Teklifler', id, {'Durum': 'Onaylandı'});
    await logIslem('Onaylandi', 'Teklif (Portal)', id, musteriAd, null, {durum: 'Onaylandı'});
    toast('Teklif onaylandi', 'basari');
    yukle();
  } catch(e) { toast('Hata: ' + e.message, 'hata'); }
}

async function revizyonIste(id) {
  var not = prompt('Revizyon notunuz:');
  if (!not) return;
  try {
    await apiPatch('Teklifler', id, {'Durum': 'Revizyon', 'Musteri Notu': not});
    await logIslem('Revizyon Istendi', 'Teklif (Portal)', id, musteriAd, null, {not: not});
    toast('Revizyon talebi iletildi', 'basari');
    yukle();
  } catch(e) { toast('Hata: ' + e.message, 'hata'); }
}

async function talepGonder() {
  var parca = document.getElementById('talep-parca').value;
  var miktar = document.getElementById('talep-miktar').value;
  if (!parca) { toast('Parca adi zorunlu', 'hata'); return; }

  var fields = {
    'Müşteri': [musteriId],
    'Parça Adı': parca,
    'Miktar': parseInt(miktar) || 1,
    'Malzeme': document.getElementById('talep-malzeme').value,
    'Termin Tarihi': document.getElementById('talep-termin').value,
    'Notlar': document.getElementById('talep-not').value,
    'Kaynak': 'Musteri Portali'
  };

  try {
    await apiPost('Teklif Kalemleri', fields);
    await logIslem('Olusturuldu', 'Talep (Portal)', musteriId, parca, null, fields);
    toast('Talebiniz iletildi. En kisa surede donus yapilacaktir.', 'basari');
    document.getElementById('talep-parca').value = '';
    document.getElementById('talep-miktar').value = '';
    document.getElementById('talep-malzeme').value = '';
    document.getElementById('talep-termin').value = '';
    document.getElementById('talep-not').value = '';
  } catch(e) { toast('Hata: ' + e.message, 'hata'); }
}

document.addEventListener('DOMContentLoaded', function() { yukle(); });
</script>
</body>
</html>
