<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Eğitim</title>
<link rel="stylesheet" href="utils/sidebar.css">
<link rel="stylesheet" href="ersan_styles.css">
<script src="utils/sidebar.js" defer></script>
<script src="ersan_log.js" defer></script>

  <!-- LAYOUT FIX v3 -->
  <link rel="stylesheet" href="utils/sidebar.css">
  <style>html,body{height:100%;margin:0;padding:0;overflow:hidden}.app{display:flex!important;flex-direction:row!important;height:100vh!important;width:100vw!important;overflow:hidden!important}#sb-mount,.sb{width:210px!important;min-width:210px!important;max-width:210px!important;flex-shrink:0!important;height:100vh!important;overflow-y:scroll!important;overflow-x:hidden!important}.main,.icerik-alani{flex:1 1 0!important;min-width:0!important;height:100vh!important;overflow:hidden!important;display:flex!important;flex-direction:column!important}.main>.tb,.main>.topbar,.main>[class*="topbar"]{flex-shrink:0!important}</style>
  <!-- /LAYOUT FIX -->
</head>
<body data-page="ik-egitim">
<div class="app">
<div id="sb-mount"></div>
<div class="icerik-alani main">
  <div class="topbar">
    <div class="topbar-baslik">Egitim</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

<div style="max-width:960px;margin:0 auto;padding:3rem 1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;">
  <div style="font-size:56px;margin-bottom:1.5rem;">🎓</div>
  <h1 style="font-size:24px;font-weight:600;color:var(--text);margin-bottom:.5rem;">Eğitim</h1>
  <span style="font-size:11px;font-weight:500;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:20px;margin-bottom:1.25rem;display:inline-block;">AS9100 §7.2</span>
  <p style="font-size:14px;color:var(--text3);text-align:center;max-width:420px;line-height:1.7;margin-bottom:2rem;">Eğitim planı, sertifika takibi, etkinlik değerlendirme. Bu modül geliştirme aşamasındadır.</p>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;max-width:480px;width:100%;">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.875rem;">Planlanacak özellikler</div>
    <div style="display:flex;align-items:center;gap:10px;padding:.5rem 0;border-top:1px solid var(--border);font-size:13px;color:var(--text2);">○ Airtable tablo bağlantısı</div>
    <div style="display:flex;align-items:center;gap:10px;padding:.5rem 0;border-top:1px solid var(--border);font-size:13px;color:var(--text2);">○ Liste ve detay görünümü</div>
    <div style="display:flex;align-items:center;gap:10px;padding:.5rem 0;border-top:1px solid var(--border);font-size:13px;color:var(--text2);">○ Form ve kayıt yönetimi</div>
    <div style="display:flex;align-items:center;gap:10px;padding:.5rem 0;border-top:1px solid var(--border);font-size:13px;color:var(--text2);">○ PDF / rapor çıktısı</div>
    <div style="display:flex;align-items:center;gap:10px;padding:.5rem 0;border-top:1px solid var(--border);font-size:13px;color:var(--text2);">○ Diğer modüllerle entegrasyon</div>
  </div>
  <a href="index.html" style="margin-top:1.5rem;font-size:13px;color:var(--accent);text-decoration:none;">← Ana sayfaya dön</a>
</div>

  </div>
</div>

<!-- LAYOUT JS -->
<script>
(function(){var sb=document.getElementById("sb-mount")||document.querySelector(".sb");var app=sb?sb.parentElement:document.querySelector(".app");var main=app?(app.querySelector(".main")||app.querySelector(".icerik-alani")):null;if(app)app.style.cssText="display:flex!important;flex-direction:row!important;height:100vh!important;width:100vw!important;overflow:hidden!important;";if(sb)sb.style.cssText="width:210px!important;min-width:210px!important;max-width:210px!important;flex-shrink:0!important;height:100vh!important;overflow-y:scroll!important;overflow-x:hidden!important;";if(main){main.style.cssText="flex:1 1 0!important;min-width:0!important;height:100vh!important;overflow:hidden!important;display:flex!important;flex-direction:column!important;";var k=Array.from(main.children).filter(function(c){return c.tagName!=="SCRIPT"&&c.tagName!=="STYLE";});if(k.length>0){k[0].style.flexShrink="0";for(var i=1;i<k.length;i++){k[i].style.flex="1 1 0";k[i].style.minHeight="0";k[i].style.overflowY="auto";}}}})();
</script>
<!-- /LAYOUT JS -->
</body>
</html>
