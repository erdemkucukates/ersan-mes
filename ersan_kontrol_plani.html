<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Kontrol Plani</title>
<link rel="stylesheet" href="ersan_styles.css">
<link rel="stylesheet" href="utils/sidebar.css">
<script src="utils/sidebar.js" defer></script>
<script src="ersan_log.js" defer></script>
</head>
<body>
<div id="sb-mount"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Kontrol Plani</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:var(--metin3)">AS9100 §8.5.1</span>
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">
    <div class="iki-panel">

      <!-- SOL PANEL -->
      <div class="sol-panel">
        <div class="sol-panel-ust">
          <div class="sol-panel-baslik">Kontrol Planlari</div>
          <button class="btn-new" onclick="yeniPlan()">+ Yeni</button>
        </div>
        <div class="sol-arama"><input type="text" placeholder="Parca No ara..." oninput="araFiltre(this.value)"></div>
        <div class="sol-liste" id="plan-liste">
          <div class="yukleniyor"><div class="spinner"></div> Yukleniyor...</div>
        </div>
      </div>

      <!-- SAG PANEL -->
      <div class="sag-panel">
        <div class="sag-panel-ust">
          <div style="font-size:13px;font-weight:600;color:var(--laci)" id="sag-baslik">Kontrol Plani Detay</div>
          <div id="sag-badge"></div>
        </div>
        <div class="sag-panel-icerik" id="sag-icerik">
          <div class="bos-durum">Listeden bir kontrol plani secin veya yeni olusturun.</div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var planListesi = [];
var seciliId = null;

async function apiGet(tablo, query) {
  var url = '/.netlify/functions/airtable?table=' + encodeURIComponent(tablo);
  if (query) url += '&' + query;
  var r = await fetch(url);
  return r.json();
}
async function apiPost(tablo, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method:'POST', path:'/v0/app5LDgJMgocw79Ix/' + encodeURIComponent(tablo), body:{fields:fields}})
  });
  return r.json();
}
async function apiPatch(tablo, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table:tablo, id:id, fields:fields})
  });
  return r.json();
}

function toast(mesaj, tip) {
  var t = document.getElementById('toast');
  t.textContent = mesaj;
  t.className = 'toast toast-' + (tip || 'basari') + ' goster';
  setTimeout(function(){ t.className = 'toast'; }, 3000);
}

async function yukle() {
  try {
    var s = await apiGet('Kontrol Plani', 'pageSize=100');
    planListesi = s.records || [];
  } catch(e) { planListesi = []; }
  listeGuncelle();
}

function araFiltre(val) {
  var arama = val.toLowerCase();
  var satirlar = document.querySelectorAll('#plan-liste .liste-satir');
  for (var i = 0; i < satirlar.length; i++) {
    satirlar[i].style.display = satirlar[i].textContent.toLowerCase().indexOf(arama) >= 0 ? '' : 'none';
  }
}

function listeGuncelle() {
  var liste = document.getElementById('plan-liste');
  if (planListesi.length === 0) {
    liste.innerHTML = '<div class="bos-durum">Tablo yapilandirilmamis veya kayit yok.</div>';
    return;
  }
  var html = '';
  planListesi.forEach(function(r) {
    var f = r.fields;
    var secili = r.id === seciliId ? ' secili' : '';
    var satirSayisi = 0;
    try { satirSayisi = JSON.parse(f['Satirlar'] || '[]').length; } catch(e) {}
    html += '<div class="liste-satir' + secili + '" onclick="planSec(\'' + r.id + '\')">'
      + '<div class="liste-satir-no">' + (f['Parca No'] || '-') + '</div>'
      + '<div class="liste-satir-ad">Rev: ' + (f['Revizyon'] || '-') + '</div>'
      + '<div class="liste-satir-alt"><span class="badge badge-mavi">' + satirSayisi + ' kontrol</span>'
      + '<span style="font-size:10px;color:var(--metin4)">' + (f['Tarih'] || '') + '</span></div>'
      + '</div>';
  });
  liste.innerHTML = html;
}

function planSec(id) {
  seciliId = id;
  listeGuncelle();
  var kayit = planListesi.find(function(r){ return r.id === id; });
  if (kayit) detayGoster(kayit);
}

function detayGoster(kayit) {
  var f = kayit.fields;
  document.getElementById('sag-baslik').textContent = (f['Parca No'] || 'Kontrol Plani') + ' Rev.' + (f['Revizyon'] || '-');
  document.getElementById('sag-badge').innerHTML = '<span class="badge badge-mavi">Kontrol Plani</span>';

  var satirlar = [];
  try { satirlar = JSON.parse(f['Satirlar'] || '[]'); } catch(e) {}
  if (satirlar.length === 0) {
    satirlar = [{opNo:'',karakteristik:'',kc:false,spec:'',yontem:'',siklik:'',kayit:''}];
  }

  var html = '';

  // Plan Bilgileri
  html += '<div class="kart"><div class="kart-baslik">Plan Bilgileri</div>'
    + '<div class="form-grid-3">'
    + '<div class="form-grup"><label class="form-label">Parca No</label><input class="form-input" id="kp-parca" value="' + (f['Parca No'] || '') + '"></div>'
    + '<div class="form-grup"><label class="form-label">Revizyon</label><input class="form-input" id="kp-rev" value="' + (f['Revizyon'] || '') + '"></div>'
    + '<div class="form-grup"><label class="form-label">Tarih</label><input type="date" class="form-input" id="kp-tarih" value="' + (f['Tarih'] || '') + '"></div>'
    + '</div></div>';

  // Kontrol Tablosu
  html += '<div class="kart"><div class="kart-baslik">Kontrol Noktalari</div>'
    + '<div style="overflow-x:auto">'
    + '<table class="tablo" id="kp-tablo"><thead><tr>'
    + '<th style="width:60px">Op No</th>'
    + '<th>Karakteristik</th>'
    + '<th style="width:40px;text-align:center" title="Key Characteristic">KC?</th>'
    + '<th>Spec / Tolerans</th>'
    + '<th>Yontem</th>'
    + '<th>Siklik</th>'
    + '<th>Kayit</th>'
    + '<th style="width:40px"></th>'
    + '</tr></thead><tbody>';

  satirlar.forEach(function(s, i) {
    html += kontrolSatiri(s, i);
  });

  html += '</tbody></table></div>'
    + '<div style="padding:8px;display:flex;gap:8px">'
    + '<button class="btn btn-beyaz btn-sm" onclick="satirEkle()">+ Satir Ekle</button>'
    + '</div></div>';

  // Butonlar
  html += '<div style="display:flex;gap:8px;justify-content:space-between">'
    + '<button class="btn btn-beyaz" onclick="muayeneFormuOlustur()">Kontrol Planindan Muayene Formu Olustur</button>'
    + '<button class="btn btn-mavi" onclick="planKaydet()">Kaydet</button>'
    + '</div>';

  document.getElementById('sag-icerik').innerHTML = html;
}

function kontrolSatiri(s, i) {
  var kcStyle = s.kc ? 'background:#fef9c3' : '';
  return '<tr style="' + kcStyle + '">'
    + '<td><input class="form-input" style="padding:4px 6px;font-size:11px;width:50px" value="' + (s.opNo||'') + '" data-idx="' + i + '" data-field="opNo"></td>'
    + '<td><input class="form-input" style="padding:4px 6px;font-size:11px" value="' + (s.karakteristik||'') + '" data-idx="' + i + '" data-field="karakteristik"></td>'
    + '<td style="text-align:center"><input type="checkbox" data-idx="' + i + '" data-field="kc"' + (s.kc?' checked':'') + ' onchange="kcDegisti(this,' + i + ')"></td>'
    + '<td><input class="form-input" style="padding:4px 6px;font-size:11px" value="' + (s.spec||'') + '" data-idx="' + i + '" data-field="spec"></td>'
    + '<td><select class="form-select" style="padding:4px 6px;font-size:11px" data-idx="' + i + '" data-field="yontem">'
    + '<option' + (s.yontem==='Kumpas'?' selected':'') + '>Kumpas</option>'
    + '<option' + (s.yontem==='Mikrometre'?' selected':'') + '>Mikrometre</option>'
    + '<option' + (s.yontem==='CMM'?' selected':'') + '>CMM</option>'
    + '<option' + (s.yontem==='Gorsel'?' selected':'') + '>Gorsel</option>'
    + '<option' + (s.yontem==='Pimli Mastar'?' selected':'') + '>Pimli Mastar</option>'
    + '<option' + (s.yontem==='Profil Projektoru'?' selected':'') + '>Profil Projektoru</option>'
    + '<option' + (s.yontem==='Yuzey Purusluk'?' selected':'') + '>Yuzey Purusluk</option>'
    + '</select></td>'
    + '<td><select class="form-select" style="padding:4px 6px;font-size:11px" data-idx="' + i + '" data-field="siklik">'
    + '<option' + (s.siklik==='Her Parca'?' selected':'') + '>Her Parca</option>'
    + '<option' + (s.siklik==='Ilk Parca'?' selected':'') + '>Ilk Parca</option>'
    + '<option' + (s.siklik==='%10 Ornekleme'?' selected':'') + '>%10 Ornekleme</option>'
    + '<option' + (s.siklik==='Son Parca'?' selected':'') + '>Son Parca</option>'
    + '</select></td>'
    + '<td><select class="form-select" style="padding:4px 6px;font-size:11px" data-idx="' + i + '" data-field="kayit">'
    + '<option' + (s.kayit==='Olcum Formu'?' selected':'') + '>Olcum Formu</option>'
    + '<option' + (s.kayit==='CMM Raporu'?' selected':'') + '>CMM Raporu</option>'
    + '<option' + (s.kayit==='Gorsel Kontrol'?' selected':'') + '>Gorsel Kontrol</option>'
    + '<option' + (s.kayit==='Checklist'?' selected':'') + '>Checklist</option>'
    + '</select></td>'
    + '<td><button class="btn btn-beyaz btn-sm" onclick="satirSil(' + i + ')" style="padding:2px 6px;font-size:10px">X</button></td>'
    + '</tr>';
}

function kcDegisti(el, idx) {
  var row = el.closest('tr');
  if (el.checked) {
    row.style.background = '#fef9c3';
  } else {
    row.style.background = '';
  }
}

function satirEkle() {
  var tbody = document.querySelector('#kp-tablo tbody');
  var rows = tbody.querySelectorAll('tr');
  var idx = rows.length;
  var tr = document.createElement('tr');
  var satir = kontrolSatiri({opNo:'Op'+(idx+1)*10,karakteristik:'',kc:false,spec:'',yontem:'Kumpas',siklik:'Her Parca',kayit:'Olcum Formu'}, idx);
  tr.innerHTML = satir.replace('<tr>','').replace('</tr>','');
  tbody.appendChild(tr);
}

function satirSil(idx) {
  var tbody = document.querySelector('#kp-tablo tbody');
  var rows = tbody.querySelectorAll('tr');
  if (rows.length > 1 && rows[idx]) rows[idx].remove();
}

function satirlariTopla() {
  var rows = document.querySelectorAll('#kp-tablo tbody tr');
  var satirlar = [];
  for (var i = 0; i < rows.length; i++) {
    var inputs = rows[i].querySelectorAll('input[type="text"], input:not([type])');
    var selects = rows[i].querySelectorAll('select');
    var kcCheck = rows[i].querySelector('input[type="checkbox"]');
    satirlar.push({
      opNo: inputs[0] ? inputs[0].value : '',
      karakteristik: inputs[1] ? inputs[1].value : '',
      kc: kcCheck ? kcCheck.checked : false,
      spec: inputs[2] ? inputs[2].value : '',
      yontem: selects[0] ? selects[0].value : '',
      siklik: selects[1] ? selects[1].value : '',
      kayit: selects[2] ? selects[2].value : ''
    });
  }
  return satirlar;
}

function yeniPlan() {
  seciliId = null;
  document.getElementById('sag-baslik').textContent = 'Yeni Kontrol Plani';
  document.getElementById('sag-badge').innerHTML = '<span class="badge badge-sari">Yeni</span>';
  detayGoster({fields:{}});
}

async function planKaydet() {
  var fields = {
    'Parca No': document.getElementById('kp-parca').value,
    'Revizyon': document.getElementById('kp-rev').value,
    'Tarih': document.getElementById('kp-tarih').value,
    'Satirlar': JSON.stringify(satirlariTopla())
  };
  try {
    if (seciliId) {
      await apiPatch('Kontrol Plani', seciliId, fields);
      await logIslem('Guncellendi', 'Kontrol Plani', seciliId, fields['Parca No'], null, fields);
      toast('Kontrol plani guncellendi');
    } else {
      var s = await apiPost('Kontrol Plani', fields);
      seciliId = s.id;
      await logIslem('Olusturuldu', 'Kontrol Plani', s.id, fields['Parca No'], null, fields);
      toast('Kontrol plani olusturuldu');
    }
    await yukle();
    if (seciliId) planSec(seciliId);
  } catch(e) {
    toast('Hata: ' + e.message, 'hata');
  }
}

function muayeneFormuOlustur() {
  var satirlar = satirlariTopla();
  if (satirlar.length === 0) {
    toast('Once kontrol noktalarini ekleyin', 'hata');
    return;
  }
  var parcaNo = document.getElementById('kp-parca').value || '-';
  var rev = document.getElementById('kp-rev').value || '-';

  // Yeni pencerede muayene formu
  var w = window.open('', '_blank', 'width=800,height=600');
  var html = '<html><head><title>Muayene Formu — ' + parcaNo + '</title>'
    + '<style>body{font-family:Segoe UI,sans-serif;padding:20px;font-size:12px}'
    + 'h1{font-size:16px;margin-bottom:4px}h2{font-size:12px;color:#666;margin-bottom:16px}'
    + 'table{width:100%;border-collapse:collapse;margin-bottom:16px}'
    + 'th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;font-size:11px}'
    + 'th{background:#f0f4f8;font-weight:600;text-transform:uppercase;font-size:10px}'
    + '.kc{background:#fef9c3}input.olcum{border:1px solid #ccc;padding:3px 6px;width:80px;font-size:11px}'
    + '.footer{margin-top:30px;display:flex;justify-content:space-between;font-size:11px;color:#666}'
    + '@media print{button{display:none}}'
    + '</style></head><body>'
    + '<h1>Muayene Formu</h1>'
    + '<h2>Parca No: ' + parcaNo + ' | Revizyon: ' + rev + ' | Tarih: ________________</h2>'
    + '<table><thead><tr><th>#</th><th>Op No</th><th>Karakteristik</th><th>KC</th><th>Spec</th><th>Yontem</th><th>Olculen</th><th>OK/NOK</th><th>Imza</th></tr></thead><tbody>';
  satirlar.forEach(function(s, i) {
    var kcClass = s.kc ? ' class="kc"' : '';
    html += '<tr' + kcClass + '><td>' + (i+1) + '</td><td>' + (s.opNo||'') + '</td><td>' + (s.karakteristik||'') + '</td>'
      + '<td>' + (s.kc ? 'KC' : '') + '</td><td>' + (s.spec||'') + '</td><td>' + (s.yontem||'') + '</td>'
      + '<td><input class="olcum"></td><td style="width:60px"></td><td style="width:60px"></td></tr>';
  });
  html += '</tbody></table>'
    + '<div class="footer"><div>Kontrol Eden: ________________</div><div>Onaylayan: ________________</div></div>'
    + '<button onclick="window.print()" style="margin-top:20px;padding:8px 16px;cursor:pointer">Yazdir</button>'
    + '</body></html>';
  w.document.write(html);
  w.document.close();
  toast('Muayene formu olusturuldu', 'bilgi');
}

document.addEventListener('DOMContentLoaded', function() {
  yukle();
});
</script>
</body>
</html>
