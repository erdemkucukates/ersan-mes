<script>
// ── GLOBALS ──
var musteriler = [];
var satisEmirleri = [];
var iletisimKayitlari = [];
var firsatlar = [];
var faturaKayitlari = [];
var seciliMusteri = null;
var aktifFiltre = 'Tumu';

// ── API HELPERS ──
async function apiGet(tablo, query) {
  var url = '/.netlify/functions/airtable?table=' + encodeURIComponent(tablo);
  if (query) url += '&' + query;
  var r = await fetch(url);
  return r.json();
}
async function apiPost(tablo, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({method: 'POST', path: '/v0/app5LDgJMgocw79Ix/' + encodeURIComponent(tablo), body: {fields: fields}})
  });
  return r.json();
}
async function apiPatch(tablo, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', {
    method: 'PATCH', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({table: tablo, id: id, fields: fields})
  });
  return r.json();
}

// ── TOAST ──
function toast(mesaj, tip) {
  var el = document.getElementById('toast-el');
  el.textContent = mesaj;
  el.className = 'toast toast-' + (tip || 'bilgi') + ' goster';
  setTimeout(function() { el.classList.remove('goster'); }, 3000);
}

// ── MODAL ──
function kapatModal(id) { document.getElementById(id).style.display = 'none'; }
function iletisimModal() { document.getElementById('iletisim-modal-overlay').style.display = 'flex'; }
function firsatModal() { document.getElementById('firsat-modal-overlay').style.display = 'flex'; }

// ── MUSTERI SKORU ──
function musteriSkoru(musteriId) {
  var skor = 0;
  var musteriSE = satisEmirleri.filter(function(s) {
    var f = s.fields;
    var mId = f['Musteri'] || f['Müşteri'];
    if (Array.isArray(mId)) return mId.indexOf(musteriId) >= 0;
    return mId === musteriId;
  });

  // Siparis hacmi (max 30 puan)
  var toplamTutar = 0;
  musteriSE.forEach(function(s) { toplamTutar += parseFloat(s.fields['Tutar'] || s.fields['Toplam Tutar'] || 0); });
  if (toplamTutar > 500000) skor += 30;
  else if (toplamTutar > 200000) skor += 20;
  else if (toplamTutar > 50000) skor += 10;

  // Siparis sikligi (max 25 puan)
  if (musteriSE.length > 10) skor += 25;
  else if (musteriSE.length > 5) skor += 15;
  else if (musteriSE.length > 0) skor += 5;

  // Son siparis tarihi (max 25 puan)
  var sonTarih = null;
  musteriSE.forEach(function(s) {
    var t = s.fields['Tarih'] || s.fields['Siparis Tarihi'] || s.createdTime;
    if (t) { var d = new Date(t); if (!sonTarih || d > sonTarih) sonTarih = d; }
  });
  if (sonTarih) {
    var gunFark = Math.floor((new Date() - sonTarih) / 86400000);
    if (gunFark < 30) skor += 25;
    else if (gunFark < 60) skor += 15;
    else if (gunFark < 90) skor += 5;
  }

  // Firsat var mi (max 20 puan)
  var mFirsatlar = firsatlar.filter(function(f) {
    var mId = f.fields['Musteri'] || f.fields['Müşteri'];
    if (Array.isArray(mId)) return mId.indexOf(musteriId) >= 0;
    return mId === musteriId;
  });
  var acikFirsat = mFirsatlar.filter(function(f) {
    var a = f.fields['Asama'] || f.fields['Aşama'] || '';
    return a !== 'Kazanildi' && a !== 'Kaybedildi';
  });
  if (acikFirsat.length > 0) skor += 20;
  else if (mFirsatlar.length > 0) skor += 10;

  return { skor: skor, toplamTutar: toplamTutar, siparisSayisi: musteriSE.length, sonTarih: sonTarih, firsatSayisi: mFirsatlar.length };
}

function skorBadgeHTML(skor) {
  var cls = skor >= 76 ? 'skor-yesil' : skor >= 51 ? 'skor-sari' : 'skor-kirmizi';
  return '<span class="skor-badge ' + cls + '">' + skor + '</span>';
}

// ── VIP / RISKLI KONTROLU ──
function musteriTipi(musteriId) {
  var bilgi = musteriSkoru(musteriId);
  if (bilgi.toplamTutar > 500000) return 'VIP';
  if (bilgi.sonTarih) {
    var gun = Math.floor((new Date() - bilgi.sonTarih) / 86400000);
    if (gun >= 90) return 'Riskli';
  }
  if (bilgi.siparisSayisi === 0) return 'Riskli';
  return 'Aktif';
}

// ── VERI YUKLE ──
async function yukle() {
  try {
    var sonuclar = await Promise.all([
      apiGet('Müşteriler', 'pageSize=100'),
      apiGet('Satış Emirleri', 'pageSize=100'),
      apiGet('İletişim Kayıtları', 'pageSize=100'),
      apiGet('Fırsatlar', 'pageSize=100'),
      apiGet('Fatura Kayıtları', 'pageSize=100')
    ]);
    musteriler = (sonuclar[0] && sonuclar[0].records) || [];
    satisEmirleri = (sonuclar[1] && sonuclar[1].records) || [];
    iletisimKayitlari = (sonuclar[2] && sonuclar[2].records) || [];
    firsatlar = (sonuclar[3] && sonuclar[3].records) || [];
    faturaKayitlari = (sonuclar[4] && sonuclar[4].records) || [];
  } catch(e) {
    console.error('Veri yuklenirken hata:', e);
    musteriler = []; satisEmirleri = []; iletisimKayitlari = []; firsatlar = []; faturaKayitlari = [];
  }
  listeGuncelle();
}

// ── FILTRE ──
function filtreBtn(el) {
  var btns = el.parentElement.querySelectorAll('.filtre-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('aktif');
  el.classList.add('aktif');
  aktifFiltre = el.getAttribute('data-f');
  listeGuncelle();
}

function filtrele() { listeGuncelle(); }

function listeGuncelle() {
  var arama = (document.getElementById('arama-input').value || '').toLowerCase();
  var filtreli = musteriler.filter(function(m) {
    var ad = (m.fields['Müşteri Adı'] || m.fields['Ad'] || m.fields['Name'] || '').toLowerCase();
    if (arama && ad.indexOf(arama) < 0) return false;
    if (aktifFiltre === 'Tumu') return true;
    var tip = musteriTipi(m.id);
    return tip === aktifFiltre;
  });

  document.getElementById('musteri-sayi').textContent = filtreli.length;
  var html = '';
  if (filtreli.length === 0) {
    html = '<div class="bos-durum">Musteri bulunamadi</div>';
  } else {
    filtreli.forEach(function(m) {
      var ad = m.fields['Müşteri Adı'] || m.fields['Ad'] || m.fields['Name'] || 'Isimsiz';
      var bilgi = musteriSkoru(m.id);
      var sonTarihStr = bilgi.sonTarih ? bilgi.sonTarih.toLocaleDateString('tr-TR') : '-';
      var secili = seciliMusteri && seciliMusteri.id === m.id ? ' secili' : '';
      html += '<div class="liste-satir' + secili + '" onclick="musteriSec(\'' + m.id + '\')">'
        + '<div class="liste-satir-ad" style="display:flex;justify-content:space-between;align-items:center;">'
        + '<span>' + ad + '</span>' + skorBadgeHTML(bilgi.skor)
        + '</div>'
        + '<div class="liste-satir-alt">'
        + '<span style="font-size:10px;color:var(--metin4);">Son: ' + sonTarihStr + '</span>'
        + '<span class="badge badge-gri" style="font-size:9px;">' + musteriTipi(m.id) + '</span>'
        + '</div></div>';
    });
  }
  document.getElementById('musteri-liste').innerHTML = html;
}

// ── MUSTERI SEC ──
function musteriSec(id) {
  seciliMusteri = musteriler.find(function(m) { return m.id === id; });
  if (!seciliMusteri) return;
  document.getElementById('bos-durum').style.display = 'none';
  document.getElementById('musteri-detay').style.display = 'flex';
  listeGuncelle();
  genelBakisYukle();
  iletisimYukle();
  firsatYukle();
  finansalYukle();
  // Reset to first tab
  var btns = document.querySelectorAll('.tab-btn');
  var tabs = document.querySelectorAll('.tab-icerik');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('aktif');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('aktif');
  btns[0].classList.add('aktif');
  tabs[0].classList.add('aktif');
}

// ── SEKMELER ──
function sekmeAc(btn, tabId) {
  var btns = document.querySelectorAll('.tab-btn');
  var tabs = document.querySelectorAll('.tab-icerik');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('aktif');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('aktif');
  btn.classList.add('aktif');
  document.getElementById(tabId).classList.add('aktif');
}

// ── TAB 1: GENEL BAKIS ──
function genelBakisYukle() {
  if (!seciliMusteri) return;
  var bilgi = musteriSkoru(seciliMusteri.id);
  var ad = seciliMusteri.fields['Müşteri Adı'] || seciliMusteri.fields['Ad'] || seciliMusteri.fields['Name'] || '';
  document.getElementById('detay-ad').textContent = ad;
  document.getElementById('detay-skor-badge').outerHTML = skorBadgeHTML(bilgi.skor);

  // KPI kartlari
  document.getElementById('genel-kpiler').innerHTML =
    '<div class="kpi-kart"><div class="kpi-etiket">Toplam Ciro</div><div class="kpi-deger">' + formatTL(bilgi.toplamTutar) + '</div></div>'
    + '<div class="kpi-kart yesil"><div class="kpi-etiket">Siparis Sayisi</div><div class="kpi-deger">' + bilgi.siparisSayisi + '</div></div>'
    + '<div class="kpi-kart sari"><div class="kpi-etiket">Acik Firsat</div><div class="kpi-deger">' + bilgi.firsatSayisi + '</div></div>'
    + '<div class="kpi-kart"><div class="kpi-etiket">Musteri Skoru</div><div class="kpi-deger">' + bilgi.skor + '/100</div></div>';

  // Skor detay
  document.getElementById('skor-detay').innerHTML =
    '<p>Siparis Hacmi: ' + formatTL(bilgi.toplamTutar) + '</p>'
    + '<p>Siparis Sikligi: ' + bilgi.siparisSayisi + ' adet</p>'
    + '<p>Son Siparis: ' + (bilgi.sonTarih ? bilgi.sonTarih.toLocaleDateString('tr-TR') : 'Yok') + '</p>'
    + '<p>Durum: <strong>' + musteriTipi(seciliMusteri.id) + '</strong></p>';

  // Son 5 siparis
  var musteriSE = satisEmirleri.filter(function(s) {
    var mId = s.fields['Musteri'] || s.fields['Müşteri'];
    if (Array.isArray(mId)) return mId.indexOf(seciliMusteri.id) >= 0;
    return mId === seciliMusteri.id;
  }).slice(0, 5);

  if (musteriSE.length === 0) {
    document.getElementById('son-siparisler').innerHTML = '<div class="bos-durum">Siparis bulunamadi</div>';
  } else {
    var thtml = '<table class="mini-tablo"><thead><tr><th>SP No</th><th>Tarih</th><th>Tutar</th><th>Durum</th></tr></thead><tbody>';
    musteriSE.forEach(function(s) {
      var f = s.fields;
      thtml += '<tr><td class="td-mono">' + (f['SE No'] || f['SP No'] || '-') + '</td>'
        + '<td>' + (f['Tarih'] || f['Siparis Tarihi'] || '-') + '</td>'
        + '<td>' + formatTL(f['Tutar'] || f['Toplam Tutar'] || 0) + '</td>'
        + '<td><span class="badge badge-mavi">' + (f['Durum'] || '-') + '</span></td></tr>';
    });
    thtml += '</tbody></table>';
    document.getElementById('son-siparisler').innerHTML = thtml;
  }
}

// ── TAB 2: ILETISIM ──
function iletisimYukle() {
  if (!seciliMusteri) return;
  var kayitlar = iletisimKayitlari.filter(function(k) {
    var mId = k.fields['Musteri'] || k.fields['Müşteri'];
    if (Array.isArray(mId)) return mId.indexOf(seciliMusteri.id) >= 0;
    return mId === seciliMusteri.id;
  });
  if (kayitlar.length === 0) {
    document.getElementById('iletisim-liste').innerHTML = '<div class="bos-durum">Iletisim kaydi yok</div>';
    return;
  }
  var html = '';
  kayitlar.forEach(function(k) {
    var f = k.fields;
    html += '<div class="iletisim-satir">'
      + '<div class="iletisim-tur">' + (f['Tür'] || f['Tur'] || 'Diger') + '</div>'
      + '<div class="iletisim-konu">' + (f['Konu'] || '-') + '</div>'
      + '<div style="font-size:11px;color:var(--metin2);margin:4px 0;">' + (f['Notlar'] || f['Not'] || '') + '</div>'
      + '<div class="iletisim-tarih">' + (f['Tarih'] || k.createdTime.substring(0, 10)) + '</div>'
      + '</div>';
  });
  document.getElementById('iletisim-liste').innerHTML = html;
}

async function iletisimKaydet() {
  if (!seciliMusteri) return;
  var fields = {
    'Müşteri': [seciliMusteri.id],
    'Tür': document.getElementById('ilt-tur').value,
    'Konu': document.getElementById('ilt-konu').value,
    'Notlar': document.getElementById('ilt-not').value,
    'Tarih': new Date().toISOString().substring(0, 10)
  };
  var aksiyon = document.getElementById('ilt-aksiyon').value;
  if (aksiyon) fields['Aksiyon Tarihi'] = aksiyon;
  try {
    await apiPost('İletişim Kayıtları', fields);
    await logIslem('Olusturuldu', 'Iletisim', seciliMusteri.id, fields['Konu'], null, fields);
    toast('Iletisim kaydi olusturuldu', 'basari');
    kapatModal('iletisim-modal-overlay');
    var yeni = await apiGet('İletişim Kayıtları', 'pageSize=100');
    iletisimKayitlari = (yeni && yeni.records) || [];
    iletisimYukle();
  } catch(e) { toast('Hata: ' + e.message, 'hata'); }
}

// ── TAB 3: FIRSATLAR ──
function firsatYukle() {
  if (!seciliMusteri) return;
  var mFirsatlar = firsatlar.filter(function(f) {
    var mId = f.fields['Musteri'] || f.fields['Müşteri'];
    if (Array.isArray(mId)) return mId.indexOf(seciliMusteri.id) >= 0;
    return mId === seciliMusteri.id;
  });
  if (mFirsatlar.length === 0) {
    document.getElementById('firsat-liste').innerHTML = '<div class="bos-durum">Firsat bulunamadi</div>';
    return;
  }
  var html = '';
  mFirsatlar.forEach(function(fr) {
    var f = fr.fields;
    var asama = f['Asama'] || f['Aşama'] || '';
    var badgeCls = asama === 'Kazanildi' ? 'badge-yesil' : asama === 'Kaybedildi' ? 'badge-kirmizi' : 'badge-mavi';
    html += '<div class="firsat-kart">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;">'
      + '<span class="firsat-baslik">' + (f['Başlık'] || f['Baslik'] || '-') + '</span>'
      + '<span class="badge ' + badgeCls + '">' + asama + '</span></div>'
      + '<div style="margin-top:4px;font-size:11px;color:var(--metin3);">'
      + 'Tutar: <span class="firsat-tutar">' + formatTL(f['Tutar'] || f['Tahmini Tutar'] || 0) + '</span>'
      + ' &bull; Olasilik: ' + (f['Olasılık'] || f['Olasilik'] || 0) + '%'
      + '</div></div>';
  });
  document.getElementById('firsat-liste').innerHTML = html;
}

async function firsatKaydet() {
  if (!seciliMusteri) return;
  var fields = {
    'Müşteri': [seciliMusteri.id],
    'Başlık': document.getElementById('frs-baslik').value,
    'Tahmini Tutar': parseFloat(document.getElementById('frs-tutar').value) || 0,
    'Olasılık': parseInt(document.getElementById('frs-olasilik').value) || 50,
    'Aşama': document.getElementById('frs-asama').value,
    'Tahmini Kapanış': document.getElementById('frs-kapanis').value,
    'Notlar': document.getElementById('frs-not').value
  };
  try {
    await apiPost('Fırsatlar', fields);
    await logIslem('Olusturuldu', 'Firsat', seciliMusteri.id, fields['Başlık'], null, fields);
    toast('Firsat eklendi', 'basari');
    kapatModal('firsat-modal-overlay');
    var yeni = await apiGet('Fırsatlar', 'pageSize=100');
    firsatlar = (yeni && yeni.records) || [];
    firsatYukle();
  } catch(e) { toast('Hata: ' + e.message, 'hata'); }
}

// ── TAB 4: FINANSAL OZET ──
function finansalYukle() {
  if (!seciliMusteri) return;
  var musteriSE = satisEmirleri.filter(function(s) {
    var mId = s.fields['Musteri'] || s.fields['Müşteri'];
    if (Array.isArray(mId)) return mId.indexOf(seciliMusteri.id) >= 0;
    return mId === seciliMusteri.id;
  });

  // Yillik gelir
  var yillikMap = {};
  musteriSE.forEach(function(s) {
    var tarih = s.fields['Tarih'] || s.fields['Siparis Tarihi'] || s.createdTime;
    var yil = tarih ? new Date(tarih).getFullYear() : 'Bilinmiyor';
    var tutar = parseFloat(s.fields['Tutar'] || s.fields['Toplam Tutar'] || 0);
    yillikMap[yil] = (yillikMap[yil] || 0) + tutar;
  });
  var yillar = Object.keys(yillikMap).sort();
  var maxTutar = 1;
  yillar.forEach(function(y) { if (yillikMap[y] > maxTutar) maxTutar = yillikMap[y]; });

  if (yillar.length === 0) {
    document.getElementById('yillik-gelir').innerHTML = '<div class="bos-durum">Veri yok</div>';
  } else {
    var barHtml = '';
    yillar.forEach(function(y) {
      var pct = Math.round((yillikMap[y] / maxTutar) * 100);
      barHtml += '<div class="bar-chart-row">'
        + '<div class="bar-chart-label">' + y + '</div>'
        + '<div class="bar-chart-bar" style="width:' + pct + '%;"></div>'
        + '<div class="bar-chart-val">' + formatTL(yillikMap[y]) + '</div></div>';
    });
    document.getElementById('yillik-gelir').innerHTML = barHtml;
  }

  // Odeme davranisi
  var mFaturalar = faturaKayitlari.filter(function(f) {
    var mId = f.fields['Musteri'] || f.fields['Müşteri'];
    if (Array.isArray(mId)) return mId.indexOf(seciliMusteri.id) >= 0;
    return mId === seciliMusteri.id;
  });
  var geciken = mFaturalar.filter(function(f) { return (f.fields['Durum'] || '') === 'Gecikti'; }).length;
  var toplam = mFaturalar.length;
  document.getElementById('odeme-davranisi').innerHTML = toplam > 0
    ? '<p>Toplam Fatura: ' + toplam + '</p><p>Geciken: ' + geciken + '</p><p>Odeme Puani: ' + (toplam > 0 ? Math.round(((toplam - geciken) / toplam) * 100) : 0) + '/100</p>'
    : '<div class="bos-durum">Fatura verisi yok</div>';

  // Son 3 fatura
  if (mFaturalar.length === 0) {
    document.getElementById('son-faturalar').innerHTML = '<div class="bos-durum">Fatura bulunamadi</div>';
  } else {
    var fHtml = '<table class="mini-tablo"><thead><tr><th>Fatura No</th><th>Tarih</th><th>Tutar</th><th>Durum</th></tr></thead><tbody>';
    mFaturalar.slice(0, 3).forEach(function(f) {
      var fl = f.fields;
      fHtml += '<tr><td class="td-mono">' + (fl['Fatura No'] || '-') + '</td>'
        + '<td>' + (fl['Tarih'] || '-') + '</td>'
        + '<td>' + formatTL(fl['Tutar'] || 0) + '</td>'
        + '<td><span class="badge ' + (fl['Durum'] === 'Odendi' ? 'badge-yesil' : fl['Durum'] === 'Gecikti' ? 'badge-kirmizi' : 'badge-sari') + '">' + (fl['Durum'] || '-') + '</span></td></tr>';
    });
    fHtml += '</tbody></table>';
    document.getElementById('son-faturalar').innerHTML = fHtml;
  }
}

// ── AI ANALIZ ──
async function aiAnaliz() {
  if (!seciliMusteri) return;
  var ad = seciliMusteri.fields['Müşteri Adı'] || seciliMusteri.fields['Ad'] || '';
  var bilgi = musteriSkoru(seciliMusteri.id);
  var prompt = 'Musteri: ' + ad + '\nToplam Ciro: ' + formatTL(bilgi.toplamTutar)
    + '\nSiparis Sayisi: ' + bilgi.siparisSayisi
    + '\nSkor: ' + bilgi.skor + '/100'
    + '\nDurum: ' + musteriTipi(seciliMusteri.id)
    + '\n\nBu musteri icin CRM stratejisi oner. Kisaca 3-4 madde halinde yaz.';
  toast('AI analiz yapiliyor...', 'bilgi');
  try {
    var r = await fetch('/.netlify/functions/claude', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: prompt, max_tokens: 500})
    });
    var data = await r.json();
    var yanit = (data.content && data.content[0] && data.content[0].text) || data.text || 'Yanit alinamadi';
    alert('AI Analiz:\n\n' + yanit);
  } catch(e) { toast('AI hatasi: ' + e.message, 'hata'); }
}

// ── YENI MUSTERI ──
function yeniMusteriModal() {
  var ad = prompt('Musteri Adi:');
  if (!ad) return;
  apiPost('Müşteriler', {'Müşteri Adı': ad}).then(function() {
    toast('Musteri eklendi', 'basari');
    logIslem('Olusturuldu', 'Musteri', '', ad, null, {ad: ad});
    yukle();
  }).catch(function(e) { toast('Hata: ' + e.message, 'hata'); });
}

// ── FORMAT ──
function formatTL(val) {
  var n = parseFloat(val) || 0;
  return n.toLocaleString('tr-TR', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + ' TL';
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function() { yukle(); });
</script>
