<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan — Fiyat Teklif Formu</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; background: #f0f2f5; color: #1a1d23; font-size: 14px; }

.header {
  background: #1e1b4b; padding: 20px 24px;
  display: flex; align-items: center; gap: 16px;
}
.logo { color: white; font-size: 20px; font-weight: 700; }
.logo-sub { color: #a5b4fc; font-size: 12px; margin-top: 2px; }

.container { max-width: 700px; margin: 32px auto; padding: 0 16px; }

.card {
  background: white; border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  overflow: hidden; margin-bottom: 20px;
}
.card-header {
  padding: 14px 20px; border-bottom: 1px solid #eee;
  font-size: 12px; font-weight: 600; color: #5a6170;
  text-transform: uppercase; letter-spacing: .5px;
  display: flex; align-items: center; gap: 8px;
}
.card-dot { width: 8px; height: 8px; border-radius: 50%; }
.card-body { padding: 20px; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item { }
.info-label { font-size: 11px; color: #9aa0ad; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.info-value { font-size: 14px; font-weight: 600; color: #1a1d23; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1 / -1; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-size: 11px; font-weight: 600; color: #5a6170; text-transform: uppercase; letter-spacing: .4px; }
.field-label .req { color: #ef4444; }
.field-input {
  border: 1.5px solid #e2e5ea; border-radius: 8px;
  padding: 9px 12px; font-size: 13px; font-family: inherit;
  color: #1a1d23; outline: none; transition: border-color .15s;
  width: 100%; background: white;
}
.field-input:focus { border-color: #6366f1; }
.field-input[readonly] { background: #f7f8fa; color: #5a6170; }
.field-input.disabled-look { background: #f0f2f5; cursor: not-allowed; }

.fiyat-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
.birim-select {
  border: 1.5px solid #e2e5ea; border-radius: 8px;
  padding: 9px 12px; font-size: 13px; font-family: inherit;
  color: #1a1d23; outline: none; background: white;
  cursor: pointer; min-width: 120px;
}
.birim-select:focus { border-color: #6366f1; }

.btn-submit {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: opacity .15s;
  box-shadow: 0 4px 16px rgba(99,102,241,.3);
}
.btn-submit:hover { opacity: .9; }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; }

.alert {
  padding: 12px 16px; border-radius: 8px; font-size: 13px;
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px;
}
.alert-info { background: #ede9fe; color: #5b21b6; border: 1px solid #ddd6fe; }
.alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
.alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

.success-screen {
  text-align: center; padding: 60px 20px;
}
.success-icon { font-size: 64px; margin-bottom: 16px; }
.success-title { font-size: 22px; font-weight: 700; color: #1e1b4b; margin-bottom: 8px; }
.success-sub { font-size: 14px; color: #5a6170; }

.loading-screen {
  text-align: center; padding: 60px 20px; color: #5a6170;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 40px; height: 40px; border: 3px solid #e2e5ea;
  border-top-color: #6366f1; border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 16px;
}

.bizim-olcu-note {
  font-size: 11px; color: #9aa0ad; margin-top: 4px;
  font-style: italic;
}

.divider { border: none; border-top: 1px solid #eee; margin: 4px 0 12px; }
</style>
</head>
<body>
<script src="ersan_nav.js"></script>
<script src="ersan_log.js"></script>

<header class="header">
  <div>
    <div class="logo">ERSAN ENDÜSTRİYEL</div>
    <div class="logo-sub">Makine ve Makine Parçaları İmalatı | Kocaeli</div>
  </div>
</header>

<div class="container" id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div>Teklif bilgileri yükleniyor...</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const TOKEN = params.get('token');
const RECORD_ID = params.get('rid');
const BASE_ID = 'app5LDgJMgocw79Ix';

let rfqData = null;
let submitted = false;

async function loadRFQ() {
  if (!TOKEN || !RECORD_ID) {
    showError('Geçersiz link. Lütfen e-postanızdaki linki kullanın.');
    return;
  }

  try {
    // Netlify function üzerinden Airtable'dan veri çek
    const res = await fetch('/.netlify/functions/airtable', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        method: 'GET',
        path: `/v0/${BASE_ID}/${getRfqTableId()}/${RECORD_ID}`
      })
    });
    const data = await res.json();

    if (data.error || !data.fields) {
      showError('Teklif talebi bulunamadı. Link geçersiz veya süresi dolmuş olabilir.');
      return;
    }

    rfqData = data.fields;

    // Token doğrula
    if (rfqData['Token'] !== TOKEN) {
      showError('Güvenlik hatası: Geçersiz token.');
      return;
    }

    // Daha önce yanıtlanmış mı?
    if (rfqData['Durum'] === 'Yanıtlandı' || rfqData['Durum'] === 'Seçildi') {
      showAlreadySubmitted();
      return;
    }

    renderForm();
  } catch(e) {
    showError('Bağlantı hatası: ' + e.message);
  }
}

function getRfqTableId() {
  // Bu değer Netlify env'den gelecek ama frontend'de sabit tutuyoruz
  // Netlify function tarafında env'den okunuyor, burada placeholder
  return 'tblHmfCvNZq0qNtb1';
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="card-body">
        <div class="alert alert-error">⚠️ ${msg}</div>
        <p style="color:#9aa0ad;font-size:12px;margin-top:12px;">
          Sorun yaşıyorsanız Ersan Endüstriyel ile iletişime geçin:<br>
          satin.alma@ersanmakine.com.tr
        </p>
      </div>
    </div>`;
}

function showAlreadySubmitted() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="card-body">
        <div class="success-screen">
          <div class="success-icon">✅</div>
          <div class="success-title">Teklifiniz Alınmış</div>
          <div class="success-sub">Bu teklif talebine daha önce yanıt verdiniz.<br>Teşekkür ederiz.</div>
        </div>
      </div>
    </div>`;
}

function renderForm() {
  const f = rfqData;
  document.getElementById('app').innerHTML = `

    <!-- BİLGİLENDİRME -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot" style="background:#6366f1"></div>
        Teklif Talebi Bilgileri
      </div>
      <div class="card-body">
        <div class="alert alert-info" style="margin-bottom:16px;">
          ℹ️ Aşağıdaki bilgiler tarafımızca belirlenmiştir. Lütfen teklif bölümünü doldurun.
        </div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Sipariş No</div>
            <div class="info-value">${f['SE No Text'] || f['SE No'] || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Parça Adı</div>
            <div class="info-value">${f['Kalem Adı'] || f['Parça Adı'] || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Malzeme / İşlem</div>
            <div class="info-value">${f['Malzeme İşlem'] || f['Parça No'] || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Talep Edilen Miktar</div>
            <div class="info-value" style="color:#6366f1;">${f['Miktar'] || 0} ${f['Birim'] || 'Adet'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Ölçü / Spec</div>
            <div class="info-value">${f['Ölçü'] || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Tahmini Ağırlık</div>
            <div class="info-value">${f['Tahmini kg'] ? f['Tahmini kg'] + ' kg' : '—'}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- TEKLİF FORMU -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot" style="background:#10b981"></div>
        Fiyat Teklifiniz
      </div>
      <div class="card-body">
        <div class="form-grid">

          <!-- FİYAT -->
          <div class="field-group">
            <label class="field-label">Birim Fiyat <span class="req">*</span></label>
            <input type="number" class="field-input" id="f-fiyat" placeholder="0,00" min="0" step="0.01">
          </div>

          <!-- FİYAT BİRİMİ -->
          <div class="field-group">
            <label class="field-label">Fiyat Birimi <span class="req">*</span></label>
            <div style="display:flex;gap:6px;">
              <select class="birim-select" id="f-birim-tip" style="flex:1;">
                <option value="kg" selected>kg</option>
                <option value="Adet">Adet</option>
              </select>
              <select class="birim-select" id="f-birim-doviz" style="flex:1;">
                <option value="TL" selected>TL</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
              </select>
            </div>
          </div>

          <!-- TESLİM SÜRESİ -->
          <div class="field-group">
            <label class="field-label">Teslim Süresi (İş Günü) <span class="req">*</span></label>
            <input type="number" class="field-input" id="f-teslim" placeholder="ör: 15" min="1">
          </div>

          <!-- ÖDEME VADESİ -->
          <div class="field-group">
            <label class="field-label">Ödeme Vadesi (Gün)</label>
            <input type="number" class="field-input" id="f-vade" placeholder="ör: 30" min="0" value="30">
          </div>

          <!-- GEÇERLİLİK TARİHİ -->
          <div class="field-group">
            <label class="field-label">Teklifin Geçerlilik Tarihi <span class="req">*</span></label>
            <input type="date" class="field-input" id="f-gecerlilik">
          </div>

          <!-- MALZEME CİNSİ -->
          <div class="field-group">
            <label class="field-label">Malzeme Cinsi / Kalite</label>
            <input type="text" class="field-input" id="f-malzeme" placeholder="ör: ST37, AISI 4140, AL 6061">
          </div>

          <!-- TEDARİKÇİ ÖLÇÜLERİ — Malzeme tipine gore dinamik -->
          <div class="field-group form-full">
            <label class="field-label">Temin Edeceğiniz Ölçüler</label>
            <div style="background:#f7f8fa;border:1px solid #e2e5ea;border-radius:8px;padding:10px;margin-bottom:6px;">
              <div style="font-size:10px;color:#9aa0ad;text-transform:uppercase;margin-bottom:4px;">Bizim Talebimiz</div>
              <div style="font-size:13px;font-weight:600;color:#5b21b6;">${f['Malzeme İşlem'] || '—'} · ${f['Ölçü'] || '—'} · ${f['Miktar'] || 0} ${f['Birim'] || 'Adet'} ${f['Tahmini kg'] ? '· ~' + f['Tahmini kg'] + ' kg' : ''}</div>
            </div>
            <div id="olcu-fields"></div>
            <div id="ted-kg" style="margin-top:6px;font-size:11px;color:#059669;font-weight:600;display:none;"></div>
          </div>

          <!-- TEDARİKÇİ KG -->
          <div class="field-group">
            <label class="field-label">Temin Edeceğiniz Ağırlık (kg)</label>
            <input type="number" class="field-input" id="f-ted-kg" placeholder="Otomatik hesaplanır" step="0.01" readonly style="background:#f7f8fa;">
          </div>

          <!-- NOT -->
          <div class="field-group">
            <label class="field-label">Notlar / Açıklama</label>
            <textarea class="field-input" id="f-not" rows="2"
              placeholder="Varsa eklemek istediğiniz bilgiler..."></textarea>
          </div>

        </div>

        <hr class="divider">

        <div id="submit-alert"></div>

        <button class="btn-submit" id="btn-submit" onclick="submitRFQ()">
          ✓ Teklifimi Gönder
        </button>
      </div>
    </div>

    <p style="text-align:center;color:#9aa0ad;font-size:11px;margin-bottom:32px;">
      Ersan Endüstriyel Makine San. Tic. Ltd. Şti. | AS9100 Rev.D Kapsamında Üretim
    </p>
  `;

  // Ölçü alanlarını malzeme tipine göre oluştur
  renderOlcuFields();

  // Geçerlilik tarihi: bugün + 20 gün
  var gecDate = new Date();
  gecDate.setDate(gecDate.getDate() + 20);
  var gecEl = document.getElementById('f-gecerlilik');
  if (gecEl) { gecEl.value = gecDate.toISOString().split('T')[0]; gecEl.min = new Date().toISOString().split('T')[0]; }

}

function renderOlcuFields() {
  var container = document.getElementById('olcu-fields');
  if (!container) return;
  // Malzeme tipini talep bilgisinden anla
  var malzemeIslem = (rfqData && rfqData['Malzeme İşlem']) || '';
  var tip = 'Mil'; // varsayılan
  if (malzemeIslem.toLowerCase().indexOf('boru') >= 0) tip = 'Boru';
  else if (malzemeIslem.toLowerCase().indexOf('lama') >= 0) tip = 'Lama';
  else if (malzemeIslem.toLowerCase().indexOf('sac') >= 0) tip = 'Sac';
  window._rfqMalzemeTip = tip;

  var html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">';
  if (tip === 'Mil') {
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Çap (mm)</div><input type="number" class="field-input" id="f-olcu-cap" placeholder="150" step="0.1"></div>';
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Boy (mm)</div><input type="number" class="field-input" id="f-olcu-boy" placeholder="200" step="0.1"></div>';
    html += '<div></div>';
  } else if (tip === 'Boru') {
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Dış Çap (mm)</div><input type="number" class="field-input" id="f-olcu-cap" placeholder="150" step="0.1"></div>';
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">İç Çap (mm)</div><input type="number" class="field-input" id="f-olcu-ic" placeholder="90" step="0.1"></div>';
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Boy (mm)</div><input type="number" class="field-input" id="f-olcu-boy" placeholder="200" step="0.1"></div>';
  } else if (tip === 'Lama') {
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">En (mm)</div><input type="number" class="field-input" id="f-olcu-en" placeholder="80" step="0.1"></div>';
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Kalınlık (mm)</div><input type="number" class="field-input" id="f-olcu-kal" placeholder="20" step="0.1"></div>';
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Boy (mm)</div><input type="number" class="field-input" id="f-olcu-boy" placeholder="300" step="0.1"></div>';
  } else if (tip === 'Sac') {
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">En (mm)</div><input type="number" class="field-input" id="f-olcu-en" placeholder="500" step="0.1"></div>';
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Boy (mm)</div><input type="number" class="field-input" id="f-olcu-boy" placeholder="500" step="0.1"></div>';
    html += '<div><div style="font-size:10px;color:#9aa0ad;margin-bottom:2px;">Kalınlık (mm)</div><input type="number" class="field-input" id="f-olcu-kal" placeholder="5" step="0.1"></div>';
  }
  html += '</div>';
  container.innerHTML = html;
  // Event listeners
  ['f-olcu-cap','f-olcu-ic','f-olcu-boy','f-olcu-en','f-olcu-kal'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', calcTedKg);
  });
}

function calcTedKg() {
  var tip = window._rfqMalzemeTip || 'Mil';
  var miktar = rfqData ? (rfqData['Miktar'] || 1) : 1;
  var rho = 7.85; // g/cm³
  var gram = 0;
  if (tip === 'Mil') {
    var cap = parseFloat(document.getElementById('f-olcu-cap')?.value) || 0;
    var boy = parseFloat(document.getElementById('f-olcu-boy')?.value) || 0;
    if (cap > 0 && boy > 0) { var r = cap/2/10, h = boy/10; gram = Math.PI*r*r*h*rho; }
  } else if (tip === 'Boru') {
    var cap = parseFloat(document.getElementById('f-olcu-cap')?.value) || 0;
    var ic = parseFloat(document.getElementById('f-olcu-ic')?.value) || 0;
    var boy = parseFloat(document.getElementById('f-olcu-boy')?.value) || 0;
    if (cap > 0 && boy > 0) { var rd = cap/2/10, ri = ic/2/10, h = boy/10; gram = Math.PI*(rd*rd-ri*ri)*h*rho; }
  } else if (tip === 'Lama') {
    var en = parseFloat(document.getElementById('f-olcu-en')?.value) || 0;
    var kal = parseFloat(document.getElementById('f-olcu-kal')?.value) || 0;
    var boy = parseFloat(document.getElementById('f-olcu-boy')?.value) || 0;
    if (en > 0 && kal > 0 && boy > 0) { gram = (en/10)*(kal/10)*(boy/10)*rho; }
  } else if (tip === 'Sac') {
    var en = parseFloat(document.getElementById('f-olcu-en')?.value) || 0;
    var boy = parseFloat(document.getElementById('f-olcu-boy')?.value) || 0;
    var kal = parseFloat(document.getElementById('f-olcu-kal')?.value) || 0;
    if (en > 0 && boy > 0 && kal > 0) { gram = (en/10)*(boy/10)*(kal/10)*rho; }
  }
  var kg = gram / 1000 * miktar;
  var kgEl = document.getElementById('ted-kg');
  var kgIn = document.getElementById('f-ted-kg');
  if (kg > 0) {
    if (kgEl) { kgEl.style.display = 'block'; kgEl.textContent = 'Hesaplanan: ' + kg.toFixed(2) + ' kg (' + miktar + ' adet)'; }
    if (kgIn) kgIn.value = kg.toFixed(2);
  } else {
    if (kgEl) kgEl.style.display = 'none';
    if (kgIn) kgIn.value = '';
  }
}

async function submitRFQ() {
  const fiyat = document.getElementById('f-fiyat').value;
  const birimTip = document.getElementById('f-birim-tip').value;
  const birimDoviz = document.getElementById('f-birim-doviz').value;
  const birim = birimDoviz + '/' + birimTip;
  const teslim = document.getElementById('f-teslim').value;
  const vade = document.getElementById('f-vade').value;
  const gecerlilik = document.getElementById('f-gecerlilik').value;
  const malzeme = document.getElementById('f-malzeme').value;
  const tip = window._rfqMalzemeTip || 'Mil';
  const cap = document.getElementById('f-olcu-cap')?.value || '';
  const ic = document.getElementById('f-olcu-ic')?.value || '';
  const boy = document.getElementById('f-olcu-boy')?.value || '';
  const en = document.getElementById('f-olcu-en')?.value || '';
  const kal = document.getElementById('f-olcu-kal')?.value || '';
  var olcular = '';
  if (tip==='Mil') olcular = cap?'Ø'+cap+'×'+boy+'mm':'';
  else if (tip==='Boru') olcular = cap?'Ø'+cap+(ic?'/'+ic:'')+'×'+boy+'mm':'';
  else if (tip==='Lama') olcular = en?en+'×'+kal+'×'+boy+'mm':'';
  else if (tip==='Sac') olcular = en?en+'×'+boy+'×'+kal+'mm':'';
  const tedKg = document.getElementById('f-ted-kg')?.value || '';
  const not = document.getElementById('f-not').value;
  const alertEl = document.getElementById('submit-alert');

  // Validasyon
  if (!fiyat || parseFloat(fiyat) <= 0) {
    alertEl.innerHTML = `<div class="alert alert-error">⚠️ Lütfen geçerli bir birim fiyat girin.</div>`;
    return;
  }
  if (!teslim || parseInt(teslim) <= 0) {
    alertEl.innerHTML = `<div class="alert alert-error">⚠️ Lütfen teslim süresini girin.</div>`;
    return;
  }
  if (!gecerlilik) {
    alertEl.innerHTML = `<div class="alert alert-error">⚠️ Lütfen teklifin geçerlilik tarihini seçin.</div>`;
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';
  alertEl.innerHTML = '';

  try {
    const res = await fetch('/.netlify/functions/rfq-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: TOKEN,
        recordId: RECORD_ID,
        teklifFiyati: fiyat,
        fiyatBirimi: birim,
        teslimSuresi: teslim,
        tedarikciOlculeri: olcular,
        malzemeCinsi: malzeme,
        gecerlilikTarihi: gecerlilik,
        tedarikciNotu: not,
        tedarikciVade: vade,
        tedarikciKg: tedKg,
      })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById('app').innerHTML = `
        <div class="card">
          <div class="card-body">
            <div class="success-screen">
              <div class="success-icon">🎉</div>
