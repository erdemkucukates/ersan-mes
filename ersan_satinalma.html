<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Satinalma</title>
<link rel="stylesheet" href="ersan_styles.css">
<script src="ersan_nav.js" defer></script>
<script src="ersan_log.js" defer></script>
</head>
<body>
<div id="nav-alani"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Satinalma</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

    <!-- SEKME BAR -->
    <div class="sekme-bar" style="display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;">
      <button class="filtre-btn aktif" onclick="sekmeGecis('talepler',this)">Talepler <span id="s-talepler" class="badge badge-gri" style="margin-left:4px;">0</span></button>
      <button class="filtre-btn" onclick="sekmeGecis('karsilastirma',this)">Fiyat Karsilastirma <span id="s-karsilastirma" class="badge badge-gri" style="margin-left:4px;">0</span></button>
      <button class="filtre-btn" onclick="sekmeGecis('gonderildi',this)">Gonderildi <span id="s-gonderildi" class="badge badge-gri" style="margin-left:4px;">0</span></button>
      <button class="filtre-btn" onclick="sekmeGecis('teklif_alindi',this)">Teklif Alindi <span id="s-teklif_alindi" class="badge badge-gri" style="margin-left:4px;">0</span></button>
      <button class="filtre-btn" onclick="sekmeGecis('onaylandi',this)">Onaylandi <span id="s-onaylandi" class="badge badge-gri" style="margin-left:4px;">0</span></button>
    </div>

    <!-- UST-ALT LAYOUT -->
    <div style="display:flex;flex-direction:column;gap:10px;height:calc(100vh - 52px - 80px);">

      <!-- UST: TABLO -->
      <div style="flex:1;min-height:180px;background:var(--beyaz);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;">
          <input type="text" id="satinalma-arama" placeholder="PR no, malzeme, SE ara..." oninput="filtreleListeyi()" style="width:220px;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--bg2);font-family:inherit;color:var(--metin2);">
          <button class="filtre-btn aktif" onclick="tipFiltre('tumu',this)">Tumu</button>
          <button class="filtre-btn" onclick="tipFiltre('hammadde',this)">Hammadde</button>
          <button class="filtre-btn" onclick="tipFiltre('fason',this)">Fason</button>
          <div style="flex:1;"></div>
          <span id="secim-sayac" style="font-size:11px;color:var(--metin3);display:none;">0 secili</span>
          <button id="toplu-rfq-btn" class="btn btn-mavi btn-sm" onclick="topluRFQ()" style="display:none;font-size:11px;padding:4px 10px;">Secilenlere RFQ Gonder</button>
        </div>
        <div id="talep-liste" style="flex:1;overflow:auto;">
          <div class="yukleniyor"><div class="spinner"></div><span>Yukleniyor...</span></div>
        </div>
      </div>

      <!-- ALT: DETAY -->
      <div id="talep-detay" style="flex:1;min-height:180px;background:var(--beyaz);border:1px solid var(--border);border-radius:8px;overflow-y:auto;padding:16px;">
        <div class="bos-durum"><p>Tablodan bir talep secin</p></div>
      </div>

    </div>

  </div>
</div>

<div id="toast-wrap" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>

<script>
var BASE = 'app5LDgJMgocw79Ix';
var T = {
  stl:       'tblHmfCvNZq0qNtb1',
  se:        'tbl56Oj1nPaqefI60',
  tedarikci: 'tblEI6683Im5AXj36',
  muzakere:  'tbl7Odd0ZZnEZ8PRP'
};

var records = [];
var filtrelenmis = [];
var seList = [];
var tedarikci = [];
var tedarikciList = [];
var muzakereler = [];
var aktifSekme = 'talepler';
var aktifTip = 'tumu';
var seciliId = null;
var seciliIds = [];

var SEKME_DURUMLARI = {
  talepler: ['Taslak'],
  karsilastirma: ['Teklif Alindi', 'Teklif Alındı'],
  gonderildi: ['Gonderildi', 'Gönderildi'],
  teklif_alindi: ['Teklif Alindi', 'Teklif Alındı'],
  onaylandi: ['Onaylandi', 'Onaylandı']
};

// ── API ──
var apiGet = function(table, params) {
  params = params || '';
  return fetch('/.netlify/functions/airtable', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({method:'GET', path:'/v0/' + BASE + '/' + table + '?' + params})
  }).then(function(res) { return res.json(); });
};

var apiFn = function(method, table, body, id) {
  id = id || '';
  return fetch('/.netlify/functions/airtable', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({method: method, path: '/v0/' + BASE + '/' + table + (id ? '/' + id : ''), body: body})
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(t); });
    return res.json();
  });
};

// ── HELPERS ──
function fmtDate(d) { try { return new Date(d).toLocaleDateString('tr-TR'); } catch(e) { return d || ''; } }
function fmt(n) { return n ? Number(n).toLocaleString('tr-TR', {minimumFractionDigits:2}) : '—'; }
function toast(msg, type) {
  type = type || 'ok';
  var el = document.createElement('div');
  el.style.cssText = 'padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;margin-top:8px;opacity:0;transform:translateY(10px);transition:all .3s;';
  el.style.background = type === 'err' ? 'var(--kirmizi)' : type === 'inf' ? 'var(--mavi)' : 'var(--yesil)';
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(function() { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }, 50);
  setTimeout(function() { el.remove(); }, 3500);
}
function getSENo(id) {
  var found = null;
  for (var i = 0; i < seList.length; i++) {
    if (seList[i].id === id) { found = seList[i]; break; }
  }
  return found ? (found.fields['SE No'] || '—') : '—';
}

// ── SEKME GECIS ──
function sekmeGecis(sekme, btn) {
  aktifSekme = sekme;
  var btns = document.querySelectorAll('.sekme-bar .filtre-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('aktif'); }
  btn.classList.add('aktif');
  seciliId = null;
  document.getElementById('talep-detay').innerHTML = '<div class="bos-durum"><p>Listeden bir talep secin</p></div>';
  filtreleListeyi();
}

// ── TIP FILTRE ──
function tipFiltre(tip, btn) {
  aktifTip = tip;
  var btns = btn.parentElement.querySelectorAll('.filtre-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('aktif'); }
  btn.classList.add('aktif');
  filtreleListeyi();
}

// ── FILTRELE ──
function filtreleListeyi() {
  var q = (document.getElementById('satinalma-arama').value || '').toLowerCase();
  var durumlar = SEKME_DURUMLARI[aktifSekme] || [];

  filtrelenmis = records.filter(function(r) {
    var f = r.fields;
    var durum = f['Durum'] || 'Taslak';
    var durumOk = durumlar.length === 0 || durumlar.indexOf(durum) >= 0;
    var tipOk = aktifTip === 'tumu' || (f['Talep Tipi'] || '').toLowerCase().indexOf(aktifTip) >= 0;
    var aramaOk = !q ||
      (f['Kalem Adı'] || '').toLowerCase().indexOf(q) >= 0 ||
      (f['Malzeme İşlem'] || '').toLowerCase().indexOf(q) >= 0 ||
      (f['Talep No'] || '').toLowerCase().indexOf(q) >= 0 ||
      getSENo((f['SE No'] || [])[0]).toLowerCase().indexOf(q) >= 0;
    return durumOk && tipOk && aramaOk;
  });

  listeRender();
  sekmeSayacGuncelle();
}

// ── MALZEME & OLCU PARSE ──
function parseMalzeme(mi) {
  if (!mi) return {tip:'', cinsi:''};
  var p = mi.split(' - ');
  return {tip: (p[0]||'').trim(), cinsi: (p[1]||'').trim()};
}
function parseOlcu(olcu, tip) {
  if (!olcu) return {o1:'',o2:'',o3:''};
  tip = (tip||'').toLowerCase();
  var m;
  if (tip === 'mil') {
    m = olcu.match(/[Øø]?([\d.]+)\s*[x×]\s*([\d.]+)/);
    return m ? {o1:m[1], o2:'0', o3:m[2]} : {o1:olcu, o2:'', o3:''};
  }
  if (tip === 'boru') {
    m = olcu.match(/[Øø]?([\d.]+)\s*\/\s*[Øø]?([\d.]+)\s*[x×]\s*([\d.]+)/);
    return m ? {o1:m[1], o2:m[2], o3:m[3]} : {o1:olcu, o2:'', o3:''};
  }
  // Lama, Sac, diger: EnxBoyxYukseklik
  m = olcu.match(/([\d.]+)\s*[x×]\s*([\d.]+)\s*[x×]\s*([\d.]+)/);
  if (m) return {o1:m[1], o2:m[2], o3:m[3]};
  m = olcu.match(/([\d.]+)\s*[x×]\s*([\d.]+)/);
  if (m) return {o1:m[1], o2:m[2], o3:''};
  return {o1:olcu, o2:'', o3:''};
}
function olcuBaslik(tip) {
  tip = (tip||'').toLowerCase();
  if (tip === 'mil') return ['Cap','—','Boy'];
  if (tip === 'boru') return ['Dis Cap','Ic Cap','Boy'];
  if (tip === 'lama') return ['En','Boy','Yukseklik'];
  if (tip === 'sac') return ['En','Boy','Kalinlik'];
  return ['Olcu 1','Olcu 2','Olcu 3'];
}

// ── SECIM ──
function toggleSecim(id, checked) {
  if (checked) { if (seciliIds.indexOf(id)<0) seciliIds.push(id); }
  else { seciliIds = seciliIds.filter(function(x){return x!==id;}); }
  secimGuncelle();
}
function tumunuSec(checked) {
  if (checked) { seciliIds = filtrelenmis.map(function(r){return r.id;}); }
  else { seciliIds = []; }
  listeRender();
}
function secimGuncelle() {
  var n = seciliIds.length;
  var el = document.getElementById('secim-sayac');
  var btn = document.getElementById('toplu-rfq-btn');
  if (el) { el.style.display = n>0?'inline':'none'; el.textContent = n+' secili'; }
  if (btn) { btn.style.display = n>0?'inline-block':'none'; }
}

// ── LISTE RENDER ──
function listeRender() {
  var el = document.getElementById('talep-liste');
  if (!filtrelenmis.length) {
    el.innerHTML = '<div class="bos-durum" style="padding:20px"><p>Kayit bulunamadi</p></div>';
    secimGuncelle();
    return;
  }
  var thS = 'padding:5px 6px;text-align:left;white-space:nowrap;font-size:10px;font-weight:600;color:var(--metin3);text-transform:uppercase;letter-spacing:.3px;';
  var html = '<table style="width:100%;border-collapse:collapse;font-size:11px;">';
  html += '<thead><tr style="background:var(--bg2);position:sticky;top:0;z-index:1;">';
  html += '<th style="width:28px;padding:5px 4px;text-align:center;"><input type="checkbox" onchange="tumunuSec(this.checked)" id="chk-hepsi"></th>';
  html += '<th style="'+thS+'">Tarih</th>';
  html += '<th style="'+thS+'">PR No</th>';
  html += '<th style="'+thS+'">Kalem</th>';
  html += '<th style="'+thS+'">M.Cinsi</th>';
  html += '<th style="'+thS+'">M.Tipi</th>';
  html += '<th style="'+thS+'text-align:center;">Olcu 1</th>';
  html += '<th style="'+thS+'text-align:center;">Olcu 2</th>';
  html += '<th style="'+thS+'text-align:center;">Olcu 3</th>';
  html += '<th style="'+thS+'text-align:center;">Miktar</th>';
  html += '<th style="'+thS+'text-align:center;">Durum</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < filtrelenmis.length; i++) {
    var r = filtrelenmis[i];
    var f = r.fields;
    var aktif = r.id === seciliId;
    var checked = seciliIds.indexOf(r.id) >= 0;
    var durum = f['Durum'] || 'Taslak';
    var durumClass = durum === 'Taslak' ? 'badge-gri' : durum === 'Onaylandı' ? 'badge-yesil' : (durum === 'Teklif Alındı' || durum === 'Teklif Alindi') ? 'badge-mavi' : 'badge-sari';
    var tarih = fmtDate(f['Talep Tarihi']);
    var prNo = f['Talep No'] || '';
    var kalem = f['Kalem Adı'] || '';
    var parsed = parseMalzeme(f['Malzeme İşlem'] || '');
    var olc = parseOlcu(f['Ölçü'] || '', parsed.tip);
    var tdS = 'padding:4px 6px;';

    html += '<tr onclick="talepSec(\''+r.id+'\')" style="cursor:pointer;border-bottom:1px solid var(--border);'+(aktif?'background:var(--mavi-bg);':'')+'">';
    html += '<td style="padding:4px;text-align:center;" onclick="event.stopPropagation()"><input type="checkbox" '+(checked?'checked':'')+' onchange="toggleSecim(\''+r.id+'\',this.checked)"></td>';
    html += '<td style="'+tdS+'white-space:nowrap;color:var(--metin3);font-size:10px;">'+tarih+'</td>';
    html += '<td style="'+tdS+'font-family:monospace;font-weight:600;color:var(--mavi-koyu);white-space:nowrap;">'+(prNo||'—')+'</td>';
    html += '<td style="'+tdS+'max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+kalem+'">'+kalem+'</td>';
    html += '<td style="'+tdS+'white-space:nowrap;">'+parsed.cinsi+'</td>';
    html += '<td style="'+tdS+'white-space:nowrap;">'+parsed.tip+'</td>';
    html += '<td style="'+tdS+'text-align:center;font-family:monospace;">'+olc.o1+'</td>';
    html += '<td style="'+tdS+'text-align:center;font-family:monospace;">'+olc.o2+'</td>';
    html += '<td style="'+tdS+'text-align:center;font-family:monospace;">'+olc.o3+'</td>';
    html += '<td style="'+tdS+'text-align:center;font-family:monospace;white-space:nowrap;">'+(f['Miktar']||'')+' '+(f['Birim']||'')+'</td>';
    html += '<td style="'+tdS+'text-align:center;"><span class="badge '+durumClass+'" style="font-size:10px;">'+durum+'</span></td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
  secimGuncelle();
}

// ── SEKME SAYAC GUNCELLE ──
function sekmeSayacGuncelle() {
  var keys = Object.keys(SEKME_DURUMLARI);
  for (var k = 0; k < keys.length; k++) {
    var key = keys[k];
    var durumlar = SEKME_DURUMLARI[key];
    var sayi = 0;
    for (var i = 0; i < records.length; i++) {
      var d = records[i].fields['Durum'] || 'Taslak';
      if (durumlar.indexOf(d) >= 0) sayi++;
    }
    var el = document.getElementById('s-' + key);
    if (el) el.textContent = sayi;
  }
}

// ── TALEP SEC (DETAY GOSTER) ──
function talepSec(id) {
  seciliId = id;
  listeRender();
  var r = null;
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === id) { r = records[i]; break; }
  }
  if (!r) return;
  var f = r.fields;
  var seId = (f['SE No'] || [])[0] || '';
  var seNo = getSENo(seId);
  var durum = f['Durum'] || 'Taslak';

  // Fiyat karsilastirma sekmesinde ozel icerik
  if (aktifSekme === 'karsilastirma') {
    gosterKarsilastirma(r);
    return;
  }

  var durumClass = durum === 'Taslak' ? 'badge-gri' : durum === 'Onaylandı' ? 'badge-yesil' : (durum === 'Teklif Alındı' || durum === 'Teklif Alindi') ? 'badge-mavi' : 'badge-sari';

  var html = '';
  // Toolbar
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">';
  html += '<div style="font-size:14px;font-weight:600;font-family:monospace;">' + (f['Talep No'] || '—') + '</div>';
  html += '<span class="badge ' + durumClass + '">' + durum + '</span>';
  if (f['Talep Tipi']) html += '<span class="badge badge-gri">' + f['Talep Tipi'] + '</span>';
  html += '<div style="flex:1;"></div>';

  // Butonlar duruma gore
  if (durum === 'Taslak' || durum === 'Onay Bekliyor') {
    html += '<button class="btn btn-mavi btn-sm" onclick="openRFQSingle(\'' + id + '\',\'' + seId + '\')">RFQ Gonder</button>';
  }
  if (durum !== 'Onaylandı') {
    html += '<button class="btn btn-beyaz btn-sm" onclick="openDurumModal(\'' + id + '\',\'' + seId + '\')">Durum Guncelle</button>';
  }
  html += '<button class="btn btn-kirmizi btn-sm" onclick="deleteSTL(\'' + id + '\',\'' + seId + '\')">Sil</button>';
  html += '</div>';

  // Detay karti
  html += '<div class="kart"><div class="kart-baslik">Talep Detayi</div>';
  html += '<div class="form-grid-2">';
  html += fieldReadonly('SE No', seNo);
  html += fieldReadonly('Kalem Adi', f['Kalem Adı'] || '—');
  html += fieldReadonly('Talep Tipi', f['Talep Tipi'] || '—');
  html += fieldReadonly('Malzeme / Islem', f['Malzeme İşlem'] || '—');
  html += fieldReadonly('Olcu / Spec', f['Ölçü'] || '—');
  html += fieldReadonly('Miktar', (f['Miktar'] || 0) + ' ' + (f['Birim'] || ''));
  html += fieldReadonly('Tahmini kg', f['Tahmini kg'] ? f['Tahmini kg'] + ' kg' : '—');
  html += fieldReadonly('Durum', durum);
  html += '</div>';

  // Secilen tedarikci bilgisi
  if (f['Seçilen Tedarikçi']) {
    html += '<div style="margin-top:10px;padding:8px 12px;background:var(--yesil-bg);border-radius:6px;font-size:12px;color:var(--yesil-t);">';
    html += 'Secilen Tedarikci: <strong>' + f['Seçilen Tedarikçi'] + '</strong>';
    if (f['Onay Fiyatı']) html += ' - ' + fmt(f['Onay Fiyatı']) + ' TL';
    html += '</div>';
  }
  html += '</div>';

  // Tedarikci yaniti karti
  if (f['Teklif Fiyatı']) {
    html += '<div class="kart"><div class="kart-baslik">Tedarikci Yaniti</div>';
    html += '<div class="form-grid-2">';
    html += fieldReadonly('Teklif Fiyati', f['Teklif Fiyatı'] ? fmt(f['Teklif Fiyatı']) + ' ' + (f['Fiyat Birimi'] || 'TL/kg') : '—');
    html += fieldReadonly('Teslim Suresi', (f['Teslim Süresi Gün'] || '—') + ' gun');
    html += fieldReadonly('Tedarikci Vadesi', (f['Tedarikçi Vade Önerisi'] || '—') + ' gun');
    html += fieldReadonly('Gecerlilik', fmtDate(f['Geçerlilik Tarihi']));
    html += fieldReadonly('Malzeme Cinsi', f['Malzeme Cinsi'] || '—');
    html += fieldReadonly('Tedarikci Olculeri', f['Tedarikçi Ölçüleri'] || '—');
    html += fieldReadonly('Tedarikci Kg', f['Tedarikçi Kg'] ? f['Tedarikçi Kg'] + ' kg' : '—');
    html += fieldReadonly('Yanit Tarihi', fmtDate(f['Yanıt Tarihi']));
    html += '</div>';
    if (f['Tedarikçi Notu']) {
      html += '<div style="margin-top:8px;padding:8px 12px;background:var(--bg2);border-radius:6px;font-size:12px;color:var(--metin2);"><strong>Not:</strong> ' + f['Tedarikçi Notu'] + '</div>';
    }
    // Onay butonu
    if (durum !== 'Onaylandı' && f['Teklif Fiyatı']) {
      html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;">';
      html += '<button class="btn btn-yesil btn-sm" onclick="onaylaSiparis(\'' + id + '\',\'' + (f['Tedarikçi Email'] || '').replace(/'/g, '') + '\',' + (f['Teklif Fiyatı'] || 0) + ',\'' + (f['Fiyat Birimi'] || 'TL/kg').replace(/'/g, '') + '\',' + (f['Tedarikçi Vade Önerisi'] || 30) + ')">Siparis Onayla</button>';
      html += '<span style="font-size:11px;color:var(--metin3);">Fiyati ve vadeyi onaylayarak satinalma siparisi olustur</span>';
      html += '</div>';
    }
    if (durum === 'Onaylandı') {
      html += '<div style="margin-top:12px;padding:8px 12px;background:var(--yesil-bg);border-radius:6px;font-size:12px;color:var(--yesil-t);font-weight:600;">Satinalma siparisi onaylandi</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="kart"><div class="kart-baslik">Tedarikci Yaniti</div>';
    html += '<div class="bos-durum" style="padding:20px"><p>Henuz yanit gelmedi. RFQ gonderin.</p></div>';
    html += '</div>';
  }

  document.getElementById('talep-detay').innerHTML = html;
}

function fieldReadonly(label, value) {
  return '<div class="form-grup"><label class="form-label">' + label + '</label><div style="padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--metin2);min-height:30px;">' + (value || '—') + '</div></div>';
}

// ── FIYAT KARSILASTIRMA ──
function gosterKarsilastirma(r) {
  var f = r.fields;
  var html = '';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">';
  html += '<div style="font-size:14px;font-weight:600;font-family:monospace;">' + (f['Talep No'] || '—') + '</div>';
  html += '<span class="badge badge-mavi">' + (f['Durum'] || '—') + '</span>';
  html += '</div>';

  html += '<div class="kart"><div class="kart-baslik">Talep Bilgisi</div>';
  html += '<div class="form-grid-2">';
  html += fieldReadonly('Malzeme / Islem', f['Malzeme İşlem'] || '—');
  html += fieldReadonly('Olcu', f['Ölçü'] || '—');
  html += fieldReadonly('Miktar', (f['Miktar'] || 0) + ' ' + (f['Birim'] || ''));
  html += fieldReadonly('Kalem Adi', f['Kalem Adı'] || '—');
  html += '</div></div>';

  // Gelen teklifler karsilastirma alani
  html += '<div class="kart"><div class="kart-baslik">Gelen Teklifler Karsilastirma</div>';

  if (f['Teklif Fiyatı']) {
    // En azindan bu kaydin kendi teklif bilgisi var
    html += '<div style="overflow-x:auto;">';
    html += '<table class="tablo"><thead><tr>';
    html += '<th>Tedarikci</th><th>Birim Fiyat</th><th>Teslim (gun)</th><th>Gecerlilik</th><th>Not</th><th></th>';
    html += '</tr></thead><tbody>';
    html += '<tr>';
    html += '<td style="font-weight:500;">' + (f['Seçilen Tedarikçi'] || f['Tedarikçi Email'] || '—') + '</td>';
    html += '<td style="font-family:monospace;font-weight:600;color:var(--mavi);">' + fmt(f['Teklif Fiyatı']) + ' ' + (f['Fiyat Birimi'] || '') + '</td>';
    html += '<td style="font-family:monospace;">' + (f['Teslim Süresi Gün'] || '—') + '</td>';
    html += '<td style="font-size:11px;">' + fmtDate(f['Geçerlilik Tarihi']) + '</td>';
    html += '<td style="font-size:11px;color:var(--metin2);">' + (f['Tedarikçi Notu'] || '—') + '</td>';
    html += '<td>';
    if ((f['Durum'] || '') !== 'Onaylandı') {
      html += '<button class="btn btn-yesil btn-sm" onclick="onaylaSiparis(\'' + r.id + '\',\'' + (f['Tedarikçi Email'] || '').replace(/'/g, '') + '\',' + (f['Teklif Fiyatı'] || 0) + ',\'' + (f['Fiyat Birimi'] || 'TL/kg').replace(/'/g, '') + '\',' + (f['Tedarikçi Vade Önerisi'] || 30) + ')">Sec & Onayla</button>';
    } else {
      html += '<span class="badge badge-yesil">Onaylandi</span>';
    }
    html += '</td></tr></tbody></table></div>';
  } else {
    html += '<div class="bos-durum" style="padding:20px"><p>Henuz teklif yaniti yok</p><p style="font-size:11px;color:var(--metin4);">Tedarikci RFQ yaniti bekleniyor</p></div>';
  }
  html += '</div>';

  document.getElementById('talep-detay').innerHTML = html;
}

// ── TOPLU RFQ ──
function topluRFQ() {
  if (!seciliIds.length) { toast('Talep secin', 'err'); return; }
  var seciliRecs = [];
  for (var i=0;i<records.length;i++) {
    if (seciliIds.indexOf(records[i].id)>=0) seciliRecs.push(records[i]);
  }
  var tedList = '';
  for (var i = 0; i < tedarikci.length; i++) {
    var t = tedarikci[i];
    var email = t.fields['E-posta'] || '';
    var ad = (t.fields['Tedarikçı Adı'] || t.fields['Tedarikçi Adı'] || '').replace(/"/g, '&quot;');
    tedList += '<div style="display:flex;align-items:center;gap:10px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;">' +
      '<input type="checkbox" data-adi="'+ad+'" data-email="'+email+'" style="width:15px;height:15px;"'+ (!email?' disabled title="E-posta yok"':'')+'>'+
      '<div style="flex:1;"><div style="font-size:12px;font-weight:500;">'+ad+'</div><div style="font-size:10px;color:var(--metin3);">'+(email||'E-posta yok')+'</div></div></div>';
  }
  var ozet = seciliRecs.map(function(r){return '<div style="font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);">'+(r.fields['Talep No']||'—')+' — '+(r.fields['Kalem Adı']||'')+' — '+(r.fields['Malzeme İşlem']||'')+'</div>';}).join('');

  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'toplu-rfq-modal';
  modal.innerHTML = '<div class="modal" style="max-width:520px;">'+
    '<div class="modal-baslik"><span>Toplu RFQ — '+seciliIds.length+' talep</span><button class="modal-kapat" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div>'+
    '<div style="max-height:120px;overflow-y:auto;margin-bottom:10px;background:var(--bg2);border-radius:6px;padding:8px 12px;">'+ozet+'</div>'+
    '<div style="font-size:11px;font-weight:600;color:var(--metin3);margin-bottom:6px;">Tedarikci Secin</div>'+tedList+
    '<div id="toplu-rfq-result" style="margin-top:8px;"></div>'+
    '<div class="modal-alt"><button class="btn btn-beyaz" onclick="this.closest(\'.modal-overlay\').remove()">Iptal</button>'+
    '<button class="btn btn-mavi" onclick="topluRFQGonder()">Gonder</button></div></div>';
  document.body.appendChild(modal);
}
function topluRFQGonder() {
  var checkboxes = document.querySelectorAll('#toplu-rfq-modal input[type=checkbox]:checked');
  if (!checkboxes.length) { toast('Tedarikci secin', 'err'); return; }
  var emails = []; var adlar = [];
  for (var i=0;i<checkboxes.length;i++) {
    if(checkboxes[i].dataset.email) emails.push(checkboxes[i].dataset.email);
    adlar.push(checkboxes[i].dataset.adi);
  }
  if (!emails.length) { toast('Secilen tedarikcilerin e-posta adresi yok', 'err'); return; }

  var promises = [];
  for (var i=0;i<seciliIds.length;i++) {
    var token = Date.now()+'-'+Math.random().toString(36).slice(2,9);
    promises.push(apiFn('PATCH', T.stl, {fields:{'Durum':'Gönderildi','Tedarikçi Email':emails.join(', '),'Token':token}}, seciliIds[i]));
  }
  Promise.all(promises).then(function() {
    for (var i=0;i<seciliIds.length;i++) {
      for (var j=0;j<records.length;j++) {
        if (records[j].id===seciliIds[i]) { records[j].fields['Durum']='Gönderildi'; break; }
      }
    }
    document.getElementById('toplu-rfq-result').innerHTML = '<div style="background:var(--yesil-bg);color:var(--yesil-t);padding:8px 12px;border-radius:6px;font-size:12px;">'+seciliIds.length+' talep '+adlar.join(', ')+' tedarikciye gonderildi</div>';
    seciliIds = [];
    filtreleListeyi();
    toast(adlar.length+' tedarikciye toplu RFQ gonderildi');
    setTimeout(function(){ var m=document.querySelector('.modal-overlay'); if(m)m.remove(); }, 2000);
  }).catch(function(e) { toast('Hata: '+e.message, 'err'); });
}

// ── LOAD ALL ──
function loadAll() {
  var all = [];
  var offsetVal = '';

  function loadPage() {
    return apiGet(T.stl, 'sort[0][field]=Talep%20No&sort[0][direction]=desc' + (offsetVal ? '&offset=' + offsetVal : '')).then(function(d) {
      all = all.concat(d.records || []);
      offsetVal = d.offset || '';
      if (offsetVal) return loadPage();
      return all;
    });
  }

  loadPage().then(function(allRecs) {
    records = allRecs;
    return Promise.all([
      apiGet(T.se, 'fields[]=SE%20No&fields[]=Par%C3%A7a%20Ad%C4%B1'),
      apiGet(T.tedarikci, 'fields[]=Tedarik%C3%A7i%20Ad%C4%B1&fields[]=E-posta&fields[]=Ortalama%20%C4%B0ndirim%20%25'),
      apiGet(T.muzakere, '')
    ]);
  }).then(function(results) {
    seList = results[0].records || [];
    tedarikci = results[1].records || [];
    tedarikciList = results[1].records || [];
    muzakereler = results[2].records || [];
    filtreleListeyi();
  }).catch(function(e) {
    document.getElementById('talep-liste').innerHTML = '<div style="padding:16px;color:var(--kirmizi);font-size:12px;">Hata: ' + e.message + '</div>';
  });
}

// ── DURUM GUNCELLE MODAL ──
function openDurumModal(stlId, seId) {
  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'durum-modal';
  var tedOptions = '';
  for (var i = 0; i < tedarikci.length; i++) {
    var ad = tedarikci[i].fields['Tedarikçi Adı'] || '';
    tedOptions += '<option value="' + ad.replace(/"/g, '&quot;') + '">' + ad + '</option>';
  }
  modal.innerHTML = '<div class="modal">' +
    '<div class="modal-baslik"><span>Durum Guncelle</span><button class="modal-kapat" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div>' +
    '<div class="form-grup"><label class="form-label">Yeni Durum</label>' +
    '<select class="form-select" id="new-durum">' +
    '<option>Taslak</option><option>Gönderildi</option><option>Teklif Alındı</option><option>Onaylandı</option><option>İptal</option>' +
    '</select></div>' +
    '<div class="form-grup"><label class="form-label">Secilen Tedarikci</label>' +
    '<select class="form-select" id="new-tedarikci"><option value="">— Secin —</option>' + tedOptions + '</select></div>' +
    '<div class="form-grup"><label class="form-label">Onay Fiyati (TL)</label><input type="number" class="form-input" id="new-fiyat" placeholder="0.00"></div>' +
    '<div class="modal-alt">' +
    '<button class="btn btn-beyaz" onclick="this.closest(\'.modal-overlay\').remove()">Iptal</button>' +
    '<button class="btn btn-mavi" onclick="saveDurum(\'' + stlId + '\',\'' + seId + '\')">Guncelle</button>' +
    '</div></div>';
  document.body.appendChild(modal);
}

function saveDurum(stlId, seId) {
  var durum = document.getElementById('new-durum').value;
  var tad = document.getElementById('new-tedarikci').value;
  var fiyat = parseFloat(document.getElementById('new-fiyat').value) || null;
  var fields = {'Durum': durum};
  if (tad) fields['Seçilen Tedarikçi'] = tad;
  if (fiyat) fields['Onay Fiyatı'] = fiyat;

  apiFn('PATCH', T.stl, {fields: fields}, stlId).then(function() {
    var r = null;
    for (var i = 0; i < records.length; i++) {
      if (records[i].id === stlId) { r = records[i]; break; }
    }
    if (r) {
      r.fields['Durum'] = durum;
      if (tad) r.fields['Seçilen Tedarikçi'] = tad;
      if (fiyat) r.fields['Onay Fiyatı'] = fiyat;
    }
    var m = document.querySelector('.modal-overlay');
    if (m) m.remove();
    filtreleListeyi();
    talepSec(stlId);
    toast('Durum guncellendi');
  }).catch(function(e) { toast('Hata: ' + e.message, 'err'); });
}

    '<div style="background:var(--bg2);border-radius:6px;padding:10px 12px;font-size:12px;margin-bottom:12px;">' +
    '<div><strong>' + (f['Malzeme İşlem'] || '—') + '</strong></div>' +
    '<div style="color:var(--metin2);">' + (f['Ölçü'] || '') + ' - ' + (f['Miktar'] || 0) + ' ' + (f['Birim'] || '') + '</div></div>' +

    '<div id="rfq-result" style="margin-top:8px;"></div>' +

    '</div></div>';

function sendRFQ(stlId, seId) {
  var checkboxes = document.querySelectorAll('#rfq-modal input[type=checkbox]:checked');
  if (!checkboxes.length) { toast('Tedarikci secin', 'err'); return; }

  var secilen = [];
  for (var i = 0; i < checkboxes.length; i++) {
    secilen.push({adi: checkboxes[i].dataset.adi, email: checkboxes[i].dataset.email});
  }
  var emails = [];
  var adlar = [];
  for (var i = 0; i < secilen.length; i++) {
    if (secilen[i].email) emails.push(secilen[i].email);
    adlar.push(secilen[i].adi);
  }

  if (!emails.length) { toast('Secilen tedarikcilerin e-posta adresi yok', 'err'); return; }

  var token = Date.now() + '-' + Math.random().toString(36).slice(2, 9);

  apiFn('PATCH', T.stl, {fields: {
    'Durum': 'Gönderildi',
    'Tedarikçi Email': emails.join(', '),
    'Token': token
  }}, stlId).then(function() {
    var r = null;
    for (var i = 0; i < records.length; i++) {
      if (records[i].id === stlId) { r = records[i]; break; }
    }
    if (r) {
      r.fields['Durum'] = 'Gönderildi';
      r.fields['Tedarikçi Email'] = emails.join(', ');
    }

    document.getElementById('rfq-result').innerHTML =
      '<div style="background:var(--yesil-bg);color:var(--yesil-t);padding:8px 12px;border-radius:6px;font-size:12px;">' +
      secilen.length + ' tedarikciye gonderildi: ' + adlar.join(', ') + '</div>';

    filtreleListeyi();
    toast(secilen.length + ' tedarikciye RFQ gonderildi');
    setTimeout(function() {
      var m = document.querySelector('.modal-overlay');
      if (m) m.remove();
      loadAll();
    }, 2000);
  }).catch(function(e) { toast('Hata: ' + e.message, 'err'); });
}

// ── SIPARIS ONAYLA ──
function onaylaSiparis(stlId, tedEmail, fiyat, birim, vade) {
  var r = null;
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === stlId) { r = records[i]; break; }
  }
  var f = r ? r.fields : {};
  var kalem = f['Kalem Adı'] || f['Malzeme İşlem'] || '—';

  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'onay-modal';
  modal.innerHTML = '<div class="modal">' +
    '<div class="modal-baslik"><span>Satinalma Siparisi Onayi</span><button class="modal-kapat" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div>' +
    '<div style="background:var(--bg2);border-radius:8px;padding:12px;margin-bottom:12px;">' +
    '<div style="font-size:13px;font-weight:600;">' + kalem + '</div>' +
    '<div style="font-size:12px;color:var(--metin2);margin-top:4px;">' + (f['Ölçü'] || '') + ' - ' + (f['Miktar'] || 0) + ' ' + (f['Birim'] || '') + '</div></div>' +
    '<div class="form-grid-2">' +
    '<div class="form-grup"><label class="form-label">Onay Fiyati</label><input type="number" class="form-input" id="onay-fiyat" value="' + fiyat + '" step="0.01"></div>' +
    '<div class="form-grup"><label class="form-label">Fiyat Birimi</label><input class="form-input" id="onay-birim" value="' + birim + '" readonly style="background:var(--bg2);"></div>' +
    '<div class="form-grup"><label class="form-label">Odeme Vadesi (gun)</label><input type="number" class="form-input" id="onay-vade" value="' + vade + '"></div>' +
    '<div class="form-grup"><label class="form-label">Tedarikci</label><input class="form-input" value="' + (tedEmail || f['Seçilen Tedarikçi'] || '—') + '" disabled style="background:var(--bg2);"></div>' +
    '</div>' +
    '<div class="form-grup"><label class="form-label">Siparis Notu</label><textarea class="form-textarea" id="onay-not" rows="2" placeholder="Opsiyonel not..."></textarea></div>' +
    '<div class="modal-alt">' +
    '<button class="btn btn-beyaz" onclick="this.closest(\'.modal-overlay\').remove()">Iptal</button>' +
    '<button class="btn btn-yesil" id="onay-btn" onclick="confirmSiparis(\'' + stlId + '\')">Onayla ve Siparis Olustur</button>' +
    '</div></div>';
  document.body.appendChild(modal);
}

function confirmSiparis(stlId) {
  var btn = document.getElementById('onay-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Onaylaniyor...'; }
  var fiyat = parseFloat(document.getElementById('onay-fiyat').value) || 0;
  var vade = parseInt(document.getElementById('onay-vade').value) || 30;

  var r = null;
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === stlId) { r = records[i]; break; }
  }
  var f = r ? r.fields : {};
  var tedEmail = f['Tedarikçi Email'] || '';
  var tedRec = null;
  for (var i = 0; i < tedarikci.length; i++) {
    if ((tedarikci[i].fields['Tedarikçi Adı'] || '') === (f['Seçilen Tedarikçi'] || '') ||
        (tedarikci[i].fields['E-posta'] || '') === tedEmail) {
      tedRec = tedarikci[i];
      break;
    }
  }

  var patchFields = {
    'Durum': 'Onaylandı',
    'Onay Fiyatı': fiyat,
    'Vade Talebi (gün)': vade,
    'Vade Onaylandı': true
  };
  if (tedRec) patchFields['Seçilen Tedarikçi'] = [tedRec.id];

  apiFn('PATCH', T.stl, {fields: patchFields}, stlId).then(function() {
    if (r) {
      r.fields['Durum'] = 'Onaylandı';
      r.fields['Onay Fiyatı'] = fiyat;
      r.fields['Vade Onaylandı'] = true;
    }
    var m = document.getElementById('onay-modal');
    if (m) m.remove();
    filtreleListeyi();
    talepSec(stlId);
    toast('Satinalma siparisi onaylandi');
    if (typeof logIslem === 'function') {
      logIslem('Onaylandı', 'Satınalma', stlId, f['Kalem Adı'] || '', {Durum: f['Durum']}, {Durum: 'Onaylandı', Fiyat: fiyat});
    }
  }).catch(function(e) {
    toast('Hata: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Onayla ve Siparis Olustur'; }
  });
}

// ── TALEP SIL ──
function deleteSTL(id, seId) {
  var r = null;
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === id) { r = records[i]; break; }
  }
  var label = r ? (r.fields['Talep No'] || r.fields['Kalem Adı'] || id) : id;
  if (!confirm(label + ' silinsin mi?')) return;

  fetch('/.netlify/functions/airtable', {
    method: 'DELETE',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({table: T.stl, id: id})
  }).then(function(res) { return res.json(); }).then(function(data) {
    if (data.error) throw new Error(JSON.stringify(data.error));
    records = records.filter(function(x) { return x.id !== id; });
    seciliId = null;
    filtreleListeyi();
    document.getElementById('talep-detay').innerHTML = '<div class="bos-durum"><p>Talep silindi.</p></div>';
    toast('Talep silindi');
    if (typeof logIslem === 'function') {
      logIslem('Silindi', 'Satınalma', id, label, null, null);
    }
  }).catch(function(e) { toast('Hata: ' + e.message, 'err'); });
}
