<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Satınalma</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#e2e5ea;--border2:#c8cdd6;
  --text:#1a1d23;--text2:#5a6170;--text3:#9aa0ad;
  --accent:#7c3aed;--accent-light:#ede9fe;--accent-hover:#6d28d9;
  --green:#059669;--green-light:#d1fae5;--red:#dc2626;--red-light:#fee2e2;
  --orange:#d97706;--orange-light:#fef3c7;--blue:#2563eb;--blue-light:#dbeafe;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13px;}

.header{height:52px;background:#1e1b4b;display:flex;align-items:center;padding:0 20px;gap:16px;position:fixed;top:0;left:0;right:0;z-index:100;}
.logo-badge{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;font-family:var(--mono);}
.header-title{color:white;font-size:14px;font-weight:600;}
.header-sub{color:rgba(255,255,255,.5);font-size:11px;}
.header-sep{width:1px;height:28px;background:rgba(255,255,255,.2);}
.header-nav a{color:rgba(255,255,255,.6);font-size:13px;font-weight:500;text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;}
.header-nav a:hover{background:rgba(255,255,255,.1);color:white;}
.header-nav a.active{background:rgba(255,255,255,.15);color:white;}
.header-nav{display:flex;gap:4px;}

/* TAB BAR */
.tab-bar{display:flex;gap:6px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:var(--sans);transition:all .15s;white-space:nowrap;}
.tab-btn:hover{border-color:var(--accent);color:var(--accent);}
.tab-btn.active{background:var(--accent);color:white;border-color:var(--accent);}

.layout-wrapper{display:flex;flex-direction:column;height:calc(100vh - 52px);margin-top:52px;}
.layout{display:flex;flex:1;overflow:hidden;}

/* LIST */
.list-panel{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.list-header{padding:12px 16px 8px;border-bottom:1px solid var(--border);}
.list-header h2{font-size:13px;font-weight:600;}
.list-count{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.list-search{padding:8px 12px;border-bottom:1px solid var(--border);}
.list-search input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--sans);background:var(--surface2);outline:none;}
.list-search input:focus{border-color:var(--accent);}
.filter-row{padding:6px 12px 8px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;}
.fc{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text3);}
.fc.on{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
.list-scroll{flex:1;overflow-y:auto;}

.stl-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.stl-item:hover{background:var(--surface2);}
.stl-item.active{background:var(--accent-light);border-left:3px solid var(--accent);}
.stl-no{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);}
.stl-parca{font-size:12px;font-weight:500;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stl-meta{font-size:11px;color:var(--text3);}

/* DETAIL */
.detail-panel{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.detail-toolbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;}
.detail-scroll{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.card-body{padding:14px;}
.card-dot{width:6px;height:6px;border-radius:50%;}

.btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);font-family:var(--sans);transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-hover);}
.btn.success{background:var(--green);color:white;border-color:var(--green);}
.btn.warn{background:var(--orange);color:white;border-color:var(--orange);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.b-Taslak{background:#f3f4f6;color:#6b7280;}
.b-Gönderildi{background:var(--blue-light);color:var(--blue);}
.b-Teklif\ Alındı{background:var(--orange-light);color:var(--orange);}
.b-Onaylandı{background:var(--green-light);color:var(--green);}
.b-İptal{background:var(--red-light);color:var(--red);}
.b-Hammadde{background:var(--blue-light);color:var(--blue);}
.b-Fason{background:var(--orange-light);color:var(--orange);}
.b-Başarılı{background:var(--green-light);color:var(--green);}
.b-Başarısız{background:var(--red-light);color:var(--red);}

.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;font-family:var(--sans);color:var(--text);outline:none;width:100%;}
.fi:focus{border-color:var(--accent);}
.fi:disabled{opacity:.6;}

.stl-table{width:100%;border-collapse:collapse;}
.stl-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;background:var(--surface2);border-bottom:1px solid var(--border);}
.stl-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px;}
.stl-table tr:last-child td{border-bottom:none;}
.stl-table tr:hover td{background:var(--surface2);}

/* Karşılaştırma tablosu */
.rfq-compare-table{width:100%;border-collapse:collapse;}
.rfq-compare-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);}
.rfq-compare-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.rfq-compare-table .best{background:var(--green-light);}
.rfq-compare-table tr:last-child td{border-bottom:none;}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;color:white;animation:fadeIn .2s;}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}
.toast.inf{background:var(--accent);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;}
.modal-box{background:white;border-radius:12px;width:520px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-head{background:#1e1b4b;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.modal-head-title{color:white;font-weight:600;font-size:14px;}
.modal-body{padding:16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px;}
.modal-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.btn-x{background:transparent;border:none;color:white;font-size:20px;cursor:pointer;line-height:1;}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;padding:40px;text-align:center;}

/* TEDARİKÇİ GRUPLARI TAB */
.td-layout{display:flex;flex:1;overflow:hidden;}
.td-list{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.td-detail{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.td-group-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.td-group-item:hover{background:var(--surface2);}
.td-group-item.active{background:var(--accent-light);border-left:3px solid var(--accent);}
.td-group-name{font-size:13px;font-weight:600;}
.td-group-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.td-group-amount{font-size:13px;font-weight:700;color:var(--accent);font-family:var(--mono);}

/* AI CARD */
.ai-card{background:var(--surface);border:2px solid transparent;border-radius:var(--radius);overflow:hidden;background-clip:padding-box;position:relative;}
.ai-card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);padding:2px;background:linear-gradient(135deg,#7c3aed,#2563eb,#059669);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.ai-card-body{padding:16px;}
.ai-card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(37,99,235,.06));}

/* AI LOADING */
.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:12px;color:var(--text2);font-size:13px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}

/* MÜZAKERE FORM */
.muzakere-form{display:flex;flex-direction:column;gap:10px;}
.muzakere-form .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.muzakere-form .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* TASARRUF RAPORU TAB */
.tasarruf-wrap{flex:1;overflow-y:auto;padding:20px;}
</style>
</head>
<body>
<script src="ersan_nav.js"></script>

<header class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="logo-badge">MES</div>
    <div><div class="header-title">Ersan MES</div><div class="header-sub">Satınalma</div></div>
  </div>
  <div class="header-sep"></div>
  <nav class="header-nav">
    <a href="ersan_teklif.html">Teklifler</a>
    <a href="ersan_planlama.html">Planlama</a>
    <a href="ersan_satinalma.html" class="active">Satınalma</a>
    <a href="ersan_isemirleri.html">İş Emirleri</a>
  </nav>
</header>

<div class="layout-wrapper">

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-talepler" onclick="switchTab('talepler')">Talepler</button>
    <button class="tab-btn" id="tab-tedarikci" onclick="switchTab('tedarikci')">Tedarikçi Grupları</button>
    <button class="tab-btn" id="tab-tasarruf" onclick="switchTab('tasarruf')">Tasarruf Raporu</button>
  </div>

  <!-- TALEPLER TAB -->
  <div class="layout" id="view-talepler">

    <!-- LIST -->
    <div class="list-panel">
      <div class="list-header">
        <h2>Satınalma Talepleri</h2>
        <div class="list-count" id="stl-count">Yükleniyor...</div>
      </div>
      <div class="list-search">
        <input type="text" id="stl-search" placeholder="SE no, malzeme ara..." oninput="filterSTL()">
      </div>
      <div class="filter-row">
        <div class="fc on" data-f="Tümü" onclick="setFilter(this)">Tümü</div>
        <div class="fc" data-f="Taslak" onclick="setFilter(this)">Taslak</div>
        <div class="fc" data-f="Gönderildi" onclick="setFilter(this)">Gönderildi</div>
        <div class="fc" data-f="Teklif Alındı" onclick="setFilter(this)">Teklif Alındı</div>
        <div class="fc" data-f="Onaylandı" onclick="setFilter(this)">Onaylandı</div>
      </div>
      <div class="list-scroll" id="stl-list">
        <div style="padding:20px;text-align:center;color:var(--text3);">Yükleniyor...</div>
      </div>
    </div>

    <!-- DETAIL -->
    <div class="detail-panel">
      <div id="detail-content">
        <div class="empty">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style="opacity:.2"><rect x="8" y="8" width="48" height="48" rx="6" stroke="currentColor" stroke-width="2"/><path d="M20 24h24M20 32h24M20 40h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <p style="font-size:14px;font-weight:500;">Listeden bir talep seçin</p>
        </div>
      </div>
    </div>

  </div>

  <!-- TEDARİKÇİ GRUPLARI TAB -->
  <div class="layout" id="view-tedarikci" style="display:none;">
    <div class="td-layout" style="flex:1;overflow:hidden;">

      <!-- Sol: Tedarikçi Grubu Listesi -->
      <div class="td-list" id="td-group-list">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;">Tedarikçi Grupları</div>
        <div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Yükleniyor...</div>
      </div>

      <!-- Sağ: Seçilen Tedarikçi Detayı -->
      <div class="td-detail" id="td-group-detail">
        <div class="empty">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="opacity:.2"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/><path d="M16 24h16M24 16v16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <p style="font-size:14px;font-weight:500;">Bir tedarikçi grubu seçin</p>
        </div>
      </div>

    </div>
  </div>

  <!-- TASARRUF RAPORU TAB -->
  <div class="layout" id="view-tasarruf" style="display:none;">
    <div class="tasarruf-wrap" id="tasarruf-content">
      <div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Yükleniyor...</div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const BASE = 'app5LDgJMgocw79Ix';
const T = {
  stl:       'tblHmfCvNZq0qNtb1',
  se:        'tbl56Oj1nPaqefI60',
  tedarikci: 'tblEI6683Im5AXj36',
  muzakere:  'tbl7Odd0ZZnEZ8PRP',
  rfq:       'RFQ_TABLE_PLACEHOLDER',
};

let stlList = [], filtered = [], seList = [], tedarikci = [];
let muzakereler = [], tedarikciList = [];
let activeId = null, activeFilter = 'Tümü';
let activeTab = 'talepler';
let activeTDGroup = null;
let aiResult = null; // AI response for active tedarikci group

// ── API ──
const apiGet = async (table, params='') => {
  const res = await fetch('/.netlify/functions/airtable', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method:'GET', path:`/v0/${BASE}/${table}?${params}`})
  });
  return res.json();
};
const apiFn = async (method, table, body, id='') => {
  const res = await fetch('/.netlify/functions/airtable', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method, path:`/v0/${BASE}/${table}${id?'/'+id:''}`, body})
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
};

// ── HELPERS ──
const fmtDate = d => { try{ return new Date(d).toLocaleDateString('tr-TR'); }catch{ return d||''; } };
const fmt = n => n ? Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2}) : '—';
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
const getSENo = id => seList.find(r=>r.id===id)?.fields?.['SE No'] || '—';

// ── TAB SWITCHING ──
function switchTab(tab) {
  activeTab = tab;
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  // Show/hide views
  document.getElementById('view-talepler').style.display  = tab === 'talepler'  ? 'flex' : 'none';
  document.getElementById('view-tedarikci').style.display = tab === 'tedarikci' ? 'flex' : 'none';
  document.getElementById('view-tasarruf').style.display  = tab === 'tasarruf'  ? 'flex' : 'none';

  if (tab === 'tedarikci') {
    renderTDGroups();
  } else if (tab === 'tasarruf') {
    renderTasarruf();
  }
}

// ── LOAD ──
async function loadAll() {
  try {
    // Load STL with pagination
    let all = [], offset = '';
    do {
      const d = await apiGet(T.stl, `sort[0][field]=Talep%20No&sort[0][direction]=desc${offset?'&offset='+offset:''}`);
      all = all.concat(d.records||[]);
      offset = d.offset||'';
    } while(offset);
    stlList = all;

    // Load SE, Tedarikçi (with Ortalama İndirim %), Müzakere Kayıtları
    const [se, td, muz] = await Promise.all([
      apiGet(T.se, 'fields[]=SE%20No&fields[]=Parça%20Adı'),
      apiGet(T.tedarikci, 'fields[]=Tedarikçi%20Adı&fields[]=E-posta&fields[]=Ortalama%20İndirim%20%25'),
      apiGet(T.muzakere, ''),
    ]);
    seList = se.records||[];
    tedarikci = td.records||[];
    tedarikciList = td.records||[];
    muzakereler = muz.records||[];

    filterAndRender();
  } catch(e) {
    document.getElementById('stl-list').innerHTML = `<div style="padding:16px;color:var(--red);font-size:12px;">Hata: ${e.message}</div>`;
  }
}

function filterAndRender() {
  const q = document.getElementById('stl-search').value.toLowerCase();
  filtered = stlList.filter(r => {
    const f = r.fields;
    const mFilter = activeFilter === 'Tümü' || f['Durum'] === activeFilter;
    const mSearch = !q ||
      (f['Talep No']||'').toLowerCase().includes(q) ||
      (f['Malzeme İşlem']||'').toLowerCase().includes(q) ||
      (f['Kalem Adı']||'').toLowerCase().includes(q) ||
      (getSENo(f['SE No']?.[0])).toLowerCase().includes(q);
    return mFilter && mSearch;
  });
  document.getElementById('stl-count').textContent = `${filtered.length} talep`;
  renderList();
}

function renderList() {
  const el = document.getElementById('stl-list');
  if (!filtered.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Talep bulunamadı</div>';
    return;
  }

  // SE bazında grupla
  const grups = {};
  filtered.forEach(r => {
    const seId = r.fields['SE No']?.[0] || 'noSE';
    if (!grups[seId]) grups[seId] = [];
    grups[seId].push(r);
  });

  el.innerHTML = Object.entries(grups).map(([seId, records]) => {
    const seNo = getSENo(seId);
    const tumDurum = records.every(r=>r.fields['Durum']==='Onaylandı') ? 'Onaylandı' :
                     records.some(r=>r.fields['Durum']==='Teklif Alındı') ? 'Teklif Alındı' :
                     records.some(r=>r.fields['Durum']==='Gönderildi') ? 'Gönderildi' : 'Taslak';
    return `<div style="border-bottom:1px solid var(--border);">
      <div style="padding:8px 14px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;"
        onclick="showSEGroup('${seId}')">
        <div>
          <div class="stl-no">${seNo}</div>
          <div class="stl-meta">${records.length} talep satırı</div>
        </div>
        <span class="badge b-${tumDurum}">${tumDurum}</span>
      </div>
      ${records.map(r => {
        const f = r.fields;
        const durum = f['Durum']||'Taslak';
        return `<div class="stl-item${r.id===activeId?' active':''}" onclick="showDetail('${r.id}')">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="badge b-${f['Talep Tipi']||'Hammadde'}" style="font-size:9px;">${f['Talep Tipi']||'—'}</span>
            <span class="badge b-${durum}" style="font-size:9px;">${durum}</span>

function renderRFQTable(records, stlId) {
  const yanit = records.filter(r=>['Yanıtlandı','Seçildi'].includes(r.fields['Durum']));
  if (!yanit.length) return '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">Henüz yanıt gelmedi.</div>';

  const skorlar = yanit.map(r => ({
    id: r.id,
    fiyat: r.fields['Teklif Fiyatı']||999999,
    teslim: r.fields['Teslim Süresi Gün']||999
  }));
  const minF = Math.min(...skorlar.map(s=>s.fiyat));
  const maxF = Math.max(...skorlar.map(s=>s.fiyat));
  const minT = Math.min(...skorlar.map(s=>s.teslim));
  const maxT = Math.max(...skorlar.map(s=>s.teslim));
  let bestId = null, bestScore = -1;
  skorlar.forEach(s => {
    const fs = maxF===minF?1:1-(s.fiyat-minF)/(maxF-minF);
    const ts = maxT===minT?1:1-(s.teslim-minT)/(maxT-minT);
    const total = fs*0.6+ts*0.4;
    if (total>bestScore) { bestScore=total; bestId=s.id; }
  });

  return `<div style="overflow-x:auto;">
    <table class="rfq-compare-table">
      <thead><tr>
        <th>Tedarikçi</th><th>Birim Fiyat</th><th>Malzeme Durumu</th>
        <th>Ölçü (tedarikçi)</th><th>Teslim (gün)</th><th>Geçerlilik</th><th>Not</th><th></th>
      </tr></thead>
      <tbody>
        ${yanit.map(r => {
          const f = r.fields;
          const isBest = r.id === bestId;
          return `<tr class="${isBest?'best':''}">
            <td>
              <div style="font-weight:500;">${f['Tedarikçi Adı']||'—'}</div>
              ${isBest?'<div style="font-size:10px;color:var(--green);font-weight:600;">⭐ AI Tavsiye</div>':''}
            </td>
            <td style="font-family:var(--mono);font-weight:600;color:var(--accent);">${f['Teklif Fiyatı']?fmt(f['Teklif Fiyatı'])+' '+f['Fiyat Birimi']:'—'}</td>
            <td>${f['Malzeme Durumu']||'—'}</td>
            <td style="font-size:11px;color:var(--text2);">${f['Tedarikçi Ölçüleri']||'—'}</td>
            <td style="font-family:var(--mono);">${f['Teslim Süresi Gün']||'—'} gün</td>
            <td style="font-size:11px;">${fmtDate(f['Geçerlilik Tarihi'])}</td>
            <td style="font-size:11px;color:var(--text2);">${f['Tedarikçi Notu']||'—'}</td>
            <td>
              <button class="btn success" style="padding:2px 8px;font-size:10px;" onclick="seciTedarikci('${r.id}','${stlId}','${f['Tedarikçi Adı']||''}',${f['Teklif Fiyatı']||0})">Seç</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

async function sendRFQ(stlId, seId) {
  const checkboxes = document.querySelectorAll('#rfq-modal input[type=checkbox]:checked');
  if (!checkboxes.length) { toast('Tedarikçi seçin', 'err'); return; }

  const secilen = Array.from(checkboxes).map(cb=>({adi:cb.dataset.adi, email:cb.dataset.email}));
  const emails = secilen.map(t=>t.email).filter(e=>e).join(', ');
  const adlar = secilen.map(t=>t.adi).join(', ');

  if (!emails) { toast('Seçilen tedarikçilerin e-posta adresi yok', 'err'); return; }

  const token = Date.now() + '-' + Math.random().toString(36).slice(2, 9);

  try {
    await apiFn('PATCH', T.stl, {fields:{
      'Durum': 'Gönderildi',
      'Tedarikçi Email': emails,
      'Token': token,
    }}, stlId);

    const r = stlList.find(x=>x.id===stlId);
    if (r) { r.fields['Durum']='Gönderildi'; r.fields['Tedarikçi Email']=emails; }

    document.getElementById('rfq-result').innerHTML =
      `<div style="background:var(--green-light);color:var(--green);padding:8px 12px;border-radius:6px;font-size:12px;">
        ✓ ${secilen.length} tedarikçiye gönderildi: ${adlar}
      </div>`;

    filterAndRender();
    toast(`${secilen.length} tedarikçiye RFQ gönderildi ✓`);
    setTimeout(()=>{ document.querySelector('.modal-bg')?.remove(); loadAll(); }, 2000);
  } catch(e) { toast('Hata: '+e.message, 'err'); }
}

// ── TALEP SİL ──
async function deleteSTL(id, seId) {
  var r = stlList.find(function(x){ return x.id === id; });
  var label = r ? (r.fields['Talep No']||r.fields['Kalem Adı']||id) : id;
  if (!confirm(label + ' silinsin mi?')) return;
  try {
    var res = await fetch('/.netlify/functions/airtable', {
      method: 'DELETE', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({table:'tblHmfCvNZq0qNtb1', id:id})
    });
    var data = await res.json();
    console.log('[DELETE-STL] response:', JSON.stringify(data));
    if (data.error) throw new Error(JSON.stringify(data.error));
    stlList = stlList.filter(function(x){ return x.id !== id; });
    activeId = null;
    filterAndRender();
    if (seId) showSEGroup(seId);
    else document.getElementById('detail-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);">Talep silindi.</div>';
    toast('Talep silindi');
  } catch(e) { toast('Hata: ' + e.message); }
}

// ── GRUP SİL (SE'ye bağlı tüm talepler) ──
async function deleteSTLGroup(seId) {
  var records = stlList.filter(function(r){ return (r.fields['SE No']||[])[0] === seId; });
  var seNo = getSENo(seId);
  if (!records.length) { toast('Silinecek talep yok'); return; }
  if (!confirm(seNo + ' — ' + records.length + ' talep satırı silinsin mi?')) return;
  try {
    for (var i = 0; i < records.length; i++) {

function buildTDGroups() {
  // Group stlList by "Seçilen Tedarikçi" or "Tedarikçi Email" as fallback
  const groups = {};
  stlList.forEach(r => {
    const f = r.fields;
    const name = (f['Seçilen Tedarikçi'] || f['Tedarikçi Email'] || 'Belirsiz').split(',')[0].trim();
    if (!groups[name]) {
      groups[name] = { name, records: [], total: 0, bekleyen: 0, yanitlanan: 0, onaylanan: 0, tedarikciRecordId: null };
    }
    groups[name].records.push(r);
    // Sum up totals
    const tutar = f['Toplam Tutar'] || f['Teklif Fiyatı'] || 0;
    groups[name].total += Number(tutar) || 0;
    const d = f['Durum'] || 'Taslak';
    if (d === 'Onaylandı') groups[name].onaylanan++;
    else if (d === 'Teklif Alındı' || d === 'Yanıtlandı' || d === 'Gönderildi') groups[name].yanitlanan++;
    else groups[name].bekleyen++;
  });

  // Try to attach tedarikci record IDs
  Object.values(groups).forEach(g => {
    const tdRec = tedarikciList.find(t => (t.fields['Tedarikçi Adı']||'') === g.name);
    if (tdRec) g.tedarikciRecordId = tdRec.id;
    // Avg discount from tedarikci record
    g.avgDiscount = tdRec?.fields?.['Ortalama İndirim %'] || 0;
  });

  return Object.values(groups).filter(g => g.records.length > 0);
}

async function generateAIPack(name) {
  const groups = buildTDGroups();
  const g = groups.find(x => x.name === name);
  if (!g) return;

  const safeKey = name.replace(/\s/g, '_');
  const btn = document.getElementById('ai-btn-' + safeKey);
  const resultArea = document.getElementById('ai-result-area-' + safeKey);
  if (!btn || !resultArea) return;

  btn.disabled = true;
  btn.textContent = 'Yükleniyor...';
  resultArea.innerHTML = `<div class="ai-loading"><div class="spinner"></div><span>Claude AI ile analiz yapılıyor...</span></div>`;

  const itemList = g.records.map((r, i) => {
    const f = r.fields;
    return `${i+1}. ${f['Kalem Adı']||f['Malzeme İşlem']||'—'}: ${f['Miktar']||0} ${f['Birim']||''}, ${f['Teklif Fiyatı']?fmt(f['Teklif Fiyatı'])+' '+(f['Fiyat Birimi']||'TL'):'fiyat yok'}`;
  }).join('\n');

  const promptContent = `Bu satınalma grubu için hedef fiyat öner ve satınalmacı için Türkçe telefon görüşme senaryosu yaz.\n\nTedarikçi: ${name}\nGeçmiş ortalama indirim: ${g.avgDiscount || 0}%\nKalemler:\n${itemList}\nToplam tutar: ${g.total.toFixed(2)} TL\n\nHedef: en az %10 indirim ve 60 gün vade. JSON formatında döndür: {"hedefFiyat": number, "hedefIndirim": number, "senaryo": string}`;

  try {
    const res = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: promptContent }]
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error('Claude API hatası: ' + errText);
    }

    const data = await res.json();
    const rawText = data?.content?.[0]?.text || data?.text || '';

    // Parse JSON from response
    let parsed = null;
    try {
      // Try to extract JSON block
      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        parsed = JSON.parse(jsonMatch[0]);
      }
    } catch(pe) {
      console.warn('AI JSON parse hatası:', pe);
    }

    aiResult = parsed;

    if (parsed) {
      resultArea.innerHTML = `
        <div class="ai-card" style="margin-bottom:0;">
          <div class="ai-card-header">✨ AI Müzakere Önerisi</div>
          <div class="ai-card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;">
              <div style="background:var(--surface2);border-radius:8px;padding:12px;text-align:center;">
                <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Teklif Tutarı</div>
                <div style="font-size:14px;font-weight:700;font-family:var(--mono);color:var(--text);">${fmt(g.total)} TL</div>
              </div>
              <div style="background:var(--accent-light);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--accent);">
                <div style="font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Hedef Fiyat</div>
                <div style="font-size:14px;font-weight:700;font-family:var(--mono);color:var(--accent);">${fmt(parsed.hedefFiyat)} TL</div>
              </div>
              <div style="background:var(--green-light);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--green);">
                <div style="font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Hedef İndirim</div>
                <div style="font-size:14px;font-weight:700;font-family:var(--mono);color:var(--green);">%${parsed.hedefIndirim}</div>
              </div>
            </div>
            <div style="background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:14px;">
              <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">📞 Telefon Senaryosu</div>
              <div style="font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;">${parsed.senaryo}</div>
            </div>
          </div>
        </div>`;

      // Fill form fields
      const hedefInput = document.getElementById('muz-hedef');
      if (hedefInput) hedefInput.value = parsed.hedefFiyat || '';

      // Show muzakere form
      const formCard = document.getElementById('muzakere-form-card');
      if (formCard) formCard.style.display = 'block';

      toast('AI analizi tamamlandı ✓');
    } else {
      // Show raw text if JSON parsing failed
      resultArea.innerHTML = `
        <div class="ai-card">
          <div class="ai-card-header">✨ AI Yanıtı</div>
          <div class="ai-card-body">
            <div style="font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;">${rawText}</div>
          </div>
        </div>`;
      // Still show form
      const formCard = document.getElementById('muzakere-form-card');
      if (formCard) formCard.style.display = 'block';
      toast('AI yanıtı alındı (JSON parse başarısız)', 'inf');
    }
  } catch(e) {
    resultArea.innerHTML = `<div style="padding:12px;background:var(--red-light);color:var(--red);border-radius:6px;font-size:12px;">Hata: ${e.message}</div>`;
    toast('AI hatası: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ AI Müzakere Paketi Oluştur';
  }
}

async function saveMuzakere(name) {
  const groups = buildTDGroups();
  const g = groups.find(x => x.name === name);
  if (!g) return;

  const sonucFiyat = parseFloat(document.getElementById('muz-sonuc')?.value);
  const vade = parseInt(document.getElementById('muz-vade')?.value);
  const not = document.getElementById('muz-not')?.value || '';
  const durum = document.getElementById('muz-durum')?.value || 'Başarılı';
  const teklifTutar = g.total || 0;
  const hedefFiyat = parseFloat(document.getElementById('muz-hedef')?.value) || null;

  if (!sonucFiyat) { toast('Sonuç fiyatı giriniz', 'err'); return; }
  if (!vade) { toast('Mutabık vade giriniz', 'err'); return; }

  // Build SE list for "Talep Grubu"
  const seNos = [...new Set(g.records.map(r => getSENo(r.fields['SE No']?.[0])))].filter(s=>s!=='—').join('+');
  const talep_grubu = name + (seNos ? '+' + seNos : '');

  const fields = {
    'Talep Grubu (tedarikçi+SE)': talep_grubu,
    'Teklif Tutarı': teklifTutar,
    'Sonuç Fiyatı': sonucFiyat,
    'Mutabık Vade': vade,
    'Görüşme Notu': not,
    'Durum': durum,
    'Tarih': new Date().toISOString().split('T')[0],
    'Satınalma Talepleri': g.records.map(r => r.id),
  };

  // Conditionally add formula-safe fields
  if (hedefFiyat) fields['Hedef Fiyat (AI)'] = hedefFiyat;
  if (g.tedarikciRecordId) fields['Tedarikçi'] = [g.tedarikciRecordId];

  // NOTE: 'Tasarruf' and 'İndirim Oranı %' are formula fields — NOT written

  try {
    const btn = document.querySelector('#muzakere-form-card .btn.success');
    if (btn) { btn.disabled = true; btn.textContent = 'Kaydediliyor...'; }

    await apiFn('POST', T.muzakere, { fields });

    // Refresh muzakereler
    const muz = await apiGet(T.muzakere, '');
    muzakereler = muz.records || [];

    toast('Müzakere kaydedildi ✓');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Müzakereyi Kaydet'; }
  } catch(e) {
    toast('Kayıt hatası: ' + e.message, 'err');
    const btn = document.querySelector('#muzakere-form-card .btn.success');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Müzakereyi Kaydet'; }
  }
}

          <div style="font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;">Ortalama İndirim</div>
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent);margin-top:4px;">%${toplam_indirim.toFixed(1)}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-dot" style="background:var(--green);"></div>Müzakere Kayıtları (${muzakereler.length})</div>
        <div style="overflow-x:auto;">
          <table class="stl-table">
            <thead><tr>
              <th>Tedarikçi + SE</th>
              <th style="text-align:right;">Toplam Teklif</th>
              <th style="text-align:right;">Toplam Sonuç</th>
              <th style="text-align:right;">Tasarruf TL</th>
              <th style="text-align:right;">İndirim %</th>
              <th style="text-align:center;">Durum</th>
              <th>Tarih</th>
            </tr></thead>
            <tbody>${rows}</tbody>
            <tfoot>
              <tr style="background:var(--surface2);font-weight:700;">
                <td style="padding:8px 10px;font-size:12px;">GENEL TOPLAM</td>
                <td style="padding:8px 10px;text-align:right;font-family:var(--mono);">${fmt(toplam_teklif)} TL</td>
                <td style="padding:8px 10px;text-align:right;font-family:var(--mono);">${fmt(toplam_sonuc)} TL</td>
                <td style="padding:8px 10px;text-align:right;font-family:var(--mono);color:var(--green);">+${fmt(toplam_tasarruf)} TL</td>
                <td style="padding:8px 10px;text-align:right;font-family:var(--mono);color:var(--accent);">%${toplam_indirim.toFixed(1)}</td>
                <td></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div style="padding:20px;color:var(--red);font-size:12px;">Hata: ${e.message}</div>`;
  }
}

// ── INIT ──
loadAll();
</script>
</body>
</html>
