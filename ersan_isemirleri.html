<!DOCTYPE html>

<body>

<!-- LAYOUT -->
<div class="layout">

    </div>

  <!-- DETAIL -->
  <div class="detail-panel">
    <div id="detail-content">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style="opacity:.3;"><rect x="8" y="8" width="48" height="48" rx="6" stroke="currentColor" stroke-width="2"/><path d="M20 24h24M20 32h24M20 40h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="48" cy="48" r="12" fill="currentColor"/><path d="M44 48h8M48 44v8" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        <p>Listeden bir iş emri seçin veya yeni oluşturun</p>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

  </div>
</div>

<script>
// ── CONFIG ──
const BASE = 'app5LDgJMgocw79Ix';
const TABLES = {
  isEmirleri:   'tbl58qL39I2tv8hK4',
  opRotalari:   'tblVECelTUG33EYm8',
  tezgahlar:    'tblsBXDsWACBAFEJ5',
  personel:     'tblwG9GqnLC9oFZzb',
  satisEmirleri:'tbl56Oj1nPaqefI60',
  tedarikciler: 'tblEI6683Im5AXj36',
};

// Operasyon tipleri — dunya standartlari
const OP_TYPES = [
  'CNC Turning','CNC Milling','Grinding','Drilling','Tapping',
  'Deburring','Welding','Assembly',
  'Heat Treatment (subcon)','Induction Hardening (subcon)',
  'Surface Treatment (subcon)','Chrome Plating (subcon)',
  'Grinding (subcon)',
  'QC Inspection','Final Inspection','FAI'
];

const FASON_OPS = [
  'Heat Treatment (subcon)','Induction Hardening (subcon)',
  'Surface Treatment (subcon)','Chrome Plating (subcon)','Grinding (subcon)'
];

// Operasyon tipine gore tezgah filtresi
const OP_TEZGAH_MAP = {
  'CNC Turning': 'CNC Torna',
  'CNC Milling': 'CNC Freze',
  'Grinding': 'Taşlama',
  'Drilling': 'Matkap',
};

// Fason operasyon tipine gore tedarikci filtresi
const OP_TEDARIKCI_MAP = {
  'Heat Treatment (subcon)': 'Isıl İşlem',
  'Induction Hardening (subcon)': 'Isıl İşlem',
  'Surface Treatment (subcon)': 'Yüzey İşlem',
  'Chrome Plating (subcon)': 'Kaplama',
  'Grinding (subcon)': 'Taşlama',
};

var tedarikciler = [];

let workOrders = [], filteredWOs = [];
let tezgahlar = [], personel = [], satisEmirleri = [];
let activeWOId = null;
let currentOps = []; // {_id, _local, sira, tip, aciklama, fason, fasonFirma, sure, durum, tezgahId, personelId}
let opsToDelete = [];
let activeFilter = 'Tümü';
let dragSrcIdx = null;

// ── API ──
const api = async (method, table, body, id='') => {
  const url = `https://api.airtable.com/v0/${BASE}/${table}${id?'/'+id:''}`;
  const res = await fetch(url, {
    method, headers: {'Authorization':`Bearer ${await getToken()}`,'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  return res.json();
};
const apiGet = async (table, params='') => {
  const res = await fetch(`https://api.airtable.com/v0/${BASE}/${table}?${params}`, {
    headers: {'Authorization':`Bearer ${await getToken()}`}
  });
  return res.json();
};

async function getToken() {
  // Netlify function üzerinden token al (güvenli)
  const res = await fetch('/.netlify/functions/airtable', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({method:'TOKEN'})
  });
  const d = await res.json();
  return d.token || '';
}

// Geçici: token doğrudan (prod'da kaldır)
const TOKEN_DIRECT = ''; // netlify function hazır olunca boş bırak

// Override API for direct token use while netlify function ready
const apiDirect = async (method, table, body, id='') => {
  const url = `https://api.airtable.com/v0/${BASE}/${table}${id?'/'+id:''}`;
  const res = await fetch(url, {
    method, headers:{'Authorization':`Bearer ${TOKEN_DIRECT}`,'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
};
const apiGetDirect = (table, params='') =>
  fetch(`https://api.airtable.com/v0/${BASE}/${table}?${params}`, {
    headers:{'Authorization':`Bearer ${TOKEN_DIRECT}`}
  }).then(r=>r.json());

// Use proxy
const apiFn = async (method, table, body, id='') => {
  const path = `/v0/${BASE}/${table}${id?'/'+id:''}`;
  const res = await fetch('/.netlify/functions/airtable', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method, path, body})
  });
  const data = await res.json();
  if (!res.ok || data.error) {
    console.error('[API-ERR]', method, table, id, 'status:', res.status, 'body:', JSON.stringify(body)?.substring(0,300), 'response:', JSON.stringify(data));
    throw new Error(data.error?.message || data.error?.type || JSON.stringify(data.error) || res.status);
  }
  return data;
};
const apiGetFn = async (table, params='') => {
  const path = `/v0/${BASE}/${table}?${params}`;
  const res = await fetch('/.netlify/functions/airtable', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method:'GET', path})
  });
  const data = await res.json();
  if (data.error) console.error('[API-GET-ERR]', table, params.substring(0,80), JSON.stringify(data.error));
  return data;
};

// ── HELPERS ──
const fmt = n => n ? Number(n).toLocaleString('tr-TR',{minimumFractionDigits:0}) : '—';
const fmtDate = d => { if(!d) return ''; try { return new Date(d).toLocaleDateString('tr-TR'); } catch { return d; } };
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── LOAD ALL ──
async function loadAll() {
  try {
    let all = [], offset = '';
    do {
      const d = await apiGetFn(TABLES.isEmirleri, `sort[0][field]=Sıra%20No&sort[0][direction]=desc${offset?'&offset='+offset:''}`);
      all = all.concat(d.records || []);
      offset = d.offset || '';
    } while (offset);
    workOrders = all;

    const [tz, ps, se, td] = await Promise.all([
      apiGetFn(TABLES.tezgahlar, ''),
      apiGetFn(TABLES.personel, ''),
      apiGetFn(TABLES.satisEmirleri, 'sort[0][field]=SE%20No&sort[0][direction]=desc'),
      apiGetFn(TABLES.tedarikciler, 'filterByFormula=' + encodeURIComponent("{Aktif}=TRUE()")),
    ]);
    tezgahlar = tz.records || [];
    personel = ps.records || [];
    satisEmirleri = se.records || [];
    tedarikciler = td.records || [];

    filterAndRender();
  } catch(e) {
    document.getElementById('wo-list').innerHTML = `<div style="padding:16px;color:var(--red);font-size:12px;">Hata: ${e.message}</div>`;
  }
}

function filterAndRender() {
  const q = document.getElementById('wo-search').value.toLowerCase();
  filteredWOs = workOrders.filter(r => {
    const f = r.fields;
    const matchFilter = activeFilter === 'Tümü' || f['Durum'] === activeFilter;
    const matchSearch = !q ||
      (f['IE No']||'').toLowerCase().includes(q) ||
      (f['Lot No']||'').toLowerCase().includes(q) ||
      (f['Parça Adı']||'').toLowerCase().includes(q) ||
      (f['Parça No']||'').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
  renderList();
}

function renderList() {
  const el = document.getElementById('wo-list');
  document.getElementById('wo-count').textContent = `${filteredWOs.length} iş emri`;
  if (!filteredWOs.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">İş emri bulunamadı</div>';
    return;
  }
  el.innerHTML = filteredWOs.map(wo => {
    const f = wo.fields;
    const durum = f['Durum'] || 'Taslak';
    const oncelik = f['Öncelik'] || 'Normal';
    const active = wo.id === activeWOId ? ' secili' : '';
    return `<div class="liste-satir${active} p-${oncelik}" onclick="loadDetail('${wo.id}')">
      <div class="wo-top">
        <div>
          <div class="wo-no">${f['IE No']||'—'}</div>
          <div class="wo-lot">${f['Lot No']||'—'}</div>
        </div>
        <div style="display:flex;gap:4px;align-items:center;">
          ${oncelik!=='Normal'?'<span class="status-badge" style="background:'+(oncelik==='Kritik'?'var(--red-light);color:var(--red)':'var(--orange-light);color:var(--orange)')+'">'+oncelik+'</span>':''}
          <span class="status-badge s-${durum}">${durum}</span>
        </div>
      </div>
      <div class="wo-parca">${f['Parça Adı']||'—'}</div>
      <div class="wo-bottom">
        <span class="wo-meta">${f['Parça No']||''} ${f['Revizyon']?'Rev.'+f['Revizyon']:''}</span>
        <span class="wo-meta">${f['Miktar']||0} ${f['Birim']||'Adet'}</span>
      </div>
    </div>`;
  }).join('');
}

function setFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.filter;
  filterAndRender();
}
function filterWOList() { filterAndRender(); }

// ── LOAD DETAIL ──
async function loadDetail(id) {
  activeWOId = id;
  renderList();
  const wo = workOrders.find(r => r.id === id);
  const f = wo?.fields || {};

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-toolbar">
      <div class="detail-toolbar-left">
        <div class="detail-title">${f['IE No']||'—'}</div>
        <div class="detail-lot">${f['Lot No']||'—'}</div>
        <span class="status-badge s-${f['Durum']||'Beklemede'}">${f['Durum']||'Beklemede'}</span>
      </div>
      <button class="toolbar-btn" onclick="showQR('${id}')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="7" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="8" width="1.5" height="1.5" fill="currentColor"/><rect x="10" y="8" width="1.5" height="1.5" fill="currentColor"/><rect x="8" y="10" width="1.5" height="1.5" fill="currentColor"/><rect x="10" y="10" width="1.5" height="1.5" fill="currentColor"/></svg>
        QR Göster

        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M3 4V2h7v2M3 9H1V5h11v4h-2M3 7h7v4H3V7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Traveler PDF
      </button>
      <button class="toolbar-btn" onclick="setWODurum('${id}','Üretimde')" style="background:var(--blue-light);color:var(--blue);border-color:var(--blue);">▶ Üretime Al</button>
      <button class="toolbar-btn success" onclick="setWODurum('${id}','Tamamlandı')">✓ Tamamla</button>
      <button class="toolbar-btn primary" onclick="saveWO('${id}')">💾 Kaydet</button>
      <button class="toolbar-btn" style="border-color:var(--red);color:var(--red);" onclick="deleteWO('${id}')">🗑 Sil</button>
    </div>
    <div class="detail-scroll" id="wo-detail-scroll">
      <!-- Bilgiler -->
      <div class="card">
        <div class="card-header">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M3.5 5h5M3.5 7h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          İş Emri Bilgileri
        </div>
        <div class="card-body">
          <div class="form-grid" style="gap:10px;">
            <div class="field-group">
              <label class="field-label">IE No</label>
              <input class="field-input" value="${f['IE No']||''}" disabled>
            </div>
            <div class="field-group">

              <input class="field-input" value="${f['Lot No']||''}" disabled style="font-family:var(--mono);">
            </div>
            <div class="field-group">
              <label class="field-label">Siparis No</label>
              <input class="field-input" value="${(function(){ var seRec = satisEmirleri.find(function(r){return r.id===(f['SE No']||[])[0];}); var sn = seRec ? seRec.fields['SE No']||'' : ''; return sn ? sn.replace(new RegExp('-[0-9]{2}$'),'') : '—'; })()}" disabled style="font-family:var(--mono);background:#f7f8fa;">
            </div>
            <div class="field-group">

              <button class="btn-add-op" onclick="addOp()">

          </div>

  // Load Teknik Resim
  await renderTeknikResim(f, id);

  await loadOps(id);
}

// ── TEKNİK RESİM ──
async function renderTeknikResim(f, woId) {
  var el = document.getElementById('ie-teknik-resim');
  if (!el) return;
  var attachments = f['Teknik Resim'];

  // IE'nin kendi Teknik Resim alani bossa, bagli Satis Emrinden cek
  if ((!attachments || !attachments.length)) {
    el.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text3);font-size:12px;">Satis emrinden yukleniyor...</div>';
    try {
      // IE'nin bagli SE kayitlari
      var seIds = f['SE No'] || f['Satış Emirleri'] || [];
      if (seIds.length > 0) {
        var seId = typeof seIds[0] === 'string' ? seIds[0] : seIds[0];
        var seData = await apiGetFn(TABLES.satisEmirleri, 'filterByFormula=RECORD_ID()%3D%22' + seId + '%22');
        var seRec = (seData.records || [])[0];
        if (seRec) {
          // Satis Emrindeki Teknik Resim veya PDF Data
          var seAtts = seRec.fields['Teknik Resim'];
          var sePdfData = seRec.fields['PDF Data'];
          if (seAtts && seAtts.length > 0) {
            attachments = seAtts;
          } else if (sePdfData) {
            attachments = [{ url: sePdfData, filename: 'teknik-resim.pdf' }];
          }
        }
      }
    } catch(e) {
      console.warn('[IE] SE teknik resim cekme hatasi:', e);
    }
  }

  if (!attachments || !attachments.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">Teknik resim bulunamadi. Siparis kaleminden yukleyin.</div>';
    return;
  }

  var html = '';
  var firstPdfUrl = null;
  attachments.forEach(function(att) {
    var url = att.url || '';
    var name = att.filename || 'dosya';
    var isPdf = name.toLowerCase().endsWith('.pdf') || url.toLowerCase().includes('.pdf');
    if (isPdf && !firstPdfUrl) firstPdfUrl = url;
  });

  // PDF varsa embed viewer goster, yoksa resim/link goster
  if (firstPdfUrl) {
    html = '<div style="height:1000px;display:flex;flex-direction:column;">' +
      '<div style="background:var(--laci);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-radius:6px 6px 0 0;">' +
      '<span style="color:#fff;font-size:11px;">' + (attachments[0].filename || 'teknik-resim.pdf') + '</span>' +
      '<a href="' + firstPdfUrl + '" target="_blank" style="color:#93c5fd;font-size:11px;text-decoration:none;">Yeni sekmede ac</a>' +
      '</div>' +
      '<iframe src="' + firstPdfUrl + '" style="flex:1;border:none;border-radius:0 0 6px 6px;background:#fff;" allowfullscreen></iframe>' +
      '</div>';
  } else {
    html = '<div style="display:flex;flex-wrap:wrap;gap:10px;padding:4px;">';

    });

  }

  el.innerHTML = html;
}

// ── LOAD OPERATIONS ──
async function loadOps(woId) {
  try {
    const data = await apiGetFn(TABLES.opRotalari,
      `filterByFormula=${encodeURIComponent(`FIND("${woId}",ARRAYJOIN({İş Emirleri}))`)}&sort[0][field]=Operasyon%20No&sort[0][direction]=asc`);
    currentOps = (data.records || []).map(r => ({
      _id: r.id, _local: false,
      sira: r.fields['Operasyon No'] || 0,
      tip: r.fields['Operasyon Tanımı'] || '',
      aciklama: r.fields['Açıklama'] || '',
      fason: r.fields['Fason mı'] || false,
      fasonFirma: r.fields['Fason Firma'] || '',
      sure: r.fields['İşleme Süresi (dk)'] || 0,
        setup: r.fields['Setup Süresi (dk)'] || 0,
      durum: r.fields['Durum'] || 'Beklemede',
      tezgahId: r.fields['Tezgah']?.[0] || '',
      personelId: r.fields['Personel']?.[0] || '',
    }));
    opsToDelete = [];
    renderOps();
  } catch(e) {
    console.error('Ops load error:', e);
  }
}

// ── RENDER OPERATIONS ──
function renderOps() {
  const tbody = document.getElementById('ops-tbody');
  if (!tbody) return;
  document.getElementById('op-count').textContent = `${currentOps.length} operasyon`;

  // Tezgah ve tedarikci opsiyonlari operasyon tipine gore filtrelenir
  function getTezgahOpts(opTip) {
    var filtreTip = OP_TEZGAH_MAP[opTip] || '';
    return tezgahlar.filter(function(t) {
      if (!filtreTip) return true;
      return (t.fields['Tezgah Tipi'] || '').indexOf(filtreTip) >= 0 || (t.fields['Tezgah Adı'] || '').indexOf(filtreTip) >= 0;
    }).map(function(t) {
      return '<option value="' + t.id + '">' + (t.fields['Tezgah Kodu']||'') + ' ' + (t.fields['Tezgah Adı']||'') + '</option>';
    }).join('');
  }
  function getTedarikciOpts(opTip) {
    var filtreKat = OP_TEDARIKCI_MAP[opTip] || '';
    return tedarikciler.filter(function(t) {
      if (!filtreKat) return true;
      var kat = (t.fields['Tedarikçi Tipi'] || '') + ' ' + (t.fields['Malzeme Kategorisi'] || []).join(' ') + ' ' + (t.fields['Tedarik Ettiği Malzeme'] || '');
      return kat.indexOf(filtreKat) >= 0;
    }).map(function(t) {
      return '<option value="' + t.id + '">' + (t.fields['Tedarikçi Adı']||'') + '</option>';
    }).join('');
  }

  if (!currentOps.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">Henüz operasyon eklenmedi</td></tr>`;
    return;
  }

  tbody.innerHTML = currentOps.map((op, i) => {
    const isFason = FASON_OPS.includes(op.tip) || op.fason;
    const durumColor = op.durum === 'Tamamlandı' ? 'var(--green)' : op.durum === 'Devam' ? 'var(--blue)' : op.durum === 'Reddedildi' ? 'var(--red)' : 'var(--text3)';

    return `<tr draggable="true" data-idx="${i}"
      ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})"
      ondrop="dragDrop(event,${i})" ondragend="dragEnd()"
      style="cursor:default;">
      <td><span class="drag-handle" title="Sürükle">⠿</span></td>
      <td><span class="op-sira">${i+1}</span></td>
      <td style="min-width:180px;">
        <select style="border:1px solid transparent;border-radius:5px;padding:5px 7px;font-size:13px;font-family:var(--sans);width:100%;outline:none;background:transparent;"
          onchange="updateOp(${i},'tip',this.value);checkFason(${i})"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'">
          ${OP_TYPES.map(t => `<option ${op.tip===t?'selected':''}>${t}</option>`).join('')}
        </select>
        ${isFason ? '<span class="fason-tag">SUBCON</span>' : ''}
      </td>
      <td>
        <input style="border:1px solid transparent;border-radius:5px;padding:5px 7px;font-size:13px;font-family:var(--sans);width:100%;outline:none;"
          value="${op.aciklama.replace(/"/g,'&quot;')}"
          oninput="updateOp(${i},'aciklama',this.value)"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'"
          placeholder="Instructions / notes...">
      </td>
      <td>
        ${isFason
          ? `<select style="border:1px solid transparent;border-radius:5px;padding:5px 7px;font-size:13px;font-family:var(--sans);width:100%;outline:none;background:transparent;"
              onchange="updateOp(${i},'fasonFirma',this.options[this.selectedIndex].text);updateOp(${i},'tezgahId',this.value)"
              onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'">
              <option value="">— Supplier —</option>
              ${getTedarikciOpts(op.tip).replace('value="' + op.tezgahId + '"', 'value="' + op.tezgahId + '" selected')}
            </select>`
          : `<select style="border:1px solid transparent;border-radius:5px;padding:5px 7px;font-size:13px;font-family:var(--sans);width:100%;outline:none;background:transparent;"
              onchange="updateOp(${i},'tezgahId',this.value)"
              onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'">
              <option value="">— Machine —</option>
              ${getTezgahOpts(op.tip).replace('value="' + op.tezgahId + '"', 'value="' + op.tezgahId + '" selected')}
            </select>`
        }
      </td>
      <td>
        <input type="number" style="border:1px solid transparent;border-radius:5px;padding:5px 6px;font-size:13px;font-family:var(--mono);width:60px;text-align:right;outline:none;"
          value="${op.setup||''}"
          oninput="updateOp(${i},'setup',parseFloat(this.value)||0)"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'"
          placeholder="0">
      </td>
      <td>
        <input type="number" style="border:1px solid transparent;border-radius:5px;padding:5px 6px;font-size:13px;font-family:var(--mono);width:60px;text-align:right;outline:none;"
          value="${op.sure||''}"
          oninput="updateOp(${i},'sure',parseFloat(this.value)||0)"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'"
          placeholder="0">
      </td>
      <td>
        <select style="border:1px solid transparent;border-radius:5px;padding:5px 6px;font-size:12px;font-family:var(--sans);width:100%;outline:none;color:${durumColor};font-weight:600;background:transparent;"
          onchange="updateOp(${i},'durum',this.value)"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='transparent'">
          ${['Bekliyor','İşlemde','Muayene Bekliyor','Tamamlandı','Atlandı'].map(d=>`<option ${op.durum===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </td>
      <td><button class="btn-del-op" onclick="removeOp(${i})">×</button></td>
    </tr>`;
  }).join('');
}

function updateOp(i, key, val) { currentOps[i][key] = val; }
function checkFason(i) {
  const op = currentOps[i];
  op.fason = FASON_OPS.includes(op.tip);
  renderOps();
}
function addOp() {
  currentOps.push({
    _id: null, _local: true,
    sira: currentOps.length + 1,
    tip: 'Tornalama', aciklama: '', fason: false,
    fasonFirma: '', sure: 0, setup: 0, durum: 'Bekliyor',
    tezgahId: '', personelId: ''
  });
  renderOps();
}
function removeOp(i) {
  const op = currentOps[i];
  if (op._id) opsToDelete.push(op._id);
  currentOps.splice(i, 1);
  renderOps();
}

// ── DRAG & DROP ──
function dragStart(e, i) { dragSrcIdx = i; e.currentTarget.style.opacity = '.4'; }
function dragOver(e, i) { e.preventDefault(); }
function dragDrop(e, i) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === i) return;
  const [moved] = currentOps.splice(dragSrcIdx, 1);
  currentOps.splice(i, 0, moved);
  currentOps.forEach((op, idx) => op.sira = idx + 1);
  renderOps();
}
function dragEnd() {
  dragSrcIdx = null;
  document.querySelectorAll('#ops-tbody tr').forEach(r => r.style.opacity = '1');
}

// ── SAVE WO ──
async function saveWO(id) {
  try {
    // 1. WO fields güncelle
    const woFields = {
      'Parça Adı': document.getElementById('f-parca-adi').value || '',
      'Parça No': document.getElementById('f-parca-no').value || null,
      'Revizyon': document.getElementById('f-rev').value || null,
      'Miktar': parseFloat(document.getElementById('f-miktar').value) || null,
      'Termin Tarihi': document.getElementById('f-termin').value || null,
      'Özel Notlar': document.getElementById('f-notlar').value || null,
      'Durum': document.getElementById('f-durum').value,
    };
    await apiFn('PATCH', TABLES.isEmirleri, {fields: woFields}, id);

    // 2. Silinecek operasyonları sil
    for (const oid of opsToDelete) {
      await apiFn('DELETE', TABLES.opRotalari, null, oid);
    }
    opsToDelete = [];

    // 3. Operasyonları kaydet
    for (let i = 0; i < currentOps.length; i++) {
      const op = currentOps[i];
      const opFields = {
        'Operasyon No': (i + 1) * 10,
        'Operasyon Tanımı': op.tip,
        'Açıklama': op.aciklama || null,
        'Fason mı': op.fason || FASON_OPS.includes(op.tip),
        'Fason Firma': op.fasonFirma || null,
        'İşleme Süresi (dk)': op.sure || null,
        'Setup Süresi (dk)': op.setup || null,
        'Durum': op.durum,
        'İş Emirleri': [id],
      };
      if (op.tezgahId) opFields['Tezgahlar'] = [op.tezgahId];

      if (op._id) {
        await apiFn('PATCH', TABLES.opRotalari, {fields: opFields}, op._id);
      } else {
        const res = await apiFn('POST', TABLES.opRotalari, {fields: opFields});
        op._id = res.id; op._local = false;
      }
    }

    // 4. Refresh
    await loadAll();
    await loadDetail(id);
    toast('İş emri kaydedildi ✓');
  } catch(e) {
    toast('Kaydetme hatası: ' + e.message, 'error');
  }
}

// ── SET DURUM ──
async function setWODurum(id, durum) {
  try {
    await apiFn('PATCH', TABLES.isEmirleri, {fields: {'Durum': durum}}, id);
    const wo = workOrders.find(r => r.id === id);
    if (wo) wo.fields['Durum'] = durum;
    await loadAll();
    await loadDetail(id);
    toast(`Durum: ${durum}`);
  } catch(e) {
    toast('Hata: ' + e.message, 'error');
  }
}

function autoFillFromSE() {
  const sel = document.getElementById('nw-se');
  const opt = sel.options[sel.selectedIndex];
  if (!opt.value) return;
  document.getElementById('nw-seno').value = opt.value || '';
  document.getElementById('nw-parcaadi').value = opt.dataset.parca || '';
  document.getElementById('nw-parcano').value = opt.dataset.no || '';
  document.getElementById('nw-miktar').value = opt.dataset.miktar || '';
  document.getElementById('nw-birim').value = opt.dataset.birim || 'Adet';
}

async function createWO() {
  const parcaAdi = document.getElementById('nw-parcaadi').value.trim();
  const miktar = parseFloat(document.getElementById('nw-miktar').value) || 0;
  if (!parcaAdi) { toast('Parça adı zorunlu', 'error'); return; }
  if (!miktar) { toast('Miktar zorunlu', 'error'); return; }

  try {
    const year = new Date().getFullYear();
    // Lot No için mevcut son kaydı bul
    const lastWOs = await apiGetFn(TABLES.isEmirleri, 'sort[0][field]=Sıra%20No&sort[0][direction]=desc&maxRecords=1');
    const lastSira = lastWOs.records?.[0]?.fields?.['Sıra No'] || 0;
    const newSira = lastSira + 1;
    const lotNo = `LOT-${year}-${String(newSira).padStart(5,'0')}-A`;

    const fields = {
      'Lot No': lotNo,
      'Parça Adı': parcaAdi,
      'Parça No': document.getElementById('nw-parcano').value || null,
      'Revizyon': document.getElementById('nw-rev').value || null,
      'Miktar': miktar,
      'Termin Tarihi': document.getElementById('nw-termin').value || null,
      'Durum': 'Beklemede',
    };

    const seVal = document.getElementById('nw-seno').value;
    if (seVal) fields['Satış Emirleri'] = [seVal];

    const res = await apiFn('POST', TABLES.isEmirleri, {fields});
    // IE No formula alanı Airtable'da otomatik üretiliyor
    const ieNo = res.fields?.['IE No'] || `IE-${year}-${String(newSira).padStart(5,'0')}`;
    document.getElementById('new-wo-modal').remove();
    await loadAll();
    await loadDetail(res.id);
    toast(`${ieNo} oluşturuldu — Lot: ${lotNo} ✓`);
  } catch(e) {
    toast('Oluşturma hatası: ' + e.message, 'error');
  }
}

  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.setTextColor(90, 97, 112);
  doc.text(`Lot: ${tr(f['Lot No']||'—')}`, 14, 52);
  doc.setTextColor(30, 27, 75);
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(tr(f['Parça Adı']||'—'), 80, 44);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.setTextColor(90, 97, 112);
  doc.text(`Parca No: ${tr(f['Parça No']||'—')} ${f['Revizyon']?'Rev.'+f['Revizyon']:''}`, 80, 51);

      2: { cellWidth: 55 },
      3: { cellWidth: 28 },
      4: { cellWidth: 18, halign: 'center' },
      5: { cellWidth: 22 },
      6: { cellWidth: 20 },
    },
    alternateRowStyles: { fillColor: [247, 248, 250] },
  });

  // Notes
  const finalY = doc.lastAutoTable.finalY + 6;
  if (f['Notlar']) {
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(30,27,75);
    doc.text('NOTLAR:', 14, finalY);
    doc.setFont('helvetica','normal'); doc.setTextColor(90,97,112);
    doc.text(tr(f['Notlar']||''), 14, finalY + 5, {maxWidth: 180});
  }

  // Footer
  doc.setFillColor(30, 27, 75);
  doc.rect(0, 282, 210, 15, 'F');
  doc.setFontSize(7); doc.setTextColor(165, 180, 252);
  doc.text('Ersan Endustriyel Makine San. Tic. Ltd. Sti.  |  Basiskele Sanayi Sitesi 12.Blok No:2 Kocaeli  |  AS9100 Rev.D Kapsaminda Uretim', 14, 288);
  doc.setTextColor(255,255,255);
  doc.text(`Baski: ${new Date().toLocaleDateString('tr-TR')}`, 160, 288);

  doc.save(`Traveler_${tr(f['IE No']||'WO')}.pdf`);
  toast('Traveler PDF indiriliyor...');
}

// ── İŞ EMRİ SİL ──
async function deleteWO(id) {
  const wo = workOrders.find(r => r.id === id);
  const ieNo = wo?.fields?.['IE No'] || id;
  if (!confirm(ieNo + ' silinsin mi?')) return;
  try {
    await fetch('/.netlify/functions/airtable', {
      method: 'DELETE', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({table:'İş Emirleri', id:id})
    });
    workOrders = workOrders.filter(r => r.id !== id);
    activeWOId = null;
    filterAndRender();
    document.getElementById('detail-content').innerHTML = '<div class="empty-state"><p>İş emri silindi.</p></div>';
    toast(ieNo + ' silindi');
    logIslem('Silindi', 'İş Emri', id, ieNo, null, null);
  } catch(e) { toast('Hata: ' + e.message); }
}
