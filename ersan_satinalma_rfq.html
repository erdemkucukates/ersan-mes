<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Satinalma Teklifleri</title>
<link rel="stylesheet" href="ersan_styles.css">
<script src="ersan_nav.js" defer></script>
<script src="ersan_log.js" defer></script>
</head>
<body>
<div id="nav-alani"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Satinalma Teklifleri <span id="pr-badge" style="display:none;font-size:12px;padding:3px 10px;border-radius:4px;background:#dbeafe;color:#1e40af;font-weight:600;margin-left:12px;"></span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--metin3);">
      <div style="font-size:48px;margin-bottom:16px;opacity:0.3;">&#9881;</div>
      <div style="font-size:16px;font-weight:600;color:var(--laci);margin-bottom:8px;">Satinalma Teklifleri</div>
      <div style="font-size:13px;">Bu modul yapim asamasindadir.</div>
    </div>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var urlParams = new URLSearchParams(window.location.search);
  var prParam = urlParams.get('pr');
  if (prParam) {
    var prBadge = document.getElementById('pr-badge');
    if (prBadge) {
      prBadge.textContent = 'PR: ' + prParam;
      prBadge.style.display = 'inline-block';
    }
  }
});
</script>
</body>
</html>
