<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Satinalma Teklifleri</title>
<link rel="stylesheet" href="ersan_styles.css">
<script src="ersan_nav.js" defer></script>
<script src="ersan_log.js" defer></script>
<style>
/* ── RFQ MODAL ── */
.rfq-modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,39,68,0.55);
  z-index: 600;
  align-items: flex-start;
  justify-content: center;
  padding-top: 40px;
  overflow-y: auto;
}
.rfq-modal-backdrop.acik { display: flex; }

.rfq-modal {
  background: var(--beyaz);
  border-radius: 12px;
  width: 96%;
  max-width: 900px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin-bottom: 40px;
}
.rfq-modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--beyaz);
  z-index: 2;
  border-radius: 12px 12px 0 0;
}
.rfq-modal-head-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--laci);
}
.rfq-modal-body { padding: 20px; }
.rfq-modal-foot {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  position: sticky;
  bottom: 0;
  background: var(--beyaz);
  border-radius: 0 0 12px 12px;
}

/* ── TALEP BLOK ── */
.rfq-talep-blok {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
  background: var(--bg2);
  position: relative;
}
.rfq-talep-blok-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.rfq-talep-blok-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--laci);
}
.rfq-talep-blok-sil {
  background: none;
  border: none;
  color: var(--kirmizi);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
}
.rfq-talep-blok-sil:hover { background: var(--kirmizi-bg); }

/* ── TEKLIF DONUK (frozen ref) ── */
.rfq-teklif-blok-frozen {
  border: 1px solid #bbf7d0;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: #f0fdf4;
}
.rfq-teklif-blok-frozen .label {
  font-size: 10px;
  font-weight: 600;
  color: var(--metin3);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.rfq-teklif-blok-frozen .val {
  font-size: 13px;
  font-weight: 500;
  color: var(--metin);
}

/* ── TEDARIKCI LISTESI ── */
.rfq-td-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.rfq-td-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 11px;
  font-weight: 500;
  background: var(--mavi-acik);
  color: var(--mavi-koyu);
}
.rfq-td-chip .sil-x {
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: var(--mavi);
  margin-left: 2px;
}
.rfq-td-chip .sil-x:hover { color: var(--kirmizi); }

/* ── TIP SELECTOR ── */
.rfq-tip-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.rfq-tip-btn {
  flex: 1;
  padding: 8px 12px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--beyaz);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--metin2);
  text-align: center;
  transition: all .15s;
  font-family: inherit;
}
.rfq-tip-btn.secili {
  border-color: var(--mavi);
  background: var(--mavi-acik);
  color: var(--mavi-koyu);
  font-weight: 600;
}

/* ── OLCU GRID ── */
.rfq-olcu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.rfq-olcu-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.rfq-olcu-item label {
  font-size: 10px;
  font-weight: 600;
  color: var(--metin3);
  text-transform: uppercase;
}
.rfq-olcu-item input {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
  font-family: inherit;
  color: var(--metin2);
}
.rfq-olcu-item input:focus {
  outline: none;
  border-color: var(--mavi);
}

/* ── SECTION HEADER ── */
.rfq-section-header {
  font-size: 12px;
  font-weight: 600;
  color: var(--laci);
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ── TAB BAR ── */
.rfq-tab-bar {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 16px;
}
.rfq-tab-btn {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--metin3);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  font-family: inherit;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.rfq-tab-btn:hover { color: var(--metin); }
.rfq-tab-btn.on {
  color: var(--mavi);
  border-bottom-color: var(--mavi);
  font-weight: 600;
}
.rfq-tab-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
  background: var(--bg);
  color: var(--metin3);
}
.rfq-tab-btn.on .rfq-tab-badge {
  background: var(--mavi-acik);
  color: var(--mavi-koyu);
}

/* ── PANEL SHOW/HIDE ── */
.rfq-panel { display: none; }
.rfq-panel.show { display: block; }

/* ── RFQ TABLE ── */
.rfq-tablo {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.rfq-tablo thead th {
  padding: 8px 10px;
  text-align: left;
  font-weight: 600;
  color: var(--metin3);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 2px solid var(--border);
  background: var(--bg2);
  user-select: none;
}
.rfq-tablo thead th[onclick] { cursor: pointer; }
.rfq-tablo thead th[onclick]:hover { background: var(--border); color: var(--laci); }
.rfq-tablo tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}
.rfq-tablo tbody tr:hover { background: var(--mavi-acik); }
.rfq-tablo tbody tr.secili-satir { background: #dbeafe; }
.rfq-tablo tbody td {
  padding: 8px 10px;
  color: var(--metin2);
  vertical-align: middle;
}
.rfq-tablo .mono {
  font-family: 'Consolas', 'Courier New', monospace;
  font-weight: 600;
  color: var(--mavi-koyu);
}
.rfq-tablo .fiyat-en-dusuk {
  color: var(--yesil);
  font-weight: 700;
}

/* ── GECIKME BANNER ── */
.rfq-gecikme-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--kirmizi-t);
  font-weight: 500;
}

/* ── KARSILASTIRMA v2 ── */
.cft-chip-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 10px;
  margin-bottom: 12px;
  scrollbar-width: thin;
}
.cft-chip {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 8px 14px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  background: #fff;
  color: #6b7280;
  cursor: pointer;
  white-space: nowrap;
  min-width: 160px;
  font-family: inherit;
  transition: all .15s;
  position: relative;
}
.cft-chip:hover { border-color: var(--mavi); background: var(--mavi-acik); }
.cft-chip.on { background: #1a2b47; color: #fff; border-color: #1a2b47; }
.cft-chip-no { font-size: 12px; font-weight: 700; font-family: 'Consolas','Courier New',monospace; }
.cft-chip-mal { font-size: 10px; opacity: .85; }
.cft-chip-badge {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 9px;
  font-weight: 700;
  background: rgba(255,255,255,.2);
  padding: 1px 6px;
  border-radius: 8px;
}
.cft-chip:not(.on) .cft-chip-badge { background: #e5e7eb; color: #6b7280; }

/* ── OZET SERIDI ── */
.cft-ozet {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
}
.cft-ozet-item {
  padding: 8px 12px;
  border-right: 1px solid #e5e7eb;
}
.cft-ozet-item:last-child { border-right: none; }
.cft-ozet-item label {
  display: block;
  font-size: 9px;
  font-weight: 600;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: .3px;
  margin-bottom: 2px;
}
.cft-ozet-item span { font-size: 12px; font-weight: 600; color: var(--metin); }

/* ── AKIS CUBUGU ── */
.cft-akis {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
}
.cft-akis-step {
  flex: 1;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  background: #f3f4f6;
  color: #9ca3af;
}
.cft-akis-step span { display: block; font-size: 9px; font-weight: 400; margin-top: 1px; }
.cft-akis-step.done { background: #f0fdf4; color: #065f46; }
.cft-akis-step.active { background: #1a2b47; color: #fff; }

/* ── IKI SUTUN LAYOUT ── */
.cft-iki-sutun {
  display: grid;
  grid-template-columns: 1fr 290px;
  gap: 14px;
  align-items: flex-start;
}

/* ── KARSILASTIRMA TABLOSU (transposed) ── */
.cft-tablo {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
}
.cft-tablo th, .cft-tablo td {
  padding: 8px 10px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
}
.cft-tablo th.cft-th-best { background: #065f46; color: #fff; }
.cft-tablo th.cft-th-mid { background: #1e40af; color: #fff; }
.cft-tablo th.cft-th-high { background: #6b7280; color: #fff; }
.cft-tablo th.cft-th-label { background: #f9fafb; color: #6b7280; font-size: 10px; text-transform: uppercase; font-weight: 600; width: 120px; }
.cft-tablo .cft-sub { display: block; font-size: 9px; font-weight: 400; opacity: .8; }
.cft-tablo .cft-best-cell { background: #f0fdf4; }
.cft-tablo .cft-fiyat-best { color: #059669; font-weight: 700; font-size: 13px; }
.cft-tablo .cft-fiyat-worst { color: #dc2626; }
.cft-tablo .cft-diff { font-size: 10px; color: #dc2626; display: block; }

/* ── KARAR SATIRI ── */
.cft-karar-btn {
  padding: 5px 12px;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.cft-karar-btn.kazanan { background: #059669; color: #fff; }
.cft-karar-btn.kazanan:hover { background: #047857; }
.cft-karar-btn.pazarlik { background: #f59e0b; color: #fff; }
.cft-karar-btn.pazarlik:hover { background: #d97706; }
.cft-karar-btn.kazandi { background: #d1fae5; color: #065f46; cursor: default; }

/* ── TASARRUF BAR ── */
.cft-tasarruf-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  margin-top: 10px;
  overflow: hidden;
}
.cft-tasarruf-bar-item {
  padding: 8px 12px;
  text-align: center;
  border-right: 1px solid #e5e7eb;
}
.cft-tasarruf-bar-item:last-child { border-right: none; }
.cft-tasarruf-bar-item label {
  display: block;
  font-size: 9px;
  font-weight: 600;
  color: #9ca3af;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.cft-tasarruf-bar-item .val { font-size: 13px; font-weight: 700; }
.cft-tasarruf-bar-item .val.yesil { color: #059669; }
.cft-tasarruf-bar-item .val.mavi { color: #1e40af; }

/* ── PAZARLIK PANELI ── */
.cft-paz-panel {
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
  font-size: 12px;
}
.cft-paz-head {
  background: #1a2b47;
  color: #fff;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
}
.cft-paz-body { padding: 12px; }

/* TD tabs */
.cft-paz-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.cft-paz-tab {
  padding: 4px 10px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  background: #fff;
  color: #6b7280;
  cursor: pointer;
  font-family: inherit;
}
.cft-paz-tab.on { background: #1a2b47; color: #fff; border-color: #1a2b47; }

/* Current price box */
.cft-paz-mevcut {
  background: #f3f4f6;
  border-radius: 6px;
  padding: 8px 10px;
  margin-bottom: 10px;
}
.cft-paz-mevcut .lbl { font-size: 10px; color: #6b7280; font-weight: 600; text-transform: uppercase; }
.cft-paz-mevcut .fiyat { font-size: 15px; font-weight: 700; color: var(--metin); margin-top: 2px; }
.cft-paz-mevcut .detay { font-size: 10px; color: #9ca3af; margin-top: 2px; }

/* Target price input */
.cft-paz-hedef-input {
  width: 100%;
  padding: 8px 10px;
  background: #eff6ff;
  border: 1px solid #93c5fd;
  border-radius: 6px;
  color: #1e40af;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  box-sizing: border-box;
}
.cft-paz-hedef-input:focus { outline: none; border-color: #3b82f6; }

/* Savings box */
.cft-paz-tasarruf {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  margin: 8px 0;
  text-align: center;
}
.cft-paz-tasarruf.pozitif { background: #f0fdf4; color: #059669; }
.cft-paz-tasarruf.negatif { background: #fef2f2; color: #dc2626; }
.cft-paz-tasarruf.bos { background: #f3f4f6; color: #9ca3af; }

/* Message textarea */
.cft-paz-mesaj {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 12px;
  font-family: inherit;
  resize: vertical;
  box-sizing: border-box;
}
.cft-paz-mesaj:focus { outline: none; border-color: #93c5fd; }

/* History bubbles */
.cft-paz-gecmis {
  max-height: 200px;
  overflow-y: auto;
  margin-top: 10px;
}
.cft-paz-bubble {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.cft-paz-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}
.cft-paz-avatar.biz { background: #1a2b47; color: #fff; }
.cft-paz-avatar.td { background: #dbeafe; color: #1e40af; }
.cft-paz-bubble-icerik {
  flex: 1;
  background: #f9fafb;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
}
.cft-paz-bubble-icerik .tarih { font-size: 9px; color: #9ca3af; margin-bottom: 2px; }
.cft-paz-bubble-icerik .hedef { color: #1e40af; font-weight: 600; margin-top: 2px; }

/* Footer buttons */
.cft-paz-footer {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.cft-paz-btn {
  flex: 1;
  padding: 7px 12px;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
}
.cft-paz-btn.primary { background: #1e40af; color: #fff; }
.cft-paz-btn.primary:hover { background: #1e3a8a; }
.cft-paz-btn.secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
.cft-paz-btn.secondary:hover { background: #e5e7eb; }

/* Label util */
.cft-lbl { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; display: block; margin-bottom: 3px; }

/* ── ONAY KART ── */
.rfq-onay-kart {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: var(--beyaz);
  display: flex;
  align-items: center;
  gap: 16px;
}
.rfq-onay-kart .bilgi { flex: 1; }
.rfq-onay-kart .bilgi .ust {
  font-size: 13px;
  font-weight: 600;
  color: var(--laci);
  font-family: monospace;
}
.rfq-onay-kart .bilgi .alt {
  font-size: 11px;
  color: var(--metin3);
  margin-top: 2px;
}
.rfq-onay-kart .fiyat-blok {
  text-align: right;
}
.rfq-onay-kart .fiyat-blok .fiyat {
  font-size: 16px;
  font-weight: 700;
  color: var(--yesil);
}
.rfq-onay-kart .fiyat-blok .birim {
  font-size: 10px;
  color: var(--metin3);
}

/* ── BOS DURUM ── */
.rfq-bos {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--metin4);
  text-align: center;
}
.rfq-bos-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
.rfq-bos-title { font-size: 14px; font-weight: 600; color: var(--metin3); margin-bottom: 4px; }
.rfq-bos-desc { font-size: 12px; }
</style>
</head>
<body>
<div id="nav-alani"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Satinalma Teklifleri <span id="pr-badge" style="display:none;font-size:12px;padding:3px 10px;border-radius:4px;background:#dbeafe;color:#1e40af;font-weight:600;margin-left:12px;"></span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn btn-mavi" onclick="rfqModalAc()">+ Yeni RFQ</button>
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

    <!-- KPI ROW -->
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
      <div class="kpi-kart">
        <div class="kpi-etiket">Toplam RFQ</div>
        <div class="kpi-deger mavi" id="kpi-toplam">0</div>
      </div>
      <div class="kpi-kart">
        <div class="kpi-etiket">Yanit Bekliyor</div>
        <div class="kpi-deger sari" id="kpi-bekliyor">0</div>
      </div>
      <div class="kpi-kart">
        <div class="kpi-etiket">Teklif Geldi</div>
        <div class="kpi-deger yesil" id="kpi-geldi">0</div>
      </div>
      <div class="kpi-kart">
        <div class="kpi-etiket">Onaylandi</div>
        <div class="kpi-deger" id="kpi-onayli" style="color:var(--yesil);">0</div>
      </div>
    </div>

    <!-- TAB BAR -->

<script>

var bekSortKol = null;

var bekSeciliIds = [];

// ── API HELPERS ──
function apiGet(tablo, query) {
  var url = '/.netlify/functions/airtable?table=' + encodeURIComponent(tablo);
  if (query) url += '&' + query;
  return fetch(url).then(function(r) { return r.json(); });
}
function apiPost(tablo, fields) {
  return fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({method:'POST', path:'/v0/' + BASE + '/' + encodeURIComponent(tablo), body:{fields:fields}})
  }).then(function(r) { return r.json(); });
}
function apiPatch(tablo, id, fields) {
  return fetch('/.netlify/functions/airtable', {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({table: tablo, id: id, fields: fields})
  }).then(function(r) { return r.json(); });
}

// ── HELPERS ──
function toast(msg, type) {
  type = type || 'ok';
  var el = document.createElement('div');
  el.style.cssText = 'padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;margin-top:8px;opacity:0;transform:translateY(10px);transition:all .3s;';
  el.style.background = type === 'err' ? 'var(--kirmizi)' : type === 'inf' ? 'var(--mavi)' : 'var(--yesil)';
  el.textContent = msg;
  var wrap = document.getElementById('toast-wrap');
  if (wrap) wrap.appendChild(el);
  setTimeout(function() { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }, 50);
  setTimeout(function() { el.remove(); }, 3500);
}

function durumBadge(durum) {
  var cls = 'badge-gri';
  if (durum === 'Gönderildi') cls = 'badge-mavi';
  else if (durum === 'Teklif Alındı') cls = 'badge-sari';
  else if (durum === 'Onaylandı') cls = 'badge-yesil';
  else if (durum === 'İptal') cls = 'badge-kirmizi';
  else if (durum === 'Taslak') cls = 'badge-gri';
  return '<span class="badge ' + cls + '">' + (durum || 'Taslak') + '</span>';
}

function formatTarih(str) {
  if (!str) return '—';
  var d = new Date(str);
  if (isNaN(d.getTime())) return str;
  var g = ('0' + d.getDate()).slice(-2);
  var a = ('0' + (d.getMonth() + 1)).slice(-2);
  return g + '.' + a + '.' + d.getFullYear();
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── SIRALAMA FONKSIYONLARI ──
function rfqSirala(kol) {
  if (rfqSortKol === kol) { rfqSortYon = rfqSortYon === 1 ? -1 : rfqSortYon === -1 ? 0 : 1; }
  else { rfqSortKol = kol; rfqSortYon = 1; }
  taleplerRender(tumTalepler);
}
function bekSirala(kol) {
  if (bekSortKol === kol) { bekSortYon = bekSortYon === 1 ? -1 : bekSortYon === -1 ? 0 : 1; }
  else { bekSortKol = kol; bekSortYon = 1; }
  bekliyorRender();
}
function sortOkIsaret(prefix, kol) {
  return (prefix === 'rfq' ? rfqSortKol : bekSortKol) === kol
    ? ((prefix === 'rfq' ? rfqSortYon : bekSortYon) === 1 ? ' \u25B2' : (prefix === 'rfq' ? rfqSortYon : bekSortYon) === -1 ? ' \u25BC' : '')
    : '';
}
function siraliDizi(arr, kolFn, yon) {
  if (!yon) return arr;
  return arr.slice().sort(function(a, b) {
    var va = kolFn(a), vb = kolFn(b);
    var na = parseFloat(va), nb = parseFloat(vb);
    var cmp;
    if (!isNaN(na) && !isNaN(nb)) { cmp = na - nb; }
    else { cmp = String(va || '').localeCompare(String(vb || ''), 'tr'); }
    return cmp * yon;
  });
}

// ── CHECKBOX FONKSIYONLARI ──
function rfqToggleSec(id, checked) {
  if (checked) { if (rfqSeciliIds.indexOf(id) < 0) rfqSeciliIds.push(id); }
  else { rfqSeciliIds = rfqSeciliIds.filter(function(x) { return x !== id; }); }
  rfqSecimGuncelle();
}
function rfqTumunuSec(checked) {
  var chks = document.querySelectorAll('#talepler-icerik .rfq-tablo tbody input[type=checkbox]');
  rfqSeciliIds = [];
  if (checked) { chks.forEach(function(c) { c.checked = true; var m = c.getAttribute('onchange').match(/'([^']+)'/); if (m) rfqSeciliIds.push(m[1]); }); }
  else { chks.forEach(function(c) { c.checked = false; }); }
  rfqSecimGuncelle();
}
function rfqSecimGuncelle() {
  var el = document.getElementById('rfq-secim-info');
  if (el) { el.style.display = rfqSeciliIds.length > 0 ? 'inline' : 'none'; el.textContent = rfqSeciliIds.length + ' secili'; }
}
function bekToggleSec(id, checked) {
  if (checked) { if (bekSeciliIds.indexOf(id) < 0) bekSeciliIds.push(id); }
  else { bekSeciliIds = bekSeciliIds.filter(function(x) { return x !== id; }); }
  bekSecimGuncelle();
}
function bekTumunuSec(checked) {
  var chks = document.querySelectorAll('#bekliyor-icerik .rfq-tablo tbody input[type=checkbox]');
  bekSeciliIds = [];
  if (checked) { chks.forEach(function(c) { c.checked = true; var m = c.getAttribute('onchange').match(/'([^']+)'/); if (m) bekSeciliIds.push(m[1]); }); }
  else { chks.forEach(function(c) { c.checked = false; }); }
  bekSecimGuncelle();
}
function bekSecimGuncelle() {
  var el = document.getElementById('bek-secim-info');
  if (el) { el.style.display = bekSeciliIds.length > 0 ? 'inline' : 'none'; el.textContent = bekSeciliIds.length + ' secili'; }
}

// ── YOGUNLUK CONFIGS ──
var RFQ_YOGUNLUK = {
  '1.4404': 7.98, '1.4571': 7.98, '1.4301': 7.93,
  '316L': 7.98, '304': 7.93, '316': 7.98,
  'St37': 7.85, 'St52': 7.85, 'S235': 7.85, 'S355': 7.85,
  'C45': 7.85, '42CrMo4': 7.85,
  'Al': 2.71, '6061': 2.71, '7075': 2.81,
  'CuZn': 8.47, 'Pirinc': 8.47,
  'Titanyum': 4.51, 'Ti6Al4V': 4.43
};

var RFQ_OLCU = {
  boru:   ['Dis Cap (mm)', 'Et Kalinligi (mm)', 'Boy (mm)'],
  mil:    ['Cap (mm)', 'Boy (mm)'],
  levha:  ['En (mm)', 'Boy (mm)', 'Kalinlik (mm)'],
  profil: ['A (mm)', 'B (mm)', 'Et (mm)', 'Boy (mm)'],
  diger:  ['Olcu / Spec']
};

// ── STATE ──
var rfqState = {
  tip: 'hammadde',
  kalemler: [],
  tedarikciler: [],
  not: '',
  prNo: null,
  editId: null
};

var tedarikciListAll = [];
var seListAll = [];

// ══════════════════════════════════════════
// PAGE-LEVEL DATA LOADING & RENDERING
// ══════════════════════════════════════════

function tedarikciAdiGetir(recIdOrArr) {
  if (!recIdOrArr) return '—';
  var id = Array.isArray(recIdOrArr) ? recIdOrArr[0] : recIdOrArr;
  if (!id) return '—';
  // Eger zaten ad ise (recXXX formatinda degilse) direkt dondur
  if (typeof id === 'string' && id.indexOf('rec') !== 0) return id;
  for (var i = 0; i < tedarikciListAll.length; i++) {
    if (tedarikciListAll[i].id === id) return tedarikciListAll[i].fields['Tedarikçi Adı'] || id;
  }
  return id;
}

function veriYukle() {
  Promise.all([
    apiGet(T_STL, 'pageSize=100&sort%5B0%5D%5Bfield%5D=Talep%20No&sort%5B0%5D%5Bdirection%5D=desc'),
    apiGet(T_MUZ, 'pageSize=100'),
    apiGet(T_TD, 'pageSize=100&fields%5B%5D=Tedarik%C3%A7i%20Ad%C4%B1')
  ]).then(function(results) {
    tumTalepler = results[0].records || [];
    muzakereler = results[1].records || [];
    tedarikciListAll = results[2].records || [];
    kpiGuncelle();
    badgeGuncelle();
    taleplerRender(tumTalepler);
    karsilastirmaRender();
    bekliyorRender();
    onayliRender();
  }).catch(function(e) {
    console.error('Veri yukleme hatasi:', e);
    toast('Veri yuklenemedi', 'err');
  });
}

// ── TAB SWITCHING ──
function setTab(id, el) {
  var btns = document.querySelectorAll('.rfq-tab-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('on'); }
  if (el) el.classList.add('on');

  var panels = document.querySelectorAll('.rfq-panel');
  for (var j = 0; j < panels.length; j++) { panels[j].classList.remove('show'); }
  var panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('show');
}

// ── KPI ──
function kpiGuncelle() {
  var toplam = 0, bekliyor = 0, geldi = 0, onayli = 0;
  var sayilanNolar = {};

  for (var i = 0; i < tumTalepler.length; i++) {
    var f = tumTalepler[i].fields;
    var no = f['Talep No'] || '';
    var durum = f['Durum'] || 'Taslak';

    if (!sayilanNolar[no + '|' + durum]) {
      sayilanNolar[no + '|' + durum] = true;
    }
    toplam++;
    if (durum === 'Gönderildi') bekliyor++;
    else if (durum === 'Teklif Alındı') geldi++;
    else if (durum === 'Onaylandı') onayli++;
  }

  document.getElementById('kpi-toplam').textContent = toplam;
  document.getElementById('kpi-bekliyor').textContent = bekliyor;
  document.getElementById('kpi-geldi').textContent = geldi;
  document.getElementById('kpi-onayli').textContent = onayli;
}

// ── BADGE ──
function badgeGuncelle() {
  var toplam = tumTalepler.length;
  var bekliyor = 0, geldi = 0, onayli = 0;
  for (var i = 0; i < tumTalepler.length; i++) {
    var durum = tumTalepler[i].fields['Durum'] || 'Taslak';
    if (durum === 'Gönderildi') bekliyor++;
    else if (durum === 'Teklif Alındı') geldi++;
    else if (durum === 'Onaylandı') onayli++;
  }
  document.getElementById('tab-badge-talepler').textContent = toplam;
  document.getElementById('tab-badge-karsilastirma').textContent = geldi;
  document.getElementById('tab-badge-bekliyor').textContent = bekliyor;
  document.getElementById('tab-badge-onayli').textContent = onayli;
}

// ══════════════════════════════════════════
// TAB 1 — TALEPLER
// ══════════════════════════════════════════

function taleplerRender(liste) {
  var el = document.getElementById('talepler-icerik');
  if (!el) return;

  if (!liste || liste.length === 0) {
    el.innerHTML = '<div class="rfq-bos"><div class="rfq-bos-icon">&#128203;</div><div class="rfq-bos-title">Henuz RFQ talebi yok</div><div class="rfq-bos-desc">"+ Yeni RFQ" butonuyla ilk talebi olusturun</div></div>';
    return;
  }

  // Gecikme banner
  var gecikmeEl = document.getElementById('talepler-gecikme');
  var bugun = new Date();
  bugun.setHours(0,0,0,0);
  var geciken = 0;
  for (var g = 0; g < liste.length; g++) {
    var gf = liste[g].fields;
    if (gf['Durum'] === 'Gönderildi' && gf['Talep Tarihi']) {
      var talepTarih = new Date(gf['Talep Tarihi']);
      var gun7 = new Date(talepTarih.getTime() + 7 * 86400000);
      if (bugun > gun7) geciken++;
    }
  }
  if (geciken > 0 && gecikmeEl) {
    gecikmeEl.innerHTML = '<div class="rfq-gecikme-banner">&#9888; ' + geciken + ' talep icin 7 gunden fazla yanit bekleniyor!</div>';
  } else if (gecikmeEl) {
    gecikmeEl.innerHTML = '';
  }

  // Gruplama: Talep No bazinda, ayni Talep No altinda kac kalem + kac tedarikci yanit verdi
  var gruplar = {};
  for (var i = 0; i < liste.length; i++) {
    var f = liste[i].fields;
    var no = f['Talep No'] || '(Nosuz-' + liste[i].id.slice(-4) + ')';
    if (!gruplar[no]) {
      gruplar[no] = {
        no: no,
        kalemler: [],
        durum: f['Durum'] || 'Taslak',
        talepTarihi: f['Talep Tarihi'] || '',
        aciliyet: f['Aciliyet'] || 'Normal',
        enDusukFiyat: null,
        yanitSayisi: 0,
        toplamTedarikci: 0
      };
    }
    gruplar[no].kalemler.push(liste[i]);
    if (f['Teklif Fiyatı'] && f['Teklif Fiyatı'] > 0) {
      gruplar[no].yanitSayisi++;
      if (gruplar[no].enDusukFiyat === null || f['Teklif Fiyatı'] < gruplar[no].enDusukFiyat) {
        gruplar[no].enDusukFiyat = f['Teklif Fiyatı'];
      }
    }
    // Tedarikci sayisi: virgullu email alanini say
    var emails = (f['Tedarikçi Email'] || '').split(',').filter(function(e) { return e.trim(); });
    if (emails.length > gruplar[no].toplamTedarikci) gruplar[no].toplamTedarikci = emails.length;
  }

  var noList = Object.keys(gruplar);

  var html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span id="rfq-secim-info" style="font-size:11px;color:var(--metin3);display:none;">0 secili</span></div>';
  html += '<table class="rfq-tablo"><thead><tr>';
  html += '<th style="width:32px;text-align:center"><input type="checkbox" onchange="rfqTumunuSec(this.checked)"></th>';
  html += '<th onclick="rfqSirala(\'no\')">Talep No' + sortOkIsaret('rfq','no') + '</th>';
  html += '<th onclick="rfqSirala(\'kalem\')">Kalem' + sortOkIsaret('rfq','kalem') + '</th>';
  html += '<th onclick="rfqSirala(\'malzeme\')">Malzeme' + sortOkIsaret('rfq','malzeme') + '</th>';
  html += '<th>Tedarikci Durum</th>';
  html += '<th onclick="rfqSirala(\'tarih\')">Talep Tarihi' + sortOkIsaret('rfq','tarih') + '</th>';
  html += '<th onclick="rfqSirala(\'durum\')">Durum' + sortOkIsaret('rfq','durum') + '</th>';
  html += '<th onclick="rfqSirala(\'fiyat\')">En Dusuk Fiyat' + sortOkIsaret('rfq','fiyat') + '</th>';
  html += '<th>Islem</th>';
  html += '</tr></thead><tbody>';

  // Siralama
  var grArr = noList.map(function(k) { return gruplar[k]; });
  if (rfqSortKol && rfqSortYon !== 0) {
    grArr = siraliDizi(grArr, function(gr) {
      if (rfqSortKol === 'no') return gr.no;
      if (rfqSortKol === 'kalem') return gr.kalemler[0] ? (gr.kalemler[0].fields['Kalem Adı'] || '') : '';
      if (rfqSortKol === 'malzeme') return gr.kalemler[0] ? (gr.kalemler[0].fields['Malzeme İşlem'] || '') : '';
      if (rfqSortKol === 'tarih') return gr.talepTarihi || '';
      if (rfqSortKol === 'durum') return gr.durum || '';
      if (rfqSortKol === 'fiyat') return gr.enDusukFiyat || 999999;
      return '';
    }, rfqSortYon);
  }

  for (var n = 0; n < grArr.length; n++) {
    var gr = grArr[n];
    var kalemAdlari = [];
    var malzemeler = [];
    for (var k = 0; k < gr.kalemler.length; k++) {
      var kf = gr.kalemler[k].fields;
      kalemAdlari.push(kf['Kalem Adı'] || '—');
      if (kf['Malzeme İşlem']) malzemeler.push(kf['Malzeme İşlem']);
    }
    var kalemStr = kalemAdlari.length > 2 ? kalemAdlari.slice(0, 2).join(', ') + ' +' + (kalemAdlari.length - 2) : kalemAdlari.join(', ');
    var malzStr = malzemeler.length > 0 ? malzemeler[0] : '—';
    if (malzemeler.length > 1) malzStr += ' +' + (malzemeler.length - 1);

    var aciliyetIcon = '';
    if (gr.aciliyet === 'Kritik') aciliyetIcon = '<span style="color:var(--kirmizi);font-weight:700;" title="Kritik">!!</span> ';
    else if (gr.aciliyet === 'Yüksek') aciliyetIcon = '<span style="color:var(--sari);font-weight:700;" title="Yuksek">!</span> ';

    var tdDurum = gr.yanitSayisi + '/' + (gr.toplamTedarikci || '?');

    var grId = gr.kalemler[0] ? gr.kalemler[0].id : gr.no;
    var grChk = rfqSeciliIds.indexOf(grId) >= 0;
    html += '<tr onclick="talepDetayGoster(\'' + escHtml(gr.no) + '\')">';
    html += '<td style="text-align:center" onclick="event.stopPropagation()"><input type="checkbox" ' + (grChk ? 'checked' : '') + ' onchange="rfqToggleSec(\'' + escHtml(grId) + '\',this.checked)"></td>';
    html += '<td class="mono">' + aciliyetIcon + escHtml(gr.no) + '</td>';
    html += '<td>' + escHtml(kalemStr) + '</td>';
    html += '<td>' + escHtml(malzStr) + '</td>';
    html += '<td>' + tdDurum + ' yanit</td>';
    html += '<td>' + formatTarih(gr.talepTarihi) + '</td>';
    html += '<td>' + durumBadge(gr.durum) + '</td>';
    html += '<td>' + (gr.enDusukFiyat ? '<span class="fiyat-en-dusuk">' + gr.enDusukFiyat.toLocaleString('tr-TR') + ' TL</span>' : '—') + '</td>';
    html += '<td><button class="btn btn-beyaz btn-sm" onclick="event.stopPropagation();talepDetayGoster(\'' + escHtml(gr.no) + '\')">Detay</button></td>';
    html += '</tr>';
  }

  html += '</tbody></table>';
  el.innerHTML = html;
}

function talepDetayGoster(no) {
  // Switch to comparison tab if there are bids, otherwise just highlight
  var hasTeklif = false;
  for (var i = 0; i < tumTalepler.length; i++) {
    var f = tumTalepler[i].fields;
    if ((f['Talep No'] || '') === no && f['Teklif Fiyatı'] && f['Teklif Fiyatı'] > 0) {
      hasTeklif = true;
      break;
    }
  }
  if (hasTeklif) {
    seciliKarsilastirmaNo = no;
    var tabBtn = document.querySelectorAll('.rfq-tab-btn')[1];
    setTab('karsilastirma', tabBtn);
    karsilastirmaRender();
  } else {
    toast(no + ' — detay bilgisi', 'inf');
  }
}

// ══════════════════════════════════════════
// TAB 2 — FIYAT KARSILASTIRMA
// ══════════════════════════════════════════

var cftAktifTd = 0; // pazarlik panelinde secili tedarikci indexi

function karsilastirmaRender() {
  var el = document.getElementById('karsilastirma-icerik');
  if (!el) return;

  // Teklif alindi olan Talep No'lari bul
  var teklifNolar = {};
  for (var i = 0; i < tumTalepler.length; i++) {
    var f = tumTalepler[i].fields;
    var durum = f['Durum'] || '';
    if (durum === 'Teklif Alındı' || (f['Teklif Fiyatı'] && f['Teklif Fiyatı'] > 0)) {
      var no = f['Talep No'] || '';
      if (no && !teklifNolar[no]) {
        teklifNolar[no] = { no: no, kalemler: [] };
      }
      if (no) teklifNolar[no].kalemler.push(tumTalepler[i]);
    }
  }

  var noList = Object.keys(teklifNolar);

  if (noList.length === 0) {
    el.innerHTML = '<div class="rfq-bos"><div class="rfq-bos-icon">&#128200;</div><div class="rfq-bos-title">Karşılaştırılacak teklif yok</div><div class="rfq-bos-desc">Tedarikçilerden teklif geldikçe burada görünecek</div></div>';
    return;
  }

  if (!seciliKarsilastirmaNo || !teklifNolar[seciliKarsilastirmaNo]) {
    seciliKarsilastirmaNo = noList[0];
  }

  var html = '';

  // ── A) CHIP BAR ──
  html += '<div class="cft-chip-bar">';
  for (var n = 0; n < noList.length; n++) {
    var gr = teklifNolar[noList[n]];
    var onCls = (noList[n] === seciliKarsilastirmaNo) ? ' on' : '';
    var ilkF = gr.kalemler[0] ? gr.kalemler[0].fields : {};
    var chipMal = ilkF['Malzeme Cinsi'] || ilkF['Malzeme İşlem'] || ilkF['Kalem Adı'] || '';
    var toplam = 0;
    for (var ci = 0; ci < gr.kalemler.length; ci++) { if (gr.kalemler[ci].fields['Teklif Fiyatı'] > 0) toplam++; }
    html += '<button class="cft-chip' + onCls + '" onclick="seciliKarsilastirmaNo=\'' + escHtml(noList[n]) + '\';cftAktifTd=0;karsilastirmaRender()">';
    html += '<span class="cft-chip-no">' + escHtml(noList[n]) + '</span>';
    html += '<span class="cft-chip-mal">' + escHtml(chipMal) + '</span>';
    html += '<span class="cft-chip-badge">' + toplam + '/' + gr.kalemler.length + '</span>';
    html += '</button>';
  }
  html += '</div>';

  // Secili grup verilerini hazirla
  var seciliGrup = teklifNolar[seciliKarsilastirmaNo];
  if (!seciliGrup) { el.innerHTML = html; return; }

  var teklifler = [];
  var enDusuk = Infinity;
  var enYuksek = 0;
  var enDusukIdx = -1;

  for (var t = 0; t < seciliGrup.kalemler.length; t++) {
    var tf = seciliGrup.kalemler[t].fields;
    var fiyat = tf['Teklif Fiyatı'] || 0;
    var tedarikciAd = tedarikciAdiGetir(tf['Seçilen Tedarikçi']) !== '—' ? tedarikciAdiGetir(tf['Seçilen Tedarikçi']) : (tf['Tedarikçi Email'] || '—');
    teklifler.push({
      id: seciliGrup.kalemler[t].id,
      tedarikci: tedarikciAd,
      kalemAdi: tf['Kalem Adı'] || '',
      malzeme: tf['Malzeme İşlem'] || '',
      malzemeCinsi: tf['Malzeme Cinsi'] || '',
      olcu: tf['Ölçü'] || '',
      tedarikciOlculeri: tf['Tedarikçi Ölçüleri'] || '',
      miktar: tf['Miktar'] || 0,
      birim: tf['Birim'] || '',
      fiyat: fiyat,
      fiyatBirimi: tf['Fiyat Birimi'] || 'TL/kg',
      teslimGun: tf['Teslim Süresi Gün'] || 0,
      vade: tf['Tedarikçi Vade Önerisi'] || '',
      not: tf['Tedarikçi Notu'] || '',
      durum: tf['Durum'] || '',
      yanitTarihi: tf['Yanıt Tarihi'] || ''
    });
    if (fiyat > 0 && fiyat < enDusuk) { enDusuk = fiyat; enDusukIdx = teklifler.length - 1; }
    if (fiyat > enYuksek) { enYuksek = fiyat; }
  }

  // Fiyata gore sirala (dusukten yuksege)
  var siraIdx = [];
  for (var si = 0; si < teklifler.length; si++) siraIdx.push(si);
  siraIdx.sort(function(a, b) {
    var fa = teklifler[a].fiyat || Infinity;
    var fb = teklifler[b].fiyat || Infinity;
    return fa - fb;
  });

  // Ilk kalem bilgisi (ozet icin)
  var ozetF = teklifler[0] || {};

  // ── B) OZET SERIDI ──
  html += '<div class="cft-ozet">';
  html += '<div class="cft-ozet-item"><label>PR No</label><span style="color:#059669;font-family:monospace">' + escHtml(seciliKarsilastirmaNo) + '</span></div>';
  html += '<div class="cft-ozet-item"><label>Kalem</label><span>' + escHtml(ozetF.kalemAdi || '—') + '</span></div>';
  html += '<div class="cft-ozet-item"><label>Malzeme</label><span>' + escHtml(ozetF.malzemeCinsi || ozetF.malzeme || '—') + '</span></div>';
  html += '<div class="cft-ozet-item"><label>Ölçü</label><span>' + escHtml(ozetF.olcu || '—') + '</span></div>';
  html += '<div class="cft-ozet-item"><label>Miktar</label><span>' + (ozetF.miktar || '—') + ' ' + escHtml(ozetF.birim || '') + '</span></div>';
  html += '</div>';

  // ── C) AKIS CUBUGU ──
  var varKazanan = false;
  for (var ak = 0; ak < teklifler.length; ak++) { if (teklifler[ak].durum === 'Onaylandı') varKazanan = true; }
  var adim3Cls = varKazanan ? 'done' : 'active';
  var adim4Cls = varKazanan ? 'done' : '';
  var adim5Cls = '';

  html += '<div class="cft-akis">';
  html += '<div class="cft-akis-step done">RFQ Gönderildi<span>Tamamlandı</span></div>';
  html += '<div class="cft-akis-step done">Teklifler Alındı<span>Tamamlandı</span></div>';
  html += '<div class="cft-akis-step ' + adim3Cls + '">Karşılaştırma<span>' + (varKazanan ? 'Tamamlandı' : 'Devam ediyor') + '</span></div>';
  html += '<div class="cft-akis-step ' + adim4Cls + '">Kazanan Seçimi<span>' + (varKazanan ? 'Tamamlandı' : 'Bekliyor') + '</span></div>';
  html += '<div class="cft-akis-step ' + adim5Cls + '">PO Oluşturuldu<span>—</span></div>';
  html += '</div>';

  // ── D) IKI SUTUN LAYOUT ──
  html += '<div class="cft-iki-sutun">';

  // ── SOL: KARSILASTIRMA TABLOSU (transposed) ──
  html += '<div>';
  html += '<table class="cft-tablo">';

  // Header row — bos + tedarikci sutunlari
  html += '<thead><tr><th class="cft-th-label"></th>';
  for (var hi = 0; hi < siraIdx.length; hi++) {
    var hRow = teklifler[siraIdx[hi]];
    var thCls = 'cft-th-high';
    var thLabel = 'Pahalı';
    if (hi === 0 && hRow.fiyat > 0) { thCls = 'cft-th-best'; thLabel = '★ En Uygun'; }
    else if (hi === siraIdx.length - 1 && siraIdx.length > 2) { thCls = 'cft-th-high'; thLabel = 'Pahalı'; }
    else if (hi > 0) { thCls = 'cft-th-mid'; thLabel = 'Orta'; }
    if (siraIdx.length === 1) { thCls = 'cft-th-best'; thLabel = 'Tek Teklif'; }
    if (siraIdx.length === 2 && hi === 1) { thCls = 'cft-th-high'; thLabel = 'Pahalı'; }
    if (hRow.durum === 'Onaylandı') { thCls = 'cft-th-best'; thLabel = '✓ Kazanan'; }
    html += '<th class="' + thCls + '">' + escHtml(hRow.tedarikci) + '<span class="cft-sub">' + thLabel + '</span></th>';
  }
  html += '</tr></thead><tbody>';

  // Satir: Teklif Edilen Tip
  html += '<tr><td class="cft-th-label">Teklif Edilen Tip</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    html += '<td class="' + bestCls + '">' + escHtml(rr.malzemeCinsi || rr.malzeme || '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Teklif Olculeri
  html += '<tr><td class="cft-th-label">Teklif Ölçüleri</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    html += '<td class="' + bestCls + '">' + escHtml(rr.tedarikciOlculeri || rr.olcu || '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Birim Fiyat
  html += '<tr><td class="cft-th-label">Birim Fiyat</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    var fCls = '';
    if (rr.fiyat > 0 && ri === 0) fCls = ' cft-fiyat-best';
    else if (rr.fiyat > 0 && ri === siraIdx.length - 1 && siraIdx.length > 1) fCls = ' cft-fiyat-worst';
    html += '<td class="' + bestCls + fCls + '">' + (rr.fiyat ? rr.fiyat.toLocaleString('tr-TR') + ' ' + escHtml(rr.fiyatBirimi) : '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Toplam Fiyat
  var enDusukToplam = (enDusuk < Infinity && teklifler[enDusukIdx]) ? enDusuk * (teklifler[enDusukIdx].miktar || 1) : 0;
  html += '<tr><td class="cft-th-label">Toplam Fiyat</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    var toplam = rr.fiyat * (rr.miktar || 1);
    var toplamStr = toplam > 0 ? toplam.toLocaleString('tr-TR') + ' TL' : '—';
    var diffStr = '';
    if (ri > 0 && toplam > 0 && enDusukToplam > 0) {
      var diff = toplam - enDusukToplam;
      if (diff > 0) diffStr = '<span class="cft-diff">+' + diff.toLocaleString('tr-TR') + ' ₺</span>';
    }
    var fCls2 = (ri === 0 && toplam > 0) ? ' cft-fiyat-best' : '';
    html += '<td class="' + bestCls + fCls2 + '" style="' + (ri === 0 ? 'font-size:14px;font-weight:700;' : '') + '">' + toplamStr + diffStr + '</td>';
  }
  html += '</tr>';

  // Satir: Odeme Vadesi
  html += '<tr><td class="cft-th-label">Ödeme Vadesi</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    html += '<td class="' + bestCls + '">' + escHtml(rr.vade ? rr.vade + ' gün' : '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Teslim Suresi
  html += '<tr><td class="cft-th-label">Teslim Süresi</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    html += '<td class="' + bestCls + '">' + (rr.teslimGun ? rr.teslimGun + ' iş günü' : '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Not
  html += '<tr><td class="cft-th-label">Not</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    html += '<td class="' + bestCls + '" style="font-size:11px;">' + escHtml(rr.not || '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Karar butonlari
  html += '<tr><td class="cft-th-label">Karar</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' cft-best-cell' : '';
    html += '<td class="' + bestCls + '">';
    if (rr.durum === 'Onaylandı') {
      html += '<button class="cft-karar-btn kazandi">✓ Kazanan</button>';
    } else if (ri === 0 && rr.fiyat > 0) {
      html += '<button class="cft-karar-btn kazanan" onclick="event.stopPropagation();kazananSec(\'' + rr.id + '\',' + rr.fiyat + ',\'' + escHtml(rr.tedarikci) + '\')">✓ Kazanan Seç → PO</button>';
    } else {
      html += '<button class="cft-karar-btn pazarlik" onclick="cftAktifTd=' + siraIdx[ri] + ';karsilastirmaRender()">Pazarlık Et</button>';
    }
    html += '</td>';
  }
  html += '</tr>';

  html += '</tbody></table>';

  // ── TASARRUF BAR ──
  var tasarrufTutar = (enYuksek > 0 && enDusuk < Infinity) ? (enYuksek - enDusuk) : 0;
  var teklifSayisi = teklifler.length;
  var durumText = varKazanan ? 'Kazanan seçildi' : 'Değerlendirme devam ediyor';
  html += '<div class="cft-tasarruf-bar">';
  html += '<div class="cft-tasarruf-bar-item"><label>Potansiyel Tasarruf</label><span class="val yesil">' + (tasarrufTutar > 0 ? tasarrufTutar.toLocaleString('tr-TR') + ' ₺' : '—') + '</span></div>';
  html += '<div class="cft-tasarruf-bar-item"><label>Teklif Sayısı</label><span class="val mavi">' + teklifSayisi + ' tedarikçi</span></div>';
  html += '<div class="cft-tasarruf-bar-item"><label>Durum</label><span class="val">' + durumText + '</span></div>';
  html += '</div>';

  html += '</div>'; // sol column end

  // ── SAG: PAZARLIK PANELI ──
  if (cftAktifTd >= teklifler.length) cftAktifTd = 0;
  var aktifTek = teklifler[cftAktifTd] || teklifler[0];

  html += '<div class="cft-paz-panel">';
  html += '<div class="cft-paz-head">Pazarlık Paneli</div>';
  html += '<div class="cft-paz-body">';

  // TD tabs
  html += '<div class="cft-paz-tabs">';
  for (var pi = 0; pi < teklifler.length; pi++) {
    var tabOn = (pi === cftAktifTd) ? ' on' : '';
    html += '<button class="cft-paz-tab' + tabOn + '" onclick="cftAktifTd=' + pi + ';karsilastirmaRender()">' + escHtml(teklifler[pi].tedarikci) + '</button>';
  }
  html += '</div>';

  // Mevcut fiyat
  html += '<div class="cft-paz-mevcut">';
  html += '<div class="lbl">' + escHtml(aktifTek.tedarikci) + '</div>';
  html += '<div class="fiyat">' + (aktifTek.fiyat ? aktifTek.fiyat.toLocaleString('tr-TR') + ' ' + escHtml(aktifTek.fiyatBirimi) : '—') + '</div>';
  html += '<div class="detay">' + (aktifTek.vade ? 'Vade: ' + aktifTek.vade + ' gün' : '') + (aktifTek.teslimGun ? ' · Teslim: ' + aktifTek.teslimGun + ' gün' : '') + '</div>';
  html += '</div>';

  // Hedef fiyat
  html += '<label class="cft-lbl">Hedef Fiyat (TL)</label>';
  html += '<input type="number" class="cft-paz-hedef-input" id="paz-hedef-fiyat" placeholder="0.00" oninput="pazTasarrufHesapla(' + (aktifTek.fiyat || 0) + ')">';

  // Tasarruf kutusu
  html += '<div class="cft-paz-tasarruf bos" id="paz-tasarruf">—</div>';

  // Mesaj
  html += '<label class="cft-lbl" style="margin-top:8px;">Mesaj</label>';
  html += '<textarea class="cft-paz-mesaj" id="paz-mesaj" rows="3" placeholder="Pazarlık mesajı..."></textarea>';

  // Muzakere gecmisi
  var ilgiliMuz = muzakereler.filter(function(m) {
    return (m.fields['Talep No'] || '') === seciliKarsilastirmaNo;
  });
  if (ilgiliMuz.length > 0) {
    html += '<div style="font-size:10px;font-weight:600;color:#6b7280;margin-top:10px;margin-bottom:6px;text-transform:uppercase;">Müzakere Geçmişi</div>';
    html += '<div class="cft-paz-gecmis">';
    for (var m = 0; m < ilgiliMuz.length; m++) {
      var mf = ilgiliMuz[m].fields;
      html += '<div class="cft-paz-bubble">';
      html += '<div class="cft-paz-avatar biz">E</div>';
      html += '<div class="cft-paz-bubble-icerik">';
      html += '<div class="tarih">' + formatTarih(mf['Tarih'] || '') + '</div>';
      html += '<div>' + escHtml(mf['Mesaj'] || mf['Not'] || '') + '</div>';
      if (mf['Hedef Fiyat']) html += '<div class="hedef">Hedef: ' + mf['Hedef Fiyat'] + ' TL</div>';
      html += '</div></div>';
    }
    html += '</div>';
  }

  // Footer butonlar
  html += '<div class="cft-paz-footer">';
  html += '<button class="cft-paz-btn primary" onclick="pazarlikKaydet(\'' + escHtml(seciliKarsilastirmaNo) + '\')">Teklif Gönder →</button>';
  html += '<button class="cft-paz-btn secondary" onclick="pazarlikKaydet(\'' + escHtml(seciliKarsilastirmaNo) + '\')">Not Kaydet</button>';
  html += '</div>';

  html += '</div>'; // paz-body
  html += '</div>'; // paz-panel

  html += '</div>'; // cft-iki-sutun

  el.innerHTML = html;
}

function pazTasarrufHesapla(mevcutFiyat) {
  var hedef = parseFloat(document.getElementById('paz-hedef-fiyat').value) || 0;
  var el = document.getElementById('paz-tasarruf');
  if (!el) return;
  if (!mevcutFiyat || !hedef) {
    el.textContent = '—';
    el.className = 'cft-paz-tasarruf bos';
    return;
  }
  var fark = mevcutFiyat - hedef;
  var yuzde = ((fark / mevcutFiyat) * 100).toFixed(1);
  if (fark > 0) {
    el.textContent = fark.toLocaleString('tr-TR') + ' TL tasarruf (%' + yuzde + ')';
    el.className = 'cft-paz-tasarruf pozitif';
  } else {
    el.textContent = 'Hedef mevcut fiyattan yüksek';
    el.className = 'cft-paz-tasarruf negatif';
  }
}

function pazarlikKaydet(talepNo) {
  var hedef = document.getElementById('paz-hedef-fiyat').value || '';
  var mesaj = document.getElementById('paz-mesaj').value || '';
  if (!mesaj && !hedef) { toast('Hedef fiyat veya mesaj girin', 'err'); return; }

  var fields = {
    'Talep No': talepNo,
    'Tarih': new Date().toISOString().split('T')[0]
  };
  if (mesaj) fields['Mesaj'] = mesaj;
  if (hedef) fields['Hedef Fiyat'] = parseFloat(hedef);

  apiPost(T_MUZ, fields).then(function(r) {
    toast('Muzakere kaydedildi');
    if (document.getElementById('paz-mesaj')) document.getElementById('paz-mesaj').value = '';
    if (document.getElementById('paz-hedef-fiyat')) document.getElementById('paz-hedef-fiyat').value = '';
    veriYukle();
  }).catch(function(e) {
    toast('Kayit hatasi: ' + e.message, 'err');
  });
}

function kazananSec(recId, fiyat, tedarikciAd) {
  if (!recId) return;
  // Tedarikci adini record ID'ye cevir (linked record alani)
  var tdRecId = null;
  for (var i = 0; i < tedarikciListAll.length; i++) {
    if ((tedarikciListAll[i].fields['Tedarikçi Adı'] || '') === tedarikciAd) {
      tdRecId = tedarikciListAll[i].id;
      break;
    }
  }
  var fields = {
    'Durum': 'Onaylandı',
    'Onay Fiyatı': fiyat
  };
  if (tdRecId) fields['Seçilen Tedarikçi'] = [tdRecId];
  else if (tedarikciAd && tedarikciAd.indexOf('rec') === 0) fields['Seçilen Tedarikçi'] = [tedarikciAd];
  apiPatch(T_STL, recId, fields).then(function() {
    toast(tedarikciAd + ' kazanan olarak secildi');
    veriYukle();
  }).catch(function(e) {
    toast('Hata: ' + e.message, 'err');
  });
}

function bekliyorRender() {
  var el = document.getElementById('bekliyor-icerik');
  if (!el) return;

  var bekleyenler = tumTalepler.filter(function(r) {
    return (r.fields['Durum'] || '') === 'Gönderildi';
  });

  if (bekleyenler.length === 0) {
    el.innerHTML = '<div class="rfq-bos"><div class="rfq-bos-icon">&#128236;</div><div class="rfq-bos-title">Gonderilmis talep yok</div><div class="rfq-bos-desc">RFQ gonderildikce burada takip edebilirsiniz</div></div>';
    return;
  }

  var bugun = new Date();
  bugun.setHours(0,0,0,0);

  var html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span id="bek-secim-info" style="font-size:11px;color:var(--metin3);display:none;">0 secili</span></div>';
  html += '<table class="rfq-tablo"><thead><tr>';
  html += '<th style="width:32px;text-align:center"><input type="checkbox" onchange="bekTumunuSec(this.checked)"></th>';
  html += '<th onclick="bekSirala(\'no\')">Talep No' + sortOkIsaret('bek','no') + '</th>';
  html += '<th onclick="bekSirala(\'kalem\')">Kalem' + sortOkIsaret('bek','kalem') + '</th>';
  html += '<th onclick="bekSirala(\'malzeme\')">Malzeme' + sortOkIsaret('bek','malzeme') + '</th>';
  html += '<th onclick="bekSirala(\'tedarikci\')">Tedarikci' + sortOkIsaret('bek','tedarikci') + '</th>';
  html += '<th onclick="bekSirala(\'tarih\')">Gonderim Tarihi' + sortOkIsaret('bek','tarih') + '</th>';
  html += '<th onclick="bekSirala(\'bekleme\')">Bekleme (Gun)' + sortOkIsaret('bek','bekleme') + '</th>';
  html += '<th>Durum</th>';
  html += '</tr></thead><tbody>';

  // Siralama
  var bekSirali = bekleyenler.slice();
  if (bekSortKol && bekSortYon !== 0) {
    var bugunMs = bugun.getTime();
    bekSirali = siraliDizi(bekSirali, function(r) {
      var bf = r.fields;
      if (bekSortKol === 'no') return bf['Talep No'] || '';
      if (bekSortKol === 'kalem') return bf['Kalem Adı'] || '';
      if (bekSortKol === 'malzeme') return bf['Malzeme İşlem'] || '';
      if (bekSortKol === 'tedarikci') return bf['Tedarikçi Email'] || '';
      if (bekSortKol === 'tarih') return bf['Talep Tarihi'] || '';
      if (bekSortKol === 'bekleme') { var t = bf['Talep Tarihi'] ? new Date(bf['Talep Tarihi']) : null; return t ? Math.floor((bugunMs - t.getTime()) / 86400000) : 0; }
      return '';
    }, bekSortYon);
  }

  for (var i = 0; i < bekSirali.length; i++) {
    var f = bekSirali[i].fields;
    var talepTarih = f['Talep Tarihi'] ? new Date(f['Talep Tarihi']) : null;
    var beklemeGun = talepTarih ? Math.floor((bugun - talepTarih) / 86400000) : 0;
    var gecikmi = beklemeGun > 7;

    var bekId = bekSirali[i].id;
    var bekChk = bekSeciliIds.indexOf(bekId) >= 0;
    html += '<tr style="' + (gecikmi ? 'background:#fef2f2;' : '') + '">';
    html += '<td style="text-align:center"><input type="checkbox" ' + (bekChk ? 'checked' : '') + ' onchange="bekToggleSec(\'' + bekId + '\',this.checked)"></td>';
    html += '<td class="mono">' + escHtml(f['Talep No'] || '—') + '</td>';
    html += '<td>' + escHtml(f['Kalem Adı'] || '—') + '</td>';
    html += '<td>' + escHtml(f['Malzeme İşlem'] || '—') + '</td>';
    html += '<td>' + escHtml(f['Tedarikçi Email'] || '—') + '</td>';
    html += '<td>' + formatTarih(f['Talep Tarihi']) + '</td>';
    html += '<td>' + (gecikmi ? '<span style="color:var(--kirmizi);font-weight:600;">' + beklemeGun + ' gun !</span>' : beklemeGun + ' gun') + '</td>';
    html += '<td>' + durumBadge('Gönderildi') + '</td>';
    html += '</tr>';
  }

  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── TEDARIKCI & SE LISTESI YUKLE ──
function rfqVerileriYukle() {
  return Promise.all([
    apiGet(T_TD, 'pageSize=100'),
    apiGet(T_SE, 'pageSize=100')
  ]).then(function(results) {
    tedarikciListAll = (results[0].records || []);
    seListAll = (results[1].records || []);
    rfqTdSelectDoldur();
  }).catch(function(e) {
    console.error('RFQ veri yukleme hatasi:', e);
  });
}

function rfqTdSelectDoldur() {
  var sel = document.getElementById('rfq-td-select');
  if (!sel) return;
  var html = '<option value="">— Tedarikci secin —</option>';
  for (var i = 0; i < tedarikciListAll.length; i++) {
    var t = tedarikciListAll[i];
    var ad = (t.fields['Tedarikçi Adı'] || '').replace(/"/g, '&quot;');
    var email = t.fields['E-posta'] || '';
    html += '<option value="' + t.id + '" data-ad="' + ad + '" data-email="' + email + '">' + ad + (email ? ' (' + email + ')' : ' (e-posta yok)') + '</option>';
  }
  sel.innerHTML = html;
}

// ── MODAL AC / KAPAT ──
function rfqModalAc(opts) {
  opts = opts || {};
  rfqState.tip = 'hammadde';
  rfqState.kalemler = [];
  rfqState.tedarikciler = [];
  rfqState.not = '';
  rfqState.prNo = opts.prNo || null;
  rfqState.editId = null;

  // Tip butonlarini sifirla
  var tipBtns = document.querySelectorAll('.rfq-tip-btn');
  for (var i = 0; i < tipBtns.length; i++) {
    tipBtns[i].classList.remove('secili');
    if (i === 0) tipBtns[i].classList.add('secili');
    tipBtns[i].style.opacity = '';
    tipBtns[i].style.pointerEvents = '';
  }

  document.getElementById('rfq-not').value = '';
  document.getElementById('rfq-modal-title').textContent = opts.prNo ? 'RFQ Talebi — PR: ' + opts.prNo : 'Yeni RFQ Talebi';

  rfqVerileriYukle().then(function() {
    // PR varsa, ilgili talepleri otomatik yukle
    if (opts.prNo) {
      rfqPRKalemleriYukle(opts.prNo);
    }
    // PR'dan gelen tip varsa otomatik sec ve butonlari kilitle
    if (opts.talepTipiSabit) {
      var sabitTip = opts.talepTipiSabit.toLowerCase();
      if (sabitTip === 'fason') { rfqState.tip = 'fason'; }
      else { rfqState.tip = 'hammadde'; }
      var tipBtns2 = document.querySelectorAll('.rfq-tip-btn');
      for (var j = 0; j < tipBtns2.length; j++) {
        tipBtns2[j].classList.remove('secili');
        if (tipBtns2[j].dataset.tip === rfqState.tip) tipBtns2[j].classList.add('secili');
        // PR'dan geliyorsa tip degistirmeyi engelle
        tipBtns2[j].style.opacity = '0.5';
        tipBtns2[j].style.pointerEvents = 'none';
      }
    }
  });

  rfqTalepGridRender();
  rfqTdListRender();
  rfqTeklifDonukRender();
  document.getElementById('rfq-modal-backdrop').classList.add('acik');
}

function rfqModalKapat() {
  document.getElementById('rfq-modal-backdrop').classList.remove('acik');
  // Sayfa verisini yenile
  veriYukle();
}

// ── PR KALEMLERI YUKLE ──
function rfqPRKalemleriYukle(prNo) {
  apiGet(T_STL, 'filter=' + encodeURIComponent("{Talep No}='" + prNo + "'")).then(function(d) {
    var recs = d.records || [];
    for (var i = 0; i < recs.length; i++) {
      var f = recs[i].fields;
      rfqState.kalemler.push({
        id: recs[i].id,
        ad: f['Kalem Adı'] || '',
        malzeme: f['Malzeme İşlem'] || '',
        olcu: f['Ölçü'] || '',
        miktar: f['Miktar'] || 0,
        birim: f['Birim'] || 'Adet',
        kg: f['Tahmini kg'] || 0,
        seId: (f['SE No'] || [])[0] || ''
      });
    }
    rfqTalepGridRender();
  }).catch(function(e) {
    console.error('PR kalemleri yukleme hatasi:', e);
  });
}

// ── TIP DEGIS ──
function rfqTipDegis(tip, btn) {
  rfqState.tip = tip;
  var btns = document.querySelectorAll('.rfq-tip-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('secili'); }
  btn.classList.add('secili');
}

// ── TEDARIKCI EKLEME ──
function rfqTdEkle() {
  var sel = document.getElementById('rfq-td-select');
  if (!sel || !sel.value) { toast('Tedarikci secin', 'err'); return; }
  var opt = sel.options[sel.selectedIndex];
  var id = sel.value;
  var ad = opt.getAttribute('data-ad') || '';
  var email = opt.getAttribute('data-email') || '';

  // Zaten eklenmis mi?
  for (var i = 0; i < rfqState.tedarikciler.length; i++) {
    if (rfqState.tedarikciler[i].id === id) {
      toast('Bu tedarikci zaten eklendi', 'inf');
      return;
    }
  }

  rfqState.tedarikciler.push({id: id, ad: ad, email: email});
  sel.value = '';
  rfqTdListRender();
}

  var el = document.getElementById('rfq-td-list');

    el.innerHTML = '<span style="font-size:11px;color:var(--metin4);">Henuz tedarikci eklenmedi</span>';

  for (var i = 0; i < rfqState.tedarikciler.length; i++) {

function rfqGrupListeRender(kayitlar) {
  var liste = document.getElementById('rfq-grup-liste');

  var html = '';
  for (var i = 0; i < kayitlar.length; i++) {
    var r = kayitlar[i];

function rfqGrupFiltre() {
  var q = (document.getElementById('rfq-grup-arama').value || '').toLowerCase();
  if (!q) {
    rfqGrupListeRender(seListAll);
    return;
  }
  var filtered = seListAll.filter(function(r) {
    var f = r.fields;
    return (f['SE No'] || '').toLowerCase().indexOf(q) >= 0 ||
           (f['Parça Adı'] || '').toLowerCase().indexOf(q) >= 0;
  });
  rfqGrupListeRender(filtered);
}

// ── TASLAK KAYDET ──
function rfqTaslakKaydet() {
  if (rfqState.kalemler.length === 0) {
    toast('En az bir kalem ekleyin', 'err');
    return;
  }

  var btn = document.getElementById('rfq-taslak-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Kaydediliyor...'; }

  var promises = [];
  for (var i = 0; i < rfqState.kalemler.length; i++) {
    var k = rfqState.kalemler[i];
    var fields = {
      'Kalem Adı': k.ad,
      'Malzeme İşlem': k.malzeme,
      'Ölçü': k.olcu,
      'Miktar': k.miktar,
      'Birim': k.birim,
      'Tahmini kg': k.kg,
      'Talep Tipi': rfqState.tip === 'hammadde' ? 'Hammadde' : 'Fason',
      'Durum': 'Taslak'
    };
    if (k.seId) fields['SE No'] = [k.seId];

    if (k.id) {
      promises.push(apiPatch(T_STL, k.id, fields));
    } else {
      promises.push(apiPost(T_STL, fields));
    }
  }

  Promise.all(promises).then(function() {
    toast('Taslak kaydedildi (' + rfqState.kalemler.length + ' kalem)');
    if (btn) { btn.disabled = false; btn.textContent = 'Taslak Kaydet'; }
    if (typeof logIslem === 'function') {
      logIslem('Taslak', 'RFQ', '', rfqState.kalemler.length + ' kalem', null, {tip: rfqState.tip});
    }
  }).catch(function(e) {
    toast('Kayit hatasi: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Taslak Kaydet'; }
  });
}

// ── RFQ GONDER ──
function rfqGonder() {
  if (rfqState.kalemler.length === 0) {
    toast('En az bir kalem ekleyin', 'err');
    return;
  }
  if (rfqState.tedarikciler.length === 0) {
    toast('En az bir tedarikci secin', 'err');
    return;
  }

  // E-postasi olan var mi kontrol et
  var emailliTd = rfqState.tedarikciler.filter(function(t) { return t.email; });
  if (emailliTd.length === 0) {
    toast('Secilen tedarikcilerin e-posta adresi yok', 'err');
    return;
  }

  var btn = document.getElementById('rfq-gonder-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Gonderiliyor...'; }

  var notText = (document.getElementById('rfq-not') || {}).value || '';
  var emails = [];
  var adlar = [];
  for (var i = 0; i < rfqState.tedarikciler.length; i++) {
    if (rfqState.tedarikciler[i].email) emails.push(rfqState.tedarikciler[i].email);
    adlar.push(rfqState.tedarikciler[i].ad);
  }

  // Oncelikle kodUret ile RFQ kodu al
  var rfqKod = '';
  var kodPromise;
  if (typeof kodUret === 'function') {
    kodPromise = kodUret('RFQ').then(function(kod) { rfqKod = kod; });
  } else {
    rfqKod = 'RFQ-' + Date.now();
    kodPromise = Promise.resolve();
  }

  kodPromise.then(function() {
    var token = Date.now() + '-' + Math.random().toString(36).slice(2, 9);

    // Her kalem icin STL kaydini guncelle veya olustur
    var promises = [];
    for (var i = 0; i < rfqState.kalemler.length; i++) {
      var k = rfqState.kalemler[i];
      var fields = {
        'Kalem Adı': k.ad,
        'Malzeme İşlem': k.malzeme,
        'Ölçü': k.olcu,
        'Miktar': k.miktar,
        'Birim': k.birim,
        'Tahmini kg': k.kg,
        'Talep Tipi': rfqState.tip === 'hammadde' ? 'Hammadde' : 'Fason',
        'Durum': 'Gönderildi',
        'Tedarikçi Email': emails.join(', '),
        'Token': token,
        'Talep No': rfqKod
      };
      if (k.seId) fields['SE No'] = [k.seId];

      if (k.id) {
        promises.push(apiPatch(T_STL, k.id, fields));
      } else {
        promises.push(apiPost(T_STL, fields));
      }
    }

    return Promise.all(promises);
  }).then(function() {
    toast(adlar.length + ' tedarikciye RFQ gonderildi: ' + rfqKod, 'ok');
    if (btn) { btn.disabled = false; btn.textContent = 'RFQ Gonder'; }
    if (typeof logIslem === 'function') {
      logIslem('Gönderildi', 'RFQ', rfqKod, adlar.join(', '), null, {kalemSayi: rfqState.kalemler.length, tedarikciler: adlar});
    }
    setTimeout(function() { rfqModalKapat(); }, 1500);
  }).catch(function(e) {
    toast('Gonderim hatasi: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'RFQ Gonder'; }
  });
}
