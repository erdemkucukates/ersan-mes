<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Satinalma Teklifleri</title>
<link rel="stylesheet" href="utils/sidebar.css">
<link rel="stylesheet" href="ersan_styles.css">
<script src="utils/sidebar.js" defer></script>
<script src="ersan_log.js" defer></script>
<style>
/* ── RFQ MODAL ── */
.rfq-modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,39,68,0.55);
  z-index: 600;
  align-items: flex-start;
  justify-content: center;
  padding-top: 40px;
  overflow-y: auto;
}
.rfq-modal-backdrop.acik { display: flex; }

.rfq-modal {
  background: var(--beyaz);
  border-radius: 12px;
  width: 96%;
  max-width: 900px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin-bottom: 40px;
}
.rfq-modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--beyaz);
  z-index: 2;
  border-radius: 12px 12px 0 0;
}
.rfq-modal-head-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--laci);
}
.rfq-modal-body { padding: 20px; }
.rfq-modal-foot {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  position: sticky;
  bottom: 0;
  background: var(--beyaz);
  border-radius: 0 0 12px 12px;
}

/* ── TALEP BLOK ── */
.rfq-talep-blok {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
  background: var(--bg2);
  position: relative;
}
.rfq-talep-blok-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.rfq-talep-blok-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--laci);
}
.rfq-talep-blok-sil {
  background: none;
  border: none;
  color: var(--kirmizi);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
}
.rfq-talep-blok-sil:hover { background: var(--kirmizi-bg); }

/* ── TEKLIF DONUK (frozen ref) ── */
.rfq-teklif-blok-frozen {
  border: 1px solid #bbf7d0;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: #f0fdf4;
}
.rfq-teklif-blok-frozen .label {
  font-size: 10px;
  font-weight: 600;
  color: var(--metin3);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.rfq-teklif-blok-frozen .val {
  font-size: 13px;
  font-weight: 500;
  color: var(--metin);
}

/* ── TEDARIKCI LISTESI ── */
.rfq-td-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.rfq-td-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 11px;
  font-weight: 500;
  background: var(--mavi-acik);
  color: var(--mavi-koyu);
}
.rfq-td-chip .sil-x {
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: var(--mavi);
  margin-left: 2px;
}
.rfq-td-chip .sil-x:hover { color: var(--kirmizi); }

/* ── TIP SELECTOR ── */
.rfq-tip-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.rfq-tip-btn {
  flex: 1;
  padding: 8px 12px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--beyaz);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--metin2);
  text-align: center;
  transition: all .15s;
  font-family: inherit;
}
.rfq-tip-btn.secili {
  border-color: var(--mavi);
  background: var(--mavi-acik);
  color: var(--mavi-koyu);
  font-weight: 600;
}

/* ── OLCU GRID ── */
.rfq-olcu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.rfq-olcu-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.rfq-olcu-item label {
  font-size: 10px;
  font-weight: 600;
  color: var(--metin3);
  text-transform: uppercase;
}
.rfq-olcu-item input {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
  font-family: inherit;
  color: var(--metin2);
}
.rfq-olcu-item input:focus {
  outline: none;
  border-color: var(--mavi);
}

/* ── SECTION HEADER ── */
.rfq-section-header {
  font-size: 12px;
  font-weight: 600;
  color: var(--laci);
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 8px 8px 0 0;
  border-bottom: none;
  margin-bottom: 0;
}
.tab-btn {
  flex: 1;
  padding: 10px 8px;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border: none;
  background: transparent;
  color: #6b7280;
  border-bottom: 2px solid transparent;
  transition: all .12s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-family: inherit;
}
.tab-btn.on { color: #1a2b47; border-bottom-color: #1a2b47; background: #f8faff; }
.tab-btn:hover:not(.on) { background: #f9fafb; }
.tab-count { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
.tc-amr { background: #fef3c7; color: #92400e; }
.tc-grn { background: #d1fae5; color: #065f46; }
.tc-blu { background: #dbeafe; color: #1e40af; }
.tc-nvy { background: #1a2b47; color: #fff; }

/* ── PANEL SHOW/HIDE ── */
.panel { display: none; background: #fff; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px; }
.panel.show { display: block; }

/* ── TALEPLER TABLE ── */
.tbl { overflow: hidden; }
.tbl table { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; background: #f9fafb; border-bottom: 1px solid #e5e7eb; user-select: none; }
.tbl th[onclick] { cursor: pointer; }
.tbl th[onclick]:hover { background: #e5e7eb; color: #1a2b47; }
.tbl td { padding: 9px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #fafafa; cursor: pointer; }
.tbl tr.late-row td { background: #fff8f8; }
.mono { font-family: monospace; font-size: 11px; font-weight: 700; color: #1a2b47; }
.muted { color: #6b7280; font-size: 11px; }
.bdg { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
.bdg::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.b-recv::before { background: #10b981; } .b-recv { background: #d1fae5; color: #065f46; }
.b-wait::before { background: #f59e0b; } .b-wait { background: #fef3c7; color: #92400e; }
.b-late::before { background: #ef4444; } .b-late { background: #fee2e2; color: #991b1b; }
.b-send::before { background: #3b82f6; } .b-send { background: #dbeafe; color: #1e40af; }
.b-taslak::before { background: #9ca3af; } .b-taslak { background: #f3f4f6; color: #6b7280; }
.b-onay::before { background: #10b981; } .b-onay { background: #d1fae5; color: #065f46; }
.act-btn { font-size: 10px; padding: 3px 9px; border-radius: 4px; border: 1px solid; cursor: pointer; white-space: nowrap; font-weight: 500; background: none; font-family: inherit; }
.ab-g { border-color: #6ee7b7; color: #065f46; background: #d1fae5; }
.ab-b { border-color: #93c5fd; color: #1e40af; background: #dbeafe; }
.ab-gray { border-color: #d1d5db; color: #6b7280; background: #f9fafb; }
.mini-bdg { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 500; display: inline-block; margin-right: 2px; }
.mb-g { background: #d1fae5; color: #065f46; }
.mb-a { background: #fef3c7; color: #92400e; }
.mb-gray { background: #f3f4f6; color: #6b7280; }

/* ── GECIKME BANNER ── */
.late-banner { background: #fee2e2; border-bottom: 1px solid #fca5a5; padding: 8px 16px; font-size: 11px; color: #991b1b; display: flex; align-items: center; gap: 8px; }
.late-dot { width: 6px; height: 6px; border-radius: 50%; background: #dc2626; flex-shrink: 0; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

/* ═══════════════════════════════════
   SEKME 2: FİYAT KARŞILAŞTIRMA
═══════════════════════════════════ */

/* RFQ seçici şerit */
.rfq-serit { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; background: #fafafa; flex-wrap: wrap; }
.rfq-serit-label { font-size: 11px; color: #6b7280; font-weight: 500; flex-shrink: 0; }
.rfq-chip { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; transition: all .12s; color: #6b7280; display: flex; align-items: center; gap: 5px; font-family: inherit; }
.rfq-chip .chip-no { font-family: monospace; font-size: 10px; font-weight: 700; }
.rfq-chip .chip-st { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
.rfq-chip.on { background: #1a2b47; color: #fff; border-color: #1a2b47; }
.rfq-chip.on .chip-st { background: rgba(255,255,255,.2); color: #fff; }
.rfq-chip:hover:not(.on) { background: #f3f4f6; border-color: #d1d5db; }
.chip-recv { background: #d1fae5; color: #065f46; }
.chip-part { background: #fef3c7; color: #92400e; }

/* Talep özet */
.talep-ozet { display: grid; grid-template-columns: repeat(5,1fr); gap: 0; border-bottom: 1px solid #e5e7eb; }
.to-item { padding: 10px 16px; border-right: 1px solid #f3f4f6; }
.to-item:last-child { border-right: none; }
.to-item label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #9ca3af; display: block; margin-bottom: 3px; }
.to-item span { font-size: 12px; font-weight: 500; color: #111827; }

/* Durum bar */
.durum-bar { display: flex; border-bottom: 1px solid #e5e7eb; }
.db-step { flex: 1; padding: 7px 10px; text-align: center; font-size: 10px; font-weight: 500; color: #9ca3af; border-right: 1px solid #f3f4f6; position: relative; }
.db-step:last-child { border-right: none; }
.db-step.done { background: #f0fdf4; color: #065f46; }
.db-step.done::after { content: '\2713'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; }
.db-step.active { background: #1a2b47; color: #fff; }
.db-step .sn { font-size: 9px; font-weight: 400; display: block; opacity: .7; margin-top: 1px; }

/* İki kolon layout */
.cft-layout { display: grid; grid-template-columns: 1fr 290px; gap: 0; min-height: 500px; }
.cft-sol { border-right: 1px solid #e5e7eb; overflow: hidden; }
.cft-sag { overflow: hidden; }

/* Karşılaştırma tablosu */
.cft-tablo-head { padding: 10px 16px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; background: #fafafa; }
.cft-th-title { font-size: 12px; font-weight: 600; color: #374151; }
.cft-th-sub { font-size: 10px; color: #6b7280; margin-top: 1px; }
.sort-sel { font-size: 11px; padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 5px; background: #fff; cursor: pointer; color: #374151; outline: none; }

.cft-table { width: 100%; border-collapse: collapse; }
.cft-table th { padding: 10px 12px; font-size: 11px; font-weight: 600; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #f3f4f6; text-align: center; vertical-align: bottom; }
.cft-table th:first-child { text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; background: #f9fafb; width: 140px; font-weight: 500; border-right: 1px solid #e5e7eb; }
.cft-table th:last-child { border-right: none; }
.cft-table .th-best { background: #065f46; color: #fff; }
.cft-table .th-mid { background: #1e40af; color: #fff; }
.cft-table .th-high { background: #6b7280; color: #fff; }
.th-badge { font-size: 9px; font-weight: 400; display: block; opacity: .8; margin-top: 2px; }
.th-star { font-size: 11px; }

.cft-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; border-right: 1px solid #f3f4f6; text-align: center; font-size: 12px; vertical-align: middle; }
.cft-table td:first-child { text-align: left; font-size: 11px; color: #6b7280; background: #fafafa; font-weight: 500; border-right: 1px solid #e5e7eb; padding-left: 16px; }
.cft-table td:last-child { border-right: none; }
.cft-table tr:last-child td { border-bottom: none; }

.td-best { background: #f0fdf4; font-weight: 700; color: #065f46; }
.td-mid { color: #111827; }
.td-high { color: #dc2626; }
.diff { display: block; font-size: 9px; margin-top: 2px; font-weight: 400; }
.diff-g { color: #10b981; } .diff-r { color: #dc2626; } .diff-n { color: #6b7280; }
.warn-cell { color: #d97706; }

.ozet-row td { background: #f9fafb; font-weight: 600; border-top: 2px solid #e5e7eb; }
.ozet-row td:first-child { color: #374151; font-size: 11px; }

.sec-row td { padding: 10px 12px; border-top: 1px solid #e5e7eb; }
.sec-row td:first-child { font-size: 10px; color: #9ca3af; }

/* Tasarruf özeti alt bar */
.tasarruf-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; border-top: 1px solid #e5e7eb; }
.tb-item { padding: 10px 16px; text-align: center; border-right: 1px solid #f3f4f6; }
.tb-item:last-child { border-right: none; }
.tb-item label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #9ca3af; display: block; margin-bottom: 3px; }
.tb-item .tv { font-size: 16px; font-weight: 700; }
.tb-item .ts { font-size: 10px; color: #9ca3af; margin-top: 2px; }
.tv-grn { color: #065f46; } .tv-blu { color: #1e40af; } .tv-ok { color: #374151; }

/* Pazarlık paneli */
.pazar-head { background: #1a2b47; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.pazar-head .pt { font-size: 12px; font-weight: 600; color: #fff; }
.pazar-head .ps { font-size: 10px; color: rgba(255,255,255,.55); margin-top: 1px; }

.td-selector { display: flex; border-bottom: 1px solid #e5e7eb; }
.td-sel-btn { flex: 1; padding: 7px 6px; font-size: 11px; text-align: center; cursor: pointer; border: none; background: transparent; color: #6b7280; border-bottom: 2px solid transparent; font-weight: 500; transition: all .1s; font-family: inherit; }
.td-sel-btn.on { color: #1a2b47; border-bottom-color: #1a2b47; background: #f8faff; }
.td-sel-btn:hover:not(.on) { background: #f9fafb; }

.pazar-body { padding: 12px; }
.p-sec { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #9ca3af; margin-bottom: 7px; padding-bottom: 4px; border-bottom: 1px solid #f3f4f6; }

.fiyat-kutu { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 9px 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.fk-left label { font-size: 10px; color: #6b7280; display: block; margin-bottom: 2px; font-weight: 500; }
.fk-left span { font-size: 11px; color: #9ca3af; }
.fk-right .fk-val { font-size: 16px; font-weight: 700; color: #111827; text-align: right; }
.fk-right .fk-sub { font-size: 10px; color: #9ca3af; text-align: right; }

.hedef-grid { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 8px; align-items: end; }
.h-inp-wrap label { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
.h-inp { width: 100%; font-size: 14px; font-weight: 700; padding: 7px 10px; border: 1px solid #93c5fd; border-radius: 6px; background: #eff6ff; color: #1e40af; outline: none; text-align: center; box-sizing: border-box; }
.h-inp:focus { border-color: #1a2b47; background: #fff; }

.tasarruf-box { background: #f0fdf4; border: 1px solid #6ee7b7; border-radius: 6px; padding: 7px 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.tasarruf-box.none { background: #fff8f8; border-color: #fca5a5; }
.ts-label { font-size: 11px; color: #065f46; font-weight: 500; }
.ts-val { font-size: 14px; font-weight: 700; color: #065f46; }
.tasarruf-box.none .ts-label, .tasarruf-box.none .ts-val { color: #991b1b; }

.not-inp { width: 100%; font-size: 12px; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #374151; outline: none; resize: none; font-family: inherit; min-height: 52px; box-sizing: border-box; }
.not-inp:focus { border-color: #1a2b47; }

.gecmis-area { padding: 10px 12px; border-top: 1px solid #f3f4f6; }
.gecmis-sec { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #9ca3af; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #f3f4f6; }

.pg-item { display: flex; gap: 7px; margin-bottom: 8px; }
.pg-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.av-biz { background: #1a2b47; color: #fff; } .av-td { background: #dbeafe; color: #1e40af; }
.pg-bbl { flex: 1; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 7px 10px; }
.pg-bbl.biz { background: #eef2ff; border-color: #c7d2fe; }
.pg-name { font-size: 10px; font-weight: 600; color: #374151; margin-bottom: 2px; }
.pg-text { font-size: 11px; color: #374151; line-height: 1.4; }
.pg-time { font-size: 9px; color: #9ca3af; margin-top: 3px; }

.pazar-btns { padding: 8px 12px; border-top: 1px solid #e5e7eb; display: flex; gap: 6px; background: #fafafa; }
.pazar-btns .btn { flex: 1; font-size: 11px; padding: 5px 8px; }

.kazanan-kutu { padding: 10px 12px; border-top: 1px solid #e5e7eb; background: #f0fdf4; }
.kz-title { font-size: 11px; font-weight: 600; color: #065f46; margin-bottom: 6px; }

/* Karar butonlari */
.cft-karar-btn {
  padding: 5px 12px;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.cft-karar-btn.kazanan { background: #059669; color: #fff; }
.cft-karar-btn.kazanan:hover { background: #047857; }
.cft-karar-btn.pazarlik { background: #f59e0b; color: #fff; }
.cft-karar-btn.pazarlik:hover { background: #d97706; }
.cft-karar-btn.kazandi { background: #d1fae5; color: #065f46; cursor: default; }

/* Button utils */
.btn { font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; color: #374151; cursor: pointer; font-weight: 500; transition: all .12s; font-family: inherit; }
.btn:hover { background: #f9fafb; }
.btn-p { background: #1a2b47; color: #fff; border-color: #1a2b47; }
.btn-p:hover { background: #243d66; }
.btn-g { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
.btn-g:hover { background: #a7f3d0; }

/* ── ONAY KART ── */
.rfq-onay-kart {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: var(--beyaz);
  display: flex;
  align-items: center;
  gap: 16px;

// ── API HELPERS ──
function apiGet(tablo, query) {
  var url = '/.netlify/functions/airtable?table=' + encodeURIComponent(tablo);
  if (query) url += '&' + query;
  return fetch(url).then(function(r) { return r.json(); });
}
function apiPost(tablo, fields) {
  return fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({method:'POST', path:'/v0/' + BASE + '/' + encodeURIComponent(tablo), body:{fields:fields}})
  }).then(function(r) { return r.json(); });
}
function apiPatch(tablo, id, fields) {
  return fetch('/.netlify/functions/airtable', {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({table: tablo, id: id, fields: fields})
  }).then(function(r) { return r.json(); });
}

// ── HELPERS ──
function toast(msg, type) {
  type = type || 'ok';
  var el = document.createElement('div');
  el.style.cssText = 'padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;margin-top:8px;opacity:0;transform:translateY(10px);transition:all .3s;';
  el.style.background = type === 'err' ? 'var(--kirmizi)' : type === 'inf' ? 'var(--mavi)' : 'var(--yesil)';
  el.textContent = msg;
  var wrap = document.getElementById('toast-wrap');
  if (wrap) wrap.appendChild(el);
  setTimeout(function() { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }, 50);
  setTimeout(function() { el.remove(); }, 3500);
}

function durumBadge(durum) {
  var cls = 'badge-gri';
  if (durum === 'Gönderildi') cls = 'badge-mavi';
  else if (durum === 'Teklif Alındı') cls = 'badge-sari';
  else if (durum === 'Onaylandı') cls = 'badge-yesil';
  else if (durum === 'İptal') cls = 'badge-kirmizi';
  else if (durum === 'Taslak') cls = 'badge-gri';
  return '<span class="badge ' + cls + '">' + (durum || 'Taslak') + '</span>';
}

function formatTarih(str) {
  if (!str) return '—';
  var d = new Date(str);
  if (isNaN(d.getTime())) return str;
  var g = ('0' + d.getDate()).slice(-2);
  var a = ('0' + (d.getMonth() + 1)).slice(-2);
  return g + '.' + a + '.' + d.getFullYear();
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── SIRALAMA FONKSIYONLARI ──
function rfqSirala(kol) {
  if (rfqSortKol === kol) { rfqSortYon = rfqSortYon === 1 ? -1 : rfqSortYon === -1 ? 0 : 1; }
  else { rfqSortKol = kol; rfqSortYon = 1; }
  taleplerRender(tumTalepler);
}
function bekSirala(kol) {
  if (bekSortKol === kol) { bekSortYon = bekSortYon === 1 ? -1 : bekSortYon === -1 ? 0 : 1; }
  else { bekSortKol = kol; bekSortYon = 1; }
  bekliyorRender();
}
function sortOkIsaret(prefix, kol) {
  return (prefix === 'rfq' ? rfqSortKol : bekSortKol) === kol
    ? ((prefix === 'rfq' ? rfqSortYon : bekSortYon) === 1 ? ' \u25B2' : (prefix === 'rfq' ? rfqSortYon : bekSortYon) === -1 ? ' \u25BC' : '')
    : '';
}
function siraliDizi(arr, kolFn, yon) {
  if (!yon) return arr;
  return arr.slice().sort(function(a, b) {
    var va = kolFn(a), vb = kolFn(b);
    var na = parseFloat(va), nb = parseFloat(vb);
    var cmp;
    if (!isNaN(na) && !isNaN(nb)) { cmp = na - nb; }
    else { cmp = String(va || '').localeCompare(String(vb || ''), 'tr'); }
    return cmp * yon;
  });
}

// ── CHECKBOX FONKSIYONLARI ──
function rfqToggleSec(id, checked) {
  if (checked) { if (rfqSeciliIds.indexOf(id) < 0) rfqSeciliIds.push(id); }

  var chks = document.querySelectorAll('#talepler-icerik .tbl tbody input[type=checkbox]');

  if (checked) { chks.forEach(function(c) { c.checked = true; var m = c.getAttribute('onchange').match(/'([^']+)'/); if (m) rfqSeciliIds.push(m[1]); }); }
  else { chks.forEach(function(c) { c.checked = false; }); }
  rfqSecimGuncelle();
}

function tedarikciAdiGetir(recIdOrArr) {
  if (!recIdOrArr) return '—';
  var id = Array.isArray(recIdOrArr) ? recIdOrArr[0] : recIdOrArr;
  if (!id) return '—';
  // Eger zaten ad ise (recXXX formatinda degilse) direkt dondur
  if (typeof id === 'string' && id.indexOf('rec') !== 0) return id;
  for (var i = 0; i < tedarikciListAll.length; i++) {
    if (tedarikciListAll[i].id === id) return tedarikciListAll[i].fields['Tedarikçi Adı'] || id;
  }
  return id;
}

function veriYukle() {
  Promise.all([
    apiGet(T_STL, 'pageSize=100&sort%5B0%5D%5Bfield%5D=Talep%20No&sort%5B0%5D%5Bdirection%5D=desc'),

    apiGet(T_TD, 'pageSize=100&fields%5B%5D=Tedarik%C3%A7i%20Ad%C4%B1')
  ]).then(function(results) {
    tumTalepler = results[0].records || [];
    muzakereler = results[1].records || [];
    tedarikciListAll = results[2].records || [];
    kpiGuncelle();
    badgeGuncelle();
    taleplerRender(tumTalepler);

// ── TAB SWITCHING ──
function setTab(id, el) {
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('on'); }
  if (el) el.classList.add('on');

  var panels = document.querySelectorAll('.panel');
  for (var j = 0; j < panels.length; j++) { panels[j].classList.remove('show'); }
  var panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('show');
}

// ── KPI ──
function kpiGuncelle() {
  var toplam = 0, bekliyor = 0, geldi = 0, onayli = 0;
  var sayilanNolar = {};

  for (var i = 0; i < tumTalepler.length; i++) {
    var f = tumTalepler[i].fields;
    var no = f['Talep No'] || '';
    var durum = f['Durum'] || 'Taslak';

    if (!sayilanNolar[no + '|' + durum]) {
      sayilanNolar[no + '|' + durum] = true;
    }
    toplam++;
    if (durum === 'Gönderildi') bekliyor++;
    else if (durum === 'Teklif Alındı') geldi++;
    else if (durum === 'Onaylandı') onayli++;
  }

  document.getElementById('kpi-toplam').textContent = toplam;
  document.getElementById('kpi-bekliyor').textContent = bekliyor;
  document.getElementById('kpi-geldi').textContent = geldi;
  document.getElementById('kpi-onayli').textContent = onayli;
}

// ── BADGE ──

    var durum = tumTalepler[i].fields['Durum'] || 'Taslak';
    if (durum === 'Gönderildi') bekliyor++;
    else if (durum === 'Teklif Alındı') geldi++;
    else if (durum === 'Onaylandı') onayli++;
  }
  document.getElementById('tab-badge-talepler').textContent = toplam;
  document.getElementById('tab-badge-karsilastirma').textContent = geldi;
  document.getElementById('tab-badge-bekliyor').textContent = bekliyor;
  document.getElementById('tab-badge-onayli').textContent = onayli;
}

// ══════════════════════════════════════════
// TAB 1 — TALEPLER
// ══════════════════════════════════════════

function taleplerRender(liste) {
  var el = document.getElementById('talepler-icerik');
  if (!el) return;

  if (!liste || liste.length === 0) {
    el.innerHTML = '<div class="rfq-bos"><div class="rfq-bos-icon">&#128203;</div><div class="rfq-bos-title">Henuz RFQ talebi yok</div><div class="rfq-bos-desc">"+ Yeni RFQ" butonuyla ilk talebi olusturun</div></div>';
    return;
  }

  // Gecikme banner
  var gecikmeEl = document.getElementById('talepler-gecikme');
  var bugun = new Date();
  bugun.setHours(0,0,0,0);
  var geciken = 0;
  for (var g = 0; g < liste.length; g++) {
    var gf = liste[g].fields;
    if (gf['Durum'] === 'Gönderildi' && gf['Talep Tarihi']) {
      var talepTarih = new Date(gf['Talep Tarihi']);
      var gun7 = new Date(talepTarih.getTime() + 7 * 86400000);
      if (bugun > gun7) geciken++;
    }
  }
  if (geciken > 0 && gecikmeEl) {
    gecikmeEl.innerHTML = '<div class="late-banner"><div class="late-dot"></div>' + geciken + ' RFQ suresi gecmis — tedarikcileri hatirlatin.</div>';
  } else if (gecikmeEl) {
    gecikmeEl.innerHTML = '';
  }

  // Gruplama: Talep No bazinda, ayni Talep No altinda kac kalem + kac tedarikci yanit verdi
  var gruplar = {};
  for (var i = 0; i < liste.length; i++) {
    var f = liste[i].fields;
    var no = f['Talep No'] || '(Nosuz-' + liste[i].id.slice(-4) + ')';
    if (!gruplar[no]) {
      gruplar[no] = {
        no: no,
        kalemler: [],
        durum: f['Durum'] || 'Taslak',
        talepTarihi: f['Talep Tarihi'] || '',
        aciliyet: f['Aciliyet'] || 'Normal',
        enDusukFiyat: null,
        yanitSayisi: 0,
        toplamTedarikci: 0
      };
    }
    gruplar[no].kalemler.push(liste[i]);
    if (f['Teklif Fiyatı'] && f['Teklif Fiyatı'] > 0) {
      gruplar[no].yanitSayisi++;
      if (gruplar[no].enDusukFiyat === null || f['Teklif Fiyatı'] < gruplar[no].enDusukFiyat) {
        gruplar[no].enDusukFiyat = f['Teklif Fiyatı'];
      }
    }
    // Tedarikci sayisi: virgullu email alanini say
    var emails = (f['Tedarikçi Email'] || '').split(',').filter(function(e) { return e.trim(); });
    if (emails.length > gruplar[no].toplamTedarikci) gruplar[no].toplamTedarikci = emails.length;
  }

  var noList = Object.keys(gruplar);

  var html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span id="rfq-secim-info" style="font-size:11px;color:#6b7280;display:none;">0 secili</span></div>';
  html += '<div class="tbl"><table><thead><tr>';
  html += '<th style="width:32px;text-align:center"><input type="checkbox" onchange="rfqTumunuSec(this.checked)"></th>';
  html += '<th onclick="rfqSirala(\'no\')">RFQ No' + sortOkIsaret('rfq','no') + '</th>';
  html += '<th onclick="rfqSirala(\'kalem\')">Kalem' + sortOkIsaret('rfq','kalem') + '</th>';
  html += '<th onclick="rfqSirala(\'malzeme\')">Malzeme' + sortOkIsaret('rfq','malzeme') + '</th>';
  html += '<th>Tedarikci Durumu</th>';
  html += '<th onclick="rfqSirala(\'tarih\')">Talep Tarihi' + sortOkIsaret('rfq','tarih') + '</th>';
  html += '<th onclick="rfqSirala(\'durum\')">Durum' + sortOkIsaret('rfq','durum') + '</th>';
  html += '<th onclick="rfqSirala(\'fiyat\')">En Dusuk' + sortOkIsaret('rfq','fiyat') + '</th>';
  html += '<th></th>';
  html += '</tr></thead><tbody>';

  // Siralama
  var grArr = noList.map(function(k) { return gruplar[k]; });
  if (rfqSortKol && rfqSortYon !== 0) {
    grArr = siraliDizi(grArr, function(gr) {
      if (rfqSortKol === 'no') return gr.no;
      if (rfqSortKol === 'kalem') return gr.kalemler[0] ? (gr.kalemler[0].fields['Kalem Adı'] || '') : '';
      if (rfqSortKol === 'malzeme') return gr.kalemler[0] ? (gr.kalemler[0].fields['Malzeme İşlem'] || '') : '';
      if (rfqSortKol === 'tarih') return gr.talepTarihi || '';
      if (rfqSortKol === 'durum') return gr.durum || '';
      if (rfqSortKol === 'fiyat') return gr.enDusukFiyat || 999999;
      return '';
    }, rfqSortYon);
  }

  for (var n = 0; n < grArr.length; n++) {
    var gr = grArr[n];
    var kalemAdlari = [];
    var malzemeler = [];
    for (var k = 0; k < gr.kalemler.length; k++) {
      var kf = gr.kalemler[k].fields;
      kalemAdlari.push(kf['Kalem Adı'] || '—');
      if (kf['Malzeme İşlem']) malzemeler.push(kf['Malzeme İşlem']);
    }
    var kalemStr = kalemAdlari.length > 2 ? kalemAdlari.slice(0, 2).join(', ') + ' +' + (kalemAdlari.length - 2) : kalemAdlari.join(', ');
    var malzStr = malzemeler.length > 0 ? malzemeler[0] : '—';
    if (malzemeler.length > 1) malzStr += ' +' + (malzemeler.length - 1);

    var aciliyetIcon = '';
    if (gr.aciliyet === 'Kritik') aciliyetIcon = '<span style="color:var(--kirmizi);font-weight:700;" title="Kritik">!!</span> ';
    else if (gr.aciliyet === 'Yüksek') aciliyetIcon = '<span style="color:var(--sari);font-weight:700;" title="Yuksek">!</span> ';

    var tdDurum = gr.yanitSayisi + '/' + (gr.toplamTedarikci || '?');

    var grId = gr.kalemler[0] ? gr.kalemler[0].id : gr.no;
    var grChk = rfqSeciliIds.indexOf(grId) >= 0;

    // Durum badge mapping
    var durumCls = 'b-taslak';
    var durumText = gr.durum || 'Taslak';
    if (gr.durum === 'Gönderildi') durumCls = 'b-send';
    else if (gr.durum === 'Teklif Alındı') {
      if (gr.yanitSayisi >= gr.toplamTedarikci && gr.toplamTedarikci > 0) { durumCls = 'b-recv'; durumText = 'Tum Yanitlar Geldi'; }
      else { durumCls = 'b-wait'; durumText = 'Kismi Yanit'; }
    }
    else if (gr.durum === 'Onaylandı') { durumCls = 'b-onay'; durumText = 'Onaylandi'; }

    // Tedarikci durumu: mini badges
    var tdHtml = '';
    if (gr.yanitSayisi > 0) tdHtml += '<span class="mini-bdg mb-g">' + gr.yanitSayisi + ' yanit</span>';
    var bekleyenTd = (gr.toplamTedarikci || 0) - gr.yanitSayisi;
    if (bekleyenTd > 0) tdHtml += ' <span class="mini-bdg mb-a">' + bekleyenTd + ' bekliyor</span>';
    if (!tdHtml) tdHtml = '<span class="muted">' + (gr.toplamTedarikci || 0) + ' tedarikci</span>';

    html += '<tr onclick="talepDetayGoster(\'' + escHtml(gr.no) + '\')">';
    html += '<td style="text-align:center" onclick="event.stopPropagation()"><input type="checkbox" ' + (grChk ? 'checked' : '') + ' onchange="rfqToggleSec(\'' + escHtml(grId) + '\',this.checked)"></td>';
    html += '<td><span class="mono">' + aciliyetIcon + escHtml(gr.no) + '</span></td>';
    html += '<td><div style="font-size:12px;font-weight:500">' + escHtml(kalemStr) + '</div></td>';
    html += '<td><div style="font-size:12px;font-weight:500">' + escHtml(malzStr) + '</div></td>';
    html += '<td>' + tdHtml + '</td>';
    html += '<td class="muted">' + formatTarih(gr.talepTarihi) + '</td>';
    html += '<td><span class="bdg ' + durumCls + '">' + durumText + '</span></td>';
    html += '<td style="font-weight:600;color:#065f46">' + (gr.enDusukFiyat ? gr.enDusukFiyat.toLocaleString('tr-TR') + ' TL' : '—') + '</td>';
    html += '<td><button class="act-btn ab-b" onclick="event.stopPropagation();talepDetayGoster(\'' + escHtml(gr.no) + '\')">Karsilastir &rarr;</button></td>';
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function talepDetayGoster(no) {
  // Switch to comparison tab if there are bids, otherwise just highlight
  var hasTeklif = false;
  for (var i = 0; i < tumTalepler.length; i++) {
    var f = tumTalepler[i].fields;
    if ((f['Talep No'] || '') === no && f['Teklif Fiyatı'] && f['Teklif Fiyatı'] > 0) {
      hasTeklif = true;
      break;
    }
  }
  if (hasTeklif) {
    seciliKarsilastirmaNo = no;
    var tabBtn = document.querySelectorAll('.tab-btn')[1];
    setTab('karsilastirma', tabBtn);
    karsilastirmaRender();
  } else {
    toast(no + ' — detay bilgisi', 'inf');
  }
}

// ══════════════════════════════════════════
// TAB 2 — FIYAT KARSILASTIRMA
// ══════════════════════════════════════════

var cftAktifTd = 0; // pazarlik panelinde secili tedarikci indexi

function karsilastirmaRender() {
  var el = document.getElementById('karsilastirma-icerik');
  if (!el) return;

  // Teklif alindi olan Talep No'lari bul
  var teklifNolar = {};
  for (var i = 0; i < tumTalepler.length; i++) {
    var f = tumTalepler[i].fields;
    var durum = f['Durum'] || '';
    if (durum === 'Teklif Alındı' || (f['Teklif Fiyatı'] && f['Teklif Fiyatı'] > 0)) {
      var no = f['Talep No'] || '';
      if (no && !teklifNolar[no]) {
        teklifNolar[no] = { no: no, kalemler: [] };
      }
      if (no) teklifNolar[no].kalemler.push(tumTalepler[i]);
    }
  }

  var noList = Object.keys(teklifNolar);

  if (noList.length === 0) {
    el.innerHTML = '<div class="rfq-bos"><div class="rfq-bos-icon">&#128200;</div><div class="rfq-bos-title">Karşılaştırılacak teklif yok</div><div class="rfq-bos-desc">Tedarikçilerden teklif geldikçe burada görünecek</div></div>';
    return;
  }

  if (!seciliKarsilastirmaNo || !teklifNolar[seciliKarsilastirmaNo]) {
    seciliKarsilastirmaNo = noList[0];
  }

  var html = '';

  // ── A) CHIP BAR ──
  html += '<div class="rfq-serit">';
  html += '<span class="rfq-serit-label">Karsilastirilacak RFQ:</span>';
  for (var n = 0; n < noList.length; n++) {
    var gr = teklifNolar[noList[n]];
    var onCls = (noList[n] === seciliKarsilastirmaNo) ? ' on' : '';
    var ilkF = gr.kalemler[0] ? gr.kalemler[0].fields : {};
    var chipMal = ilkF['Malzeme Cinsi'] || ilkF['Malzeme İşlem'] || ilkF['Kalem Adı'] || '';
    var toplam = 0;
    for (var ci = 0; ci < gr.kalemler.length; ci++) { if (gr.kalemler[ci].fields['Teklif Fiyatı'] > 0) toplam++; }
    var chipStCls = (toplam >= gr.kalemler.length) ? 'chip-recv' : 'chip-part';
    html += '<button class="rfq-chip' + onCls + '" onclick="seciliKarsilastirmaNo=\'' + escHtml(noList[n]) + '\';cftAktifTd=0;karsilastirmaRender()">';
    html += '<span class="chip-no">' + escHtml(noList[n]) + '</span>';
    html += escHtml(chipMal);
    html += '<span class="chip-st ' + chipStCls + '">' + toplam + '/' + gr.kalemler.length + '</span>';
    html += '</button>';
  }
  html += '</div>';

  // Secili grup verilerini hazirla
  var seciliGrup = teklifNolar[seciliKarsilastirmaNo];
  if (!seciliGrup) { el.innerHTML = html; return; }

  var teklifler = [];
  var enDusuk = Infinity;
  var enYuksek = 0;
  var enDusukIdx = -1;

  for (var t = 0; t < seciliGrup.kalemler.length; t++) {
    var tf = seciliGrup.kalemler[t].fields;
    var fiyat = tf['Teklif Fiyatı'] || 0;
    var tedarikciAd = tedarikciAdiGetir(tf['Seçilen Tedarikçi']) !== '—' ? tedarikciAdiGetir(tf['Seçilen Tedarikçi']) : (tf['Tedarikçi Email'] || '—');
    teklifler.push({
      id: seciliGrup.kalemler[t].id,
      tedarikci: tedarikciAd,
      kalemAdi: tf['Kalem Adı'] || '',
      malzeme: tf['Malzeme İşlem'] || '',
      malzemeCinsi: tf['Malzeme Cinsi'] || '',
      olcu: tf['Ölçü'] || '',
      tedarikciOlculeri: tf['Tedarikçi Ölçüleri'] || '',
      miktar: tf['Miktar'] || 0,
      birim: tf['Birim'] || '',
      fiyat: fiyat,
      fiyatBirimi: tf['Fiyat Birimi'] || 'TL/kg',
      teslimGun: tf['Teslim Süresi Gün'] || 0,
      vade: tf['Tedarikçi Vade Önerisi'] || '',
      not: tf['Tedarikçi Notu'] || '',
      durum: tf['Durum'] || '',
      yanitTarihi: tf['Yanıt Tarihi'] || ''
    });
    if (fiyat > 0 && fiyat < enDusuk) { enDusuk = fiyat; enDusukIdx = teklifler.length - 1; }
    if (fiyat > enYuksek) { enYuksek = fiyat; }
  }

  // Fiyata gore sirala (dusukten yuksege)
  var siraIdx = [];
  for (var si = 0; si < teklifler.length; si++) siraIdx.push(si);
  siraIdx.sort(function(a, b) {
    var fa = teklifler[a].fiyat || Infinity;
    var fb = teklifler[b].fiyat || Infinity;
    return fa - fb;
  });

  // Ilk kalem bilgisi (ozet icin)
  var ozetF = teklifler[0] || {};

  // ── B) OZET SERIDI ──
  html += '<div class="talep-ozet">';
  html += '<div class="to-item"><label>PR No</label><span style="color:#059669;font-family:monospace;font-size:11px">' + escHtml(seciliKarsilastirmaNo) + '</span></div>';
  html += '<div class="to-item"><label>Kalem</label><span>' + escHtml(ozetF.kalemAdi || '—') + '</span></div>';
  html += '<div class="to-item"><label>Malzeme</label><span>' + escHtml(ozetF.malzemeCinsi || ozetF.malzeme || '—') + '</span></div>';
  html += '<div class="to-item"><label>Olcu</label><span style="font-size:11px">' + escHtml(ozetF.olcu || '—') + '</span></div>';
  html += '<div class="to-item"><label>Miktar</label><span>' + (ozetF.miktar || '—') + ' ' + escHtml(ozetF.birim || '') + '</span></div>';
  html += '</div>';

  // ── C) AKIS CUBUGU ──
  var varKazanan = false;
  for (var ak = 0; ak < teklifler.length; ak++) { if (teklifler[ak].durum === 'Onaylandı') varKazanan = true; }
  var adim3Cls = varKazanan ? 'done' : 'active';
  var adim4Cls = varKazanan ? 'done' : '';
  var adim5Cls = '';

  html += '<div class="durum-bar">';
  html += '<div class="db-step done">RFQ Gonderildi<span class="sn">Tamamlandi</span></div>';
  html += '<div class="db-step done">Teklifler Alindi<span class="sn">Tamamlandi</span></div>';
  html += '<div class="db-step ' + adim3Cls + '">Karsilastirma & Pazarlik<span class="sn">' + (varKazanan ? 'Tamamlandi' : 'Devam ediyor') + '</span></div>';
  html += '<div class="db-step ' + adim4Cls + '">Kazanan Secimi<span class="sn">' + (varKazanan ? 'Tamamlandi' : 'Bekliyor') + '</span></div>';
  html += '<div class="db-step ' + adim5Cls + '">PO Olusturuldu<span class="sn">—</span></div>';
  html += '</div>';

  // ── D) IKI SUTUN LAYOUT ──
  html += '<div class="cft-layout">';

  // ── SOL: KARSILASTIRMA TABLOSU ──
  html += '<div class="cft-sol">';
  html += '<div class="cft-tablo-head"><div><div class="cft-th-title">Tedarikci Teklifleri</div><div class="cft-th-sub">' + teklifler.length + ' teklif alindi &middot; En uygun otomatik vurgulandi</div></div></div>';
  html += '<div style="overflow-x:auto"><table class="cft-table">';

  // Header row
  html += '<thead><tr><th></th>';
  for (var hi = 0; hi < siraIdx.length; hi++) {
    var hRow = teklifler[siraIdx[hi]];
    var thCls = 'th-high';
    var thLabel = 'Pahali';
    if (hi === 0 && hRow.fiyat > 0) { thCls = 'th-best'; thLabel = '\u2605 En Uygun'; }
    else if (hi === siraIdx.length - 1 && siraIdx.length > 2) { thCls = 'th-high'; thLabel = 'Pahali'; }
    else if (hi > 0) { thCls = 'th-mid'; thLabel = 'Orta'; }
    if (siraIdx.length === 1) { thCls = 'th-best'; thLabel = 'Tek Teklif'; }
    if (siraIdx.length === 2 && hi === 1) { thCls = 'th-high'; thLabel = 'Pahali'; }
    if (hRow.durum === 'Onaylandı') { thCls = 'th-best'; thLabel = '\u2713 Kazanan'; }
    html += '<th class="' + thCls + '">' + escHtml(hRow.tedarikci) + '<span class="th-badge">' + thLabel + '</span></th>';
  }
  html += '</tr></thead><tbody>';

  // Satir: Teklif Edilen Tip
  html += '<tr><td>Teklif Edilen Tip</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' td-best' : '';
    html += '<td class="' + bestCls + '">' + escHtml(rr.malzemeCinsi || rr.malzeme || '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Teklif Olculeri
  html += '<tr><td>Teklif Olculeri</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' td-best' : '';
    html += '<td class="' + bestCls + '">' + escHtml(rr.tedarikciOlculeri || rr.olcu || '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Birim Fiyat
  html += '<tr><td>Birim Fiyat</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' td-best' : '';
    var highCls = (ri === siraIdx.length - 1 && siraIdx.length > 1) ? ' td-high' : '';
    html += '<td class="' + bestCls + highCls + '">' + (rr.fiyat ? rr.fiyat.toLocaleString('tr-TR') + ' ' + escHtml(rr.fiyatBirimi) : '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Toplam Fiyat
  var enDusukToplam = (enDusuk < Infinity && teklifler[enDusukIdx]) ? enDusuk * (teklifler[enDusukIdx].miktar || 1) : 0;
  html += '<tr><td>Toplam Fiyat</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' td-best' : '';
    var toplam = rr.fiyat * (rr.miktar || 1);
    var toplamStr = toplam > 0 ? toplam.toLocaleString('tr-TR') + ' TL' : '—';
    var diffStr = '';
    if (ri > 0 && toplam > 0 && enDusukToplam > 0) {
      var diff = toplam - enDusukToplam;
      if (diff > 0) diffStr = '<span class="diff diff-r">+' + diff.toLocaleString('tr-TR') + ' \u20BA</span>';
    }
    html += '<td class="' + bestCls + '" style="' + (ri === 0 ? 'font-size:14px;' : '') + '">' + toplamStr + diffStr + '</td>';
  }
  html += '</tr>';

  // Satir: Odeme Vadesi
  html += '<tr><td>Odeme Vadesi</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' td-best' : '';
    html += '<td class="' + bestCls + '">' + escHtml(rr.vade ? rr.vade + ' gun' : '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Teslim Suresi
  html += '<tr><td>Teslim Suresi</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' td-best' : '';
    html += '<td class="' + bestCls + '">' + (rr.teslimGun ? rr.teslimGun + ' is gunu' : '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Not
  html += '<tr><td>Not</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    var bestCls = (ri === 0) ? ' td-best' : '';
    html += '<td class="' + bestCls + '" style="font-size:11px;">' + escHtml(rr.not || '—') + '</td>';
  }
  html += '</tr>';

  // Satir: Karar butonlari
  html += '<tr class="sec-row"><td>Karar</td>';
  for (var ri = 0; ri < siraIdx.length; ri++) {
    var rr = teklifler[siraIdx[ri]];
    html += '<td>';
    if (rr.durum === 'Onaylandı') {
      html += '<button class="cft-karar-btn kazandi">\u2713 Kazanan</button>';
    } else if (ri === 0 && rr.fiyat > 0) {
      html += '<button class="cft-karar-btn kazanan" onclick="event.stopPropagation();kazananSec(\'' + rr.id + '\',' + rr.fiyat + ',\'' + escHtml(rr.tedarikci) + '\')">\u2713 Kazanan Sec \u2192 PO</button>';
    } else {
      html += '<button class="cft-karar-btn pazarlik" onclick="cftAktifTd=' + siraIdx[ri] + ';karsilastirmaRender()">Pazarlık Et</button>';
    }
    html += '</td>';
  }
  html += '</tr>';

  html += '</tbody></table></div>';

  // ── TASARRUF BAR ──
  var tasarrufTutar = (enYuksek > 0 && enDusuk < Infinity) ? (enYuksek - enDusuk) : 0;
  var teklifSayisi = teklifler.length;
  var durumTextBar = varKazanan ? '\u2713 Kazanan secildi' : 'Degerlendirme devam ediyor';
  html += '<div class="tasarruf-bar">';

function pazTasarrufHesapla(mevcutFiyat) {
  var hedef = parseFloat(document.getElementById('paz-hedef-fiyat').value) || 0;
  var el = document.getElementById('paz-tasarruf');
  if (!el) return;
  if (!mevcutFiyat || !hedef) {
    el.innerHTML = '<div class="ts-label">Hedef tasarruf</div><div class="ts-val">\u2014</div>';
    el.className = 'tasarruf-box';
    return;
  }
  var fark = mevcutFiyat - hedef;
  var yuzde = ((fark / mevcutFiyat) * 100).toFixed(1);
  if (fark > 0) {
    el.innerHTML = '<div class="ts-label">Hedef tasarruf</div><div class="ts-val">' + fark.toLocaleString('tr-TR') + ' TL (%' + yuzde + ')</div>';
    el.className = 'tasarruf-box';
  } else {
    el.innerHTML = '<div class="ts-label">Hedef mevcut fiyattan yuksek</div><div class="ts-val">\u2014</div>';
    el.className = 'tasarruf-box none';
  }
}

function pazarlikKaydet(talepNo) {
  var hedef = document.getElementById('paz-hedef-fiyat').value || '';
  var mesaj = document.getElementById('paz-mesaj').value || '';
  if (!mesaj && !hedef) { toast('Hedef fiyat veya mesaj girin', 'err'); return; }

  var fields = {
    'Talep No': talepNo,
    'Tarih': new Date().toISOString().split('T')[0]
  };
  if (mesaj) fields['Mesaj'] = mesaj;
  if (hedef) fields['Hedef Fiyat'] = parseFloat(hedef);

  apiPost(T_MUZ, fields).then(function(r) {
    toast('Muzakere kaydedildi');
    if (document.getElementById('paz-mesaj')) document.getElementById('paz-mesaj').value = '';
    if (document.getElementById('paz-hedef-fiyat')) document.getElementById('paz-hedef-fiyat').value = '';
    veriYukle();
  }).catch(function(e) {
    toast('Kayit hatasi: ' + e.message, 'err');
  });
}

function kazananSec(recId, fiyat, tedarikciAd) {
  if (!recId) return;
  // Tedarikci adini record ID'ye cevir (linked record alani)
  var tdRecId = null;
  for (var i = 0; i < tedarikciListAll.length; i++) {
    if ((tedarikciListAll[i].fields['Tedarikçi Adı'] || '') === tedarikciAd) {
      tdRecId = tedarikciListAll[i].id;
      break;
    }
  }
  var fields = {
    'Durum': 'Onaylandı',
    'Onay Fiyatı': fiyat
  };
  if (tdRecId) fields['Seçilen Tedarikçi'] = [tdRecId];
  else if (tedarikciAd && tedarikciAd.indexOf('rec') === 0) fields['Seçilen Tedarikçi'] = [tedarikciAd];
  apiPatch(T_STL, recId, fields).then(function() {
    toast(tedarikciAd + ' kazanan olarak secildi');
    veriYukle();
  }).catch(function(e) {
    toast('Hata: ' + e.message, 'err');
  });
}

// ── TEDARIKCI & SE LISTESI YUKLE ──
function rfqVerileriYukle() {
  return Promise.all([
    apiGet(T_TD, 'pageSize=100'),
    apiGet(T_SE, 'pageSize=100')
  ]).then(function(results) {
    tedarikciListAll = (results[0].records || []);
    seListAll = (results[1].records || []);
    rfqTdSelectDoldur();
  }).catch(function(e) {
    console.error('RFQ veri yukleme hatasi:', e);
  });
}

function rfqTdSelectDoldur() {
  var sel = document.getElementById('rfq-td-select');
  if (!sel) return;
  var html = '<option value="">— Tedarikci secin —</option>';
  for (var i = 0; i < tedarikciListAll.length; i++) {
    var t = tedarikciListAll[i];
    var ad = (t.fields['Tedarikçi Adı'] || '').replace(/"/g, '&quot;');
    var email = t.fields['E-posta'] || '';
    html += '<option value="' + t.id + '" data-ad="' + ad + '" data-email="' + email + '">' + ad + (email ? ' (' + email + ')' : ' (e-posta yok)') + '</option>';
  }
  sel.innerHTML = html;
}

// ── MODAL AC / KAPAT ──
function rfqModalAc(opts) {
  opts = opts || {};
  rfqState.tip = 'hammadde';
  rfqState.kalemler = [];
  rfqState.tedarikciler = [];
  rfqState.not = '';
  rfqState.prNo = opts.prNo || null;
  rfqState.editId = null;

  // Tip butonlarini sifirla
  var tipBtns = document.querySelectorAll('.rfq-tip-btn');
  for (var i = 0; i < tipBtns.length; i++) {
    tipBtns[i].classList.remove('secili');
    if (i === 0) tipBtns[i].classList.add('secili');
    tipBtns[i].style.opacity = '';
    tipBtns[i].style.pointerEvents = '';
  }

  document.getElementById('rfq-not').value = '';
  document.getElementById('rfq-modal-title').textContent = opts.prNo ? 'RFQ Talebi — PR: ' + opts.prNo : 'Yeni RFQ Talebi';

  rfqVerileriYukle().then(function() {
    // PR varsa, ilgili talepleri otomatik yukle
    if (opts.prNo) {
      rfqPRKalemleriYukle(opts.prNo);
    }
    // PR'dan gelen tip varsa otomatik sec ve butonlari kilitle
    if (opts.talepTipiSabit) {
      var sabitTip = opts.talepTipiSabit.toLowerCase();
      if (sabitTip === 'fason') { rfqState.tip = 'fason'; }
      else { rfqState.tip = 'hammadde'; }
      var tipBtns2 = document.querySelectorAll('.rfq-tip-btn');
      for (var j = 0; j < tipBtns2.length; j++) {
        tipBtns2[j].classList.remove('secili');
        if (tipBtns2[j].dataset.tip === rfqState.tip) tipBtns2[j].classList.add('secili');
        // PR'dan geliyorsa tip degistirmeyi engelle
        tipBtns2[j].style.opacity = '0.5';
        tipBtns2[j].style.pointerEvents = 'none';
      }
    }
  });

  rfqTalepGridRender();
  rfqTdListRender();
  rfqTeklifDonukRender();
  document.getElementById('rfq-modal-backdrop').classList.add('acik');
}

function rfqModalKapat() {
  document.getElementById('rfq-modal-backdrop').classList.remove('acik');
  // Sayfa verisini yenile
  veriYukle();
}

// ── PR KALEMLERI YUKLE ──
function rfqPRKalemleriYukle(prNo) {
  apiGet(T_STL, 'filter=' + encodeURIComponent("{Talep No}='" + prNo + "'")).then(function(d) {
    var recs = d.records || [];
    for (var i = 0; i < recs.length; i++) {
      var f = recs[i].fields;
      rfqState.kalemler.push({
        id: recs[i].id,
        ad: f['Kalem Adı'] || '',
        malzeme: f['Malzeme İşlem'] || '',
        olcu: f['Ölçü'] || '',
        miktar: f['Miktar'] || 0,
        birim: f['Birim'] || 'Adet',
        kg: f['Tahmini kg'] || 0,
        seId: (f['SE No'] || [])[0] || ''
      });
    }
    rfqTalepGridRender();
  }).catch(function(e) {
    console.error('PR kalemleri yukleme hatasi:', e);
  });
}

function rfqTipDegis(tip, btn) {
  rfqState.tip = tip;

  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('secili'); }
  btn.classList.add('secili');
}

// ── TEDARIKCI EKLEME ──
function rfqTdEkle() {
  var sel = document.getElementById('rfq-td-select');
  if (!sel || !sel.value) { toast('Tedarikci secin', 'err'); return; }
  var opt = sel.options[sel.selectedIndex];
  var id = sel.value;
  var ad = opt.getAttribute('data-ad') || '';
  var email = opt.getAttribute('data-email') || '';

  // Zaten eklenmis mi?
  for (var i = 0; i < rfqState.tedarikciler.length; i++) {
    if (rfqState.tedarikciler[i].id === id) {
      toast('Bu tedarikci zaten eklendi', 'inf');
      return;
    }
  }

  rfqState.tedarikciler.push({id: id, ad: ad, email: email});
  sel.value = '';
  rfqTdListRender();
}

  var el = document.getElementById('rfq-td-list');

    el.innerHTML = '<span style="font-size:11px;color:var(--metin4);">Henuz tedarikci eklenmedi</span>';

  }

  var html = '';
  for (var i = 0; i < rfqState.tedarikciler.length; i++) {
    var t = rfqState.tedarikciler[i];
    html += '<span class="rfq-td-chip">' + t.ad + (t.email ? '' : ' (e-posta yok)') + '<span class="sil-x" onclick="rfqTdSil(' + i + ')">&times;</span></span>';
  }
  el.innerHTML = html;
}

// ── TEDARIKCI SIL ──
function rfqTdSil(idx) {
  rfqState.tedarikciler.splice(idx, 1);
  rfqTdListRender();
}

// ── GRUP EKLEME MODAL ──
function rfqGrupEkleModal() {
  var el = document.getElementById('rfq-grup-modal');
  if (el) el.style.display = 'flex';

  var liste = document.getElementById('rfq-grup-liste');
  if (!liste) return;

  if (seListAll.length === 0) {
    liste.innerHTML = '<div style="padding:16px;text-align:center;color:var(--metin4);font-size:12px;">SE kaydi bulunamadi</div>';
    return;
  }

  rfqGrupListeRender(seListAll);
}

function rfqGrupListeRender(kayitlar) {
  var liste = document.getElementById('rfq-grup-liste');
  if (!liste) return;

  var html = '';
  for (var i = 0; i < kayitlar.length; i++) {
    var r = kayitlar[i];
    var f = r.fields;
    var seNo = f['SE No'] || '—';
    var parcaAd = f['Parça Adı'] || '';
    var malzeme = f['Hammadde'] || f['Malzeme'] || '';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);">';
    html += '<input type="checkbox" value="' + r.id + '" data-seno="' + seNo.replace(/"/g, '&quot;') + '" data-parca="' + parcaAd.replace(/"/g, '&quot;') + '" data-malzeme="' + malzeme.replace(/"/g, '&quot;') + '" style="width:15px;height:15px;">';
    html += '<div style="flex:1;"><div style="font-size:12px;font-weight:500;font-family:monospace;color:var(--mavi-koyu);">' + seNo + '</div>';
    html += '<div style="font-size:11px;color:var(--metin2);">' + parcaAd + (malzeme ? ' - ' + malzeme : '') + '</div></div></div>';
  }
  liste.innerHTML = html || '<div style="padding:16px;text-align:center;color:var(--metin4);font-size:12px;">Sonuc bulunamadi</div>';
}

function rfqGrupFiltre() {
  var q = (document.getElementById('rfq-grup-arama').value || '').toLowerCase();
  if (!q) {
    rfqGrupListeRender(seListAll);
    return;
  }
  var filtered = seListAll.filter(function(r) {
    var f = r.fields;
    return (f['SE No'] || '').toLowerCase().indexOf(q) >= 0 ||
           (f['Parça Adı'] || '').toLowerCase().indexOf(q) >= 0;
  });
  rfqGrupListeRender(filtered);
}

function rfqGrupSecimEkle() {
  var checkboxes = document.querySelectorAll('#rfq-grup-liste input[type=checkbox]:checked');
  if (!checkboxes.length) { toast('En az bir kalem secin', 'err'); return; }

  for (var i = 0; i < checkboxes.length; i++) {
    var cb = checkboxes[i];
    rfqState.kalemler.push({
      id: null,
      ad: cb.getAttribute('data-parca') || '',
      malzeme: cb.getAttribute('data-malzeme') || '',
      olcu: '',
      miktar: 1,
      birim: 'Adet',
      kg: 0,
      seId: cb.value
    });
  }

  document.getElementById('rfq-grup-modal').style.display = 'none';
  rfqTalepGridRender();
  rfqTeklifDonukRender();
  toast(checkboxes.length + ' kalem eklendi');
}

// ── TEKIL EKLEME MODAL ──
function rfqTekilEkleModal() {
  document.getElementById('rfq-tekil-modal').style.display = 'flex';
  document.getElementById('rfq-tekil-ad').value = '';
  document.getElementById('rfq-tekil-malzeme').value = '';
  document.getElementById('rfq-tekil-olcu').value = '';
  document.getElementById('rfq-tekil-miktar').value = '';
  document.getElementById('rfq-tekil-kg').value = '';
  document.getElementById('rfq-tekil-birim').value = 'Adet';
}

function rfqTekilEkleKaydet() {
  var ad = document.getElementById('rfq-tekil-ad').value.trim();
  var malzeme = document.getElementById('rfq-tekil-malzeme').value.trim();
  var olcu = document.getElementById('rfq-tekil-olcu').value.trim();
  var miktar = parseFloat(document.getElementById('rfq-tekil-miktar').value) || 0;
  var birim = document.getElementById('rfq-tekil-birim').value;
  var kg = parseFloat(document.getElementById('rfq-tekil-kg').value) || 0;

  if (!ad) { toast('Kalem adi giriniz', 'err'); return; }

  rfqState.kalemler.push({
    id: null,
    ad: ad,
    malzeme: malzeme,
    olcu: olcu,
    miktar: miktar,
    birim: birim,
    kg: kg,
    seId: ''
  });

  document.getElementById('rfq-tekil-modal').style.display = 'none';
  rfqTalepGridRender();
  rfqTeklifDonukRender();
  toast('Kalem eklendi');
}

// ── TASLAK KAYDET ──
function rfqTaslakKaydet() {
  if (rfqState.kalemler.length === 0) {
    toast('En az bir kalem ekleyin', 'err');
    return;
  }

  var btn = document.getElementById('rfq-taslak-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Kaydediliyor...'; }

  var promises = [];
  for (var i = 0; i < rfqState.kalemler.length; i++) {
    var k = rfqState.kalemler[i];
    var fields = {
      'Kalem Adı': k.ad,
      'Malzeme İşlem': k.malzeme,
      'Ölçü': k.olcu,
      'Miktar': k.miktar,
      'Birim': k.birim,
      'Tahmini kg': k.kg,
      'Talep Tipi': rfqState.tip === 'hammadde' ? 'Hammadde' : 'Fason',
      'Durum': 'Taslak'
    };
    if (k.seId) fields['SE No'] = [k.seId];

    if (k.id) {
      promises.push(apiPatch(T_STL, k.id, fields));
    } else {
      promises.push(apiPost(T_STL, fields));
    }
  }

  Promise.all(promises).then(function() {
    toast('Taslak kaydedildi (' + rfqState.kalemler.length + ' kalem)');
    if (btn) { btn.disabled = false; btn.textContent = 'Taslak Kaydet'; }
    if (typeof logIslem === 'function') {
      logIslem('Taslak', 'RFQ', '', rfqState.kalemler.length + ' kalem', null, {tip: rfqState.tip});
    }
  }).catch(function(e) {
    toast('Kayit hatasi: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Taslak Kaydet'; }
  });
}

// ── RFQ GONDER ──
function rfqGonder() {
  if (rfqState.kalemler.length === 0) {
    toast('En az bir kalem ekleyin', 'err');
    return;
  }
  if (rfqState.tedarikciler.length === 0) {
    toast('En az bir tedarikci secin', 'err');
    return;
  }

  // E-postasi olan var mi kontrol et
  var emailliTd = rfqState.tedarikciler.filter(function(t) { return t.email; });
  if (emailliTd.length === 0) {
    toast('Secilen tedarikcilerin e-posta adresi yok', 'err');
    return;
  }

  var btn = document.getElementById('rfq-gonder-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Gonderiliyor...'; }

  var notText = (document.getElementById('rfq-not') || {}).value || '';
  var emails = [];
  var adlar = [];
  for (var i = 0; i < rfqState.tedarikciler.length; i++) {
    if (rfqState.tedarikciler[i].email) emails.push(rfqState.tedarikciler[i].email);
    adlar.push(rfqState.tedarikciler[i].ad);
  }

  // Oncelikle kodUret ile RFQ kodu al
  var rfqKod = '';
  var kodPromise;
  if (typeof kodUret === 'function') {
    kodPromise = kodUret('RFQ').then(function(kod) { rfqKod = kod; });
  } else {
    rfqKod = 'RFQ-' + Date.now();
    kodPromise = Promise.resolve();
  }

  kodPromise.then(function() {
    var token = Date.now() + '-' + Math.random().toString(36).slice(2, 9);

    // Her kalem icin STL kaydini guncelle veya olustur
    var promises = [];
    for (var i = 0; i < rfqState.kalemler.length; i++) {
      var k = rfqState.kalemler[i];
      var fields = {
        'Kalem Adı': k.ad,
        'Malzeme İşlem': k.malzeme,
        'Ölçü': k.olcu,
        'Miktar': k.miktar,
        'Birim': k.birim,
        'Tahmini kg': k.kg,
        'Talep Tipi': rfqState.tip === 'hammadde' ? 'Hammadde' : 'Fason',
        'Durum': 'Gönderildi',
        'Tedarikçi Email': emails.join(', '),
        'Token': token,
        'Talep No': rfqKod
      };
      if (k.seId) fields['SE No'] = [k.seId];

      if (k.id) {
        promises.push(apiPatch(T_STL, k.id, fields));
      } else {
        promises.push(apiPost(T_STL, fields));
      }
    }

    return Promise.all(promises);
  }).then(function() {
    toast(adlar.length + ' tedarikciye RFQ gonderildi: ' + rfqKod, 'ok');
    if (btn) { btn.disabled = false; btn.textContent = 'RFQ Gonder'; }
    if (typeof logIslem === 'function') {
      logIslem('Gönderildi', 'RFQ', rfqKod, adlar.join(', '), null, {kalemSayi: rfqState.kalemler.length, tedarikciler: adlar});
    }
    setTimeout(function() { rfqModalKapat(); }, 1500);
  }).catch(function(e) {
    toast('Gonderim hatasi: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'RFQ Gonder'; }
  });
}
