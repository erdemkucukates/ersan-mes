<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — İç Denetim</title>
<link rel="stylesheet" href="utils/sidebar.css">
<link rel="stylesheet" href="ersan_styles.css">
<script src="utils/sidebar.js" defer></script>
<script src="ersan_log.js" defer></script>

  <!-- LAYOUT FIX v3 -->
  <link rel="stylesheet" href="utils/sidebar.css">
  <style>html,body{height:100%;margin:0;padding:0;overflow:hidden}.app{display:flex!important;flex-direction:row!important;height:100vh!important;width:100vw!important;overflow:hidden!important;gap:0!important;padding:0!important;margin:0!important}#sb-mount,.sb{width:210px!important;min-width:210px!important;max-width:210px!important;flex:0 0 210px!important;height:100vh!important;overflow-y:scroll!important;overflow-x:hidden!important;margin:0!important;border-right:none!important}.main,.icerik-alani{flex:1 1 0!important;min-width:0!important;height:100vh!important;overflow:hidden!important;display:flex!important;flex-direction:column!important}.main>.tb,.main>.topbar,.main>[class*="topbar"]{flex-shrink:0!important}</style>

<body data-page="denetim-panel">
<div class="app">
<div id="sb-mount"></div>
<div class="icerik-alani main">
  <div class="topbar">
    <div class="topbar-baslik">Ic Denetim</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

<div class="layout-wrapper">
  <!-- LEFT PANEL -->
  <div class="list-panel" id="listPanel">
    <div class="list-header">
      <div>
        <h2>İç Denetim</h2>
        <div class="list-count" id="listCount">0 kayıt</div>
      </div>
      <button class="list-new-btn" onclick="newDenetim()">+ Yeni</button>
    </div>
    <div class="filter-row" id="filterRow">
      <span class="fc on" data-filter="Tümü" onclick="setFilter(this,'Tümü')">Tümü</span>
      <span class="fc" data-filter="Planlandı" onclick="setFilter(this,'Planlandı')">Planlandı</span>
      <span class="fc" data-filter="Devam Ediyor" onclick="setFilter(this,'Devam Ediyor')">Devam</span>
      <span class="fc" data-filter="Tamamlandı" onclick="setFilter(this,'Tamamlandı')">Tamam</span>
    </div>
    <div class="list-scroll" id="listScroll">
      <div class="list-empty">Yükleniyor…</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-toolbar" id="detailToolbar">
      <div class="toolbar-title" id="toolbarTitle">—</div>
      <div class="toolbar-spacer"></div>
      <button class="btn sm" id="btnDelete" style="display:none" onclick="deleteDenetim()">Sil</button>
    </div>
    <div class="detail-scroll" id="detailScroll">
      <div class="empty-state">
        <div class="es-icon">🔍</div>
        <div class="es-text">Bir denetim seçin veya yeni oluşturun</div>
        <div class="es-sub">Sol panelden kayıt seçin ya da "+ Yeni" butonuna tıklayın</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  </div>
</div>

<script>
/* ===== CONFIG ===== */
const BASE = 'app5LDgJMgocw79Ix';
const T = {
  denetim: 'İç Denetim',
  personel: 'tblwG9GqnLC9oFZzb'
};
const PROXY = '/.netlify/functions/airtable';
const AI_PROXY = '/.netlify/functions/claude';

/* ===== STATE ===== */
let allRecords = [];
let currentFilter = 'Tümü';
let currentRecordId = null;
let isNew = false;
let personelList = [];

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', () => {
  loadPersonel();
  loadDenetimler();
});

/* ===== TOAST ===== */
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2800);
}

/* ===== AIRTABLE PROXY ===== */
async function atFetch(method, table, id='', body=null, params='') {
  const url = `${PROXY}?base=${BASE}&table=${encodeURIComponent(table)}${id ? '&id='+id : ''}${params}`;
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  return res.json();
}

/* ===== LOAD PERSONEL ===== */
async function loadPersonel() {
  try {
    const data = await atFetch('GET', T.personel, '', null, '&maxRecords=100&fields[]=Ad Soyad');
    personelList = (data.records || []).map(r => ({id: r.id, name: r.fields['Ad Soyad'] || r.id}));
  } catch(e) {
    personelList = [];
  }
}

/* ===== LOAD DENETİMLER ===== */
async function loadDenetimler() {
  try {
    const data = await atFetch('GET', T.denetim, '', null, '&maxRecords=200&sort[0][field]=Tarih&sort[0][direction]=desc');
    allRecords = data.records || [];
    renderList();
  } catch(e) {
    document.getElementById('listScroll').innerHTML = `<div class="list-empty">Hata: ${e.message}</div>`;
  }
}

/* ===== RENDER LIST ===== */
function renderList() {
  const filtered = currentFilter === 'Tümü'
    ? allRecords
    : allRecords.filter(r => (r.fields['Statü'] || '') === currentFilter);

  document.getElementById('listCount').textContent = filtered.length + ' kayıt';
  const el = document.getElementById('listScroll');

  if (!filtered.length) {
    el.innerHTML = '<div class="list-empty">Kayıt bulunamadı</div>';
    return;
  }

  el.innerHTML = filtered.map(r => {
    const f = r.fields;
    const no = f['Denetim No'] || '—';
    const tarih = f['Tarih'] || '';
    const kapsam = f['Kapsam'] || '';
    const statu = f['Statü'] || '';
    const active = r.id === currentRecordId ? ' active' : '';
    return `<div class="den-item${active}" onclick="selectRecord('${r.id}')">
      <div class="den-no">${escHtml(no)}</div>
      <div class="den-tarih">${tarih ? formatTarih(tarih) : '—'}</div>
      <div class="den-kapsam">${escHtml(kapsam.substring(0,60))}${kapsam.length>60?'…':''}</div>
      <div class="den-meta">
        <span class="badge b-${escClass(statu)}">${escHtml(statu||'—')}</span>
      </div>
    </div>`;
  }).join('');
}

/* ===== FILTER ===== */
function setFilter(el, val) {
  currentFilter = val;
  document.querySelectorAll('.fc').forEach(e => e.classList.remove('on'));
  el.classList.add('on');
  renderList();
}

/* ===== SELECT RECORD ===== */
function selectRecord(id) {
  currentRecordId = id;
  isNew = false;
  renderList();
  const rec = allRecords.find(r => r.id === id);
  if (rec) renderDetail(rec);
}

/* ===== NEW DENETİM ===== */
function newDenetim() {
  currentRecordId = null;
  isNew = true;
  renderList();
  renderDetail(null);
}

/* ===== AUTO NO ===== */
function genDenetimNo() {
  const year = new Date().getFullYear();
  const existing = allRecords
    .map(r => r.fields['Denetim No'] || '')
    .filter(n => n.startsWith(`DEN-${year}-`))
    .map(n => parseInt(n.split('-')[2]) || 0);
  const max = existing.length ? Math.max(...existing) : 0;
  return `DEN-${year}-${String(max + 1).padStart(3,'0')}`;
}

/* ===== RENDER DETAIL ===== */
function renderDetail(rec) {
  const f = rec ? rec.fields : {};
  const id = rec ? rec.id : null;
  const denetimNo = isNew ? genDenetimNo() : (f['Denetim No'] || '');
  const tarih = f['Tarih'] || '';
  const kapsam = f['Kapsam'] || '';
  const statu = f['Statü'] || 'Planlandı';
  const notlar = f['Notlar'] || '';

  // Denetçi: multipleRecordLinks array of record IDs
  const denetciIds = f['Denetçi'] || [];

  // Bulgular: JSON string
  let bulgular = [];
  try { bulgular = JSON.parse(f['Bulgular'] || '[]'); } catch(e) { bulgular = []; }

  // Toolbar
  document.getElementById('toolbarTitle').textContent = isNew ? '+ Yeni Denetim' : denetimNo;
  document.getElementById('btnDelete').style.display = (!isNew && id) ? '' : 'none';

  const personelOptions = personelList.map(p =>
    `<option value="${p.id}" ${denetciIds.includes(p.id)?'selected':''}>${escHtml(p.name)}</option>`
  ).join('');

  const statuOpts = ['Planlandı','Devam Ediyor','Tamamlandı'].map(s =>
    `<option value="${s}" ${statu===s?'selected':''}>${s}</option>`
  ).join('');

  // Build bulgular HTML
  const bulgularHtml = bulgular.map((b,i) => buildBulguCard(b, i)).join('');

  document.getElementById('detailScroll').innerHTML = `

    <!-- CARD 1: Denetim Planı -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot" style="background:var(--accent)"></div>
        Denetim Planı
        <div class="card-header-right">
          <span class="badge b-${escClass(statu)}">${escHtml(statu)}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="form-grid" style="margin-bottom:10px;">
          <div class="fg">
            <label class="fl">Denetim No</label>
            <input class="fi" type="text" id="fDenetimNo" value="${escHtml(denetimNo)}" placeholder="DEN-2026-001" style="font-family:var(--mono);" readonly>
          </div>
          <div class="fg">
            <label class="fl">Tarih</label>
            <input class="fi" type="date" id="fTarih" value="${tarih}">
          </div>
        </div>
        <div class="form-grid" style="margin-bottom:10px;">
          <div class="fg">
            <label class="fl">Denetçi (Personel)</label>
            <select class="fi" id="fDenetci" multiple size="3" style="min-height:70px;">
              ${personelOptions}
            </select>
            <small style="font-size:10px;color:var(--text3);margin-top:2px;">Ctrl/Cmd ile çoklu seçim</small>
          </div>
          <div class="fg">
            <label class="fl">Statü</label>
            <select class="fi" id="fStatu">${statuOpts}</select>
          </div>
        </div>
        <div class="fg" style="margin-bottom:10px;">
          <label class="fl">Kapsam (Hangi modüller / prosesler)</label>
          <textarea class="fi" id="fKapsam" rows="3" placeholder="Örn: Satınalma prosesi, girdi kalite kontrolü, doküman yönetimi…">${escHtml(kapsam)}</textarea>
        </div>
        <div class="fg" style="margin-bottom:12px;">
          <label class="fl">Notlar</label>
          <textarea class="fi" id="fNotlar" rows="2" placeholder="Denetim öncesi notlar…">${escHtml(notlar)}</textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn primary" onclick="saveDenetim()">💾 Kaydet</button>
        </div>
      </div>
    </div>

    <!-- CARD 2: Bulgular -->
    <div class="card" id="bulgularCard" style="display:${isNew?'none':''};">
      <div class="card-header">
        <div class="card-dot" style="background:var(--red)"></div>
        Bulgular
        <div class="card-header-right">
          <button class="btn sm" onclick="addBulgu()">+ Bulgu Ekle</button>
        </div>
      </div>
      <div class="card-body">
        <div class="bulgu-list" id="bulguList">
          ${bulgularHtml || '<div style="color:var(--text3);font-size:12px;padding:4px 0;">Henüz bulgu eklenmedi.</div>'}
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
          <button class="btn primary" onclick="saveBulgular()">💾 Bulguları Kaydet</button>
        </div>
      </div>
    </div>

    <!-- CARD 3: AI Kontrol Listesi -->
    <div class="card" id="aiCard" style="display:${isNew?'none':''};">
      <div class="card-header">
        <div class="card-dot" style="background:var(--blue)"></div>
        AI Kontrol Listesi
        <div class="card-header-right">
          <button class="btn sm primary" onclick="generateAI()">✨ AI Kontrol Listesi Oluştur</button>
        </div>
      </div>
      <div class="card-body">
        <div id="aiResult" style="color:var(--text3);font-size:12px;padding:4px 0;">
          "AI Kontrol Listesi Oluştur" butonuna tıklayarak AS9100 Rev.D uyumlu denetim kontrol listesi oluşturun.
        </div>
      </div>
    </div>
  `;

  // Re-bind bulgu index references
  window._bulgular = bulgular.slice();
}

/* ===== BUILD BULGU CARD HTML ===== */
function buildBulguCard(b, i) {
  const tipOpts = ['Majör','Minör','Gözlem'].map(t =>
    `<option value="${t}" ${(b.tip||''===t)?'selected':''}>${t}</option>`
  ).join('');
  // Check selected properly
  const tipler = ['Majör','Minör','Gözlem'];
  const tipOptsCorrect = tipler.map(t =>
    `<option value="${t}" ${b.tip===t?'selected':''}>${t}</option>`
  ).join('');

  return `<div class="bulgu-card" id="bulguCard${i}">
    <div class="bulgu-card-head">
      <span class="badge b-${escClass(b.tip||'Gözlem')}">${escHtml(b.tip||'Gözlem')}</span>
      <span style="font-size:11px;color:var(--text3);">Bulgu #${i+1}</span>
      <button class="bulgu-remove-btn" onclick="removeBulgu(${i})" title="Kaldır">✕</button>
    </div>
    <div class="bulgu-grid">
      <div class="fg">
        <label class="fl">Tipi</label>
        <select class="fi" id="bTip${i}" onchange="updateBulguBadge(${i})">
          ${tipOptsCorrect}
        </select>
      </div>
      <div class="fg">
        <label class="fl">AS9100 Maddesi</label>
        <input class="fi" type="text" id="bMadde${i}" value="${escHtml(b.madde||'')}" placeholder="Örn: 8.4.1">
      </div>
      <div class="fg" style="grid-column:1/-1;">
        <label class="fl">Açıklama</label>
        <textarea class="fi" id="bAciklama${i}" rows="2" placeholder="Bulgu açıklaması…">${escHtml(b.aciklama||'')}</textarea>
      </div>
      <div class="fg" style="grid-column:1/-1;">
        <label class="fl">Kapanış Hedef Tarihi</label>
        <input class="fi" type="date" id="bKapanis${i}" value="${b.kapanis||''}">
      </div>
    </div>
  </div>`;
}

/* ===== ADD BULGU ===== */
function addBulgu() {
  window._bulgular = collectBulgular();
  window._bulgular.push({tip:'Gözlem', madde:'', aciklama:'', kapanis:''});
  const list = document.getElementById('bulguList');
  list.innerHTML = window._bulgular.map((b,i) => buildBulguCard(b,i)).join('');
}

/* ===== REMOVE BULGU ===== */
function removeBulgu(i) {
  window._bulgular = collectBulgular();
  window._bulgular.splice(i, 1);
  const list = document.getElementById('bulguList');
  if (window._bulgular.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:4px 0;">Henüz bulgu eklenmedi.</div>';
  } else {
    list.innerHTML = window._bulgular.map((b,i) => buildBulguCard(b,i)).join('');
  }
}

/* ===== UPDATE BULGU BADGE ===== */
function updateBulguBadge(i) {
  const tip = document.getElementById('bTip'+i).value;
  const card = document.getElementById('bulguCard'+i);
  if (card) {
    const badge = card.querySelector('.badge');
    badge.className = `badge b-${escClass(tip)}`;
    badge.textContent = tip;
  }
}

/* ===== COLLECT BULGULAR ===== */
function collectBulgular() {
  const list = document.getElementById('bulguList');
  if (!list) return [];
  const cards = list.querySelectorAll('.bulgu-card');
  const result = [];
  cards.forEach((c, i) => {
    result.push({
      tip: (document.getElementById('bTip'+i)||{}).value || '',
      madde: (document.getElementById('bMadde'+i)||{}).value || '',
      aciklama: (document.getElementById('bAciklama'+i)||{}).value || '',
      kapanis: (document.getElementById('bKapanis'+i)||{}).value || ''
    });
  });
  return result;
}

/* ===== SAVE DENETİM ===== */
async function saveDenetim() {
  const no = document.getElementById('fDenetimNo').value.trim();
  const tarih = document.getElementById('fTarih').value;
  const kapsam = document.getElementById('fKapsam').value.trim();
  const statu = document.getElementById('fStatu').value;
  const notlar = document.getElementById('fNotlar').value.trim();

  // Collect selected denetçi IDs
  const denetciSel = document.getElementById('fDenetci');
  const denetciIds = denetciSel
    ? Array.from(denetciSel.selectedOptions).map(o => o.value)
    : [];

  if (!no) { toast('Denetim No gerekli', true); return; }
  if (!tarih) { toast('Tarih gerekli', true); return; }

  const fields = {
    'Denetim No': no,
    'Tarih': tarih,
    'Kapsam': kapsam,
    'Statü': statu,
    'Notlar': notlar
  };
  if (denetciIds.length) fields['Denetçi'] = denetciIds;

  try {
    const btn = document.querySelector('[onclick="saveDenetim()"]');
    btn.disabled = true; btn.textContent = 'Kaydediliyor…';

    let savedId, savedRec;
    if (isNew) {
      const res = await atFetch('POST', T.denetim, '', {fields});
      savedId = res.id;
      savedRec = res;
      allRecords.unshift(res);
      await logIslem('Oluşturuldu', 'İç Denetim', savedId, no, null, fields);
      toast('Denetim oluşturuldu: ' + no);
    } else {
      const res = await atFetch('PATCH', T.denetim, currentRecordId, {fields});
      savedId = res.id;
      savedRec = res;
      const idx = allRecords.findIndex(r => r.id === currentRecordId);
      if (idx !== -1) allRecords[idx] = res;
      await logIslem('Güncellendi', 'İç Denetim', savedId, no, null, fields);
      toast('Denetim güncellendi');
    }

    currentRecordId = savedId;
    isNew = false;
    renderList();
    renderDetail(savedRec);
  } catch(e) {
    toast('Hata: ' + e.message, true);
  } finally {
    const btn = document.querySelector('[onclick="saveDenetim()"]');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Kaydet'; }
  }
}

/* ===== SAVE BULGULAR ===== */
async function saveBulgular() {
  if (!currentRecordId) { toast('Önce denetimi kaydedin', true); return; }
  const bulgular = collectBulgular();
  const fields = { 'Bulgular': JSON.stringify(bulgular) };
  try {
    const btn = document.querySelector('[onclick="saveBulgular()"]');
    btn.disabled = true; btn.textContent = 'Kaydediliyor…';
    const res = await atFetch('PATCH', T.denetim, currentRecordId, {fields});
    const idx = allRecords.findIndex(r => r.id === currentRecordId);
    if (idx !== -1) allRecords[idx] = res;
    await logIslem('Güncellendi', 'İç Denetim', currentRecordId, res.fields['Denetim No']||'', null, {bulgular: bulgular.length + ' bulgu'});
    toast('Bulgular kaydedildi (' + bulgular.length + ' adet)');
  } catch(e) {
    toast('Hata: ' + e.message, true);
  } finally {
    const btn = document.querySelector('[onclick="saveBulgular()"]');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Bulguları Kaydet'; }
  }
}

/* ===== DELETE ===== */
async function deleteDenetim() {
  if (!currentRecordId) return;
  const rec = allRecords.find(r => r.id === currentRecordId);
  const no = rec ? (rec.fields['Denetim No']||'') : '';
  if (!confirm(`"${no}" denetimini silmek istediğinize emin misiniz?`)) return;
  try {
    await atFetch('DELETE', T.denetim, currentRecordId);
    await logIslem('Silindi', 'İç Denetim', currentRecordId, no, null, null);
    allRecords = allRecords.filter(r => r.id !== currentRecordId);
    currentRecordId = null;
    isNew = false;
    renderList();
    document.getElementById('detailScroll').innerHTML = `
      <div class="empty-state">
        <div class="es-icon">🗑️</div>
        <div class="es-text">Denetim silindi</div>
        <div class="es-sub">Sol panelden yeni bir kayıt seçin</div>
      </div>`;
    document.getElementById('toolbarTitle').textContent = '—';
    document.getElementById('btnDelete').style.display = 'none';
    toast('Denetim silindi: ' + no);
  } catch(e) {
    toast('Hata: ' + e.message, true);
  }
}

/* ===== AI KONTROL LİSTESİ ===== */
async function generateAI() {
  const kapsam = (document.getElementById('fKapsam')||{}).value || '';
  const aiResult = document.getElementById('aiResult');
  if (!kapsam.trim()) {
    toast('Önce Kapsam alanını doldurun', true);
    return;
  }

  const btn = document.querySelector('[onclick="generateAI()"]');
  btn.disabled = true;
  btn.textContent = '⏳ Oluşturuluyor…';
  aiResult.className = 'ai-result loading';
  aiResult.textContent = 'AI kontrol listesi oluşturuluyor, lütfen bekleyin…';

  const prompt = `AS9100 Rev.D için "${kapsam}" modülü denetim kontrol listesi hazırla. Türkçe, madde madde.`;

  try {
    const res = await fetch(AI_PROXY, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: [{role:'user', content: prompt}]
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const text = data?.content?.[0]?.text || data?.choices?.[0]?.message?.content || JSON.stringify(data);
    aiResult.className = 'ai-result';
    aiResult.textContent = text;
    toast('AI kontrol listesi oluşturuldu');
  } catch(e) {
    aiResult.className = '';
    aiResult.textContent = 'Hata: ' + e.message;
    toast('AI hatası: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ AI Kontrol Listesi Oluştur';
  }
}

/* ===== UTILS ===== */
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escClass(s) {
  return String(s||'').replace(/\s+/g,' ');
}
function formatTarih(d) {
  if (!d) return '—';
  const [y,m,gn] = d.split('-');
  return `${gn}.${m}.${y}`;
}
</script>

<script>
