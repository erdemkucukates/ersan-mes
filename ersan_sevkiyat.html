<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Sevkiyat &amp; CoC</title>
<link rel="stylesheet" href="utils/sidebar.css">
<link rel="stylesheet" href="ersan_styles.css">
<script src="utils/sidebar.js" defer></script>
<script src="ersan_log.js" defer></script>
</head>
<body data-page="satis-sevkiyat">
<div class="app">
<div id="sb-mount"></div>
<div class="icerik-alani main">
  <div class="topbar">
    <div class="topbar-baslik">Sevkiyat</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

<div class="layout-wrapper">

  <!-- LEFT PANEL -->
  <div class="list-panel">
    <div class="list-header">
      <h2>Sevkiyat</h2>
      <div class="list-count" id="list-count">— kayıt</div>
    </div>
    <div class="list-search">
      <input type="text" id="ie-search" placeholder="IE No, Parça ara..." oninput="renderList()">
    </div>
    <div class="filter-row">
      <span class="fc on" data-f="Tümü" onclick="setFilter(this)">Tümü</span>
      <span class="fc" data-f="Hazır" onclick="setFilter(this)">Hazır</span>
      <span class="fc" data-f="Bekliyor" onclick="setFilter(this)">Bekliyor</span>
      <span class="fc" data-f="Sevk Edildi" onclick="setFilter(this)">Sevk Edildi</span>
    </div>
    <div class="list-scroll" id="ie-list">
      <div class="empty"><div class="empty-icon">🚚</div><div>Yükleniyor...</div></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="detail-panel">
    <div class="detail-toolbar">
      <div class="toolbar-title" id="toolbar-title">Sevkiyat &amp; CoC</div>
      <button class="btn" onclick="refreshAll()" title="Yenile">↺ Yenile</button>
      <button class="btn success" id="btn-sevket" disabled onclick="sevkEt()">🚚 Sevk Et</button>
    </div>
    <div class="detail-scroll" id="detail-scroll">
      <div class="empty">
        <div class="empty-icon">🚚</div>
        <div style="font-size:14px;font-weight:600;color:var(--text2);">İş Emri Seçin</div>
        <div style="font-size:12px;">Sol listeden tamamlanmış bir iş emri seçerek sevk kontrolü yapın.</div>
      </div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toast-container"></div>

  </div>
</div>

<script>
// ── CONFIG ──
const BASE = 'app5LDgJMgocw79Ix';
const T = {
  ie:       'tbl58qL39I2tv8hK4',
  se:       'tbl56Oj1nPaqefI60',
  op:       'tblVECelTUG33EYm8',
  muayene:  'tblm47qZunWAsfufH',
  ncr:      'tblreW3hJTIxwXb0K',
  malzeme:  'tblSj5Ep6F9Ir1NGu',
  musteri:  'tblPxhjJDEx0fyUQx'
};

// ── STATE ──
let ieList = [];
let selectedId = null;
let activeFilter = 'Tümü';
let checkResults = {};   // {index: {ok, label, sub}}
let cocData = null;      // generated CoC fields

// ── API ──
const apiFn = async (method, table, body, id='') => {
  const path = `/v0/${BASE}/${table}${id ? '/'+id : ''}`;
  const res = await fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({method, path, body})
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
};
const apiGetFn = async (table, params='') => {
  const path = `/v0/${BASE}/${table}?${params}`;
  const res = await fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({method:'GET', path})
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
};
const apiGetAll = async (table, params='') => {
  let all = [], offset = '';
  do {
    const d = await apiGetFn(table, params + (offset ? '&offset='+offset : ''));
    all = all.concat(d.records || []);
    offset = d.offset || '';
  } while (offset);
  return all;
};

// ── HELPERS ──
const escHtml = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate = d => { if(!d) return '—'; try { return new Date(d).toLocaleDateString('tr-TR'); } catch { return d; } };
const todayISO = () => new Date().toISOString().slice(0,10);
const todayLocal = () => new Date().toLocaleDateString('tr-TR');

// ── KARGO TAKİP LİNKLERİ ──
var KARGO_URL = {
  'DHL': function(no) { return 'https://www.dhl.com/tr-tr/home/tracking/tracking.html?submit=1&tracking-id=' + no; },
  'MNG': function(no) { return 'https://www.mngkargo.com.tr/gonderi-sorgula?trackingNumber=' + no; },
  'MNG Kargo': function(no) { return 'https://www.mngkargo.com.tr/gonderi-sorgula?trackingNumber=' + no; },
  'Aras': function(no) { return 'https://kargotakip.araskargo.com.tr/?sorgula=' + no; },
  'Aras Kargo': function(no) { return 'https://kargotakip.araskargo.com.tr/?sorgula=' + no; },
  'Yurtiçi': function(no) { return 'https://www.yurticikargo.com/tr/online-islemler/gonderi-sorgula?code=' + no; },
  'Yurtiçi Kargo': function(no) { return 'https://www.yurticikargo.com/tr/online-islemler/gonderi-sorgula?code=' + no; }
};

function kargoLinkOlustur(firma, takipNo) {
  if (!firma || !takipNo) return null;
  var fn = KARGO_URL[firma];
  return fn ? fn(takipNo) : null;
}

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function sevkDurumu(f) {
  const d = f['Durum'] || '';
  const sevk = f['Sevkiyat Durumu'] || '';
  if (sevk === 'Sevk Edildi') return 'Sevk Edildi';
  if (d === 'Tamamlandı') return 'Hazır';
  return 'Bekliyor';
}

// ── FILTER ──
function setFilter(el) {
  document.querySelectorAll('.filter-row .fc').forEach(e => e.classList.remove('on'));
  el.classList.add('on');
  activeFilter = el.dataset.f;
  renderList();
}

// ── LOAD ──
async function loadAll() {
  try {
    document.getElementById('ie-list').innerHTML =
      '<div class="empty"><div class="empty-icon" style="font-size:24px">⏳</div><div>Yükleniyor...</div></div>';
    // Load tamamlandı or beklemede IEs
    ieList = await apiGetAll(T.ie,
      'sort[0][field]=IE%20No&sort[0][direction]=desc');
    renderList();
  } catch(e) {
    toast('Yükleme hatası: ' + e.message, 'err');
    document.getElementById('ie-list').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><div>Yükleme hatası</div></div>';
  }
}

function renderList() {
  const q = (document.getElementById('ie-search').value || '').toLowerCase().trim();
  let items = ieList.filter(r => {
    const f = r.fields;
    const d = f['Durum'] || '';
    // Show Tamamlandı, Üretimde (bekliyor), or Sevk Edildi
    if (!['Tamamlandı','Üretimde','Beklemede'].includes(d) && f['Sevkiyat Durumu'] !== 'Sevk Edildi') return false;
    const sd = sevkDurumu(f);
    if (activeFilter !== 'Tümü' && sd !== activeFilter) return false;
    if (q) {
      const match = (f['IE No']||'').toLowerCase().includes(q) ||
        (f['Parça Adı']||'').toLowerCase().includes(q) ||
        (f['Parça No']||'').toLowerCase().includes(q);
      if (!match) return false;
    }
    return true;
  });

  document.getElementById('list-count').textContent = items.length + ' kayıt';

  if (!items.length) {
    document.getElementById('ie-list').innerHTML =
      '<div class="empty"><div class="empty-icon">📭</div><div>Kayıt bulunamadı</div></div>';
    return;
  }

  var bugun = todayISO();
  document.getElementById('ie-list').innerHTML = items.map(r => {
    const f = r.fields;
    const sd = sevkDurumu(f);
    const badgeCls = 'b-sevk-' + sd;
    const isActive = r.id === selectedId ? ' secili' : '';
    var tahminTeslim = f['Tahmini Teslim'] || f['Teslim Tarihi'] || '';
    var gecikmisMi = tahminTeslim && tahminTeslim < bugun && sd !== 'Sevk Edildi';
    var gecikStyle = gecikmisMi ? 'border-left:3px solid var(--red);background:rgba(239,68,68,0.06);' : '';
    var gecikBadge = gecikmisMi ? '<span style="font-size:9px;color:var(--red);font-weight:600;">GECİKMİŞ</span>' : '';
    return `<div class="liste-satir ie-item${isActive}" style="${gecikStyle}" onclick="selectIE('${r.id}')">
      <div class="ie-no">${escHtml(f['IE No']||'—')}</div>
      <div class="ie-parca">${escHtml(f['Parça Adı']||'—')}</div>
      <div class="ie-meta">
        <span style="font-size:10px;color:var(--text3)">${f['Miktar']||0} ${f['Birim']||'Adet'}</span>
        ${gecikBadge}
        <span class="badge ${badgeCls}">${escHtml(sd)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── SELECT IE ──
async function selectIE(id) {
  selectedId = id;
  renderList(); // update active highlight
  checkResults = {};
  cocData = null;

  const rec = ieList.find(r => r.id === id);
  if (!rec) return;
  const f = rec.fields;

  document.getElementById('toolbar-title').textContent = (f['IE No']||'—') + ' — ' + (f['Parça Adı']||'');
  document.getElementById('btn-sevket').disabled = true;

  renderDetailSkeleton(rec);

  // Pre-fill irsaliye fields and kargo link from existing data
  if (f['İrsaliye No']) { var el = document.getElementById('irsaliye-no'); if (el) el.value = f['İrsaliye No']; }
  if (f['İrsaliye Tarihi']) { var el2 = document.getElementById('irsaliye-tarih'); if (el2) el2.value = f['İrsaliye Tarihi']; }
  if (f['Kargo']) { var el3 = document.getElementById('irsaliye-kargo'); if (el3) el3.value = f['Kargo']; }
  if (f['Takip No']) { var el4 = document.getElementById('irsaliye-takip'); if (el4) el4.value = f['Takip No']; }
  if (f['Sevkiyat Notları']) { var el5 = document.getElementById('irsaliye-notlar'); if (el5) el5.value = f['Sevkiyat Notları']; }
  updateKargoLink(f['Kargo'] || '', f['Takip No'] || '');

  await runChecks(rec);
}

function renderDetailSkeleton(rec) {
  const f = rec.fields;
  const sd = sevkDurumu(f);
  document.getElementById('detail-scroll').innerHTML = `
    <!-- Card 1: Ön Kontrol -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot" style="background:var(--accent)"></div>
        Sevk Ön Kontrol
        <span id="kontrol-badge" style="margin-left:auto;font-size:10px;color:var(--text3)">Kontrol ediliyor...</span>
      </div>
      <div class="card-body">
        <div class="checklist" id="checklist-container">
          ${[1,2,3,4,5,6,7,8].map(i=>`
          <div class="check-item loading" id="chk-${i}">
            <span class="check-icon">⏳</span>
            <div><div class="check-label">${getCheckLabel(i)}</div></div>
          </div>`).join('')}
        </div>
        <div style="margin-top:12px;display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn" onclick="runChecks(ieList.find(r=>r.id===selectedId))">↺ Kontrol Et</button>
          <button class="btn success" id="btn-sevket-inline" disabled onclick="sevkEt()">🚚 Sevk Et</button>
        </div>
      </div>
    </div>

    <!-- Card 2: CoC -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot" style="background:var(--blue)"></div>
        CoC Oluştur
        <span style="margin-left:auto;font-size:10px;color:var(--text3)">Uygunluk Beyannamesi</span>
      </div>
      <div class="card-body">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
          <button class="btn primary" onclick="generateCoC()">📄 CoC Oluştur</button>
          <button class="btn" id="btn-pdf" disabled onclick="printCoC()">⬇ PDF İndir</button>
        </div>
        <div id="coc-print-area">
          <div id="coc-container" style="color:var(--text3);font-size:12px;padding:8px 0;">
            CoC oluşturmak için butona tıklayın.
          </div>
        </div>
      </div>
    </div>

    <!-- Card 3: İrsaliye -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot" style="background:var(--orange)"></div>
        İrsaliye Bilgileri
      </div>
      <div class="card-body">
        <div class="form-grid" style="margin-bottom:10px;">
          <div class="fg">
            <label class="fl">İrsaliye No</label>
            <input class="fi" type="text" id="irsaliye-no" placeholder="ör: IRS-2026-001">
          </div>
          <div class="fg">
            <label class="fl">Tarih</label>
            <input class="fi" type="date" id="irsaliye-tarih" value="${todayISO()}">
          </div>
          <div class="fg">
            <label class="fl">Kargo / Taşıyıcı</label>
            <input class="fi" type="text" id="irsaliye-kargo" placeholder="ör: Yurtiçi Kargo" oninput="updateKargoLink(this.value, document.getElementById('irsaliye-takip').value)">
          </div>
          <div class="fg">
            <label class="fl">Takip No</label>
            <input class="fi" type="text" id="irsaliye-takip" placeholder="ör: 123456789" oninput="updateKargoLink(document.getElementById('irsaliye-kargo').value, this.value)">
          </div>
        </div>
        <div class="fg" style="margin-bottom:12px;">
          <label class="fl">Notlar</label>
          <textarea class="fi" id="irsaliye-notlar" placeholder="Sevkiyat notları..."></textarea>
        </div>
        <div id="kargo-link-area" style="margin-bottom:12px;"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn" onclick="printIrsaliye()">🖨 İrsaliye Yazdır</button>
          <button class="btn primary" onclick="saveIrsaliye()">💾 Kaydet</button>
        </div>
      </div>
    </div>
  `;
}

function getCheckLabel(i) {
  const labels = [
    'Tüm operasyonlar tamamlandı',
    'Son muayene onaylandı',
    'Açık NCR yok',
    'Malzeme sertifikası mevcut',
    'FAI durumu',
    'Sapma onayı',
    'Miktar doğrulandı',
    'Kaliteci imzası'
  ];
  return labels[i-1] || '';
}

// ── RUN CHECKS ──
async function runChecks(rec) {
  if (!rec) return;
  const f = rec.fields;
  const ieId = rec.id;
  const ieNo = f['IE No'] || '';

  // Reset UI
  for (let i = 1; i <= 8; i++) updateCheck(i, 'loading', getCheckLabel(i), '');
  document.getElementById('btn-sevket').disabled = true;
  const inlineBtn = document.getElementById('btn-sevket-inline');
  if (inlineBtn) inlineBtn.disabled = true;

  try {
    // 1. Tüm operasyonlar tamamlandı
    let opsOk = false, opsSub = '';
    try {
      const opsData = await apiGetFn(T.op,
        `filterByFormula=${encodeURIComponent(`{İş Emri}='${ieNo}'`)}&fields[]=Durum&fields[]=Operasyon%20Tanımı`);
      const ops = opsData.records || [];
      if (ops.length === 0) { opsOk = false; opsSub = 'Operasyon rotası bulunamadı'; }
      else {
        const pending = ops.filter(r => (r.fields['Durum']||'') !== 'Tamamlandı');
        opsOk = pending.length === 0;
        opsSub = opsOk ? `${ops.length} operasyon tamamlandı` : `${pending.length}/${ops.length} bekliyor`;
      }
    } catch(e) { opsSub = 'Kontrol edilemedi'; }
    updateCheck(1, opsOk ? 'ok' : 'fail', getCheckLabel(1), opsSub);

    // 2. Son muayene onaylandı
    let muayeneOk = false, muayeneSub = '';
    try {
      const muData = await apiGetFn(T.muayene,
        `filterByFormula=${encodeURIComponent(`{İş Emri No}='${ieNo}'`)}&sort[0][field]=Muayene%20Tarihi&sort[0][direction]=desc&maxRecords=5`);
      const muRecs = muData.records || [];
      if (muRecs.length === 0) { muayeneOk = false; muayeneSub = 'Muayene kaydı yok'; }
      else {
        const approved = muRecs.find(r => {
          const s = (r.fields['Sonuç']||r.fields['Karar']||r.fields['Gözle Muayene']||r.fields['Durum']||'');
          return s === 'Uygun' || s === 'Onaylandı' || s === 'Geçti';
        });
        muayeneOk = !!approved;
        muayeneSub = muayeneOk ? 'Son muayene: Uygun' : `Son durum: ${muRecs[0].fields['Sonuç']||muRecs[0].fields['Karar']||muRecs[0].fields['Durum']||'?'}`;
      }
    } catch(e) { muayeneSub = 'Kontrol edilemedi'; }
    updateCheck(2, muayeneOk ? 'ok' : 'warn', getCheckLabel(2), muayeneSub);

    // 3. Açık NCR yok
    let ncrOk = false, ncrSub = '';
    try {
      const ncrData = await apiGetFn(T.ncr,
        `filterByFormula=${encodeURIComponent(`AND({İş Emri No}='${ieNo}',{Statü}!='Kapalı')`)}&fields[]=Statü&fields[]=NCR%20No`);
      const openNcrs = ncrData.records || [];
      ncrOk = openNcrs.length === 0;
      ncrSub = ncrOk ? 'Açık NCR bulunamadı' : `${openNcrs.length} açık NCR mevcut`;
    } catch(e) { ncrSub = 'Kontrol edilemedi'; }
    updateCheck(3, ncrOk ? 'ok' : 'fail', getCheckLabel(3), ncrSub);

    // 4. Malzeme sertifikası mevcut
    let sertOk = false, sertSub = '';
    try {
      const malData = await apiGetFn(T.malzeme,
        `filterByFormula=${encodeURIComponent(`{İş Emri}='${ieNo}'`)}&fields[]=Sertifika%20Durumu&fields[]=Sertifika%20No`);
      const malRecs = malData.records || [];
      if (malRecs.length === 0) { sertOk = false; sertSub = 'Malzeme kaydı bulunamadı'; }
      else {
        const withCert = malRecs.filter(r => {
          const sd = (r.fields['Sertifika Durumu']||'').toLowerCase();
          return sd === 'mevcut' || sd === 'var' || sd === 'evet' || r.fields['Sertifika No'];
        });
        sertOk = withCert.length > 0;
        sertSub = sertOk ? `Sertifika: ${withCert[0].fields['Sertifika No']||'Mevcut'}` : 'Sertifika eksik';
      }
    } catch(e) { sertSub = 'Kontrol edilemedi'; }
    updateCheck(4, sertOk ? 'ok' : 'warn', getCheckLabel(4), sertSub);

    // 5. FAI durumu
    let faiOk = false, faiSub = '';
    const faiGerekli = f['FAI Gerekli mi?'] || f['FAI Gerekli'] || false;
    const faiDurum = f['FAI Durumu'] || f['FAI'] || '';
    if (!faiGerekli) { faiOk = true; faiSub = 'FAI gerekli değil'; }
    else {
      faiOk = faiDurum === 'Tamamlandı' || faiDurum === 'Onaylandı';
      faiSub = faiOk ? `FAI: ${faiDurum}` : `FAI gerekli, durum: ${faiDurum||'Belirsiz'}`;
    }
    updateCheck(5, faiOk ? 'ok' : (faiGerekli ? 'warn' : 'ok'), getCheckLabel(5), faiSub);

    // 6. Sapma onayı
    let sapmaOk = true, sapmaSub = '';
    try {
      const sapmaData = await apiGetFn(T.ncr,
        `filterByFormula=${encodeURIComponent(`AND({İş Emri No}='${ieNo}',{Karar}='Sapma')`)}&fields[]=Karar&fields[]=Statü&fields[]=NCR%20No`);
      const sapmaRecs = sapmaData.records || [];
      if (sapmaRecs.length === 0) { sapmaOk = true; sapmaSub = 'Sapma kaydı yok'; }
      else {
        const openSapma = sapmaRecs.filter(r => (r.fields['Statü']||'') !== 'Kapalı');
        sapmaOk = openSapma.length === 0;
        sapmaSub = sapmaOk
          ? `${sapmaRecs.length} sapma — hepsi kapatılmış`
          : `${openSapma.length} açık sapma onayı bekliyor`;
      }
    } catch(e) { sapmaSub = 'Kontrol edilemedi'; }
    updateCheck(6, sapmaOk ? 'ok' : 'warn', getCheckLabel(6), sapmaSub);

    // 7. Miktar doğrulandı
    const miktar = f['Miktar'] || 0;
    const miktarOk = miktar > 0;
    updateCheck(7, miktarOk ? 'ok' : 'fail', getCheckLabel(7),
      miktarOk ? `${miktar} ${f['Birim']||'Adet'}` : 'Miktar girilmemiş');

    // 8. Kaliteci imzası
    const kaliteci = f['Kaliteci'] || f['Kalite Onay'] || f['Kalite Sorumlusu'] || '';
    const kaliteciOk = !!kaliteci;
    updateCheck(8, kaliteciOk ? 'ok' : 'warn', getCheckLabel(8),
      kaliteciOk ? `İmzalayan: ${kaliteci}` : 'Kaliteci kaydı yok (manuel kontrol)');

    // Decide if Sevk Et enabled
    const criticals = [1, 3, 7]; // must all be ok
    const allCritical = criticals.every(i => checkResults[i] === true);
    const allOk = [1,2,3,4,5,6,7,8].every(i => checkResults[i] !== false);

    const canSevk = allCritical;
    document.getElementById('btn-sevket').disabled = !canSevk;
    const ibtn = document.getElementById('btn-sevket-inline');
    if (ibtn) ibtn.disabled = !canSevk;

    const badge = document.getElementById('kontrol-badge');
    if (badge) {
      if (allOk) { badge.textContent = '✅ Tüm kontroller geçti'; badge.style.color = 'var(--green)'; }
      else if (canSevk) { badge.textContent = '⚠️ Uyarılar var'; badge.style.color = 'var(--orange)'; }
      else { badge.textContent = '❌ Kritik kontrol başarısız'; badge.style.color = 'var(--red)'; }
    }

  } catch(e) {
    toast('Kontrol hatası: ' + e.message, 'err');
  }
}

function updateCheck(i, state, label, sub) {
  const el = document.getElementById('chk-' + i);
  if (!el) return;
  el.className = 'check-item ' + (state === 'loading' ? 'loading' : state === 'ok' ? 'ok' : state === 'fail' ? 'fail' : 'warn');
  const icon = state === 'loading' ? '⏳' : state === 'ok' ? '✅' : state === 'fail' ? '❌' : '⚠️';
  el.innerHTML = `<span class="check-icon">${icon}</span>
    <div><div class="check-label">${escHtml(label)}</div>${sub ? `<div class="check-sub">${escHtml(sub)}</div>` : ''}</div>`;
  // store result
  if (state !== 'loading') checkResults[i] = (state === 'ok');
}

// ── GENERATE CoC ──
async function generateCoC() {
  if (!selectedId) return;
  const rec = ieList.find(r => r.id === selectedId);
  if (!rec) return;
  const f = rec.fields;

  toast('CoC oluşturuluyor...', 'inf');

  // Fetch extra data
  let musteriAdi = f['Müşteri Adı'] || f['Müşteri'] || '—';
  let musteriAdres = '—';
  let lotNo = f['Lot No'] || '—';
  let heatNo = f['Heat No'] || '—';
  let malzemeAdi = f['Malzeme'] || '—';
  let sertifikaNo = f['Sertifika No'] || '—';
  let muayeneSonuc = '—';
  let muayeneTarihi = '—';
  let muayeneEden = '—';

  try {
    // Get malzeme info
    const malData = await apiGetFn(T.malzeme,
      `filterByFormula=${encodeURIComponent(`{İş Emri}='${f['IE No']||''}'`)}&fields[]=Malzeme%20Adı&fields[]=Isı%20%2F%20Lot%20No&fields[]=Sertifika%20No&fields[]=Sertifika%20Durumu&maxRecords=1`);
    if (malData.records && malData.records.length) {
      const mf = malData.records[0].fields;
      if (mf['Malzeme Adı']) malzemeAdi = mf['Malzeme Adı'];
      if (mf['Isı / Lot No']) { lotNo = mf['Isı / Lot No']; heatNo = mf['Isı / Lot No']; }
      if (mf['Sertifika No']) sertifikaNo = mf['Sertifika No'];
    }
  } catch(e) {}

  try {
    // Get muayene
    const muData = await apiGetFn(T.muayene,
      `filterByFormula=${encodeURIComponent(`{İş Emri No}='${f['IE No']||''}'`)}&sort[0][field]=Muayene%20Tarihi&sort[0][direction]=desc&maxRecords=1`);
    if (muData.records && muData.records.length) {
      const muf = muData.records[0].fields;
      muayeneSonuc = muf['Sonuç'] || muf['Karar'] || muf['Gözle Muayene'] || muf['Durum'] || '—';
      muayeneTarihi = fmtDate(muf['Muayene Tarihi']);
      muayeneEden = muf['Muayene Eden'] || muf['Kaliteci'] || '—';
    }
  } catch(e) {}

  try {
    // Get musteri
    const musteriIds = f['Müşteri'];
    if (musteriIds && musteriIds.length) {
      const msData = await apiGetFn(T.musteri,
        `filterByFormula=${encodeURIComponent(`RECORD_ID()='${musteriIds[0]}'`)}&fields[]=Firma%20Adı&fields[]=Adres&maxRecords=1`);
      if (msData.records && msData.records.length) {
        const msf = msData.records[0].fields;
        musteriAdi = msf['Firma Adı'] || musteriAdi;
        musteriAdres = msf['Adres'] || musteriAdres;
      }
    }
  } catch(e) {}

  const cocNo = `CoC-${(f['IE No']||'000').replace(/[^A-Z0-9-]/gi,'')}-${new Date().getFullYear()}`;

  cocData = {
    cocNo,
    ieNo: f['IE No'] || '—',
    parcaAdi: f['Parça Adı'] || '—',
    parcaNo: f['Parça No'] || '—',
    revizyon: f['Revizyon'] || '—',
    miktar: `${f['Miktar']||0} ${f['Birim']||'Adet'}`,
    lotNo, heatNo,
    malzemeAdi, sertifikaNo,
    musteriAdi, musteriAdres,
    muayeneSonuc, muayeneTarihi, muayeneEden,
    tarih: todayLocal()
  };

  renderCoC(cocData);
  const pdfBtn = document.getElementById('btn-pdf');
  if (pdfBtn) pdfBtn.disabled = false;
  toast('CoC oluşturuldu', 'ok');
  await logIslem('CoC Oluşturuldu', 'Sevkiyat', selectedId, f['IE No']||'', null, {cocNo});
}

// ── SAVE İRSALİYE ──
async function saveIrsaliye() {
  if (!selectedId) return;
  const rec = ieList.find(r => r.id === selectedId);
  if (!rec) return;
  const f = rec.fields;

  const irsaliyeNo = document.getElementById('irsaliye-no').value.trim();
  const tarih = document.getElementById('irsaliye-tarih').value;
  const kargo = document.getElementById('irsaliye-kargo').value.trim();
  const takip = document.getElementById('irsaliye-takip').value.trim();
  const notlar = document.getElementById('irsaliye-notlar').value.trim();

  if (!irsaliyeNo) { toast('İrsaliye No zorunlu', 'err'); return; }

  try {
    const fields = {};
    if (irsaliyeNo) fields['İrsaliye No'] = irsaliyeNo;
    if (tarih) fields['İrsaliye Tarihi'] = tarih;
    if (kargo) fields['Kargo'] = kargo;
    if (takip) fields['Takip No'] = takip;
    if (notlar) fields['Sevkiyat Notları'] = notlar;

    await apiFn('PATCH', T.ie, {fields}, selectedId);
    // Update local cache
    rec.fields = {...rec.fields, ...fields};
    toast('İrsaliye kaydedildi ✓', 'ok');
    await logIslem('İrsaliye Kaydedildi', 'Sevkiyat', selectedId, f['IE No']||'', null, fields);

    // Kargo takip linki göster
    updateKargoLink(kargo, takip);
  } catch(e) {
    toast('Kayıt hatası: ' + e.message, 'err');
  }
}

function updateKargoLink(firma, takipNo) {
  var area = document.getElementById('kargo-link-area');
  if (!area) return;
  var link = kargoLinkOlustur(firma, takipNo);
  if (link) {
    area.innerHTML = '<a href="' + escHtml(link) + '" target="_blank" style="color:#1e40af;text-decoration:underline;font-size:11px;display:inline-flex;align-items:center;gap:4px;">' +
      '📦 Kargo Takip (' + escHtml(firma) + ') →</a>';
  } else {
    area.innerHTML = '';
  }
}

// ── SEVK ET ──
async function sevkEt() {
  if (!selectedId) return;
  const rec = ieList.find(r => r.id === selectedId);
  if (!rec) return;
  const f = rec.fields;

  if (!confirm(`"${f['IE No']||'—'}" iş emrini sevk etmek istediğinize emin misiniz?`)) return;

  try {
    const eskiDurum = f['Durum'];
    const fields = {
      'Durum': 'Sevk Edildi',
      'Sevkiyat Durumu': 'Sevk Edildi',
      'Sevk Tarihi': todayISO()
    };
    await apiFn('PATCH', T.ie, {fields}, selectedId);

    // Update local cache
    rec.fields = {...rec.fields, ...fields};
    renderList();
    document.getElementById('btn-sevket').disabled = true;
    const ibtn = document.getElementById('btn-sevket-inline');
    if (ibtn) ibtn.disabled = true;
    const badge = document.getElementById('kontrol-badge');
    if (badge) { badge.textContent = '🚚 Sevk Edildi'; badge.style.color = 'var(--green)'; }

    toast(`${f['IE No']||'—'} sevk edildi!`, 'ok');
    await logIslem('Sevk Edildi', 'Sevkiyat', selectedId, f['IE No']||'', {Durum: eskiDurum}, fields);

    // Bağlı siparişi Tamamlandı olarak güncelle
    var siparisNo = f['SE No'] || f['Sipariş No'] || '';
    if (siparisNo) {
      try {
        var seRes = await apiGetFn(T.se,
          'filterByFormula=' + encodeURIComponent("{SE No}='" + siparisNo + "'") + '&maxRecords=1');
        if (seRes.records && seRes.records.length > 0) {
          await apiFn('PATCH', T.se, {fields: {'Durum': 'Tamamlandı'}}, seRes.records[0].id);
          toast('Sipariş ' + siparisNo + ' tamamlandı olarak güncellendi', 'ok');
          if (typeof logIslem === 'function') logIslem('SEVKIYAT_TESLIM', 'Sevkiyat', seRes.records[0].id, siparisNo, null, {Durum:'Tamamlandı'});
        }
      } catch(seErr) {
        console.warn('Sipariş güncelleme hatası:', seErr);
      }
    }
  } catch(e) {
    toast('Sevk hatası: ' + e.message, 'err');
  }
}
