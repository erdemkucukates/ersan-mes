<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Planlama</title>
<link rel="stylesheet" href="utils/sidebar.css">
<link rel="stylesheet" href="ersan_styles.css">
<script src="utils/sidebar.js" defer></script>
<script src="ersan_log.js" defer></script>
<style>
/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.kpi{background:#fff;border:1px solid #e5e7eb;border-radius:7px;padding:10px 14px;border-top:3px solid;transition:box-shadow .15s}
.kpi:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-val{font-size:22px;font-weight:700;margin:2px 0}
.kpi-lbl{font-size:11px;color:#6b7280;font-weight:500}

/* ── AS9100 STRIP ── */
.as-strip{display:flex;gap:16px;align-items:center;background:#fff;border:1px solid #e5e7eb;border-radius:7px;padding:8px 14px;margin-bottom:12px;font-size:12px;font-weight:500}
.as-ok{color:#059669}.as-warn{color:#ef4444}.as-info{color:#8b5cf6}

/* ── GANTT ── */
.gantt{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:12px}
.gantt-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #e5e7eb;background:#f9fafb}
.gantt-toolbar-title{font-size:13px;font-weight:600;color:#1f2937}
.gantt-head{display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid #e5e7eb;background:#f9fafb;font-size:10px;font-weight:600;color:#6b7280}
.gantt-head-label{padding:6px 10px;border-right:1px solid #e5e7eb}
.gantt-head-dates{display:flex;position:relative}
.gantt-head-dates span{flex:1;text-align:center;padding:6px 0;border-right:1px solid #f3f4f6}
.gantt-scroll{max-height:260px;overflow-y:auto}
.gantt-row{display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid #f3f4f6;min-height:28px;align-items:center}
.gantt-row:hover{background:#f9fafb}
.gantt-label{padding:4px 10px;font-size:11px;font-weight:500;color:#374151;border-right:1px solid #e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
.gantt-bar-area{position:relative;height:20px}
.gantt-bar{position:absolute;height:14px;top:3px;border-radius:3px;min-width:4px;font-size:9px;color:#fff;line-height:14px;padding:0 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.gb-done{background:#10b981}
.gb-active{background:#1a2b47;animation:pulse-bar 2s ease-in-out infinite}
.gb-plan{background:#d1d5db;color:#374151}
.gb-late{background:#ef4444}
.gb-fason{background:#8b5cf6}
.gantt-today{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #ef4444;z-index:2;pointer-events:none}
@keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:.7}}

/* ── KAPASITE ── */
.kapasite-section{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.kapasite-section-title{font-size:13px;font-weight:600;color:#1f2937;margin-bottom:10px}
.kapasite-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kap-item{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:8px 12px}
.kap-name{font-size:11px;font-weight:600;color:#374151;display:flex;justify-content:space-between;align-items:center}
.kap-pct{font-size:11px;font-weight:700}
.kap-bar{height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;margin-top:4px}
.kap-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;background:#f3f4f6;border-radius:6px;overflow:hidden;border:1px solid #e5e7eb}
.vt-btn{padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#6b7280;font-family:inherit;transition:all .15s}
.vt-btn.active{background:#fff;color:#1f2937;box-shadow:0 1px 2px rgba(0,0,0,.06)}
</style>
</head>
<body data-page="uretim-plan">
<div class="app">
<div id="sb-mount"></div>
<div class="icerik-alani main">
  <div class="topbar">
    <div class="topbar-baslik">Planlama</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="view-toggle">
        <button class="vt-btn active" onclick="setGanttView('week',this)">Haftalık</button>
        <button class="vt-btn" onclick="setGanttView('month',this)">Aylık</button>
      </div>
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">

<!-- ── KPI ROW ── -->
<div class="kpi-row" id="kpi-row">
  <div class="kpi" style="border-top-color:#3b82f6"><div class="kpi-lbl">Aktif İş Emri</div><div class="kpi-val" id="kpi-aktif">—</div></div>
  <div class="kpi" style="border-top-color:#f59e0b"><div class="kpi-lbl">Bu Hafta Termin</div><div class="kpi-val" id="kpi-hafta">—</div></div>
  <div class="kpi" style="border-top-color:#ef4444"><div class="kpi-lbl">Gecikmiş</div><div class="kpi-val" id="kpi-geciken">—</div></div>
  <div class="kpi" style="border-top-color:#8b5cf6"><div class="kpi-lbl">Fason Bekleyen</div><div class="kpi-val" id="kpi-fason">—</div></div>
  <div class="kpi" style="border-top-color:#10b981"><div class="kpi-lbl">Kapasite %</div><div class="kpi-val" id="kpi-kapasite">—</div></div>
</div>

<!-- ── AS9100 STRIP ── -->
<div class="as-strip" id="as-strip">
  <span id="as-plan">—</span>
  <span id="as-gecikme">—</span>
  <span id="as-fason">—</span>
</div>

<!-- ── GANTT TIMELINE ── -->
<div class="gantt" id="gantt-container">
  <div class="gantt-toolbar">
    <div class="gantt-toolbar-title">Üretim Zaman Çizelgesi</div>
    <div style="font-size:11px;color:#6b7280;" id="gantt-range-label">—</div>
  </div>
  <div class="gantt-head" id="gantt-head">
    <div class="gantt-head-label">İş Emri</div>
    <div class="gantt-head-dates" id="gantt-dates"></div>
  </div>
  <div class="gantt-scroll" id="gantt-body">

</div>

<!-- ── TEZGAH KAPASİTE ── -->
<div class="kapasite-section" id="kapasite-section">
  <div class="kapasite-section-title">Tezgah Kapasite Durumu</div>
  <div class="kapasite-grid" id="kapasite-grid">
    <div style="padding:12px;text-align:center;color:#9ca3af;font-size:12px;grid-column:span 3;">Yükleniyor...</div>
  </div>
</div>

<div class="layout">

  <!-- LIST -->
  <div class="list-panel">
    <div class="list-header">
      <h2>Satış Emirleri</h2>
      <div class="list-count" id="se-count">Yükleniyor...</div>
    </div>
    <div class="list-search">
      <input type="text" id="se-search" placeholder="SE no, parça ara..." oninput="filterSE()">
    </div>
    <div class="filter-row">
      <div class="fc on" data-f="Tümü" onclick="setFilter(this)">Tümü</div>
      <div class="fc" data-f="Beklemede" onclick="setFilter(this)">Beklemede</div>
      <div class="fc" data-f="Üretimde" onclick="setFilter(this)">Üretimde</div>
      <div class="fc" data-f="Tamamlandı" onclick="setFilter(this)">Tamamlandı</div>
    </div>
    <div class="list-scroll" id="se-list">
      <div style="padding:20px;text-align:center;color:var(--text3);">Yükleniyor...</div>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="detail-panel">
    <div id="detail-content">
      <div class="empty">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style="opacity:.25"><rect x="8" y="8" width="48" height="48" rx="6" stroke="currentColor" stroke-width="2"/><path d="M20 24h24M20 32h24M20 40h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="48" cy="48" r="10" fill="currentColor" opacity=".15"/><path d="M44 48h8M48 44v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <p>Listeden bir satış emri seçin</p>
      </div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toast-wrap"></div>

  </div>
</div>

<script>
// ── CONFIG ──
const BASE = 'app5LDgJMgocw79Ix';
const T = {
  se:       'tbl56Oj1nPaqefI60',
  musteriler:'tblPxhjJDEx0fyUQx',
  tedarikci:'tblEI6683Im5AXj36',
  isEmirleri:'tbl58qL39I2tv8hK4',
  stl:      'tblHmfCvNZq0qNtb1',
  tezgahlar:'tblsBXDsWACBAFEJ5',
  rfq:      'RFQ_TABLE_PLACEHOLDER', // Satınalma Teklifleri tablosu
};

let seList = [], filteredSE = [], musteriler = [], tedarikci = [];
let activeId = null;
let activeFilter = 'Tümü';
let stlSatirlar = []; // talep satırları (local)

// ── API ──
const apiFn = async (method, table, body, id='') => {
  const path = `/v0/${BASE}/${table}${id?'/'+id:''}`;
  const res = await fetch('/.netlify/functions/airtable', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method, path, body})
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
};
const apiGet = async (table, params='') => {
  const path = `/v0/${BASE}/${table}?${params}`;
  const res = await fetch('/.netlify/functions/airtable', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method:'GET', path})
  });
  return res.json();
};

// ── HELPERS ──
const fmt = n => n ? Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2}) : '—';
const fmtDate = d => { if(!d) return ''; try{ return new Date(d).toLocaleDateString('tr-TR'); }catch{ return d; } };
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
const getMusteriAd = id => musteriler.find(r=>r.id===id)?.fields?.['Müşteri Adı'] || '—';

// ── LOAD ──
async function loadAll() {
  try {
    let all=[], offset='';
    do {
      const d = await apiGet(T.se, `sort[0][field]=SE%20No&sort[0][direction]=desc${offset?'&offset='+offset:''}`);
      all = all.concat(d.records||[]);
      offset = d.offset||'';
    } while(offset);
    seList = all;

    const [m, td] = await Promise.all([
      apiGet(T.musteriler, 'fields[]=Müşteri%20Adı'),
      apiGet(T.tedarikci, 'fields[]=Tedarikçi%20Adı&fields[]=E-posta&fields[]=Telefon'),
    ]);
    musteriler = m.records||[];
    tedarikci = td.records||[];
    filterAndRender();
  } catch(e) {
    document.getElementById('se-list').innerHTML = `<div style="padding:16px;color:var(--red);font-size:12px;">Hata: ${e.message}</div>`;
  }
}

function filterAndRender() {
  const q = document.getElementById('se-search').value.toLowerCase();
  filteredSE = seList.filter(r => {
    const f = r.fields;
    const mFilter = activeFilter === 'Tümü' || f['Durum'] === activeFilter;
    const mSearch = !q ||
      (f['SE No']||'').toLowerCase().includes(q) ||
      (f['Parça Adı']||'').toLowerCase().includes(q) ||
      (f['Parça No']||'').toLowerCase().includes(q);
    return mFilter && mSearch;
  });
  document.getElementById('se-count').textContent = `${filteredSE.length} sipariş`;
  renderSEList();
}

function renderSEList() {
  const el = document.getElementById('se-list');
  if (!filteredSE.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Sipariş bulunamadı</div>';
    return;
  }
  el.innerHTML = filteredSE.map(r => {
    const f = r.fields;
    const durum = f['Durum']||'Beklemede';
    const musteriAd = getMusteriAd(f['Müşteri']?.[0]);
    return `<div class="liste-satir se-item${r.id===activeId?' secili':''}" onclick="loadDetail('${r.id}')">
      <div class="se-top">
        <span class="se-no">${f['SE No']||'—'}</span>
        <span class="badge b-${durum}">${durum}</span>
      </div>
      <div class="se-parca">${f['Parça Adı']||'—'}</div>
      <div class="se-bottom">
        <span class="se-meta">${musteriAd}</span>
        <span class="se-meta">${f['Miktar']||0} ${f['Birim']||'Adet'}</span>
      </div>
    </div>`;
  }).join('');
}

function setFilter(el) {
  document.querySelectorAll('.fc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  activeFilter = el.dataset.f;
  filterAndRender();
}
function filterSE() { filterAndRender(); }

// ── DETAIL ──
async function loadDetail(id) {
  activeId = id;
  renderSEList();
  const se = seList.find(r=>r.id===id);
  const f = se?.fields||{};
  const musteriAd = getMusteriAd(f['Müşteri']?.[0]);
  const durum = f['Durum']||'Beklemede';

  // Load STL records for this SE
  let stlRecords = [];
  if (T.stl !== 'STL_TABLE_ID') {
    try {
      const d = await apiGet(T.stl,
        `filterByFormula=${encodeURIComponent(`{SE No}="${id}"`)}&sort[0][field]=Talep%20No&sort[0][direction]=asc`);
      stlRecords = d.records||[];
    } catch(e) { console.warn('STL load error:', e); }
  }

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-toolbar">
      <div class="detail-title">${f['SE No']||'—'}</div>
      <span class="badge b-${durum}">${durum}</span>
      <span style="font-size:12px;color:var(--text2);">${musteriAd}</span>
      <div style="flex:1;"></div>
      <button class="btn warn" onclick="createSTL('${id}')">
        📋 Satınalma Talebi Oluştur
      </button>
      <button class="btn success" onclick="openIEModal('${id}')" ${stlRecords.some(r=>r.fields['Durum']==='Onaylandı')?'':'title="Önce satınalma talebi onaylanmalı"'}>
        ⚙️ İş Emri Aç
      </button>
      <select class="fi" style="width:150px;font-size:12px;" onchange="updateSEDurum('${id}',this.value)">
        ${['Beklemede','Üretimde','Tamamlandı','Kısmi Sevk','İptal'].map(d=>`<option ${durum===d?'selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div class="detail-scroll">

      <!-- SE BİLGİLERİ -->
      <div class="card">
        <div class="card-header"><div class="card-dot" style="background:#6366f1"></div>Sipariş Bilgileri</div>
        <div class="card-body">
          <div class="grid4" style="gap:10px;">
            <div class="fg"><div class="fl">SE No</div><input class="fi" value="${f['SE No']||''}" disabled style="font-family:var(--mono)"></div>
            <div class="fg"><div class="fl">Parça No</div><input class="fi" value="${f['Parça No']||''}" disabled></div>
            <div class="fg"><div class="fl">Parça Adı</div><input class="fi" value="${f['Parça Adı']||''}" disabled></div>
            <div class="fg"><div class="fl">Müşteri</div><input class="fi" value="${musteriAd}" disabled></div>
            <div class="fg"><div class="fl">Miktar</div><input class="fi" value="${f['Miktar']||0} ${f['Birim']||'Adet'}" disabled></div>
            <div class="fg"><div class="fl">Termin</div><input class="fi" value="${fmtDate(f['Termin Tarihi'])}" disabled></div>
            <div class="fg"><div class="fl">Müşteri PO No</div><input class="fi" value="${f['Müşteri PO No']||'—'}" disabled></div>
            <div class="fg"><div class="fl">Durum</div><input class="fi" value="${durum}" disabled></div>
          </div>
        </div>
      </div>

      <!-- SATINALMA TALEPLERİ -->
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:#f59e0b"></div>
          Satınalma Talepleri
          <span style="margin-left:auto;font-size:10px;font-weight:400;color:var(--text3);">${stlRecords.length} talep</span>
          <button class="btn" style="padding:3px 8px;font-size:10px;margin-left:8px;" onclick="loadDetail('${id}')">Yenile</button>
        </div>
        <div class="card-body" style="padding:0;">
          ${stlRecords.length === 0
            ? `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">
                Henüz satınalma talebi yok. "📋 Satınalma Talebi Oluştur" butonuna tıklayın.
              </div>`
            : `<div style="overflow-x:auto;">
                <table class="stl-table">
                  <thead><tr>
                    <th>#</th><th>Tip</th><th>Malzeme / İşlem</th><th>Miktar</th><th>Ölçü / Spec</th>
                    <th>Durum</th><th>Tedarikçi</th><th>Fiyat</th><th></th>
                  </tr></thead>
                  <tbody>
                    ${stlRecords.map((r,i) => {
                      const rf = r.fields;
                      const stlDurum = rf['Durum']||'Taslak';
                      return `<tr>
                        <td style="font-family:var(--mono);font-size:11px;">${i+1}</td>
                        <td><span class="badge ${rf['Talep Tipi']==='Hammadde'?'b-Gönderildi':'b-Teklif Alındı'}">${rf['Talep Tipi']||'—'}</span></td>
                        <td style="font-weight:500;">${rf['Malzeme İşlem']||'—'}</td>
                        <td style="font-family:var(--mono);">${rf['Miktar']||0} ${rf['Birim']||''}</td>
                        <td style="color:var(--text2);font-size:11px;">${rf['Ölçü']||'—'}</td>
                        <td><span class="badge b-${stlDurum}">${stlDurum}</span></td>
                        <td style="font-size:11px;">${rf['Seçilen Tedarikçi']||'—'}</td>
                        <td style="font-family:var(--mono);color:var(--accent);">${rf['Onay Fiyatı']?fmt(rf['Onay Fiyatı'])+' TL':'—'}</td>
                        <td>
                          <div style="display:flex;gap:4px;">
                            <button class="btn" style="padding:2px 7px;font-size:10px;" onclick="openRFQFromSTL('${r.id}','${id}')">📧 RFQ</button>
                            <button class="btn" style="padding:2px 7px;font-size:10px;" onclick="openSTLDurum('${r.id}','${id}')">✏️</button>
                          </div>
                        </td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>`
          }
        </div>
      </div>

    </div>`;
}

// ── SATINALMA TALEBİ OLUŞTUR ──
// ── STL DATA ──
// stlKalemler = [ { kalemId, kalemAdi, stokKodu, miktar, birim, altSatirlar: [{tip,malzemeTipi,malzemeCinsi,cap,ic_cap,boy,en,yukseklik,kalinlik,miktar,birim,spec,yogunluk}, ...] } ]
let stlKalemler = [];
let stlPdfUrl = null;

const YOGUNLUK = { 'Çelik':7.85,'Paslanmaz':7.93,'Alüminyum':2.70,'Titanyum':4.51,'Bakır':8.96 };

function kgHesapla(s) {
  const rho = YOGUNLUK[s.yogunluk] || 7.85;
  if (s.malzemeTipi === 'Mil') {
    const r = (parseFloat(s.cap)||0) / 2 / 10;
    const h = (parseFloat(s.boy)||0) / 10;
    return Math.PI * r * r * h * rho / 1000;
  } else if (s.malzemeTipi === 'Boru') {
    const rd = (parseFloat(s.cap)||0) / 2 / 10;
    const ri = (parseFloat(s.ic_cap)||0) / 2 / 10;
    const h = (parseFloat(s.boy)||0) / 10;
    return Math.PI * (rd*rd - ri*ri) * h * rho / 1000;
  } else if (s.malzemeTipi === 'Lama' || s.malzemeTipi === 'Sac') {
    const en = (parseFloat(s.en)||0) / 10;
    const boy = (parseFloat(s.boy)||0) / 10;
    const yuk = (parseFloat(s.yukseklik || s.kalinlik)||0) / 10;
    return en * boy * yuk * rho / 1000;
  }
  return 0;
}

function olcuAlanlar(ki, ai, s) {
  const tip = s.malzemeTipi;
  if (s.tip === 'Fason') return `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
      <div class="fg"><div class="fl">İşlem Tipi</div><input class="fi" value="${s.malzemeCinsi||''}" oninput="stlKalemler[${ki}].altSatirlar[${ai}].malzemeCinsi=this.value" placeholder="Isıl İşlem, Kaynak..."></div>
      <div class="fg"><div class="fl">Teknik Şartname</div><input class="fi" value="${s.spec||''}" oninput="stlKalemler[${ki}].altSatirlar[${ai}].spec=this.value" placeholder="58-60 HRC..."></div>
      <div class="fg"><div class="fl">Miktar</div><input type="number" class="fi" value="${s.miktar||''}" oninput="stlKalemler[${ki}].altSatirlar[${ai}].miktar=parseFloat(this.value)||0;renderKgBadge(${ki},${ai})"></div>
    </div>`;

  let olcuInputs = '';
  if (tip === 'Mil') {
    olcuInputs = `
      <div class="fg"><div class="fl">Çap (mm)</div><input type="number" class="fi" value="${s.cap||''}" oninput="stlKalemler[${ki}].altSatirlar[${ai}].cap=this.value;renderKgBadge(${ki},${ai})" placeholder="ör: 150"></div>

let pdfDoc = null, pdfPage = 1, pdfScale = 1.2;

async function initPdfJs(url) {
  if (!window.pdfjsLib) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      loadPdfDoc(url);
    };
    document.head.appendChild(script);
  } else {
    loadPdfDoc(url);
  }
}

async function loadPdfDoc(url) {
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfPage = 1;
    renderPdfPage();
  } catch(e) {
    toast('PDF yüklenemedi: ' + e.message, 'err');
  }
}

async function renderPdfPage() {
  if (!pdfDoc) return;
  const canvas = document.getElementById('pdf-canvas');
  if (!canvas) return;
  const page = await pdfDoc.getPage(pdfPage);
  const viewport = page.getViewport({ scale: pdfScale });
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport }).promise;
  const info = document.getElementById('pdf-page-info');
  if (info) info.textContent = `${pdfPage} / ${pdfDoc.numPages}`;
  const zoomInfo = document.getElementById('pdf-zoom-info');
  if (zoomInfo) zoomInfo.textContent = Math.round(pdfScale * 100) + '%';
}

window.pdfNextPage = function() { if (pdfDoc && pdfPage < pdfDoc.numPages) { pdfPage++; renderPdfPage(); } }
window.pdfPrevPage = function() { if (pdfPage > 1) { pdfPage--; renderPdfPage(); } }
window.pdfZoomIn = function() { pdfScale = Math.min(parseFloat((pdfScale + 0.25).toFixed(2)), 4); renderPdfPage(); }
window.pdfZoomOut = function() { pdfScale = Math.max(parseFloat((pdfScale - 0.25).toFixed(2)), 0.25); renderPdfPage(); }
window.pdfFit = function() {
  const area = document.getElementById('pdf-viewer-area');
  if (!area || !pdfDoc) return;
  pdfDoc.getPage(pdfPage).then(page => {
    const vp = page.getViewport({ scale: 1 });
    pdfScale = parseFloat(((area.clientWidth - 40) / vp.width).toFixed(2));
    renderPdfPage();
  });
}

function updateSTLOzet() {
  const el = document.getElementById('stl-ozet');
  if (!el) return;
  const toplamSatir = stlKalemler.reduce((s,k)=>s+k.altSatirlar.length, 0);
  el.textContent = `${stlKalemler.length} kalem · ${toplamSatir} alt satır`;
}

async function saveSTL(seId) {
  // PR No uret
  let prNo = '';
  try { prNo = await kodUret('PR'); } catch(e) { prNo = 'PR-' + new Date().getFullYear().toString().slice(-2) + '-XXXXX'; }

  const tumSatirlar = [];
  stlKalemler.forEach((k, ki) => {
    k.altSatirlar.forEach((s, ai) => {
      const olcu = s.tip === 'Fason' ? (s.spec||'') :
        s.malzemeTipi === 'Mil' ? `Ø${s.cap||'—'}x${s.boy||'—'}mm` :
        s.malzemeTipi === 'Boru' ? `Ø${s.cap||'—'}/Ø${s.ic_cap||'—'}x${s.boy||'—'}mm` :
        s.malzemeTipi === 'Lama' ? `${s.en||'—'}x${s.boy||'—'}x${s.yukseklik||'—'}mm` :
        s.malzemeTipi === 'Sac' ? `${s.en||'—'}x${s.boy||'—'}x${s.kalinlik||'—'}mm` : (s.spec||'');
      const kg = kgHesapla(s);
      tumSatirlar.push({
        'Talep No': prNo,
        'SE No': [seId],
        'Talep Tipi': s.tip,
        'Kalem Adı': k.kalemAdi||'',
        'Malzeme İşlem': s.tip==='Fason' ? (s.malzemeCinsi||'') : `${s.malzemeTipi} - ${s.malzemeCinsi||''}`,
        'Miktar': s.miktar||0,
        'Birim': s.birim||'Adet',
        'Ölçü': olcu||null,
        'Tahmini kg': kg > 0 ? parseFloat((kg*(s.miktar||1)).toFixed(3)) : null,
        'Durum': 'Taslak',
        'Talep Tarihi': new Date().toISOString().split('T')[0],
      });
    });
  });

  const dolu = tumSatirlar.filter(s => (s['Malzeme İşlem']||'').replace(/^(Mil|Boru|Lama|Sac|Profil|Diğer) - $/,'').trim());
  if (!dolu.length) { toast('En az bir satır doldurun', 'err'); return; }

  try {
    for (const fields of dolu) {
      await apiFn('POST', T.stl, { fields });
    }
    document.getElementById('stl-modal')?.remove();
    toast(`${dolu.length} talep satırı kaydedildi ✓`);
    await loadDetail(seId);
  } catch(e) {
    toast('Kaydetme hatası: '+e.message, 'err');
  }
}

  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'rfq-stl-modal';

    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-head-title">📧 RFQ Gönder — ${f['SE No']||''}</div>
        <button class="btn-x" onclick="document.getElementById('rfq-stl-modal').remove()">×</button>
      </div>
      <div class="modal-body">
        <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px;">Tedarikçi Seçin</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${tedarikci.map(t => {

              <input type="checkbox" data-id="${t.id}" data-adi="${(t.fields['Tedarikçi Adı']||'').replace(/"/g,'')}" data-email="${email}"

              <div style="flex:1;">
                <div style="font-size:12px;font-weight:500;">${t.fields['Tedarikçi Adı']||'—'}</div>
                <div style="font-size:11px;color:var(--text3);">${email||'⚠️ E-posta yok'}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div id="rfq-stl-result" style="margin-top:8px;"></div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="document.getElementById('rfq-stl-modal').remove()">İptal</button>
        <button class="btn primary" onclick="sendRFQFromSTL('${seId}','${stlId}')">📧 Gönder</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function sendRFQFromSTL(seId, stlId) {
  const se = seList.find(r=>r.id===seId);
  const f = se?.fields||{};
  const checkboxes = document.querySelectorAll('#rfq-stl-modal input[type=checkbox]:checked');
  if (!checkboxes.length) { toast('Tedarikçi seçin', 'err'); return; }

  const tedarikciler = Array.from(checkboxes).map(cb=>({
    id: cb.dataset.id, adi: cb.dataset.adi, email: cb.dataset.email
  }));

  try {
    const res = await fetch('/.netlify/functions/send-rfq', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        seNo: f['SE No']||'',
        parcaAdi: f['Parça Adı']||'',
        parcaNo: f['Parça No']||'',
        miktar: f['Miktar']||0,
        birim: f['Birim']||'Adet',
        tedarikciler,
      })
    });
    const data = await res.json();
    const sent = (data.results||[]).filter(r=>r.status==='sent').length;
    document.getElementById('rfq-stl-result').innerHTML =
      `<div style="background:var(--green-light);color:var(--green);padding:8px 12px;border-radius:6px;font-size:12px;">
        ✓ ${sent} tedarikçiye RFQ gönderildi.
      </div>`;

    // STL durumunu Gönderildi yap
    if (T.stl !== 'STL_TABLE_ID') {
      await apiFn('PATCH', T.stl, {fields:{'Durum':'Gönderildi'}}, stlId);
    }
    toast(`${sent} RFQ gönderildi ✓`);
    setTimeout(()=>{ document.getElementById('rfq-stl-modal')?.remove(); loadDetail(seId); }, 1500);
  } catch(e) {
    toast('Hata: '+e.message, 'err');
  }
}

async function createIE(seId) {
  try {
    const year = new Date().getFullYear();
    const lastIEs = await apiGet(T.isEmirleri, 'sort[0][field]=Sıra%20No&sort[0][direction]=desc&maxRecords=1');
    const lastSira = lastIEs.records?.[0]?.fields?.['Sıra No']||0;
    const newSira = lastSira + 1;
    const lotNo = `LOT-${year}-${String(newSira).padStart(5,'0')}-A`;

    const fields = {
      'Lot No': lotNo,
      'Satış Emirleri': [seId],
      'Parça Adı': document.getElementById('ie-parca').value||'',
      'Parça No': document.getElementById('ie-parcano').value||null,
      'Revizyon': document.getElementById('ie-rev').value||null,
      'Miktar': parseFloat(document.getElementById('ie-miktar').value)||1,
      'Termin Tarihi': document.getElementById('ie-termin').value||null,
      'Durum': 'Beklemede',
    };

    const res = await apiFn('POST', T.isEmirleri, {fields});
    const ieNo = res.fields?.['IE No'] || `IE-${year}-${String(newSira).padStart(5,'0')}`;

    await apiFn('PATCH', T.se, {fields:{'Durum':'Üretimde'}}, seId);
    const se = seList.find(r=>r.id===seId);
    if (se) se.fields['Durum'] = 'Üretimde';

    document.getElementById('ie-modal')?.remove();
    toast(`${ieNo} iş emri oluşturuldu — Lot: ${lotNo} ✓`);
    renderSEList();
    await loadDetail(seId);
  } catch(e) {
    toast('Hata: '+e.message, 'err');
  }
}

// ── PLANLAMA DASHBOARD ──
var ieList = [];
var tezgahList = [];
var ganttViewMode = 'week'; // 'week' | 'month'

function setGanttView(mode, btn) {
  ganttViewMode = mode;
  document.querySelectorAll('.vt-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderGantt();
}

async function loadDashboardData() {
  try {
    // Load İş Emirleri
    var allIE = [], offset = '';
    do {
      var d = await apiGet(T.isEmirleri, 'sort[0][field]=Termin%20Tarihi&sort[0][direction]=asc' + (offset ? '&offset=' + offset : ''));
      allIE = allIE.concat(d.records || []);
      offset = d.offset || '';
    } while (offset);
    ieList = allIE;

    // Load Tezgahlar
    var td = await apiGet(T.tezgahlar, '');
    tezgahList = td.records || [];

    renderKPIs();
    renderAS9100();
    renderGantt();
    renderKapasite();
  } catch(e) {
    console.warn('Dashboard load error:', e);
  }
}

function getWeekEnd(d) {
  var end = new Date(d);
  end.setDate(end.getDate() + (7 - end.getDay()));
  return end;
}

function renderKPIs() {
  var now = new Date();
  var weekEnd = getWeekEnd(now);
  var weekStart = new Date(now);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);

  var aktif = 0, hafta = 0, geciken = 0, fason = 0;
  ieList.forEach(function(r) {
    var f = r.fields;
    var durum = f['Durum'] || 'Beklemede';
    if (durum !== 'Tamamlandı' && durum !== 'İptal') aktif++;
    if (durum !== 'Tamamlandı' && durum !== 'İptal' && f['Termin Tarihi']) {
      var termin = new Date(f['Termin Tarihi']);
      if (termin <= weekEnd && termin >= weekStart) hafta++;
      if (termin < now && durum !== 'Tamamlandı') geciken++;
    }
    if ((durum === 'Beklemede' || durum === 'Fason Bekliyor') && (f['Fason'] || durum === 'Fason Bekliyor')) fason++;
  });

  var kapYuzde = tezgahList.length > 0 ? Math.min(Math.round((aktif / (tezgahList.length * 1.5)) * 100), 100) : 0;

  document.getElementById('kpi-aktif').textContent = aktif;
  document.getElementById('kpi-hafta').textContent = hafta;
  document.getElementById('kpi-geciken').textContent = geciken;
  document.getElementById('kpi-geciken').style.color = geciken > 0 ? '#ef4444' : '';
  document.getElementById('kpi-fason').textContent = fason;
  document.getElementById('kpi-kapasite').textContent = kapYuzde + '%';
  document.getElementById('kpi-kapasite').style.color = kapYuzde > 95 ? '#ef4444' : kapYuzde > 80 ? '#f59e0b' : '#10b981';
}

function renderAS9100() {
  var now = new Date();
  var planlanmamis = 0, geciken = 0, fasonBekleyen = 0;
  ieList.forEach(function(r) {
    var f = r.fields;
    var durum = f['Durum'] || 'Beklemede';
    if (durum === 'Tamamlandı' || durum === 'İptal') return;
    if (!f['Baslangic_Tarihi'] && !f['Termin Tarihi']) planlanmamis++;
    if (f['Termin Tarihi'] && new Date(f['Termin Tarihi']) < now && durum !== 'Tamamlandı') geciken++;
    if ((f['Fason'] || durum === 'Fason Bekliyor')) fasonBekleyen++;
  });

  document.getElementById('as-plan').className = planlanmamis === 0 ? 'as-ok' : 'as-warn';
  document.getElementById('as-plan').innerHTML = planlanmamis === 0
    ? '&#10003; Tüm WO\'lar Planlandı'
    : '&#9888; ' + planlanmamis + ' WO Planlanmamış';

  document.getElementById('as-gecikme').className = geciken > 0 ? 'as-warn' : 'as-ok';
  document.getElementById('as-gecikme').textContent = 'Gecikme: ' + geciken + ' WO';

  document.getElementById('as-fason').className = 'as-info';
  document.getElementById('as-fason').textContent = 'Fason: ' + fasonBekleyen + ' bekliyor';
}

function renderGantt() {
  var now = new Date();
  now.setHours(0, 0, 0, 0);
  var days = ganttViewMode === 'week' ? 7 : 30;

  var rangeStart = new Date(now);
  rangeStart.setDate(rangeStart.getDate() - Math.floor(days * 0.2));
  var rangeEnd = new Date(rangeStart);
  rangeEnd.setDate(rangeEnd.getDate() + days);

  var totalMs = rangeEnd.getTime() - rangeStart.getTime();

  // Header dates
  var datesEl = document.getElementById('gantt-dates');
  var dateLabels = '';
  var step = ganttViewMode === 'week' ? 1 : 5;
  for (var i = 0; i < days; i += step) {
    var dd = new Date(rangeStart);
    dd.setDate(dd.getDate() + i);
    var label = dd.getDate() + '/' + (dd.getMonth() + 1);
    dateLabels += '<span>' + label + '</span>';
  }
  datesEl.innerHTML = dateLabels;

  // Range label
  var fmt1 = rangeStart.toLocaleDateString('tr-TR', {day:'numeric',month:'short'});
  var fmt2 = rangeEnd.toLocaleDateString('tr-TR', {day:'numeric',month:'short',year:'numeric'});
  document.getElementById('gantt-range-label').textContent = fmt1 + ' — ' + fmt2;

  // Filter WOs that overlap with range
  var activeIE = ieList.filter(function(r) {
    var f = r.fields;
    var durum = f['Durum'] || 'Beklemede';
    if (durum === 'İptal') return false;
    return true;
  });

  // Limit to 25 for readability
  var shown = activeIE.slice(0, 25);

  var bodyEl = document.getElementById('gantt-body');
  if (!shown.length) {
    bodyEl.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">İş emri bulunamadı</div>';
    return;
  }

  var rowsHtml = '';
  shown.forEach(function(r) {
    var f = r.fields;
    var ieNo = f['IE No'] || '—';
    var parca = f['Parça Adı'] || '';
    var durum = f['Durum'] || 'Beklemede';
    var label = ieNo + (parca ? ' · ' + parca.substring(0, 18) : '');

    var start = f['Baslangic_Tarihi'] ? new Date(f['Baslangic_Tarihi']) : null;
    var end = f['Termin Tarihi'] ? new Date(f['Termin Tarihi']) : null;

    // Default: if no start, use 3 days before termin; if no termin, use 7 days from now
    if (!end) end = new Date(now.getTime() + 7 * 86400000);
    if (!start) {
      start = new Date(end);
      start.setDate(start.getDate() - 5);
    }

    var barClass = 'gb-plan';
    if (durum === 'Tamamlandı') barClass = 'gb-done';
    else if (durum === 'Üretimde') barClass = 'gb-active';
    else if (durum === 'Fason Bekliyor') barClass = 'gb-fason';
    else if (end < now && durum !== 'Tamamlandı') barClass = 'gb-late';

    // Calculate position
    var leftPct = Math.max(0, ((start.getTime() - rangeStart.getTime()) / totalMs) * 100);
    var widthPct = Math.max(1, ((end.getTime() - start.getTime()) / totalMs) * 100);
    if (leftPct + widthPct > 100) widthPct = 100 - leftPct;
    if (leftPct > 100) { leftPct = 98; widthPct = 2; }

    // Today line position
    var todayPct = ((now.getTime() - rangeStart.getTime()) / totalMs) * 100;

    rowsHtml += '<div class="gantt-row">' +
      '<div class="gantt-label" title="' + label + '">' + label + '</div>' +
      '<div class="gantt-bar-area">' +
        '<div class="gantt-bar ' + barClass + '" style="left:' + leftPct.toFixed(1) + '%;width:' + widthPct.toFixed(1) + '%;">' + ieNo + '</div>' +
        (todayPct >= 0 && todayPct <= 100 ? '<div class="gantt-today" style="left:' + todayPct.toFixed(1) + '%;"></div>' : '') +
      '</div>' +
    '</div>';
  });

  bodyEl.innerHTML = rowsHtml;
}

function renderKapasite() {
  var gridEl = document.getElementById('kapasite-grid');
  if (!tezgahList.length) {
    gridEl.innerHTML = '<div style="padding:12px;text-align:center;color:#9ca3af;font-size:12px;grid-column:span 3;">Tezgah verisi bulunamadı</div>';
    return;
  }

  var now = new Date();
  // Count active WOs per machine
  var tezgahMap = {};
  tezgahList.forEach(function(t) {
    var name = t.fields['Tezgah Adı'] || t.fields['Ad'] || '—';
    tezgahMap[t.id] = { name: name, count: 0 };
  });

  ieList.forEach(function(r) {
    var f = r.fields;
    var durum = f['Durum'] || 'Beklemede';
    if (durum === 'Tamamlandı' || durum === 'İptal') return;
    var tezgahIds = f['Tezgah'] || f['Tezgahlar'] || [];
    if (typeof tezgahIds === 'string') tezgahIds = [tezgahIds];
    tezgahIds.forEach(function(tid) {
      if (tezgahMap[tid]) tezgahMap[tid].count++;
    });
  });

  var html = '';
  Object.keys(tezgahMap).forEach(function(tid) {
    var t = tezgahMap[tid];
    // Estimate capacity: 3 WO per machine = 100%
    var pct = Math.min(Math.round((t.count / 3) * 100), 100);
    var color = pct > 95 ? '#ef4444' : pct > 80 ? '#f59e0b' : '#10b981';
    var warn = pct > 95 ? ' ⚠' : '';

    html += '<div class="kap-item">' +
      '<div class="kap-name"><span>' + t.name + '</span><span class="kap-pct" style="color:' + color + '">' + pct + '%' + warn + '</span></div>' +
      '<div class="kap-bar"><div class="kap-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
      '<div style="font-size:10px;color:#9ca3af;margin-top:2px;">' + t.count + ' aktif iş emri</div>' +
    '</div>';
  });

  gridEl.innerHTML = html || '<div style="padding:12px;text-align:center;color:#9ca3af;font-size:12px;grid-column:span 3;">Tezgah verisi bulunamadı</div>';
}

loadAll();
loadDashboardData();
