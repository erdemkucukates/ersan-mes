      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.45);margin-top:3px">Bekleyen PR</div>
    </div>
    <div style="text-align:center;padding:0 18px;border-right:1px solid rgba(255,255,255,.12)">

    </div>
    <div style="text-align:center;padding:0 18px">
      <div style="font-size:26px;font-weight:800;color:#F5A623;line-height:1" id="bn-kalib">&mdash;</div>

    </div>
    <div style="margin-left:auto;text-align:right">
      <div style="font-size:9.5px;color:rgba(255,255,255,.3)">AS9100 Rev.D</div>

  <!-- MODÜL KARTLAR: Satış & Üretim -->

    Satış & Üretim Akışı
    <div style="flex:1;height:1px;background:#e5e7eb"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px" id="mod-satis"></div>

  <!-- MODÜL KARTLAR: Kalite -->
  <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:9px;display:flex;align-items:center;gap:8px">
    Kalite & Uygunluk
    <div style="flex:1;height:1px;background:#e5e7eb"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px" id="mod-kalite"></div>

  <!-- MODÜL KARTLAR: Destek -->

    Destek Süreçleri
    <div style="flex:1;height:1px;background:#e5e7eb"></div>

<script>
var MODROLLER_SATIS = [
  { ikon:'\uD83D\uDCBC', ad:'Teklif Y\u00F6netimi',  url:'ersan_teklif.html',    std:'AS9100 \u00A78.2', aciklama:'Teknik resim bazl\u0131 fiyatlama', durum:'aktif', renk:'#14b8a6' },
  { ikon:'\uD83D\uDCE6', ad:'Sipari\u015F Y\u00F6netimi', url:'ersan_siparisler.html',std:'AS9100 \u00A78.2', aciklama:'SP gruplama, PDF viewer', durum:'aktif', renk:'#3b82f6' },
  { ikon:'\uD83D\uDED2', ad:'Sat\u0131nalma',        url:'ersan_satinalma_pr.html',std:'AS9100 \u00A78.4',aciklama:'PR\u2192RFQ\u2192PO teklif kar\u015F\u0131la\u015Ft\u0131rma', durum:'aktif', renk:'#f59e0b' },
  { ikon:'\uD83D\uDE9A', ad:'\u00D6n Kabul',         url:'ersan_satinalma_grn.html',std:'AS9100 \u00A78.4',aciklama:'Malzeme kabul formu, tedarik\u00E7i', durum:'aktif', renk:'#f59e0b' },
  { ikon:'\uD83D\uDCE5', ad:'Girdi Kalite',     url:'ersan_kalite_iqc.html', std:'AS9100 \u00A78.4', aciklama:'Malzeme muayenesi, kabul/red', durum:'aktif', renk:'#ef4444' },
  { ikon:'\uD83D\uDCCB', ad:'\u0130\u015F Emirleri',      url:'ersan_isemirleri.html', std:'AS9100 \u00A78.5', aciklama:'WO olu\u015Fturma, traveller takibi', durum:'aktif', renk:'#10b981' },
  { ikon:'\uD83C\uDFED', ad:'\u00DCretim / At\u00F6lye',  url:'ersan_atolye.html',     std:'AS9100 \u00A78.5', aciklama:'Operasyon rotas\u0131, tezgah durumu', durum:'aktif', renk:'#10b981' },
  { ikon:'\uD83D\uDCE4', ad:'Sevkiyat',         url:'ersan_sevkiyat.html',   std:'AS9100 \u00A78.5.4',aciklama:'8 madde sevk kontrol, CoC', durum:'aktif', renk:'#0d9488' }
];

var MODROLLER_KALITE = [
  { ikon:'\u2705', ad:'Kalite Kontrol',   url:'ersan_kalite_iqc.html',  std:'AS9100 \u00A78.6', aciklama:'Girdi kalite, IQC, NCR hub', durum:'aktif', renk:'#059669' },
  { ikon:'\u26D4', ad:'NCR Y\u00F6netimi',     url:'ersan_kalite_ncr.html',  std:'AS9100 \u00A78.7', aciklama:'Uygunsuzluk, k\u00F6k neden, iskarta', durum:'uyari', renk:'#dc2626' },
  { ikon:'\uD83D\uDD27', ad:'CAPA',             url:'ersan_kalite_capa.html', std:'AS9100 \u00A710.2',aciklama:'D\u00FCzeltici faaliyet, 5-Why', durum:'aktif', renk:'#7c3aed' },
  { ikon:'\uD83D\uDD0D', ad:'\u0130\u00E7 Denetim',       url:'ersan_denetim_panel.html',std:'AS9100 \u00A79.2',aciklama:'Denetim plan\u0131, bulgu takibi', durum:'aktif', renk:'#84cc16' }
];

var MODROLLER_DESTEK = [
  { ikon:'\uD83D\uDE0A', ad:'M\u00FC\u015Fteri Y\u00F6netimi', url:'ersan_crm.html',         std:'AS9100 \u00A78.5.5',aciklama:'M\u00FC\u015Fteri bilgileri, \u015Fikayet', durum:'aktif', renk:'#e879f9' },
  { ikon:'\uD83D\uDD27', ad:'Ekipman & Bak\u0131m',  url:'ersan_ekipman_dashboard.html',std:'AS9100 \u00A77.1.3',aciklama:'Bak\u0131m takvimi, ar\u0131za, kalibrasyon', durum:'aktif', renk:'#f97316' },
  { ikon:'\uD83D\uDC65', ad:'Personel',         url:'ersan_ik_personel.html', std:'AS9100 \u00A77.2', aciklama:'Yetkinlik matrisi, e\u011Fitim takibi', durum:'aktif', renk:'#ec4899' },
  { ikon:'\u26A0', ad:'Risk Y\u00F6netimi',    url:'ersan_risk_fmea.html',   std:'AS9100 \u00A76.1', aciklama:'Risk tan\u0131mlama, FMEA analizi', durum:'aktif', renk:'#f59e0b' },
  { ikon:'\uD83E\uDDBA', ad:'\u0130SG',              url:'ersan_isg.html',          std:'ISO 45001',   aciklama:'Tehlike kayd\u0131, olay bildirimi', durum:'aktif', renk:'#dc2626' },
  { ikon:'\uD83D\uDCC2', ad:'Dok\u00FCman',          url:'ersan_dms_master.html',   std:'AS9100 \u00A77.5', aciklama:'Pros\u00E9d\u00FCr, talimat, form y\u00F6netimi', durum:'aktif', renk:'#8b5cf6' }
];

function modKartRender(containerId, modroller) {
  var el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = modroller.map(function(m) {
    var durumHtml = m.durum === 'uyari'
      ? '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;background:#fee2e2;color:#991b1b">\u25CF Dikkat</span>'
      : '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;background:#d1fae5;color:#065f46">\u25CF Aktif</span>';
    return '<div onclick="window.location.href=\'' + m.url + '\'" '
      + 'style="background:#fff;border:1px solid #e5e7eb;border-radius:9px;padding:12px 13px;cursor:pointer;transition:.15s;border-top:2px solid ' + m.renk + ';box-shadow:0 1px 3px rgba(0,0,0,.06)" '
      + 'onmouseenter="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 4px 12px rgba(0,0,0,.1)\'" '
      + 'onmouseleave="this.style.transform=\'\';this.style.boxShadow=\'0 1px 3px rgba(0,0,0,.06)\'">'
      + '<div style="font-size:20px;margin-bottom:8px">' + m.ikon + '</div>'
      + '<div style="font-size:12px;font-weight:700;color:#111827;margin-bottom:3px">' + m.ad + '</div>'
      + '<div style="font-size:10.5px;color:#6b7280;margin-bottom:6px;line-height:1.4">' + m.aciklama + '</div>'
      + '<div style="font-size:9px;color:#d1d5db;font-family:monospace;margin-bottom:6px">' + m.std + '</div>'
      + durumHtml
      + '</div>';
  }).join('');
}

async function bannerYukle() {
  try {
    var sonuclar = await Promise.allSettled([
      airtable('list','Teklifler',{filterByFormula:"{Durum}='Bekleyen Onay'"}),
      airtable('list','Satis Emirleri',{filterByFormula:"OR({Durum}='Uretimde',{Durum}='Planlamada')"}),
      airtable('list','Is Emirleri',{filterByFormula:"OR({Durum}='Acik',{Durum}='Devam')"}),
      airtable('list','Satinalma Talepleri',{filterByFormula:"{Durum}='Bekleyen'"}),
      airtable('list','NCR Kayitlari',{filterByFormula:"{Durum}='Acik'"})
    ]);

    var sayac = function(r) { return r.status === 'fulfilled' ? (r.value.records ? r.value.records.length : 0) : 0; };
    var set = function(id, val) { var el = document.getElementById(id); if(el) el.textContent = val; };

    set('bn-teklif',    sayac(sonuclar[0]));
    set('bn-siparis',   sayac(sonuclar[1]));
    set('bn-isemri',    sayac(sonuclar[2]));
    set('bn-satinalma', sayac(sonuclar[3]));
    set('bn-ncr',       sayac(sonuclar[4]));
  } catch(e) {
    console.warn('Banner yuklenemedi:', e);
  }
}

function topbarGuncelle() {
  var ava  = document.getElementById('tb-ava');
  if (ava)  ava.textContent = sessionStorage.getItem('kullanici_ava') || 'EK';
}

document.addEventListener('DOMContentLoaded', function() {
  modKartRender('mod-satis',   MODROLLER_SATIS);
  modKartRender('mod-kalite',  MODROLLER_KALITE);
  modKartRender('mod-destek',  MODROLLER_DESTEK);
  topbarGuncelle();
  bannerYukle();
});
</script>
</body>
</html>
