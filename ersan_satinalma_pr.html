<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ersan MES — Satinalma Talepleri</title>
<link rel="stylesheet" href="ersan_styles.css">
<script src="ersan_nav.js" defer></script>
<script src="ersan_log.js" defer></script>
<style>
.pr-layout{display:flex;gap:12px;height:calc(100vh - 52px - 80px)}
.pr-sol{width:320px;flex-shrink:0;background:var(--beyaz);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
.pr-sag{flex:1;background:var(--beyaz);border:1px solid var(--border);border-radius:8px;overflow-y:auto;padding:16px}
.pr-tab{flex:1;padding:8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:var(--metin3);background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit}
.pr-tab.aktif{color:var(--mavi);border-bottom-color:var(--mavi);background:var(--mavi-acik)}
.f-grp{margin-bottom:8px}.f-lbl{font-size:10px;font-weight:600;color:var(--metin3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;display:block}
.f-inp{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--metin2);background:var(--beyaz);font-family:inherit}
.f-inp:focus{outline:none;border-color:var(--mavi);box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.f-inp-auto{background:#f0f9ff;border-color:#93c5fd;color:#1e40af}
.f-inp-linked{background:#f0fdf4;border-color:#86efac;color:#166534}
.modal-ov{position:fixed;inset:0;background:rgba(15,39,68,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.modal-bx{background:var(--beyaz);border-radius:10px;width:92%;max-width:780px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-bd{padding:18px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--border)}
.stl-inp{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit}
.stl-lbl{font-size:10px;color:var(--metin3);margin-bottom:2px}
.kalem-tbl{width:100%;border-collapse:collapse;margin-top:6px}
.kalem-tbl th{background:var(--bg2);padding:5px 8px;font-size:10px;font-weight:600;color:var(--metin3);text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border)}
.kalem-tbl td{padding:4px 8px;border-bottom:1px solid var(--bg2);font-size:12px}
.kalem-tbl input,.kalem-tbl select{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit}
.tab .tb-n{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;margin-left:4px}
.tb-amr{background:#FAEEDA;color:#854F0B}
.tb-blu{background:#E6F1FB;color:#185FA5}
.kritik-banner{display:none;padding:7px 14px;background:#FCEBEB;border-bottom:1px solid #F09595;font-size:12px;color:#791F1F;font-weight:500;align-items:center;gap:8px}
.kritik-banner.show{display:flex}
.kritik-dot{width:7px;height:7px;border-radius:50%;background:#E24B4A;flex-shrink:0}
.filter-drawer{display:none;padding:12px 14px;border-bottom:1px solid #e5e7eb;background:#f9fafb}
.filter-drawer.open{display:block}
.fd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fd-label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:3px}
.fd-inp{width:100%;font-size:12px;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;background:#fff;color:#111827;outline:none;font-family:inherit}
.fd-inp:focus{border-color:#1a2b47}
.fd-date-row{display:flex;gap:6px}
.fd-date-row .fd-inp{flex:1}
.acil-btn-row{display:flex;gap:5px;flex-wrap:wrap}
.acil-toggle{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#6b7280;transition:all .12s;font-family:inherit}
.acil-toggle.on-n{background:#d1fae5;color:#065f46;border-color:#059669}
.acil-toggle.on-y{background:#fef3c7;color:#92400e;border-color:#d97706}
.acil-toggle.on-k{background:#fee2e2;color:#991b1b;border-color:#dc2626}
.fd-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid #e5e7eb;margin-top:8px}
.fd-clear{font-size:11px;color:#dc2626;border:none;background:none;cursor:pointer;font-family:inherit}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;padding:6px 14px;border-bottom:1px solid #e5e7eb;background:#fff}
.chip-row:empty{display:none;padding:0}
.filter-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.filter-chip .fc-x{cursor:pointer;opacity:.6;font-size:10px}
.chip-clear-all{font-size:11px;color:#dc2626;border:none;background:none;cursor:pointer;margin-left:auto;font-family:inherit}
.filter-toggle-btn{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit}
.filter-toggle-btn.has-filter{border-color:#93c5fd;background:#dbeafe;color:#1e40af}
.filter-toggle-btn .fb-cnt{font-size:10px;background:#1a2b47;color:#fff;padding:0 5px;border-radius:8px;font-weight:600}
.pr-tablo{width:100%;border-collapse:collapse}
.pr-tablo thead th{background:var(--bg2);padding:7px 10px;font-size:10px;font-weight:600;color:var(--metin3);text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border)}
.pr-tablo tbody td{padding:8px 10px;font-size:12px;color:var(--metin2);border-bottom:1px solid var(--bg2);cursor:pointer}
.pr-tablo tbody tr:hover td{background:var(--bg2)}
.pr-tablo tr.p-k td{background:#fff5f5}
.pr-tablo tr.p-k:hover td{background:#fee2e2}
.pr-tablo tr.p-y td{background:#fffbeb}
.pr-tablo tr.p-y:hover td{background:#fef3c7}
.pr-tablo td.brd-k{border-left:3px solid #dc2626}
.pr-tablo td.brd-y{border-left:3px solid #d97706}
.pr-tablo td.brd-n{border-left:3px solid transparent}
.pr-tablo tr.sel-row td{background:#f0fdf4}
.list-footer{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between}
.lf-info{font-size:12px;color:var(--metin4)}
.lf-info b{color:var(--laci)}
.rfq-quick-btn{font-size:12px;padding:6px 14px;background:var(--laci);color:#fff;border:none;border-radius:5px;cursor:pointer;opacity:.4;pointer-events:none;transition:opacity .15s;font-family:inherit}
.rfq-quick-btn.ready{opacity:1;pointer-events:auto}
</style>
</head>
<body>
<div id="nav-alani"></div>
<div class="icerik-alani">
  <div class="topbar">
    <div class="topbar-baslik">Satinalma Talepleri (PR)</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn btn-mavi" onclick="modalAc()">+ Yeni Talep</button>
      <div style="width:28px;height:28px;border-radius:50%;background:var(--laci);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">EK</div>
    </div>
  </div>
  <div class="sayfa-icerik">
    <div class="kpi-grid" style="margin-bottom:12px">
      <div class="kpi-kart"><div class="kpi-etiket">Toplam</div><div class="kpi-deger" id="kpi-toplam">-</div></div>
      <div class="kpi-kart sari"><div class="kpi-etiket">Onay Bekleyen</div><div class="kpi-deger" id="kpi-onay">-</div></div>
      <div class="kpi-kart yesil"><div class="kpi-etiket">Onaylanan</div><div class="kpi-deger" id="kpi-onayli">-</div></div>
      <div class="kpi-kart"><div class="kpi-etiket">RFQ</div><div class="kpi-deger" id="kpi-rfq">-</div></div>
    </div>
    <!-- Arama + Filtre -->
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <input type="text" id="pr-arama" placeholder="PR no, malzeme, WO ara..." oninput="listeyiUygula()" style="flex:1;font-size:13px;padding:7px 12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#111827;outline:none;font-family:inherit">
      <button class="filter-toggle-btn" id="filter-toggle" onclick="drawerToggle()">Filtrele <span class="fb-cnt" id="filter-count" style="display:none"></span></button>
    </div>
    <!-- Filtre Drawer -->
    <div class="filter-drawer" id="filter-drawer">
      <div class="fd-grid">
        <div><label class="fd-label">PR Tipi</label><select class="fd-inp" id="fd-tip" onchange="listeyiUygula()"><option value="">Tumu</option><option>Siparise Bagli</option><option>Genel Alim</option></select></div>
        <div><label class="fd-label">Kategori</label><select class="fd-inp" id="fd-kat" onchange="listeyiUygula()"><option value="">Tumu</option><option>Hammadde</option><option>Fason</option><option>Hizmet</option><option>Sarf Malzeme</option><option>Yedek Parca</option></select></div>
        <div><label class="fd-label">Talep Eden</label><select class="fd-inp" id="fd-kisi" onchange="listeyiUygula()"><option value="">Tumu</option></select></div>
        <div><label class="fd-label">Ihtiyac Tarihi Araligi</label><div class="fd-date-row"><input class="fd-inp" type="date" id="fd-t1" oninput="listeyiUygula()"><input class="fd-inp" type="date" id="fd-t2" oninput="listeyiUygula()"></div></div>
      </div>
      <div><label class="fd-label" style="margin-bottom:6px">Aciliyet</label><div class="acil-btn-row"><button class="acil-toggle" onclick="acilToggle('Normal',this,'on-n')">Normal</button><button class="acil-toggle" onclick="acilToggle('Yuksek',this,'on-y')">Yuksek</button><button class="acil-toggle" onclick="acilToggle('Kritik',this,'on-k')">Kritik</button></div></div>
      <div class="fd-footer"><button class="fd-clear" onclick="filtreleriTemizle()">Filtreleri temizle</button><button class="fd-clear" onclick="drawerToggle()" style="color:var(--laci)">Kapat</button></div>
    </div>
    <!-- Chip'ler -->
    <div class="chip-row" id="chip-row"></div>
    <!-- Sekmeler -->
    <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:0">
      <button id="tab-bekleyen" style="flex:1;padding:9px 8px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--laci);border-bottom:2px solid var(--laci);display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit" onclick="sekmeAyarla('bekleyen',this)">Bekleyen <span class="tb-n tb-amr" id="tn-bekleyen"></span></button>
      <button id="tab-rfq" style="flex:1;padding:9px 8px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--metin3);border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit" onclick="sekmeAyarla('rfq',this)">RFQ Gonderildi <span class="tb-n tb-blu" id="tn-rfq"></span></button>
    </div>
    <!-- Kritik Banner -->
    <div class="kritik-banner" id="kritik-banner"><div class="kritik-dot"></div><span id="kritik-txt"></span></div>
    <!-- Tablo -->
    <div style="background:var(--beyaz);border:1px solid var(--border);border-radius:0 0 8px 8px;overflow:hidden;">
      <div style="padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;color:var(--metin4)"><b id="liste-count">0</b> kayit</span></div>
      <div style="overflow-x:auto">
        <table class="pr-tablo"><thead><tr><th style="width:120px">PR No</th><th>Aciklama / Kategori</th><th>Tip</th><th>Is Emri</th><th>Aciliyet</th><th>Ihtiyac Tarihi</th><th style="width:80px"></th></tr></thead><tbody id="pr-tbody"></tbody></table>
      </div>
    </div>
    <!-- Footer -->
    <div class="list-footer"><div class="lf-info">Secili: <b id="secili-pr">&mdash;</b></div><button class="rfq-quick-btn" id="rfq-quick-btn" onclick="hizliRfq()">&#8594; RFQ Olustur</button></div>
  </div>
</div>
<div id="pr-modal" style="display:none"></div>

<script>
var BASE = 'app5LDgJMgocw79Ix';
var TABLO = 'Sat\u0131nalma Talepleri';
var talepler = [], siparisler = [], tedarikciler = [];
var aktifSekme = 'bekleyen';
var acilSet = {};
var seciliPR = null;
var drawerAcikMi = false;
var YOGUNLUK = {'Celik':7.85,'Paslanmaz':7.93,'Aluminyum':2.70,'Titanyum':4.51,'Bronz':8.89,'Pirinc':8.50,'Bakir':8.96};
var YOGUNLUK_KEYS = Object.keys(YOGUNLUK);
var FASON_ISLEMLER = ['Isil Islem','Induksiyon','Nitrasyon','Sementasyon','Taslama','Boyama','Kaplama','Diger'];

async function apiGet(tablo, query) {
  var url = '/.netlify/functions/airtable?table=' + encodeURIComponent(tablo);
  if (query) url += '&' + query;
  var r = await fetch(url); return r.json();
}
async function apiPost(tablo, fields) {
  var r = await fetch('/.netlify/functions/airtable', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({method:'POST', path:'/v0/'+BASE+'/'+encodeURIComponent(tablo), body:{fields:fields}}) });
  return r.json();
}
async function apiPatch(tablo, id, fields) {
  var r = await fetch('/.netlify/functions/airtable', { method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table:tablo, id:id, fields:fields}) });
  return r.json();
}

async function veriYukle() {
  try {
    var woParam = new URLSearchParams(window.location.search).get('wo');
    var data = await apiGet(TABLO, 'pageSize=100&sort[0][field]=Talep%20Tarihi&sort[0][direction]=desc');
    talepler = data.records || [];
    var spData = await apiGet('Sat\u0131\u015F Emirleri', 'pageSize=100&sort[0][field]=SE%20No&sort[0][direction]=desc');
    siparisler = spData.records || [];
    var tdData = await apiGet('Tedarik\u00E7iler (OTL)', '');
    tedarikciler = tdData.records || [];
    kpiGuncelle(); listeyiUygula();
    if (woParam) { await modalAc(); var w = document.getElementById('f-wo-no'); if(w){w.value=woParam;w.style.background='#f0fdf4';w.style.color='#166534';} }
  } catch(e) { var prTbody = document.getElementById('pr-tbody'); if(prTbody) prTbody.innerHTML = '<tr><td colspan="7" style="padding:16px;color:var(--kirmizi);font-size:12px;">Hata: '+e.message+'</td></tr>'; }
}

function kpiGuncelle() {
  document.getElementById('kpi-toplam').textContent = talepler.length;
  document.getElementById('kpi-onay').textContent = talepler.filter(function(r){return r.fields['Durum']==='Onay Bekliyor'}).length;
  document.getElementById('kpi-onayli').textContent = talepler.filter(function(r){return (r.fields['Durum']||'').indexOf('Onayland')>=0}).length;
  document.getElementById('kpi-rfq').textContent = talepler.filter(function(r){return (r.fields['Durum']||'').indexOf('RFQ')>=0}).length;
}
function trTarih(d) { if(!d) return '-'; try { return new Date(d).toLocaleDateString('tr-TR'); } catch(e) { return d; } }
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function tabloRender(liste) {
  var tbody = document.getElementById('pr-tbody');
  if (!tbody) return;

  var bekS = talepler.filter(function(r){var d=r.fields['Durum']||'Taslak';return d==='Taslak'||d==='Onay Bekliyor'||d.indexOf('Onayland')>=0}).length;
  var rfqS = talepler.filter(function(r){return (r.fields['Durum']||'').indexOf('RFQ')>=0}).length;
  var tnB = document.getElementById('tn-bekleyen'); if(tnB) tnB.textContent = bekS||'';
  var tnR = document.getElementById('tn-rfq'); if(tnR) tnR.textContent = rfqS||'';

  var kritikler = talepler.filter(function(r){var d=r.fields['Durum']||'Taslak';return (d==='Taslak'||d==='Onay Bekliyor'||d.indexOf('Onayland')>=0) && r.fields['Aciliyet']==='Kritik'});
  var banner = document.getElementById('kritik-banner');
  if(banner){
    if(kritikler.length && aktifSekme==='bekleyen'){banner.classList.add('show');document.getElementById('kritik-txt').textContent=kritikler.length+' kritik talep bekliyor';}
    else{banner.classList.remove('show');}
  }

  // Talep Eden dropdown doldur
  var kdSel = document.getElementById('fd-kisi');
  if(kdSel && kdSel.options.length<=1){
    var kisiler = {};
    talepler.forEach(function(r){var k=r.fields['Talep Eden'];if(k)kisiler[k]=1;});
    Object.keys(kisiler).forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=k;kdSel.appendChild(o);});
  }

  var lcEl = document.getElementById('liste-count'); if(lcEl) lcEl.textContent = liste.length;

  if(!liste.length){
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--metin4);font-size:13px;">Kayit bulunamadi</td></tr>';
    return;
  }

  // Siralama: Kritik > Yuksek > Normal
  var sirali = liste.slice().sort(function(a,b){
    var map = {'Kritik':0,'Y\u00FCksek':1,'Yuksek':1};
    var va = map[a.fields['Aciliyet']] !== undefined ? map[a.fields['Aciliyet']] : 2;
    var vb = map[b.fields['Aciliyet']] !== undefined ? map[b.fields['Aciliyet']] : 2;
    return va - vb;
  });

  tbody.innerHTML = sirali.map(function(r){
    var f = r.fields;
    var prNo = f['Talep No']||r.id.substring(0,8);
    var tip = f['PR Tipi']||f['Talep Tipi']||'-';
    var wo = f['Is Emri No']||'-';
    var acil = f['Aciliyet']||'Normal';
    var tarih = trTarih(f['Ihtiyac Tarihi']);
    var kat = f['Kategori']||f['Kalem Ad\u0131']||'-';
    var acikl = tip==='Genel Alim'?kat:(f['Kalem Ad\u0131']||kat);
    var pc = acil==='Kritik'?'p-k':acil==='Y\u00FCksek'||acil==='Yuksek'?'p-y':'';
    var brd = acil==='Kritik'?'brd-k':acil==='Y\u00FCksek'||acil==='Yuksek'?'brd-y':'brd-n';
    var acilCls = acil==='Kritik'?'badge-kirmizi':acil==='Y\u00FCksek'||acil==='Yuksek'?'badge-sari':'badge-gri';
    var isSel = seciliPR === r.id;
    return '<tr class="'+pc+(isSel?' sel-row':'')+'" onclick="prSatirSec(\''+r.id+'\')" style="cursor:pointer">'+
      '<td class="'+brd+'"><span style="font-family:monospace;font-size:11px;font-weight:600;color:var(--mavi-koyu)">'+escH(prNo)+'</span></td>'+
      '<td>'+escH(acikl)+'</td>'+
      '<td style="color:var(--metin3)">'+escH(tip)+'</td>'+
      '<td style="font-family:monospace;font-size:11px;color:var(--metin3)">'+escH(wo)+'</td>'+
      '<td><span class="badge '+acilCls+'">'+escH(acil)+'</span></td>'+
      '<td style="color:var(--metin3)">'+tarih+'</td>'+
      '<td style="text-align:right">'+
      '<button class="btn btn-sm btn-beyaz" onclick="event.stopPropagation();rfqDonustur(\''+r.id+'\')" style="padding:3px 8px;font-size:10px">RFQ</button>'+
      '</td></tr>';
  }).join('');
}

function listeyiUygula() {
  var ara = (document.getElementById('pr-arama')||{value:''}).value.toLowerCase();
  var tip = (document.getElementById('fd-tip')||{value:''}).value;
  var kat = (document.getElementById('fd-kat')||{value:''}).value;
  var kisi = (document.getElementById('fd-kisi')||{value:''}).value;
  var t1 = (document.getElementById('fd-t1')||{value:''}).value;
  var t2 = (document.getElementById('fd-t2')||{value:''}).value;

  var filtre = talepler.filter(function(r){
    var f = r.fields;
    var durum = f['Durum']||'Taslak';
    var durumOk = false;
    if(aktifSekme==='bekleyen'){durumOk = durum==='Taslak'||durum==='Onay Bekliyor'||durum.indexOf('Onayland')>=0;}
    else{durumOk = durum.indexOf('RFQ')>=0;}
    if(!durumOk) return false;
    if(tip && (f['PR Tipi']||'')!==tip) return false;
    if(kat && (f['Kategori']||f['Talep Tipi']||'')!==kat) return false;
    if(kisi && (f['Talep Eden']||'')!==kisi) return false;
    if(Object.keys(acilSet).length && !acilSet[f['Aciliyet']||'Normal']) return false;
    if(t1 && (f['Ihtiyac Tarihi']||'')<t1) return false;
    if(t2 && (f['Ihtiyac Tarihi']||'')>t2) return false;
    if(ara){
      var m = [f['Talep No'],f['Kalem Ad\u0131'],f['Is Emri No'],f['Kategori'],f['Talep Eden'],f['PR Tipi']].join(' ').toLowerCase();
      if(m.indexOf(ara)<0) return false;
    }
    return true;
  });

  tabloRender(filtre);
  chipRender(tip,kat,kisi,t1,t2);
  var fc = aktifFilterSayisi();
  var fcEl = document.getElementById('filter-count');
  if(fcEl){fcEl.style.display=fc?'inline':'none';fcEl.textContent=fc;}
  var ftBtn = document.getElementById('filter-toggle');

function chipRender(tip,kat,kisi,t1,t2) {
  var chips=[];
  if(tip) chips.push({l:'Tip: '+tip, fn:"document.getElementById('fd-tip').value='';listeyiUygula()"});
  if(kat) chips.push({l:kat, fn:"document.getElementById('fd-kat').value='';listeyiUygula()"});
  if(kisi) chips.push({l:kisi, fn:"document.getElementById('fd-kisi').value='';listeyiUygula()"});
  if(t1) chips.push({l:'>='+trTarih(t1), fn:"document.getElementById('fd-t1').value='';listeyiUygula()"});
  if(t2) chips.push({l:'<='+trTarih(t2), fn:"document.getElementById('fd-t2').value='';listeyiUygula()"});
  var clsMap={'Normal':'on-n','Yuksek':'on-y','Kritik':'on-k'};
  Object.keys(acilSet).forEach(function(a){chips.push({l:a,fn:"delete acilSet['"+a+"'];document.querySelector('.acil-toggle."+clsMap[a]+"')?.classList.remove('"+clsMap[a]+"');listeyiUygula()"});});
  var row=document.getElementById('chip-row'); if(!row) return;
  if(!chips.length){row.innerHTML='';return;}
  row.innerHTML=chips.map(function(c){return '<span class="filter-chip">'+c.l+'<span class="fc-x" onclick="'+c.fn+'">&#10005;</span></span>';}).join('')+
    '<button class="chip-clear-all" onclick="filtreleriTemizle()">Tumunu temizle</button>';
}

async function spSecildi() {
  var sel = document.getElementById('f-siparis');
  var opt = sel.options[sel.selectedIndex];
  var woInp = document.getElementById('f-wo-no');
  if (!sel.value) {
    document.getElementById('stl-body').innerHTML=''; _stlKalemler=[];
    if (woInp) { woInp.value=''; woInp.style.background='var(--bg2)'; woInp.style.color='var(--metin3)'; }
    return;
  }
  var spId = sel.value;
  var seNo = opt.dataset.seno || '';

  // Siparis kalemlerini bul (ayni SE grubundakiler)
  var kalemler = siparisler.filter(function(s) {
    var sn = s.fields['SE No']||'';
    if (!seNo) return s.id === spId;
    var parent = sn.split('-').slice(0,3).join('-');
    var selParent = seNo.split('-').slice(0,3).join('-');
    return parent === selParent;
  });

  _stlKalemler = kalemler.map(function(r) {
    var f = r.fields;
    return { seId: r.id, parcaAdi: f['Par\u00E7a Ad\u0131']||'', miktar: f['Miktar']||0, birim: f['Birim']||'Adet', seNo: f['SE No']||'',
      rows: [{tip:'Hammadde',malzemeTipi:'Mil',malzemeCinsi:'',yogunluk:'Celik',cap:'',boy:'',ic_cap:'',en:'',kalinlik:'',spec:'',tedarikciId:'',tedarikciAdi:''}]
    };
  });
  renderSTL();

  // Bagli Is Emrini Airtable'dan sorgula
  if (woInp) {
    woInp.value = 'Sorgulanıyor...';
    woInp.style.background = 'var(--bg2)';
    woInp.style.color = 'var(--metin4)';
    try {
      // Secilen siparis kalemlerinin ID'leriyle IE tablosunda ara
      var seIds = kalemler.map(function(k){return k.id});
      var ieData = await apiGet('\u0130\u015F Emirleri', 'pageSize=100');
      var ieRecs = (ieData.records||[]).filter(function(ie) {
        var bagli = ie.fields['SE No'] || ie.fields['Sat\u0131\u015F Emirleri'] || [];
        return bagli.some(function(sid){return seIds.indexOf(sid)>=0});
      });
      if (ieRecs.length > 0) {
        var ieNolar = ieRecs.map(function(r){return r.fields['IE No']||r.id}).join(', ');
        woInp.value = ieNolar;
        woInp.style.background = '#f0fdf4';
        woInp.style.color = '#166534';
      } else {
        woInp.value = 'Henuz IE olusturulmamis';
        woInp.style.background = '#fefce8';
        woInp.style.color = '#854d0e';
      }
    } catch(e) {
      woInp.value = 'IE sorgulanamadi';
      woInp.style.background = 'var(--bg2)';
      woInp.style.color = 'var(--metin4)';
    }
  }
}

function calcKg(tip, s, adet) {
  var rho=YOGUNLUK[s.yogunluk]||7.85, gram=0;
  if(tip==='Mil'){var r2=(parseFloat(s.cap)||0)/2/10,h2=(parseFloat(s.boy)||0)/10;gram=Math.PI*r2*r2*h2*rho;}
  else if(tip==='Boru'){var rd2=(parseFloat(s.cap)||0)/2/10,ri2=(parseFloat(s.ic_cap)||0)/2/10,h3=(parseFloat(s.boy)||0)/10;gram=Math.PI*(rd2*rd2-ri2*ri2)*h3*rho;}
  else if(tip==='Lama'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*((parseFloat(s.boy)||0)/10)*rho;}
  else if(tip==='Sac'){gram=((parseFloat(s.en)||0)/10)*((parseFloat(s.boy)||0)/10)*((parseFloat(s.kalinlik)||0)/10)*rho;}
  return gram/1000*(adet||1);
}
function stlOlcuStr(s) {
  if(s.malzemeTipi==='Mil') return 'O'+(s.cap||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Boru') return 'O'+(s.cap||'?')+'/'+(s.ic_cap||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Lama') return (s.en||'?')+'x'+(s.kalinlik||'?')+'x'+(s.boy||'?')+'mm';
  if(s.malzemeTipi==='Sac') return (s.en||'?')+'x'+(s.boy||'?')+'x'+(s.kalinlik||'?')+'mm';
  return '';
}

function renderSTL() {
  var body = document.getElementById('stl-body');
  if (!body) return;
  body.innerHTML = '';
  _stlKalemler.forEach(function(kalem, ki) {
    var div = document.createElement('div');
    div.style.cssText = 'border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;';
    var seNo = kalem.seNo.split('-').pop() || (ki+1);
    var header = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bg);">'+
      '<span style="font-size:12px;font-weight:600;color:var(--mavi-koyu);">Kalem '+seNo+'</span>'+
      '<span style="font-size:12px;font-weight:500;">'+kalem.parcaAdi+'</span>'+
      '<span style="font-size:11px;color:var(--metin4);">'+kalem.miktar+' '+kalem.birim+'</span></div>';
    var rowsHtml = '';
    kalem.rows.forEach(function(row, ri) {
      var uid = ki+'_'+ri;
      rowsHtml += '<div style="position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
        '<span style="font-size:10px;font-weight:600;color:var(--metin3);">'+(ri+1)+'. '+(row.tip==='Fason'?'Fason':'Hammadde')+'</span>'+
        '<button onclick="removeSTLRow('+ki+','+ri+')" style="background:transparent;border:none;color:var(--kirmizi);font-size:12px;cursor:pointer;">Sil</button></div>'+
        renderSTLRow(row, uid)+'</div>';
    });
    rowsHtml += '<button onclick="addSTLRow('+ki+')" style="width:100%;padding:5px;border:1px dashed var(--metin4);border-radius:6px;background:transparent;color:var(--metin3);font-size:11px;cursor:pointer;font-family:inherit;">+ Talep Satiri Ekle</button>';
    div.innerHTML = header + rowsHtml;
    body.appendChild(div);
    // Event listeners
    kalem.rows.forEach(function(row, ri) {
      var uid = ki+'_'+ri;
      setTimeout(function() {
        var tipSel = document.getElementById('stl-tip-'+uid);
        if(tipSel) tipSel.onchange=function(){kalem.rows[ri].tip=this.value;if(this.value==='Fason')kalem.rows[ri].malzemeTipi='Fason';renderSTL();};
        var mtypSel = document.getElementById('stl-mtyp-'+uid);
        if(mtypSel) mtypSel.onchange=function(){kalem.rows[ri].malzemeTipi=this.value;renderSTL();};
        var yogSel = document.getElementById('stl-yog-'+uid);
        if(yogSel) yogSel.onchange=function(){kalem.rows[ri].yogunluk=this.value;kgHesapla(uid,ki,ri);};
        ['mc','cap','ic','boy','en','kal','spec'].forEach(function(fld){
          var el=document.getElementById('stl-'+fld+'-'+uid); if(!el) return;
          var map={mc:'malzemeCinsi',cap:'cap',ic:'ic_cap',boy:'boy',en:'en',kal:'kalinlik',spec:'spec'};
          if(fld==='mc'&&kalem.rows[ri].tip==='Fason'){el.onchange=function(){kalem.rows[ri].malzemeCinsi=this.value;};}
          else{el.oninput=function(){kalem.rows[ri][map[fld]]=this.value;if(['cap','ic','boy','en','kal'].indexOf(fld)>=0)kgHesapla(uid,ki,ri);};}
        });
        var tdSel = document.getElementById('stl-td-'+uid);
        if(tdSel) tdSel.onchange=function(){kalem.rows[ri].tedarikciId=this.value;kalem.rows[ri].tedarikciAdi=this.options[this.selectedIndex].text;};
      }, 0);
    });
  });
}
var _kgTimer=null;
function kgHesapla(uid,ki,ri){clearTimeout(_kgTimer);_kgTimer=setTimeout(function(){var s=_stlKalemler[ki].rows[ri];if(!s)return;var kg=calcKg(s.malzemeTipi,s,1);var el=document.getElementById('stl-kg-'+uid);if(el){el.textContent=kg>0?'Tahmini: '+kg.toFixed(2)+' kg/adet':'';el.style.display=kg>0?'block':'none';}},500);}

// ── GENEL ALIM KALEMLERI ──
function genelKalemEkle() { _genelKalemler.push({aciklama:'',miktar:1,birim:'Adet',tedarikciId:'',tedarikciAdi:''}); genelKalemlerRender(); }
function genelKalemSil(i) { _genelKalemler.splice(i,1); if(!_genelKalemler.length) _genelKalemler.push({aciklama:'',miktar:1,birim:'Adet',tedarikciId:'',tedarikciAdi:''}); genelKalemlerRender(); }
function genelKalemlerRender() {
  var el = document.getElementById('genel-kalem-alani'); if(!el) return;
  var tdOptsHtml = '<option value="">--</option>'+tedarikciler.map(function(t){return '<option value="'+t.id+'">'+(t.fields['Tedarik\u00E7i Ad\u0131']||'')+'</option>';}).join('');
  var html = '<table class="kalem-tbl"><thead><tr><th>#</th><th>Aciklama</th><th style="width:70px">Miktar</th><th style="width:80px">Birim</th><th style="width:160px">Tedarikci</th><th style="width:30px"></th></tr></thead><tbody>';
  _genelKalemler.forEach(function(k,i){
    html += '<tr><td style="text-align:center;font-weight:600;color:var(--metin3)">'+(i+1)+'</td>'+
      '<td><input value="'+(k.aciklama||'')+'" oninput="_genelKalemler['+i+'].aciklama=this.value" placeholder="Malzeme/hizmet aciklamasi"></td>'+
      '<td><input type="number" value="'+(k.miktar||1)+'" min="1" oninput="_genelKalemler['+i+'].miktar=parseFloat(this.value)||1"></td>'+
      '<td><select onchange="_genelKalemler['+i+'].birim=this.value"><option'+(k.birim==='Adet'?' selected':'')+'>Adet</option><option'+(k.birim==='Kg'?' selected':'')+'>Kg</option><option'+(k.birim==='Mt'?' selected':'')+'>Mt</option><option'+(k.birim==='Tk'?' selected':'')+'>Tk</option><option'+(k.birim==='Lt'?' selected':'')+'>Lt</option></select></td>'+
      '<td><select onchange="_genelKalemler['+i+'].tedarikciId=this.value;_genelKalemler['+i+'].tedarikciAdi=this.options[this.selectedIndex].text">'+tdOptsHtml.replace('value="'+(k.tedarikciId||'')+'"','value="'+(k.tedarikciId||'')+'" selected')+'</select></td>'+
      '<td><button onclick="genelKalemSil('+i+')" style="background:none;border:none;color:var(--kirmizi);cursor:pointer;font-size:14px">&times;</button></td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── KAYDET ──
async function talepKaydet() {
  try {
    var bugun = new Date().toISOString().split('T')[0];
    if (_modalSekme === 'siparis' && _stlKalemler.length > 0) {
      // Siparis bagli: her kalem icin ayri satinalma talebi (mevcut STL mantigiyla)
      var count = 0;
      for (var ki=0; ki<_stlKalemler.length; ki++) {
        var kalem = _stlKalemler[ki];
        for (var ri=0; ri<kalem.rows.length; ri++) {
          var s = kalem.rows[ri];
          var kg = s.tip==='Hammadde' ? calcKg(s.malzemeTipi, s, kalem.miktar) : 0;
          await apiPost(TABLO, {
            'Talep No': _prNo,
            'SE No': [kalem.seId],
            'Kalem Ad\u0131': kalem.parcaAdi,
            'Talep Tipi': s.tip,
            'Malzeme \u0130\u015Flem': s.tip==='Fason'?(s.malzemeCinsi||''):(s.malzemeTipi+' - '+(s.malzemeCinsi||'')),
            'Miktar': kalem.miktar||0,
            'Birim': kalem.birim||'Adet',
            '\u00D6l\u00E7\u00FC': s.tip==='Hammadde'?stlOlcuStr(s):(s.spec||''),
            'Tahmini kg': kg>0?parseFloat(kg.toFixed(3)):null,
            'Durum': 'Onay Bekliyor',
            'PR Tipi': 'Siparise Bagli',
            'Aciliyet': document.getElementById('f-aciliyet').value,
            'Ihtiyac Tarihi': document.getElementById('f-ihtiyac').value,
            'Is Emri No': document.getElementById('f-wo-no').value||'',
            'Talep Tarihi': bugun,
          });
          count++;
        }
      }
      if (typeof logIslem === 'function') logIslem('PR_OLUSTURULDU', 'Satinalma', null, _prNo, null, {kalem:count});
      modalKapat(); await veriYukle();
      toast(count + ' satinalma talebi olusturuldu');
    } else {
      // Genel alim: tek kayit, kalemler notlara yazilir
      var kalemOzet = _genelKalemler.map(function(k,i){return (i+1)+'. '+(k.aciklama||'?')+' x'+k.miktar+' '+k.birim;}).join('\n');
      var notlar = (document.getElementById('f-notlar').value||'');
      if (kalemOzet) notlar = (notlar?notlar+'\n\n':'') + 'Kalemler:\n' + kalemOzet;
      var res = await apiPost(TABLO, {
        'Talep No': _prNo,
        'Durum': 'Onay Bekliyor',
        'PR Tipi': 'Genel Alim',
        'Kategori': document.getElementById('f-kategori').value,
        'Aciliyet': document.getElementById('f-aciliyet').value,
        'Ihtiyac Tarihi': document.getElementById('f-ihtiyac').value,
        'Is Emri No': document.getElementById('f-wo-no').value||'',
        'Talep Tarihi': bugun,
        'Kalem Sayisi': _genelKalemler.length,
        'Notlar': notlar,
      });
      if (res.error) throw new Error(res.error.type||res.error.message||JSON.stringify(res.error));
      if (typeof logIslem === 'function') logIslem('PR_OLUSTURULDU', 'Satinalma', res.id, _prNo, null, {});
      modalKapat(); await veriYukle();
      toast('Satinalma talebi olusturuldu');
    }
  } catch(e) { alert('Kaydetme hatasi: ' + e.message); }
}

function toast(msg) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;background:var(--mavi);z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;';
  el.textContent = msg; document.body.appendChild(el);
  setTimeout(function(){el.style.opacity='1';el.style.transform='translateY(0)';},10);
  setTimeout(function(){el.remove();},3000);
}

async function durumGuncelle(id, durum) {
  try { await apiPatch(TABLO, id, {'Durum':durum}); await veriYukle(); } catch(e) { alert('Hata: '+e.message); }
}
async function rfqDonustur(id) {
  var r = talepler.find(function(t){return t.id===id});
  var prNo = r?r.fields['Talep No']:'';
  if (!confirm(prNo+' icin RFQ olusturulsun mu?')) return;
  try {
    await apiPatch(TABLO, id, {'Durum':'RFQ Olusturuldu'});
    if (typeof logIslem==='function') logIslem('PR_RFQ_DONUSTURULDU','Satinalma',id,prNo,null,{});
    window.location.href = 'ersan_satinalma_rfq.html?pr='+encodeURIComponent(prNo);
  } catch(e) { alert('Hata: '+e.message); }
}

document.addEventListener('DOMContentLoaded', veriYukle);
</script>
