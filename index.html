<script>

  { group:'uretim', icon:'📦', name:'Sipariş Yönetimi', desc:'Onaylanan tekliften sipariş, SP gruplama, PDF viewer, teknik resim', url:'ersan_siparisler.html', status:'active', std:['AS9100 §8.2'] },
  { group:'uretim', icon:'🛒', name:'Satınalma', desc:'AI müzakere paketi, RFQ, tedarikçi teklif karşılaştırma, tasarruf raporu', url:'ersan_satinalma.html', status:'active', std:['AS9100 §8.4','ISO §8.4'] },
  { group:'uretim', icon:'📋', name:'Ön Kabul', desc:'Malzeme ön kabul formu, tedarikçi satınalma sipariş eşleştirme', url:'ersan_on_kabul.html', status:'active', std:['AS9100 §8.4'] },
  { group:'uretim', icon:'🔬', name:'Girdi Kalite', desc:'Malzeme muayenesi, MAT ID, QR etiket, kabul/red kararı', url:'ersan_girdi_kalite.html', status:'active', std:['AS9100 §8.4'] },
  { group:'uretim', icon:'⚙️', name:'İş Emirleri', desc:'WO oluşturma, lot numarası, traveler, operasyon rotası, tezgah atama', url:'ersan_isemirleri.html', status:'active', std:['AS9100 §8.5'] },
  { group:'uretim', icon:'🏭', name:'Üretim / Atölye', desc:'Operasyon rotası, traveller takibi, QR tarama, tezgah durumu', url:'ersan_uretim.html', status:'active', std:['AS9100 §8.5'] },
  { group:'uretim', icon:'🚚', name:'Sevkiyat', desc:'8 madde sevk kontrol, CoC oluşturma, irsaliye, kalite onay', url:'ersan_sevkiyat.html', status:'active', std:['AS9100 §8.5.4'] },

  // Kalite
  { group:'kalite', icon:'✅', name:'Kalite Kontrol', desc:'Girdi kalite, üretim muayenesi, NCR, CAPA hub sayfası', url:'ersan_kalite.html', status:'active', std:['AS9100 §8.6','ISO §8.6'] },
  { group:'kalite', icon:'⚠️', name:'NCR Yönetimi', desc:'Uygunsuzluk raporu, AI kök neden, ıskarta/yeniden işle/sapma kararı', url:'ersan_ncr.html', status:'active', std:['AS9100 §8.7'] },
  { group:'kalite', icon:'🔧', name:'CAPA', desc:'Düzeltici faaliyet, 5-Why AI analizi, önleyici aksiyon, kapanış', url:'ersan_duzeltici.html', status:'active', std:['AS9100 §10.2','ISO §10.2'] },
  { group:'kalite', icon:'🔍', name:'İç Denetim', desc:'Denetim planı, AI kontrol listesi, bulgu kaydı, kapanış takibi', url:'ersan_denetim.html', status:'active', std:['AS9100 §9.2','ISO §9.2'] },

  // Destek
  { group:'destek', icon:'🔩', name:'Ekipman & Bakım', desc:'Bakım/kalibrasyon takibi, arıza kaydı, durum güncelleme', url:'ersan_bakim.html', status:'active', std:['AS9100 §7.1.3'] },
  { group:'destek', icon:'📁', name:'Doküman Yönetimi', desc:'Prosedür, talimat, form, revizyon takibi, gözden geçirme uyarısı', url:'ersan_dokuman.html', status:'active', std:['AS9100 §7.5','ISO §7.5'] },

  { group:'yonetim', icon:'📊', name:'Yönetim Gözden Geçirme', desc:'KPI dashboard, Chart.js grafik, AI yönetim raporu', url:'ersan_ygg.html', status:'active', std:['AS9100 §9.3','ISO §9.3'] },
  { group:'yonetim', icon:'🏭', name:'Akıllı Fabrika', desc:'Canlı dashboard, tezgah durumu, AI günlük özet, termin takvimi', url:'ersan_akilli_fabrika.html', status:'active', std:['AS9100 §8.5'] },
];

function renderModules() {
  const groups = { uretim: [], kalite: [], destek: [], yonetim: [] };
  MODULES_DEF.forEach(m => groups[m.group].push(m));
  Object.entries(groups).forEach(([key, mods]) => {
    const el = document.getElementById('mod-' + key);
    if (!el) return;
    el.innerHTML = mods.map(m => `
      <a href="${m.status === 'active' ? m.url : '#'}" class="module-card ${m.status === 'active' ? 'active' : 'soon'}">
        <div class="module-header">
          <span class="module-icon">${m.icon}</span>
          <span class="status-badge ${m.status === 'active' ? 's-active' : 's-soon'}">${m.status === 'active' ? 'Aktif' : 'Yakında'}</span>
        </div>
        <div class="module-name">${m.name}</div>
        <div class="module-desc">${m.desc}</div>
        <div class="module-std">${m.std.map(s => {
          const cls = s.startsWith('AS') ? 'badge-as' : s.startsWith('OH') ? 'badge-oh' : 'badge-iso';
          return `<span class="std-badge ${cls}">${s}</span>`;
        }).join('')}</div>
      </a>`).join('');
  });
}

async function airtableGet(table, filter) {
  try {
    const params = { table };
    if (filter) params.filter = filter;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(v)).join('&');
    const r = await fetch('/.netlify/functions/airtable?' + qs);
    const d = await r.json();
    return (d.records?.length ?? 0).toString();
  } catch { return '—'; }
}
async function loadStats() {
  const [t, s, ie, stl, ncr, mal] = await Promise.all([
    airtableGet('Teklifler', 'AND({Durum}!="Onaylandı",{Durum}!="Reddedildi")'),
    airtableGet('Satış Emirleri', '{Durum}!="Tamamlandı"'),
    airtableGet('İş Emirleri', '{Durum}!="Tamamlandı"'),
    airtableGet('Satınalma Talepleri', '{Durum}="Taslak"'),
    airtableGet('NCR Kayıtları', '{Statü}!="Kapalı"'),
    airtableGet('Malzeme Girişleri', '{Statü}="Karantina"'),
  ]);
  document.getElementById('stat-teklif').textContent = t;
  document.getElementById('stat-siparis').textContent = s;
  document.getElementById('stat-ie').textContent = ie;
  document.getElementById('stat-stl').textContent = stl;
  document.getElementById('stat-ncr').textContent = ncr;
  document.getElementById('stat-mal').textContent = mal;
}

renderModules();
loadStats();
</script>
